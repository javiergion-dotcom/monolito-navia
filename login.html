<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOGIN · MONOLITO</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#dfe6ec;
  color:#17303d;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
}

.card{
  width:100%;
  max-width:430px;
  background:white;
  border-radius:28px;
  padding:26px;
  box-shadow:0 18px 36px rgba(0,0,0,.25);
}

.logo{
  text-align:center;
  font-size:30px;
  font-weight:900;
  margin-bottom:6px;
}

.sub{
  text-align:center;
  color:#4f5f69;
  font-weight:800;
  margin-bottom:22px;
}

input{
  width:100%;
  padding:18px;
  border-radius:18px;
  border:1px solid #b8c2ca;
  font-size:26px;
  text-align:center;
  letter-spacing:6px;
  font-weight:900;
}

.teclado{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-top:18px;
}

button{
  border:0;
  border-radius:18px;
  padding:18px;
  font-size:22px;
  font-weight:900;
  background:#17303d;
  color:white;
  box-shadow:0 8px 16px rgba(0,0,0,.18);
}

button:active{
  transform:translateY(4px) scale(.97);
}

.borrar{
  background:#c00000;
}

.entrar{
  background:#48a530;
}

.aviso{
  margin-top:18px;
  background:#eef2f5;
  border-radius:16px;
  padding:13px;
  text-align:center;
  font-weight:800;
  color:#4f5f69;
}

.error{
  margin-top:14px;
  color:#c00000;
  text-align:center;
  font-weight:900;
  min-height:20px;
}
</style>
</head>

<body>

<div class="card">

  <div class="logo">MONOLITO</div>
  <div class="sub">Acceso por PIN · Sistema de control</div>

  <input id="pin" type="password" maxlength="8" readonly placeholder="PIN">

  <div class="teclado">
    <button onclick="num('1')">1</button>
    <button onclick="num('2')">2</button>
    <button onclick="num('3')">3</button>

    <button onclick="num('4')">4</button>
    <button onclick="num('5')">5</button>
    <button onclick="num('6')">6</button>

    <button onclick="num('7')">7</button>
    <button onclick="num('8')">8</button>
    <button onclick="num('9')">9</button>

    <button class="borrar" onclick="limpiar()">C</button>
    <button onclick="num('0')">0</button>
    <button class="entrar" onclick="entrar()">OK</button>
  </div>

  <div class="error" id="error"></div>

  <div class="aviso">
    El PIN identifica al usuario y su nivel de autoridad.
  </div>

</div>

<script>

/* =========================
   VERSION GLOBAL
========================= */

const VERSION_MONOLITO = "2026.05.20.01";

/* =========================
   LIMPIEZA AUTOMATICA
========================= */

const versionGuardada = localStorage.getItem("version_monolito");

if(versionGuardada !== VERSION_MONOLITO){

  localStorage.removeItem("usuario");
  localStorage.removeItem("nivel");
  localStorage.removeItem("loginActivo");
  localStorage.removeItem("ultimoLogin");
  localStorage.removeItem("usuarios_monolito");

  localStorage.setItem("version_monolito", VERSION_MONOLITO);
}

/* =========================
   USUARIOS BASE
========================= */

function usuariosBase(){

  return [

    {nombre:"SILVIA", pin:"2580", nivel:"HOSTELERIA", activo:true, fijo:true},

    {nombre:"HOSTELERO", pin:"0000", nivel:"HOSTELERIA", activo:true, fijo:true},

    {nombre:"CAMARERO", pin:"1111", nivel:"CAMARERO", activo:true, fijo:true}

  ];
}

/* =========================
   LEER USUARIOS
========================= */

function leerUsuarios(){

  let data = JSON.parse(localStorage.getItem("usuarios_monolito") || "null");

  if(!Array.isArray(data)){
    data = [];
  }

  const base = usuariosBase();

  base.forEach(b => {

    const existe = data.find(u =>
      String(u.nombre || "").toUpperCase() === String(b.nombre).toUpperCase()
    );

    if(!existe){
      data.push(b);
    }

  });

  /* ELIMINAR JAVI Y 0985 */

  data = data.filter(u => {

    const nombre = String(u.nombre || "").toUpperCase();
    const pin = String(u.pin || "");

    if(nombre === "JAVI") return false;
    if(pin === "0985") return false;

    return true;
  });

  localStorage.setItem("usuarios_monolito", JSON.stringify(data));

  return data;
}

/* =========================
   NIVEL USUARIO
========================= */

function nivelUsuario(u){

  const nombre = String(u.nombre || "").toUpperCase();

  if(u.nivel) return u.nivel;

  if(
    nombre === "SILVIA" ||
    nombre === "HOSTELERO"
  ){
    return "HOSTELERIA";
  }

  return "CAMARERO";
}

/* =========================
   TECLADO
========================= */

function num(n){

  const p = document.getElementById("pin");

  if(p.value.length >= 8) return;

  p.value += n;

  document.getElementById("error").textContent = "";
}

function limpiar(){

  document.getElementById("pin").value = "";

  document.getElementById("error").textContent = "";
}

/* =========================
   LOGIN
========================= */

function entrar(){

  const pin = document.getElementById("pin").value;

  const usuarios = leerUsuarios();

  const usuario = usuarios.find(u =>

    String(u.pin) === String(pin) &&
    u.activo !== false

  );

  if(!usuario){

    document.getElementById("error").textContent = "PIN incorrecto";

    limpiar();

    return;
  }

  const nivel = nivelUsuario(usuario);

  localStorage.setItem("usuario", usuario.nombre);

  localStorage.setItem("nivel", nivel);

  localStorage.setItem("loginActivo", "SI");

  localStorage.setItem("ultimoLogin", new Date().toLocaleString("es-ES"));

  window.location.href = "index.html?v=" + VERSION_MONOLITO;
}

/* =========================
   TECLADO FISICO
========================= */

document.addEventListener("keydown", function(e){

  if(e.key >= "0" && e.key <= "9"){
    num(e.key);
  }

  if(e.key === "Backspace"){

    const p = document.getElementById("pin");

    p.value = p.value.slice(0,-1);
  }

  if(e.key === "Enter"){
    entrar();
  }

});

/* =========================
   ARRANQUE
========================= */

leerUsuarios();

</script>

</body>
</html>
