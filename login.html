<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO · ACCESO</title>

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color: transparent;
}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(180deg,#17303d 0%, #0f1f28 100%);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.contenedor{
  width:100%;
  max-width:380px;
  padding:30px 20px;
  text-align:center;
}

.logo{
  font-size:36px;
  font-weight:700;
  letter-spacing:2px;
  margin-bottom:10px;
}

.sub{
  font-size:14px;
  opacity:0.75;
  margin-bottom:30px;
}

input{
  width:100%;
  padding:18px;
  font-size:22px;
  text-align:center;
  border:none;
  border-radius:14px;
  outline:none;
  margin-bottom:20px;
}

.boton{
  background:linear-gradient(180deg,#8fb1c7 0%, #4f6f82 100%);
  padding:18px;
  border-radius:18px;
  font-size:20px;
  font-weight:700;
  cursor:pointer;
  box-shadow:
    inset 0 3px 6px rgba(255,255,255,0.25),
    inset 0 -8px 16px rgba(0,0,0,0.15),
    0 16px 30px rgba(0,0,0,0.30);
}

.boton:active{
  transform:translateY(8px) scale(0.96);
}

.mensaje{
  margin-top:14px;
  font-size:14px;
  color:#ffd7d7;
  min-height:20px;
}
</style>
</head>

<body>

<div class="contenedor">
  <div class="logo">MONOLITO</div>
  <div class="sub">Acceso por código</div>

  <input type="number" id="codigo" placeholder="Código" autofocus>

  <div class="boton" onclick="entrar()">ENTRAR</div>

  <div class="mensaje" id="mensaje"></div>
</div>

<script>
const CODIGO_PERMITIDO = "2580";

function entrar(){
  const codigo = document.getElementById("codigo").value.trim();

  if(codigo === ""){
    document.getElementById("mensaje").textContent = "Introduce código";
    return;
  }

  if(codigo !== CODIGO_PERMITIDO){
    document.getElementById("mensaje").textContent = "Código incorrecto";
    return;
  }

  localStorage.setItem("usuario", codigo);
  sessionStorage.setItem("loginOK", "SI");

  try{
    if(navigator.vibrate){
      navigator.vibrate(20);
    }
  }catch(e){}

  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "sine";
    osc.frequency.value = 240;
    gain.gain.value = 0.03;

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start();
    osc.stop(ctx.currentTime + 0.08);
  }catch(e){}

  setTimeout(function(){
    window.location.href = "index.html";
  },100);
}

document.getElementById("codigo").addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    entrar();
  }
});
</script>

</body>
</html>
