<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso Monolito</title>

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color: transparent;
}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(180deg,#0f1a21 0%, #17303d 100%);
  color:white;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.contenedor{
  width:100%;
  max-width:420px;
  padding:24px;
  text-align:center;
}

.logo{
  font-size:34px;
  font-weight:700;
  margin-bottom:8px;
}

.sub{
  font-size:15px;
  opacity:.8;
  margin-bottom:24px;
}

.pin{
  min-height:38px;
  font-size:30px;
  letter-spacing:12px;
  margin-bottom:10px;
}

.estado{
  min-height:22px;
  font-size:14px;
  opacity:.75;
  margin-bottom:24px;
}

.teclado{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
}

.tecla{
  border:none;
  border-radius:18px;
  height:84px;
  font-size:28px;
  font-weight:700;
  color:white;
  background:linear-gradient(180deg,#6f8fa6 0%, #4c6576 100%);
  box-shadow:
    inset 0 2px 4px rgba(255,255,255,0.22),
    0 10px 20px rgba(0,0,0,0.25);
  cursor:pointer;
}

.tecla:active{
  transform:translateY(3px);
}

@media (max-width: 480px){
  .contenedor{
    max-width:360px;
    padding:18px;
  }

  .tecla{
    height:76px;
    font-size:25px;
  }
}
</style>
</head>

<body>

<div class="contenedor">
  <div class="logo">MONOLITO</div>
  <div class="sub">Identificación de operador</div>

  <div class="pin" id="pin"></div>
  <div class="estado" id="estado">Introduce tu código</div>

  <div class="teclado">
    <button class="tecla" type="button" onclick="meter('1')">1</button>
    <button class="tecla" type="button" onclick="meter('2')">2</button>
    <button class="tecla" type="button" onclick="meter('3')">3</button>
    <button class="tecla" type="button" onclick="meter('4')">4</button>
    <button class="tecla" type="button" onclick="meter('5')">5</button>
    <button class="tecla" type="button" onclick="meter('6')">6</button>
    <button class="tecla" type="button" onclick="meter('7')">7</button>
    <button class="tecla" type="button" onclick="meter('8')">8</button>
    <button class="tecla" type="button" onclick="meter('9')">9</button>
    <button class="tecla" type="button" onclick="borrar()">←</button>
    <button class="tecla" type="button" onclick="meter('0')">0</button>
    <button class="tecla" type="button" onclick="reiniciar()">C</button>
  </div>
</div>

<script>
let codigo = "";

const usuarios = {
  "0985": { nombre:"JAVI", tipo:"admin" },
  "4544": { nombre:"SILVIA", tipo:"admin" },
  "1111": { nombre:"DARIO", tipo:"operador" },
  "2222": { nombre:"TOÑO", tipo:"operador" }
};

function refrescar(){
  document.getElementById("pin").textContent = "• ".repeat(codigo.length);
}

function meter(n){
  if(codigo.length >= 4) return;

  codigo += n;
  refrescar();

  if(codigo.length === 4){
    validar();
  }
}

function borrar(){
  codigo = codigo.slice(0,-1);
  refrescar();
}

function reiniciar(){
  codigo = "";
  document.getElementById("estado").textContent = "Introduce tu código";
  refrescar();
}

function validar(){
  const usuario = usuarios[codigo];

  if(usuario){
    localStorage.setItem("usuario", usuario.nombre);
    localStorage.setItem("tipoUsuario", usuario.tipo);
    window.location.href = "index.html";
  }else{
    document.getElementById("estado").textContent = "Código incorrecto";
    setTimeout(() => {
      reiniciar();
    }, 700);
  }
}

document.addEventListener("keydown", function(e){
  if(e.key >= "0" && e.key <= "9"){
    meter(e.key);
  }else if(e.key === "Backspace"){
    borrar();
  }else if(e.key === "Escape"){
    reiniciar();
  }
});

refrescar();
</script>

</body>
</html>
