<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMUNICACIÓN · MONOLITO</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#eef2f5;color:#17303d}
header{background:#17303d;color:white;padding:16px;display:flex;align-items:center;gap:12px}
header h2{margin:0;font-size:20px}
button{border:0;border-radius:14px;padding:12px;font-size:15px;font-weight:900;cursor:pointer}
.volver{background:white;color:#17303d}
.contenedor{padding:16px}
.card{background:white;border-radius:22px;padding:16px;margin-bottom:14px;box-shadow:0 8px 18px rgba(0,0,0,.10)}
textarea{width:100%;min-height:110px;padding:12px;border-radius:14px;border:1px solid #ccc;font-size:16px}
.guardar{width:100%;margin-top:10px;background:#17303d;color:white}
.comunicacion{border-left:8px solid #f2c94c}
.fecha{font-size:13px;color:#666;margin-top:8px}
.hecha{opacity:.55}
.hecha p{text-decoration:line-through}
.acciones{display:flex;gap:8px;margin-top:10px}
.ok{background:#27ae60;color:white;flex:1}
.borrar{background:#c0392b;color:white;flex:1}
.estado{font-size:13px;color:#666;margin-top:8px}
.error{background:#fdecea;color:#8a1f11;border-left:8px solid #c0392b}
</style>
</head>

<body>

<header>
  <button id="btnVolver" class="volver">← Volver</button>
  <h2>COMUNICACIÓN</h2>
</header>

<div class="contenedor">

  <div class="card">
    <h3>Nueva comunicación</h3>
    <textarea id="mensaje" placeholder="Escribe aquí la comunicación para el siguiente turno..."></textarea>
    <button id="btnGuardar" class="guardar">GUARDAR COMUNICACIÓN</button>
    <div id="estado" class="estado"></div>
  </div>

  <div id="lista"></div>

</div>

<script type="module">
import {
  leerColeccion,
  guardarColeccion,
  escucharColeccion,
  borrarDocumento
} from "./monolito-cloud.js";

const COLECCION = "comunicaciones";
const CLAVE_LOCAL = "monolito_comunicaciones";
const CLAVE_LOCAL_VIEJA = "monolito_comunicaciones";

let comunicaciones = [];
let guardando = false;

function usuarioActual(){
  return localStorage.getItem("usuario") ||
         localStorage.getItem("usuarioActual") ||
         "JAVI";
}

function crearId(){
  return "comunicacion_" + Date.now() + "_" + Math.random().toString(36).slice(2,7);
}

function esc(txt){
  return String(txt || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function estado(txt){
  document.getElementById("estado").textContent = txt || "";
}

function normalizar(c){
  return {
    id: c.id ? String(c.id) : crearId(),
    mensaje: c.mensaje || "",
    usuario: c.usuario || "JAVI",
    fecha: c.fecha || new Date().toLocaleString("es-ES"),
    fechaMs: Number(c.fechaMs || Date.now()),
    hecha: Boolean(c.hecha),
    actualizadoEn: c.actualizadoEn || new Date().toISOString()
  };
}

function ordenarLista(lista){
  return [...lista].sort((a,b)=>Number(b.fechaMs || 0) - Number(a.fechaMs || 0));
}

function guardarLocal(){
  localStorage.setItem(CLAVE_LOCAL, JSON.stringify(comunicaciones));
}

async function guardarLista(){
  guardarLocal();
  await guardarColeccion(COLECCION, comunicaciones);
}

async function guardarComunicacion(){
  if(guardando) return;

  const campo = document.getElementById("mensaje");
  const mensaje = campo.value.trim();

  if(!mensaje){
    alert("Escribe una comunicación.");
    return;
  }

  guardando = true;
  estado("Guardando comunicación...");

  const nueva = normalizar({
    id: crearId(),
    mensaje,
    usuario: usuarioActual(),
    fecha: new Date().toLocaleString("es-ES"),
    fechaMs: Date.now(),
    hecha: false,
    actualizadoEn: new Date().toISOString()
  });

  comunicaciones.unshift(nueva);

  try{
    await guardarLista();
    campo.value = "";
    pintar();
    estado("Comunicación guardada correctamente.");
  }catch(error){
    console.error(error);
    estado("Error al guardar. Se conserva copia local.");
    pintar();
  }finally{
    guardando = false;
  }
}

async function marcarHecha(id){
  comunicaciones = comunicaciones.map(c => {
    if(String(c.id) === String(id)){
      return normalizar({
        ...c,
        hecha: !c.hecha,
        actualizadoEn: new Date().toISOString()
      });
    }
    return c;
  });

  try{
    await guardarLista();
  }catch(error){
    console.error(error);
    guardarLocal();
  }

  pintar();
}

async function borrarComunicacion(id){
  if(!confirm("¿Borrar esta comunicación?")) return;

  comunicaciones = comunicaciones.filter(c => String(c.id) !== String(id));
  guardarLocal();
  pintar();

  try{
    await borrarDocumento(COLECCION, id);
  }catch(error){
    console.error(error);
    estado("No se pudo borrar en la nube. Revisa conexión.");
  }
}

function pintar(){
  const lista = document.getElementById("lista");

  if(comunicaciones.length === 0){
    lista.innerHTML = `
      <div class="card">
        No hay comunicaciones pendientes.
      </div>
    `;
    return;
  }

  const ordenadas = ordenarLista(comunicaciones);

  lista.innerHTML = ordenadas.map(c => `
    <div class="card comunicacion ${c.hecha ? "hecha" : ""}">
      <strong>${esc(c.usuario)}</strong>
      <p>${esc(c.mensaje)}</p>
      <div class="fecha">${esc(c.fecha)}</div>
      <div class="acciones">
        <button class="ok" data-accion="hecha" data-id="${esc(c.id)}">
          ${c.hecha ? "REABRIR" : "HECHA"}
        </button>
        <button class="borrar" data-accion="borrar" data-id="${esc(c.id)}">
          BORRAR
        </button>
      </div>
    </div>
  `).join("");
}

function volver(){
  window.location.href = "index.html";
}

function activarBotones(){
  document.getElementById("btnVolver").addEventListener("click", volver);
  document.getElementById("btnGuardar").addEventListener("click", guardarComunicacion);

  document.getElementById("lista").addEventListener("click", function(e){
    const btn = e.target.closest("button");
    if(!btn) return;

    const accion = btn.dataset.accion;
    const id = btn.dataset.id;

    if(accion === "hecha") marcarHecha(id);
    if(accion === "borrar") borrarComunicacion(id);
  });
}

async function recuperarLocalSiExiste(){
  const local = localStorage.getItem(CLAVE_LOCAL_VIEJA);
  if(!local) return [];

  try{
    return JSON.parse(local).map(normalizar);
  }catch(e){
    return [];
  }
}

async function iniciar(){
  activarBotones();
  pintar();

  escucharColeccion(COLECCION, (lista)=>{
    comunicaciones = ordenarLista((lista || []).map(normalizar));
    guardarLocal();
    pintar();
  });

  try{
    const nube = await leerColeccion(COLECCION);
    comunicaciones = ordenarLista((nube || []).map(normalizar));

    if(comunicaciones.length === 0){
      const recuperadas = await recuperarLocalSiExiste();

      if(recuperadas.length > 0){
        comunicaciones = ordenarLista(recuperadas);
        await guardarLista();
      }
    }

    pintar();
  }catch(error){
    console.error(error);

    const recuperadas = await recuperarLocalSiExiste();

    comunicaciones = ordenarLista(recuperadas);
    pintar();

    if(comunicaciones.length === 0){
      document.getElementById("lista").innerHTML = `
        <div class="card error">
          No se pudo cargar comunicación desde la nube.
        </div>
      `;
    }
  }
}

iniciar();
</script>

</body>
</html>
