<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVISOS PEDIDOS · MONOLITO</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#eef2f5;color:#17303d}
header{background:#17303d;color:white;padding:16px;display:flex;align-items:center;gap:12px}
header h2{margin:0;font-size:20px}
button{border:0;border-radius:14px;padding:12px;font-size:16px;font-weight:900;cursor:pointer}
.volver{background:white;color:#17303d;width:auto;padding:8px 12px}
.contenedor{padding:16px}
.card{background:white;border-radius:22px;padding:16px;margin-bottom:14px;box-shadow:0 8px 18px rgba(0,0,0,.12)}
label{display:block;font-weight:900;margin-top:12px}
textarea,select{width:100%;margin-top:6px;padding:13px;border-radius:16px;border:1px solid #b8c2ca;font-size:16px}
textarea{min-height:110px;resize:none}
.guardar{width:100%;background:#48a530;color:white;margin-top:14px}
.eliminar{width:100%;background:#c00000;color:white;margin-top:12px}
.aviso{border-left:8px solid #ffb300}
.incidencia{border-left:8px solid #c00000}
.texto{font-size:16px;font-weight:900}
.fecha{margin-top:8px;color:#60707a;font-size:13px;font-weight:900}
.tipo{display:inline-block;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:900;margin-bottom:8px}
.tipoAviso{background:#fff3cd;color:#8a6200}
.tipoIncidencia{background:#ffd7d7;color:#9b0000}
.vacio{background:white;border-radius:22px;padding:18px;text-align:center;font-weight:900;color:#60707a}
.estado{font-size:13px;font-weight:900;color:#60707a;margin-bottom:12px}
</style>
</head>

<body>

<header>
  <button id="btnVolver" class="volver">←</button>
  <h2>🛎️ AVISOS PEDIDOS</h2>
</header>

<div class="contenedor">

  <div class="estado" id="estadoCloud">Conectando con la nube...</div>

  <div class="card">
    <label>Tipo</label>
    <select id="tipo">
      <option value="AVISO">AVISO</option>
      <option value="INCIDENCIA">INCIDENCIA</option>
    </select>

    <label>Texto del aviso</label>
    <textarea id="texto" placeholder="Ejemplo: Falta gel de manos, mini servilletas, vasos takeaway..."></textarea>

    <button id="btnGuardar" class="guardar">Guardar aviso</button>
  </div>

  <div id="lista"></div>

</div>

<script type="module">
import {
  guardarColeccion,
  escucharColeccion,
  borrarDocumento
} from "./monolito-cloud.js";

let avisosCloud = [];

function usuarioActual(){
  return localStorage.getItem("usuario") || "JAVI";
}

function crearId(){
  return "aviso_" + Date.now() + "_" + Math.random().toString(36).slice(2,7);
}

function esc(txt){
  return String(txt || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function volver(){
  window.location.href = "index.html";
}

async function guardarAviso(){
  const texto = document.getElementById("texto").value.trim();
  const tipo = document.getElementById("tipo").value;

  if(!texto){
    alert("Escribe un aviso.");
    return;
  }

  const nuevo = {
    id: crearId(),
    texto,
    tipo,
    fecha: new Date().toLocaleString("es-ES"),
    fechaMs: Date.now(),
    creadoPor: usuarioActual(),
    activo: true,
    actualizadoEn: new Date().toISOString()
  };

  avisosCloud.unshift(nuevo);

  await guardarColeccion("avisos_pedidos", avisosCloud);

  document.getElementById("texto").value = "";
  document.getElementById("tipo").value = "AVISO";
}

async function eliminarAviso(id){
  if(!confirm("¿Eliminar este aviso?")) return;

  avisosCloud = avisosCloud.filter(a => String(a.id) !== String(id));

  await borrarDocumento("avisos_pedidos", id);

  pintar();
}

function pintar(){
  let html = "";

  if(avisosCloud.length === 0){
    html = `<div class="vacio">No hay avisos pendientes</div>`;
  }else{
    avisosCloud.forEach((a)=>{
      const esIncidencia = a.tipo === "INCIDENCIA";

      html += `
        <div class="card ${esIncidencia ? "incidencia" : "aviso"}">
          <div class="tipo ${esIncidencia ? "tipoIncidencia" : "tipoAviso"}">
            ${esIncidencia ? "INCIDENCIA" : "AVISO"}
          </div>

          <div class="texto">
            ${esIncidencia ? "🚨" : "🛎️"} ${esc(a.texto || "")}
          </div>

          <div class="fecha">
            ${esc(a.fecha || "")}
          </div>

          <button class="eliminar" data-accion="eliminar" data-id="${esc(a.id)}">
            Eliminar
          </button>
        </div>
      `;
    });
  }

  document.getElementById("lista").innerHTML = html;
}

function activarBotones(){
  document.getElementById("btnVolver").addEventListener("click", volver);
  document.getElementById("btnGuardar").addEventListener("click", guardarAviso);

  document.getElementById("lista").addEventListener("click", function(e){
    const btn = e.target.closest("button");
    if(!btn) return;

    if(btn.dataset.accion === "eliminar"){
      eliminarAviso(btn.dataset.id);
    }
  });
}

function iniciar(){
  activarBotones();

  escucharColeccion("avisos_pedidos", (lista)=>{
    avisosCloud = lista.sort((a,b)=>
      Number(b.fechaMs || 0) - Number(a.fechaMs || 0)
    );

    document.getElementById("estadoCloud").textContent =
      "✅ Conectado a Firebase · avisos sincronizados";

    pintar();
  });
}

iniciar();
</script>

</body>
</html>
