<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONFIGURACIÓN · MONOLITO</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#eef2f5;
  color:#17303d;
}

header{
  background:#17303d;
  color:white;
  padding:16px;
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:900;
  font-size:20px;
}

.volver{
  background:white;
  color:#17303d;
  border:0;
  border-radius:12px;
  padding:8px 12px;
  font-weight:900;
}

.contenido{
  padding:16px;
}

.card{
  background:white;
  border-radius:22px;
  padding:16px;
  margin-bottom:14px;
  box-shadow:0 8px 18px rgba(0,0,0,.12);
}

.titulo{
  font-size:22px;
  font-weight:900;
  margin-bottom:10px;
}

.subtitulo{
  font-size:16px;
  font-weight:900;
  margin-top:16px;
  margin-bottom:8px;
  color:#4f5f69;
}

label{
  display:block;
  font-weight:900;
  margin-top:12px;
  margin-bottom:6px;
}

input,select,textarea{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:1px solid #b8c2ca;
  font-size:16px;
}

textarea{
  min-height:80px;
}

button{
  border:0;
  border-radius:14px;
  padding:12px;
  font-weight:900;
  font-size:15px;
}

.guardar{
  width:100%;
  background:#48a530;
  color:white;
  margin-top:14px;
}

.nuevo{
  width:100%;
  background:#ff9800;
  color:white;
  margin-top:10px;
}

.borrar{
  width:100%;
  background:#c00000;
  color:white;
  margin-top:10px;
}

.editar{
  background:#2196f3;
  color:white;
}

.desactivar{
  background:#ff9800;
  color:white;
}

.reactivar{
  background:#48a530;
  color:white;
}

.linea{
  border-top:1px solid #dfe6ec;
  padding-top:12px;
  margin-top:12px;
}

.nombre{
  font-size:18px;
  font-weight:900;
}

.detalle{
  color:#4f5f69;
  margin-top:5px;
  font-size:14px;
}

.botones{
  display:flex;
  gap:8px;
  margin-top:10px;
  flex-wrap:wrap;
}

.botones button{
  flex:1;
}

.inactivo{
  opacity:.45;
}

.aviso{
  background:#fff3cd;
  color:#7a4d00;
  border-radius:14px;
  padding:12px;
  font-weight:900;
  margin-top:10px;
}

.rojoAviso{
  background:#ffe0e0;
  color:#c00000;
  border-radius:14px;
  padding:12px;
  font-weight:900;
  margin-top:10px;
}

.vacio{
  background:#eef2f5;
  border-radius:18px;
  padding:16px;
  text-align:center;
  font-weight:900;
  margin-top:10px;
}

.oculto{
  display:none;
}
</style>
</head>

<body>

<script>
const nivel = localStorage.getItem("nivel");

if(nivel === "demo"){
  alert("Acceso no permitido en modo DEMO");
  window.location.href = "index.html";
}
</script>

<header>
  <button class="volver" onclick="volver()">←</button>
  ⚙️ CONFIGURACIÓN
</header>

<div class="contenido">

  <!-- ================= USUARIOS ================= -->

  <div class="card">

    <div class="titulo">
      Usuarios
    </div>

    <label>Nombre usuario</label>
    <input id="usuarioNombre" placeholder="Ej: DARÍO">

    <label>PIN</label>
    <input id="usuarioPin" type="number" placeholder="Ej: 1234">

    <button class="guardar" onclick="guardarUsuario()">
      💾 Guardar usuario
    </button>

    <div id="listaUsuarios"></div>

  </div>

  <!-- ================= PROMOCIONES ================= -->

  <div class="card">

    <div class="titulo">
      Promociones
    </div>

    <label>Proveedor</label>
    <input id="promoProveedor" placeholder="Ej: TURRADO">

    <label>Promoción</label>
    <input id="promoNombre" placeholder="Ej: MAHOU 5 + 2">

    <label>% descuento</label>
    <input id="promoDescuento" type="number" step="0.01">

    <label>Unidades con cargo</label>
    <input id="promoCargo" type="number" step="1">

    <label>Unidades coste 0 €</label>
    <input id="promoGratis" type="number" step="1">

    <label>Fecha inicio</label>
    <input id="promoInicio" type="date">

    <label>Fecha fin</label>
    <input id="promoFin" type="date">

    <label>Nota</label>
    <textarea id="promoNota"></textarea>

    <button class="guardar" onclick="guardarPromocion()">
      💾 Guardar promoción
    </button>

    <button class="nuevo" onclick="limpiarPromocion()">
      ➕ Nueva promoción
    </button>

    <div class="aviso">
      PEDIDOS leerá automáticamente las promociones activas.
    </div>

    <div id="listaPromociones"></div>

  </div>

  <!-- ================= CONTROL PEDIDOS ================= -->

  <div class="card">

    <div class="titulo">
      Control pedidos
    </div>

    <div class="detalle">
      Configuración real de comportamiento en PEDIDOS.
    </div>

    <label>
      Activar “Cuántas hay”
    </label>

    <select id="activarCuantasHay">
      <option value="SI">SI</option>
      <option value="NO">NO</option>
    </select>

    <label>
      Activar “Cuántas pido”
    </label>

    <select id="activarCuantasPido">
      <option value="SI">SI</option>
      <option value="NO">NO</option>
    </select>

    <label>
      Frecuencia control stock
    </label>

    <select id="frecuenciaControl">
      <option value="SIEMPRE">SIEMPRE</option>
      <option value="SEMANAL">SEMANAL</option>
      <option value="MENSUAL">MENSUAL</option>
      <option value="PERSONALIZADO">PERSONALIZADO</option>
    </select>

    <label>
      Cada cuántos pedidos
    </label>

    <input
      type="number"
      id="cadaPedidos"
      placeholder="Ej: 4"
    >

    <button class="guardar" onclick="guardarControlPedidos()">
      💾 Guardar control pedidos
    </button>

    <div class="aviso">
      PEDIDOS leerá esta configuración automáticamente.
    </div>

  </div>

  <!-- ================= SISTEMA ================= -->

  <div class="card">

    <div class="titulo">
      Sistema
    </div>

    <div class="rojoAviso">
      Zona delicada. Solo usar para limpiar pruebas.
    </div>

    <button class="borrar" onclick="borrarCalendario()">
      Borrar calendario
    </button>

    <button class="borrar" onclick="borrarDocumentos()">
      Borrar documentos
    </button>

    <button class="borrar" onclick="borrarPagos()">
      Borrar pagos pendientes
    </button>

    <button class="borrar" onclick="borrarHistoricoPedidos()">
      Borrar histórico pedidos
    </button>

    <button class="borrar" onclick="borrarIncidencias()">
      Borrar incidencias
    </button>

  </div>

</div>

<script>

let editandoUsuario = "";
let editandoPromo = "";

function volver(){
  window.location.href = "index.html";
}

function usuarioActual(){
  return localStorage.getItem("usuario") || "OPERADOR";
}

function esHostelero(){
  const u = usuarioActual().toUpperCase();
  return u === "JAVI" || u === "JAVIER" || u === "SILVIA";
}

function protegerAcceso(){

  if(!esHostelero()){

    alert("⚠ ACCESO SOLO HOSTELERÍA");

    window.location.href = "index.html";
  }
}

protegerAcceso();

function normalizar(t){
  return String(t || "").trim().toUpperCase();
}

/* ================= USUARIOS ================= */

function usuariosBase(){

  return [

    {
      nombre:"JAVI",
      pin:"0000",
      fijo:true,
      activo:true
    },

    {
      nombre:"SILVIA",
      pin:"0000",
      fijo:true,
      activo:true
    },

    {
      nombre:"CAMARERO",
      pin:"1111",
      fijo:true,
      activo:true
    }
  ];
}

function leerUsuarios(){

  let data = JSON.parse(
    localStorage.getItem("usuarios_monolito") || "null"
  );

  if(!data || data.length === 0){

    data = usuariosBase();

    guardarUsuarios(data);
  }

  return data;
}

function guardarUsuarios(data){

  localStorage.setItem(
    "usuarios_monolito",
    JSON.stringify(data)
  );
}

function guardarUsuario(){

  const nombre = normalizar(
    document.getElementById("usuarioNombre").value
  );

  const pin = String(
    document.getElementById("usuarioPin").value || ""
  ).trim();

  if(!nombre){
    alert("Falta el nombre.");
    return;
  }

  if(!pin){
    alert("Falta el PIN.");
    return;
  }

  let data = leerUsuarios();

  let idx = data.findIndex(
    u => normalizar(u.nombre) === nombre
  );

  if(editandoUsuario !== ""){
    idx = Number(editandoUsuario);
  }

  const anterior = idx >= 0 ? data[idx] : {};

  const registro = {

    nombre,
    pin,

    fijo: anterior.fijo || false,

    activo: anterior.activo !== false,

    actualizadoPor: usuarioActual(),

    actualizado:
      new Date().toLocaleString("es-ES")
  };

  if(idx >= 0){
    data[idx] = registro;
  }else{
    data.unshift(registro);
  }

  guardarUsuarios(data);

  limpiarUsuario();

  pintarUsuarios();
}

function limpiarUsuario(){

  editandoUsuario = "";

  document.getElementById("usuarioNombre").value = "";

  document.getElementById("usuarioPin").value = "";
}

function editarUsuario(i){

  const u = leerUsuarios()[i];

  editandoUsuario = i;

  document.getElementById("usuarioNombre").value =
    u.nombre || "";

  document.getElementById("usuarioPin").value =
    u.pin || "";

  window.scrollTo({
    top:0,
    behavior:"smooth"
  });
}

function eliminarUsuario(i){

  let data = leerUsuarios();

  const u = data[i];

  if(u.fijo){

    alert("Este usuario base no se elimina.");

    return;
  }

  if(!confirm("¿Eliminar " + u.nombre + "?")) return;

  data.splice(i,1);

  guardarUsuarios(data);

  pintarUsuarios();
}

function pintarUsuarios(){

  const data = leerUsuarios();

  let html = "";

  data.forEach((u,i)=>{

    html += `

      <div class="linea ${u.activo === false ? "inactivo" : ""}">

        <div class="nombre">
          ${u.nombre}
        </div>

        <div class="detalle">
          PIN: ••••
        </div>

        <div class="detalle">
          Última actualización:
          ${u.actualizado || "-"}
        </div>

        <div class="botones">

          <button
            class="editar"
            onclick="editarUsuario(${i})"
          >
            Cambiar PIN
          </button>

          ${
            u.fijo
            ? ""
            : `
              <button
                class="borrar"
                onclick="eliminarUsuario(${i})"
              >
                Eliminar
              </button>
            `
          }

        </div>

      </div>
    `;
  });

  document.getElementById("listaUsuarios").innerHTML = html;
}

/* ================= PROMOCIONES ================= */

function leerPromociones(){

  return JSON.parse(
    localStorage.getItem("promociones_monolito") || "[]"
  );
}

function guardarPromociones(data){

  localStorage.setItem(
    "promociones_monolito",
    JSON.stringify(data)
  );
}

function limpiarPromocion(){

  editandoPromo = "";

  document.getElementById("promoProveedor").value = "";
  document.getElementById("promoNombre").value = "";
  document.getElementById("promoDescuento").value = "";
  document.getElementById("promoCargo").value = "";
  document.getElementById("promoGratis").value = "";
  document.getElementById("promoInicio").value = "";
  document.getElementById("promoFin").value = "";
  document.getElementById("promoNota").value = "";
}

function guardarPromocion(){

  const proveedor = normalizar(
    document.getElementById("promoProveedor").value
  );

  const nombre =
    document.getElementById("promoNombre")
    .value
    .trim()
    .toUpperCase();

  if(!proveedor){
    alert("Falta proveedor.");
    return;
  }

  if(!nombre){
    alert("Falta promoción.");
    return;
  }

  let data = leerPromociones();

  let idx =
    editandoPromo !== ""
    ? Number(editandoPromo)
    : -1;

  const anterior =
    idx >= 0
    ? data[idx]
    : {};

  const registro = {

    id: anterior.id || Date.now(),

    proveedor,

    nombre,

    descuento:Number(
      document.getElementById("promoDescuento").value || 0
    ),

    cargo:Number(
      document.getElementById("promoCargo").value || 0
    ),

    gratis:Number(
      document.getElementById("promoGratis").value || 0
    ),

    inicio:
      document.getElementById("promoInicio").value,

    fin:
      document.getElementById("promoFin").value,

    nota:
      document.getElementById("promoNota").value.trim(),

    activa:
      anterior.activa !== false,

    actualizado:
      new Date().toLocaleString("es-ES")
  };

  if(idx >= 0){
    data[idx] = registro;
  }else{
    data.unshift(registro);
  }

  guardarPromociones(data);

  limpiarPromocion();

  pintarPromociones();
}

function editarPromocion(i){

  const p = leerPromociones()[i];

  editandoPromo = i;

  document.getElementById("promoProveedor").value =
    p.proveedor || "";

  document.getElementById("promoNombre").value =
    p.nombre || "";

  document.getElementById("promoDescuento").value =
    p.descuento || "";

  document.getElementById("promoCargo").value =
    p.cargo || "";

  document.getElementById("promoGratis").value =
    p.gratis || "";

  document.getElementById("promoInicio").value =
    p.inicio || "";

  document.getElementById("promoFin").value =
    p.fin || "";

  document.getElementById("promoNota").value =
    p.nota || "";

  window.scrollTo({
    top:0,
    behavior:"smooth"
  });
}

function togglePromocion(i){

  let data = leerPromociones();

  data[i].activa =
    data[i].activa === false
    ? true
    : false;

  guardarPromociones(data);

  pintarPromociones();
}

function borrarPromocion(i){

  if(!confirm("¿Borrar promoción?")) return;

  let data = leerPromociones();

  data.splice(i,1);

  guardarPromociones(data);

  pintarPromociones();
}

function pintarPromociones(){

  const data = leerPromociones();

  let html = "";

  if(data.length === 0){

    html = `
      <div class="vacio">
        No hay promociones guardadas.
      </div>
    `;
  }

  data.forEach((p,i)=>{

    html += `

      <div class="linea ${p.activa === false ? "inactivo" : ""}">

        <div class="nombre">
          ${p.nombre}
        </div>

        <div class="detalle">
          Proveedor:
          <strong>${p.proveedor}</strong>
        </div>

        <div class="detalle">
          ${p.cargo || 0}
          con cargo ·
          ${p.gratis || 0}
          coste 0 €
        </div>

        <div class="detalle">
          Inicio:
          ${p.inicio || "-"}
          ·
          Fin:
          ${p.fin || "-"}
        </div>

        ${
          p.nota
          ? `
            <div class="detalle">
              Nota:
              ${p.nota}
            </div>
          `
          : ""
        }

        <div class="detalle">
          Estado:
          <strong>
            ${p.activa === false ? "INACTIVA" : "ACTIVA"}
          </strong>
        </div>

        <div class="botones">

          <button
            class="editar"
            onclick="editarPromocion(${i})"
          >
            Editar
          </button>

          <button
            class="${p.activa === false ? "reactivar" : "desactivar"}"
            onclick="togglePromocion(${i})"
          >
            ${p.activa === false ? "Activar" : "Desactivar"}
          </button>

          <button
            class="borrar"
            onclick="borrarPromocion(${i})"
          >
            Borrar
          </button>

        </div>

      </div>
    `;
  });

  document.getElementById("listaPromociones").innerHTML = html;
}

/* ================= CONTROL PEDIDOS ================= */

function leerControlPedidos(){

  return JSON.parse(

    localStorage.getItem("control_pedidos_monolito") ||

    JSON.stringify({

      activarCuantasHay:"SI",

      activarCuantasPido:"SI",

      frecuencia:"SIEMPRE",

      cadaPedidos:4
    })
  );
}

function guardarControlPedidos(){

  const data = {

    activarCuantasHay:
      document.getElementById("activarCuantasHay").value,

    activarCuantasPido:
      document.getElementById("activarCuantasPido").value,

    frecuencia:
      document.getElementById("frecuenciaControl").value,

    cadaPedidos:
      Number(
        document.getElementById("cadaPedidos").value || 0
      )
  };

  localStorage.setItem(
    "control_pedidos_monolito",
    JSON.stringify(data)
  );

  alert("Configuración pedidos guardada.");
}

function pintarControlPedidos(){

  const data = leerControlPedidos();

  document.getElementById("activarCuantasHay").value =
    data.activarCuantasHay || "SI";

  document.getElementById("activarCuantasPido").value =
    data.activarCuantasPido || "SI";

  document.getElementById("frecuenciaControl").value =
    data.frecuencia || "SIEMPRE";

  document.getElementById("cadaPedidos").value =
    data.cadaPedidos || 4;
}

/* ================= SISTEMA ================= */

function confirmarTexto(texto){

  return prompt(
    texto +
    "\n\nEscribe BORRAR para confirmar:"
  ) === "BORRAR";
}

function borrarClave(clave,nombre){

  if(!confirmarTexto("Vas a borrar " + nombre + ".")) return;

  localStorage.removeItem(clave);

  alert(nombre + " borrado.");
}

function borrarCalendario(){
  borrarClave("calendario","calendario");
}

function borrarDocumentos(){
  borrarClave("documentos_monolito","documentos");
}

function borrarPagos(){
  borrarClave("pagos_pendientes","pagos pendientes");
}

function borrarHistoricoPedidos(){
  borrarClave("pedidos_historico","histórico pedidos");
}

function borrarIncidencias(){
  borrarClave("incidencias","incidencias");
}

/* ================= START ================= */

pintarUsuarios();

pintarPromociones();

pintarControlPedidos();

</script>

</body>
</html>
