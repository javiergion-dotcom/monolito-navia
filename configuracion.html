<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONFIGURACIÓN · MONOLITO</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#eef2f5;color:#17303d}
header{background:#17303d;color:white;padding:16px;display:flex;align-items:center;gap:10px;font-weight:900;font-size:20px}
.volver{background:white;color:#17303d;border:0;border-radius:12px;padding:8px 12px;font-weight:900}
.contenido{padding:16px}
.card{background:white;border-radius:22px;padding:16px;margin-bottom:14px;box-shadow:0 8px 18px rgba(0,0,0,.12)}
.cardRoja{background:#fff1f1;border:3px solid #c00000}
.titulo{font-size:22px;font-weight:900;margin-bottom:10px}
label{display:block;font-weight:900;margin-top:12px;margin-bottom:6px}
input,select,textarea{width:100%;padding:12px;border-radius:14px;border:1px solid #b8c2ca;font-size:16px}
textarea{min-height:80px}
button{border:0;border-radius:14px;padding:12px;font-weight:900;font-size:15px}
.guardar{width:100%;background:#48a530;color:white;margin-top:14px}
.nuevo{width:100%;background:#ff9800;color:white;margin-top:10px}
.borrar{width:100%;background:#c00000;color:white;margin-top:10px}
.botonRojo{width:100%;background:#c00000;color:white;margin-top:10px}
.editar{background:#2196f3;color:white}
.desactivar{background:#ff9800;color:white}
.reactivar{background:#48a530;color:white}
.linea{border-top:1px solid #dfe6ec;padding-top:12px;margin-top:12px}
.nombre{font-size:18px;font-weight:900}
.detalle{color:#4f5f69;margin-top:5px;font-size:14px}
.botones{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.botones button{flex:1}
.inactivo{opacity:.45}
.aviso{background:#fff3cd;color:#7a4d00;border-radius:14px;padding:12px;font-weight:900;margin-top:10px}
.rojoAviso{background:#ffe0e0;color:#c00000;border-radius:14px;padding:12px;font-weight:900;margin-top:10px}
.vacio{background:#eef2f5;border-radius:18px;padding:16px;text-align:center;font-weight:900;margin-top:10px}
</style>
</head>

<body>

<header>
  <button class="volver" onclick="volver()">←</button>
  ⚙️ CONFIGURACIÓN
</header>

<div class="contenido">

  <div class="card">
    <div class="titulo">Usuarios</div>

    <label>Usuario</label>
    <input id="usuarioNombre" placeholder="Ej: CAMARERO">

    <label>Contraseña</label>
    <input id="usuarioClave" placeholder="Ej: 1234">

    <label>Rol</label>
    <select id="usuarioRol">
      <option value="ADMIN">ADMIN</option>
      <option value="USUARIO">USUARIO</option>
      <option value="CAMARERO">CAMARERO</option>
    </select>

    <button class="guardar" onclick="guardarUsuario()">💾 Guardar usuario</button>
    <button class="nuevo" onclick="limpiarUsuario()">➕ Nuevo usuario</button>

    <div id="listaUsuarios"></div>
  </div>

  <div class="card">
    <div class="titulo">Promociones</div>

    <label>Proveedor</label>
    <input id="promoProveedor" placeholder="Ej: TURRADO">

    <label>Promoción</label>
    <input id="promoNombre" placeholder="Ej: MAHOU 5 + 2">

    <label>% descuento</label>
    <input id="promoDescuento" type="number" step="0.01">

    <label>Unidades con cargo</label>
    <input id="promoCargo" type="number" step="1">

    <label>Unidades gratis / regalo</label>
    <input id="promoGratis" type="number" step="1">

    <label>Fecha inicio</label>
    <input id="promoInicio" type="date">

    <label>Fecha fin</label>
    <input id="promoFin" type="date">

    <label>Nota</label>
    <textarea id="promoNota"></textarea>

    <button class="guardar" onclick="guardarPromocion()">💾 Guardar promoción</button>
    <button class="nuevo" onclick="limpiarPromocion()">➕ Nueva promoción</button>

    <div class="aviso">PEDIDOS leerá automáticamente las promociones activas desde la nube.</div>

    <div id="listaPromociones"></div>
  </div>

  <div class="card cardRoja">
    <div class="titulo" style="color:#c00000">⚠️ Mantenimiento delicado</div>
    <div class="rojoAviso">Zona delicada. Cada botón borra datos de la nube. Usar solo si estás seguro.</div>

    <button class="botonRojo" onclick="vaciarColeccion('pedidos_historico','PEDIDOS HISTÓRICO')">🗑️ Borrar pedidos histórico</button>
    <button class="botonRojo" onclick="vaciarColeccion('pagos_pendientes','PAGOS PENDIENTES')">🗑️ Borrar pagos pendientes</button>
    <button class="botonRojo" onclick="vaciarColeccion('incidencias','INCIDENCIAS')">🗑️ Borrar incidencias</button>
    <button class="botonRojo" onclick="vaciarColeccion('avisos_pedidos','AVISOS PEDIDOS')">🗑️ Borrar avisos pedidos</button>
    <button class="botonRojo" onclick="vaciarColeccion('promociones_monolito','PROMOCIONES')">🗑️ Borrar promociones</button>
    <button class="botonRojo" onclick="vaciarColeccion('articulos','ARTÍCULOS')">🗑️ Borrar artículos</button>
    <button class="botonRojo" onclick="vaciarColeccion('proveedores','PROVEEDORES')">🗑️ Borrar proveedores</button>
    <button class="botonRojo" onclick="reinicioTotal()">🔥 REINICIO TOTAL DEL PROGRAMA</button>
  </div>

</div>

<script type="module">
import {
  leerColeccion,
  guardarColeccion,
  borrarColeccion,
  borrarDocumento
} from "./monolito-cloud.js";

let usuariosCloud = [];
let promocionesCloud = [];
let editandoUsuario = "";
let editandoPromo = "";

window.volver = function(){
  window.location.href = "index.html";
};

function usuarioActual(){
  return localStorage.getItem("usuario") || "JAVI";
}

function valor(id){
  const el = document.getElementById(id);
  return el ? el.value : "";
}

function normalizar(t){
  return String(t || "")
    .trim()
    .toUpperCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

function crearId(prefijo){
  return String(prefijo || "id")
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9]+/g,"_")
    .replace(/^_+|_+$/g,"")
    + "_" + Date.now() + "_" + Math.random().toString(36).slice(2,7);
}

function esc(t){
  return String(t || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

/* USUARIOS */

async function leerUsuarios(){
  usuariosCloud = await leerColeccion("usuarios_monolito");
  usuariosCloud = usuariosCloud.sort((a,b)=>String(a.nombre || "").localeCompare(String(b.nombre || "")));
  return usuariosCloud;
}

async function guardarUsuarios(){
  await guardarColeccion("usuarios_monolito", usuariosCloud);
}

window.limpiarUsuario = function(){
  editandoUsuario = "";
  document.getElementById("usuarioNombre").value = "";
  document.getElementById("usuarioClave").value = "";
  document.getElementById("usuarioRol").value = "USUARIO";
  document.getElementById("usuarioNombre").focus();
};

window.guardarUsuario = async function(){
  const nombre = normalizar(valor("usuarioNombre"));
  const clave = String(valor("usuarioClave") || "").trim();
  const rol = valor("usuarioRol") || "USUARIO";

  if(!nombre){
    alert("Falta usuario.");
    document.getElementById("usuarioNombre").focus();
    return;
  }

  if(!clave){
    alert("Falta contraseña.");
    document.getElementById("usuarioClave").focus();
    return;
  }

  const idx = editandoUsuario !== "" ? Number(editandoUsuario) : -1;
  const anterior = idx >= 0 ? usuariosCloud[idx] : {};
  const ahora = new Date();

  const registro = {
    id: anterior.id || crearId("usuario_" + nombre),
    nombre:nombre,
    usuario:nombre,
    clave:clave,
    password:clave,
    rol:rol,
    activo: anterior.activo !== false,
    creadoPor: anterior.creadoPor || usuarioActual(),
    actualizadoPor: usuarioActual(),
    actualizado: ahora.toLocaleString("es-ES"),
    actualizadoEn: ahora.toISOString(),
    fechaMs: anterior.fechaMs || ahora.getTime()
  };

  if(idx >= 0){
    usuariosCloud[idx] = registro;
  }else{
    usuariosCloud.unshift(registro);
  }

  await guardarUsuarios();
  await pintarUsuarios();
  limpiarUsuario();

  alert("Usuario guardado.");
};

window.editarUsuario = function(i){
  const u = usuariosCloud[i];
  editandoUsuario = i;

  document.getElementById("usuarioNombre").value = u.nombre || u.usuario || "";
  document.getElementById("usuarioClave").value = u.clave || u.password || "";
  document.getElementById("usuarioRol").value = u.rol || "USUARIO";

  window.scrollTo({top:0,behavior:"smooth"});
};

window.toggleUsuario = async function(i){
  usuariosCloud[i].activo = usuariosCloud[i].activo === false ? true : false;
  usuariosCloud[i].actualizado = new Date().toLocaleString("es-ES");
  usuariosCloud[i].actualizadoEn = new Date().toISOString();
  usuariosCloud[i].actualizadoPor = usuarioActual();

  await guardarUsuarios();
  await pintarUsuarios();
};

window.borrarUsuario = async function(i){
  const u = usuariosCloud[i];

  if(!u){
    alert("No se encontró el usuario.");
    return;
  }

  if(!confirm("¿Borrar este usuario definitivamente?")) return;

  const ok = await borrarDocumento("usuarios_monolito", u.id);

  if(ok){
    usuariosCloud = usuariosCloud.filter(x => String(x.id) !== String(u.id));
    await pintarUsuarios();
    alert("Usuario borrado correctamente.");
  }else{
    alert("No se pudo borrar el usuario.");
  }
};

async function pintarUsuarios(){
  const data = await leerUsuarios();
  let html = "";

  if(data.length === 0){
    html = `<div class="vacio">No hay usuarios guardados.</div>`;
  }

  data.forEach((u,i)=>{
    html += `
      <div class="linea ${u.activo === false ? "inactivo" : ""}">
        <div class="nombre">${esc(u.nombre || u.usuario || "SIN USUARIO")}</div>
        <div class="detalle">Rol: <strong>${esc(u.rol || "USUARIO")}</strong></div>
        <div class="detalle">Estado: <strong>${u.activo === false ? "INACTIVO" : "ACTIVO"}</strong></div>
        <div class="botones">
          <button class="editar" onclick="editarUsuario(${i})">Editar</button>
          <button class="${u.activo === false ? "reactivar" : "desactivar"}" onclick="toggleUsuario(${i})">
            ${u.activo === false ? "Activar" : "Desactivar"}
          </button>
          <button class="borrar" onclick="borrarUsuario(${i})">Borrar</button>
        </div>
      </div>
    `;
  });

  document.getElementById("listaUsuarios").innerHTML = html;
}

/* PROMOCIONES */

async function leerPromociones(){
  promocionesCloud = await leerColeccion("promociones_monolito");
  promocionesCloud = promocionesCloud.sort((a,b)=>Number(b.fechaMs || 0)-Number(a.fechaMs || 0));
  return promocionesCloud;
}

async function guardarPromociones(){
  await guardarColeccion("promociones_monolito", promocionesCloud);
}

window.limpiarPromocion = function(){
  editandoPromo = "";
  document.getElementById("promoProveedor").value = "";
  document.getElementById("promoNombre").value = "";
  document.getElementById("promoDescuento").value = "";
  document.getElementById("promoCargo").value = "";
  document.getElementById("promoGratis").value = "";
  document.getElementById("promoInicio").value = "";
  document.getElementById("promoFin").value = "";
  document.getElementById("promoNota").value = "";
  document.getElementById("promoProveedor").focus();
};

window.guardarPromocion = async function(){
  const proveedor = normalizar(valor("promoProveedor"));
  const nombre = normalizar(valor("promoNombre"));

  if(!proveedor){ alert("Falta proveedor."); return; }
  if(!nombre){ alert("Falta promoción."); return; }

  const idx = editandoPromo !== "" ? Number(editandoPromo) : -1;
  const anterior = idx >= 0 ? promocionesCloud[idx] : {};
  const ahora = new Date();

  const registro = {
    id: anterior.id || crearId("promo_" + proveedor + "_" + nombre),
    proveedor,
    nombre,
    promocion:nombre,
    proveedorNormalizado:proveedor,
    nombreNormalizado:nombre,
    tipo:"PROMOCION",
    visibleEnPedidos:true,

    descuento:Number(valor("promoDescuento") || 0),
    cargo:Number(valor("promoCargo") || 0),
    gratis:Number(valor("promoGratis") || 0),

    inicio:valor("promoInicio"),
    fin:valor("promoFin"),
    fechaInicio:valor("promoInicio"),
    fechaFin:valor("promoFin"),

    nota:String(valor("promoNota") || "").trim(),

    activa:anterior.activa !== false,
    activo:anterior.activa !== false,

    actualizadoPor:usuarioActual(),
    actualizado:ahora.toLocaleString("es-ES"),
    actualizadoEn:ahora.toISOString(),
    fechaMs:anterior.fechaMs || ahora.getTime()
  };

  if(idx >= 0){
    promocionesCloud[idx] = registro;
  }else{
    promocionesCloud.unshift(registro);
  }

  await guardarPromociones();
  await pintarPromociones();
  limpiarPromocion();

  alert("Promoción guardada en la nube.");
};

window.editarPromocion = function(i){
  const p = promocionesCloud[i];
  editandoPromo = i;

  document.getElementById("promoProveedor").value = p.proveedor || p.proveedorNormalizado || "";
  document.getElementById("promoNombre").value = p.nombre || p.promocion || "";
  document.getElementById("promoDescuento").value = p.descuento || "";
  document.getElementById("promoCargo").value = p.cargo || "";
  document.getElementById("promoGratis").value = p.gratis || "";
  document.getElementById("promoInicio").value = p.inicio || p.fechaInicio || "";
  document.getElementById("promoFin").value = p.fin || p.fechaFin || "";
  document.getElementById("promoNota").value = p.nota || "";

  window.scrollTo({top:0,behavior:"smooth"});
};

window.togglePromocion = async function(i){
  promocionesCloud[i].activa = promocionesCloud[i].activa === false ? true : false;
  promocionesCloud[i].activo = promocionesCloud[i].activa;
  promocionesCloud[i].visibleEnPedidos = promocionesCloud[i].activa;
  promocionesCloud[i].actualizado = new Date().toLocaleString("es-ES");
  promocionesCloud[i].actualizadoEn = new Date().toISOString();
  promocionesCloud[i].actualizadoPor = usuarioActual();

  await guardarPromociones();
  await pintarPromociones();
};

window.borrarPromocion = async function(i){
  const p = promocionesCloud[i];

  if(!p){
    alert("No se encontró la promoción.");
    return;
  }

  if(!confirm("¿Borrar esta promoción definitivamente?")) return;

  const ok = await borrarDocumento("promociones_monolito", p.id);

  if(ok){
    promocionesCloud = promocionesCloud.filter(x => String(x.id) !== String(p.id));
    await pintarPromociones();
    alert("Promoción borrada correctamente.");
  }else{
    alert("No se pudo borrar la promoción.");
  }
};

async function pintarPromociones(){
  const data = await leerPromociones();
  let html = "";

  if(data.length === 0){
    html = `<div class="vacio">No hay promociones guardadas.</div>`;
  }

  data.forEach((p,i)=>{
    html += `
      <div class="linea ${p.activa === false ? "inactivo" : ""}">
        <div class="nombre">${esc(p.nombre || p.promocion || "SIN NOMBRE")}</div>
        <div class="detalle">Proveedor: <strong>${esc(p.proveedor || p.proveedorNormalizado || "-")}</strong></div>
        <div class="detalle">% descuento: ${Number(p.descuento || 0).toFixed(2).replace(".",",")}%</div>
        <div class="detalle">${p.cargo || 0} con cargo · ${p.gratis || 0} gratis / regalo</div>
        <div class="detalle">Inicio: ${p.inicio || p.fechaInicio || "-"} · Fin: ${p.fin || p.fechaFin || "-"}</div>
        ${p.nota ? `<div class="detalle">Nota: ${esc(p.nota)}</div>` : ""}
        <div class="detalle">Estado: <strong>${p.activa === false ? "INACTIVA" : "ACTIVA"}</strong></div>
        <div class="botones">
          <button class="editar" onclick="editarPromocion(${i})">Editar</button>
          <button class="${p.activa === false ? "reactivar" : "desactivar"}" onclick="togglePromocion(${i})">
            ${p.activa === false ? "Activar" : "Desactivar"}
          </button>
          <button class="borrar" onclick="borrarPromocion(${i})">Borrar</button>
        </div>
      </div>
    `;
  });

  document.getElementById("listaPromociones").innerHTML = html;
}

/* MANTENIMIENTO */

window.vaciarColeccion = async function(nombreColeccion, nombreVisible){
  const aviso1 = confirm("⚠️ Vas a borrar: " + nombreVisible + ". ¿Seguro?");
  if(!aviso1) return;

  const texto = prompt("Para confirmar escribe BORRAR");
  if(texto !== "BORRAR"){
    alert("Cancelado.");
    return;
  }

  const ok = await borrarColeccion(nombreColeccion);

  if(ok){
    localStorage.removeItem(nombreColeccion);

    if(nombreColeccion === "usuarios_monolito") await pintarUsuarios();
    if(nombreColeccion === "promociones_monolito") await pintarPromociones();

    alert(nombreVisible + " borrado correctamente.");
  }else{
    alert("No se pudo borrar " + nombreVisible + ".");
  }
};

window.reinicioTotal = async function(){
  const aviso1 = confirm("🔥 REINICIO TOTAL. Esto borra datos principales del programa. ¿Seguro?");
  if(!aviso1) return;

  const texto = prompt("Para confirmar escribe REINICIAR");
  if(texto !== "REINICIAR"){
    alert("Cancelado.");
    return;
  }

  const colecciones = [
    "pedidos_historico",
    "pagos_pendientes",
    "incidencias",
    "avisos_pedidos",
    "promociones_monolito",
    "articulos",
    "proveedores"
  ];

  for(const c of colecciones){
    await borrarColeccion(c);
    localStorage.removeItem(c);
  }

  await pintarUsuarios();
  await pintarPromociones();

  alert("Reinicio total completado.");
};

/* ENTER */

function activarEnterSiguienteCampo(){
  const campos = Array.from(document.querySelectorAll("input, select, textarea"));

  campos.forEach((campo, index)=>{
    campo.addEventListener("focus", ()=>{
      setTimeout(()=>{
        if(campo.select) campo.select();
      },50);
    });

    campo.addEventListener("click", ()=>{
      setTimeout(()=>{
        if(campo.select) campo.select();
      },50);
    });

    campo.addEventListener("keydown", (e)=>{
      if(e.key === "Enter"){
        e.preventDefault();
        const siguiente = campos[index + 1];

        if(siguiente){
          siguiente.focus();
          if(siguiente.select) siguiente.select();
        }
      }
    });
  });
}

/* INICIO */

async function iniciar(){
  activarEnterSiguienteCampo();
  await pintarUsuarios();
  await pintarPromociones();
}

iniciar();
</script>

</body>
</html>
