<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONFIGURACIÓN · MONOLITO</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#eef2f5;
  color:#17303d;
}

header{
  background:#17303d;
  color:white;
  padding:16px;
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:900;
  font-size:20px;
}

.volver{
  background:white;
  color:#17303d;
  border:0;
  border-radius:12px;
  padding:8px 12px;
  font-weight:900;
}

.contenido{
  padding:16px;
}

.card{
  background:white;
  border-radius:22px;
  padding:16px;
  margin-bottom:14px;
  box-shadow:0 8px 18px rgba(0,0,0,.12);
}

.titulo{
  font-size:22px;
  font-weight:900;
  margin-bottom:10px;
}

label{
  display:block;
  font-weight:900;
  margin-top:12px;
  margin-bottom:6px;
}

input,select,textarea{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:1px solid #b8c2ca;
  font-size:16px;
}

textarea{
  min-height:80px;
}

button{
  border:0;
  border-radius:14px;
  padding:12px;
  font-weight:900;
  font-size:15px;
}

.guardar{
  width:100%;
  background:#48a530;
  color:white;
  margin-top:14px;
}

.nuevo{
  width:100%;
  background:#ff9800;
  color:white;
  margin-top:10px;
}

.borrar{
  width:100%;
  background:#c00000;
  color:white;
  margin-top:10px;
}

.editar{
  background:#2196f3;
  color:white;
}

.desactivar{
  background:#ff9800;
  color:white;
}

.reactivar{
  background:#48a530;
  color:white;
}

.linea{
  border-top:1px solid #dfe6ec;
  padding-top:12px;
  margin-top:12px;
}

.nombre{
  font-size:18px;
  font-weight:900;
}

.detalle{
  color:#4f5f69;
  margin-top:5px;
  font-size:14px;
}

.botones{
  display:flex;
  gap:8px;
  margin-top:10px;
  flex-wrap:wrap;
}

.botones button{
  flex:1;
}

.inactivo{
  opacity:.45;
}

.aviso{
  background:#fff3cd;
  color:#7a4d00;
  border-radius:14px;
  padding:12px;
  font-weight:900;
  margin-top:10px;
}

.rojoAviso{
  background:#ffe0e0;
  color:#c00000;
  border-radius:14px;
  padding:12px;
  font-weight:900;
  margin-top:10px;
}

.vacio{
  background:#eef2f5;
  border-radius:18px;
  padding:16px;
  text-align:center;
  font-weight:900;
  margin-top:10px;
}
</style>
</head>

<body>

<script>

/* =========================================================
   PROTECCIÓN CONFIGURACIÓN · MONOLITO
========================================================= */

const usuario = String(
  localStorage.getItem("usuario") || ""
).trim().toUpperCase();

const nivel = String(
  localStorage.getItem("nivel") || ""
).trim().toUpperCase();

const rol = String(
  localStorage.getItem("rol") || ""
).trim().toUpperCase();

const usuariosHosteleria = [
  "JAVI",
  "JAVIER",
  "SILVIA"
];

const accesoPermitido =

  usuariosHosteleria.includes(usuario) ||

  rol === "ADMIN" ||

  nivel === "HOSTELERIA";

if(!accesoPermitido){

  alert("⚠ ACCESO SOLO HOSTELERÍA");

  window.location.href = "index.html";
}

</script>

<header>
  <button class="volver" onclick="volver()">←</button>
  ⚙️ CONFIGURACIÓN
</header>

<div class="contenido">

  <div class="card">

    <div class="titulo">
      Usuarios
    </div>

    <div class="aviso" id="estadoCloud">
      Usuarios sincronizados con cloud
    </div>

    <label>Nombre usuario</label>
    <input id="usuarioNombre">

    <label>PIN</label>
    <input id="usuarioPin" type="number">

    <label>Nivel</label>
    <select id="usuarioNivel">
      <option value="HOSTELERIA">HOSTELERÍA</option>
      <option value="OPERADOR">OPERADOR</option>
      <option value="DEMO">DEMO</option>
    </select>

    <label>Rol</label>
    <select id="usuarioRol">
      <option value="ADMIN">ADMIN</option>
      <option value="OPERADOR">OPERADOR</option>
      <option value="DEMO">DEMO</option>
    </select>

    <button class="guardar">
      💾 Guardar usuario
    </button>

  </div>

  <div class="card">

    <div class="titulo">
      Promociones
    </div>

    <div class="aviso">
      PEDIDOS leerá automáticamente promociones activas.
    </div>

  </div>

  <div class="card">

    <div class="titulo">
      Control pedidos
    </div>

    <label>
      Activar “Cuántas hay”
    </label>

    <select>
      <option>SI</option>
      <option>NO</option>
    </select>

    <label>
      Activar “Cuántas pido”
    </label>

    <select>
      <option>SI</option>
      <option>NO</option>
    </select>

  </div>

  <div class="card">

    <div class="titulo">
      Sistema
    </div>

    <div class="rojoAviso">
      Zona delicada. Solo usar para limpiar pruebas.
    </div>

    <button class="borrar">
      Borrar incidencias
    </button>

  </div>

</div>

<script>

function volver(){
  window.location.href = "index.html";
}

</script>

</body>
</html>
