<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONFIGURACIÓN · MONOLITO</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#eef2f5;color:#17303d}
header{background:#17303d;color:white;padding:16px;display:flex;align-items:center;gap:10px;font-weight:900;font-size:20px}
.volver{background:white;color:#17303d;border:0;border-radius:12px;padding:8px 12px;font-weight:900}
.contenido{padding:16px}
.card{background:white;border-radius:22px;padding:16px;margin-bottom:14px;box-shadow:0 8px 18px rgba(0,0,0,.12)}
.titulo{font-size:22px;font-weight:900;margin-bottom:10px}
label{display:block;font-weight:900;margin-top:12px;margin-bottom:6px}
input,select,textarea{width:100%;padding:12px;border-radius:14px;border:1px solid #b8c2ca;font-size:16px}
textarea{min-height:80px}
button{border:0;border-radius:14px;padding:12px;font-weight:900;font-size:15px}
.guardar{width:100%;background:#48a530;color:white;margin-top:14px}
.nuevo{width:100%;background:#ff9800;color:white;margin-top:10px}
.borrar{width:100%;background:#c00000;color:white;margin-top:10px}
.editar{background:#2196f3;color:white}
.desactivar{background:#ff9800;color:white}
.reactivar{background:#48a530;color:white}
.linea{border-top:1px solid #dfe6ec;padding-top:12px;margin-top:12px}
.nombre{font-size:18px;font-weight:900}
.detalle{color:#4f5f69;margin-top:5px;font-size:14px}
.botones{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.botones button{flex:1}
.inactivo{opacity:.45}
.aviso{background:#fff3cd;color:#7a4d00;border-radius:14px;padding:12px;font-weight:900;margin-top:10px}
.rojoAviso{background:#ffe0e0;color:#c00000;border-radius:14px;padding:12px;font-weight:900;margin-top:10px}
.vacio{background:#eef2f5;border-radius:18px;padding:16px;text-align:center;font-weight:900;margin-top:10px}
</style>
</head>

<body>

<header>
  <button class="volver" onclick="volver()">←</button>
  ⚙️ CONFIGURACIÓN
</header>

<div class="contenido">

  <div class="card">
    <div class="titulo">Promociones</div>

    <label>Proveedor</label>
    <input id="promoProveedor" placeholder="Ej: TURRADO">

    <label>Promoción</label>
    <input id="promoNombre" placeholder="Ej: MAHOU 5 + 2">

    <label>% descuento</label>
    <input id="promoDescuento" type="number" step="0.01">

    <label>Unidades con cargo</label>
    <input id="promoCargo" type="number" step="1">

    <label>Unidades coste 0 €</label>
    <input id="promoGratis" type="number" step="1">

    <label>Fecha inicio</label>
    <input id="promoInicio" type="date">

    <label>Fecha fin</label>
    <input id="promoFin" type="date">

    <label>Nota</label>
    <textarea id="promoNota"></textarea>

    <button class="guardar" onclick="guardarPromocion()">💾 Guardar promoción</button>
    <button class="nuevo" onclick="limpiarPromocion()">➕ Nueva promoción</button>

    <div class="aviso">PEDIDOS leerá automáticamente las promociones activas desde la nube.</div>

    <div id="listaPromociones"></div>
  </div>

</div>

<script type="module">
import {
  leerColeccion,
  guardarColeccion
} from "./monolito-cloud.js";

let promocionesCloud = [];
let editandoPromo = "";

window.volver = function(){
  window.location.href = "index.html";
};

function usuarioActual(){
  return localStorage.getItem("usuario") || "JAVI";
}

function normalizar(t){
  return String(t || "")
    .trim()
    .toUpperCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

function crearId(prefijo){
  return String(prefijo || "promo")
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9]+/g,"_")
    .replace(/^_+|_+$/g,"")
    + "_" + Date.now() + "_" + Math.random().toString(36).slice(2,7);
}

async function leerPromociones(){
  promocionesCloud = await leerColeccion("promociones_monolito");
  promocionesCloud = promocionesCloud.sort((a,b)=>Number(b.fechaMs || 0)-Number(a.fechaMs || 0));
  return promocionesCloud;
}

async function guardarPromociones(){
  await guardarColeccion("promociones_monolito", promocionesCloud);
}

window.limpiarPromocion = function(){
  editandoPromo = "";
  document.getElementById("promoProveedor").value = "";
  document.getElementById("promoNombre").value = "";
  document.getElementById("promoDescuento").value = "";
  document.getElementById("promoCargo").value = "";
  document.getElementById("promoGratis").value = "";
  document.getElementById("promoInicio").value = "";
  document.getElementById("promoFin").value = "";
  document.getElementById("promoNota").value = "";
};

window.guardarPromocion = async function(){
  const proveedor = normalizar(document.getElementById("promoProveedor").value);
  const nombre = normalizar(document.getElementById("promoNombre").value);

  if(!proveedor){ alert("Falta proveedor."); return; }
  if(!nombre){ alert("Falta promoción."); return; }

  const idx = editandoPromo !== "" ? Number(editandoPromo) : -1;
  const anterior = idx >= 0 ? promocionesCloud[idx] : {};

  const ahora = new Date();

  const registro = {
    id: anterior.id || crearId("promo_" + proveedor + "_" + nombre),
    proveedor,
    nombre,
    promocion:nombre,

    descuento:Number(document.getElementById("promoDescuento").value || 0),
    cargo:Number(document.getElementById("promoCargo").value || 0),
    gratis:Number(document.getElementById("promoGratis").value || 0),

    inicio:document.getElementById("promoInicio").value,
    fin:document.getElementById("promoFin").value,
    fechaInicio:document.getElementById("promoInicio").value,
    fechaFin:document.getElementById("promoFin").value,

    nota:document.getElementById("promoNota").value.trim(),

    activa:anterior.activa !== false,
    activo:anterior.activa !== false,

    actualizadoPor:usuarioActual(),
    actualizado:ahora.toLocaleString("es-ES"),
    actualizadoEn:ahora.toISOString(),
    fechaMs:anterior.fechaMs || ahora.getTime()
  };

  if(idx >= 0){
    promocionesCloud[idx] = registro;
  }else{
    promocionesCloud.unshift(registro);
  }

  await guardarPromociones();
  limpiarPromocion();
  await pintarPromociones();

  alert("Promoción guardada en la nube.");
};

window.editarPromocion = function(i){
  const p = promocionesCloud[i];

  editandoPromo = i;

  document.getElementById("promoProveedor").value = p.proveedor || "";
  document.getElementById("promoNombre").value = p.nombre || p.promocion || "";
  document.getElementById("promoDescuento").value = p.descuento || "";
  document.getElementById("promoCargo").value = p.cargo || "";
  document.getElementById("promoGratis").value = p.gratis || "";
  document.getElementById("promoInicio").value = p.inicio || p.fechaInicio || "";
  document.getElementById("promoFin").value = p.fin || p.fechaFin || "";
  document.getElementById("promoNota").value = p.nota || "";

  window.scrollTo({top:0,behavior:"smooth"});
};

window.togglePromocion = async function(i){
  promocionesCloud[i].activa = promocionesCloud[i].activa === false ? true : false;
  promocionesCloud[i].activo = promocionesCloud[i].activa;
  promocionesCloud[i].actualizado = new Date().toLocaleString("es-ES");
  promocionesCloud[i].actualizadoPor = usuarioActual();

  await guardarPromociones();
  await pintarPromociones();
};

window.borrarPromocion = async function(i){
  if(!confirm("¿Borrar esta promoción?")) return;

  promocionesCloud.splice(i,1);

  await guardarPromociones();
  await pintarPromociones();
};

async function pintarPromociones(){
  const data = await leerPromociones();
  let html = "";

  if(data.length === 0){
    html = `<div class="vacio">No hay promociones guardadas.</div>`;
  }

  data.forEach((p,i)=>{
    html += `
      <div class="linea ${p.activa === false ? "inactivo" : ""}">
        <div class="nombre">${p.nombre || p.promocion || "SIN NOMBRE"}</div>
        <div class="detalle">Proveedor: <strong>${p.proveedor || "-"}</strong></div>
        <div class="detalle">% descuento: ${Number(p.descuento || 0).toFixed(2).replace(".",",")}%</div>
        <div class="detalle">${p.cargo || 0} con cargo · ${p.gratis || 0} coste 0 €</div>
        <div class="detalle">Inicio: ${p.inicio || p.fechaInicio || "-"} · Fin: ${p.fin || p.fechaFin || "-"}</div>
        ${p.nota ? `<div class="detalle">Nota: ${p.nota}</div>` : ""}
        <div class="detalle">Estado: <strong>${p.activa === false ? "INACTIVA" : "ACTIVA"}</strong></div>

        <div class="botones">
          <button class="editar" onclick="editarPromocion(${i})">Editar</button>
          <button class="${p.activa === false ? "reactivar" : "desactivar"}" onclick="togglePromocion(${i})">
            ${p.activa === false ? "Activar" : "Desactivar"}
          </button>
          <button class="borrar" onclick="borrarPromocion(${i})">Borrar</button>
        </div>
      </div>
    `;
  });

  document.getElementById("listaPromociones").innerHTML = html;
}

async function iniciar(){
  await pintarPromociones();
}

iniciar();
</script>

</body>
</html>
