<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<title>Monolito GPT Pro</title><style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

h1{
margin-top:30px;
}

button{
padding:12px;
margin:8px;
border-radius:8px;
border:none;
cursor:pointer;
font-size:16px;
}

.menu button{
width:220px;
display:block;
margin:10px auto;
}

.azul{background:#2563eb;color:white;}
.rojo{background:#ef4444;color:white;}
.amarillo{background:#facc15;color:black;}

#pantallaPedidos{
display:none;
margin-top:30px;
}

table{
margin:auto;
border-collapse:collapse;
width:90%;
background:#1e293b;
}

th,td{
border:1px solid #334155;
padding:10px;
}

input{
width:80px;
}

.totalFinal{
margin-top:20px;
font-size:22px;
}

</style></head><body><h1>MONOLITO GPT PRO</h1>
<p>Sistema de control profesional – Cafetería Monolito</p><div class="menu"><button class="azul" onclick="abrirPedidos()">Pedidos</button>

<button class="amarillo">Comunicaciones</button>
<button class="rojo">Incidencias</button>

</div><div id="pantallaPedidos"><h2>Pedido a proveedor</h2><table><tr>
<th>Unidades</th>
<th>Artículo</th>
<th>Precio</th>
<th>%</th>
<th>Total</th>
</tr><tr>
<td><input type="number" value="0" onchange="calcular()"></td>
<td>Barril Estrella</td>
<td><input type="number" value="85" onchange="calcular()"></td>
<td><input type="number" value="4" onchange="calcular()"></td>
<td class="totalLinea">0</td>
</tr><tr>
<td><input type="number" value="0" onchange="calcular()"></td>
<td>Tercio Estrella</td>
<td><input type="number" value="18" onchange="calcular()"></td>
<td><input type="number" value="4" onchange="calcular()"></td>
<td class="totalLinea">0</td>
</tr><tr>
<td><input type="number" value="0" onchange="calcular()"></td>
<td>Coca-Cola caja</td>
<td><input type="number" value="22" onchange="calcular()"></td>
<td><input type="number" value="0" onchange="calcular()"></td>
<td class="totalLinea">0</td>
</tr></table><div class="totalFinal">
TOTAL PEDIDO: <span id="totalPedido">0</span> €
</div><br><button onclick="cerrarPedidos()">Cerrar</button>

</div><script>

function abrirPedidos(){
document.getElementById("pantallaPedidos").style.display="block"
}

function cerrarPedidos(){
document.getElementById("pantallaPedidos").style.display="none"
}

function calcular(){

let filas=document.querySelectorAll("table tr")
let totalGeneral=0

for(let i=1;i<filas.length;i++){

let inputs=filas[i].querySelectorAll("input")

let unidades=parseFloat(inputs[0].value)||0
let precio=parseFloat(inputs[1].value)||0
let descuento=parseFloat(inputs[2].value)||0

let total=unidades*precio*(1-descuento/100)

filas[i].querySelector(".totalLinea").innerText=total.toFixed(2)

totalGeneral+=total

}

document.getElementById("totalPedido").innerText=totalGeneral.toFixed(2)

}

</script></body>
</html>
