<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAMBIO · MONOLITO</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f5;color:#17303d}
header{background:#17303d;color:white;padding:16px;font-weight:900;font-size:20px;display:flex;align-items:center;gap:10px}
.volver{background:white;color:#17303d;border:0;border-radius:10px;padding:6px 10px;font-weight:900}
.contenedor{padding:16px}
.linea{background:white;padding:12px;border-radius:12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;font-weight:900}
input{width:90px;padding:8px;border-radius:8px;border:1px solid #ccc;text-align:center}
textarea{width:100%;margin-top:10px;padding:10px;border-radius:10px;border:1px solid #ccc}
.total{background:#17303d;color:white;padding:16px;border-radius:16px;font-size:22px;font-weight:900;margin-top:15px;text-align:center}
.resultado{margin-top:12px;padding:14px;border-radius:12px;font-weight:900;text-align:center}
.ok{background:#e8f5e9;color:#2e7d32}
.error{background:#ffe5e5;color:#c00000}
.boton{width:100%;margin-top:12px;padding:14px;border:0;border-radius:14px;font-weight:900;font-size:16px;cursor:pointer}
.totalizar{background:#4caf50;color:white}
.borrar{background:#c00000;color:white}
.historial{background:#17303d;color:white}
.info{margin-top:10px;font-size:13px;color:#4f5f69}
</style>
</head>

<body>

<header>
  <button id="btnVolver" class="volver">←</button>
  💰 CAMBIO
</header>

<div class="contenedor">
  <div class="linea">
    <div>CAMBIO ESPERADO</div>
    <input id="esperado" type="number">
  </div>
</div>

<div class="contenedor" id="lista"></div>

<div class="contenedor">
  <div class="total" id="total">0,00 €</div>
  <div class="resultado" id="resultado"></div>

  <textarea id="nota" placeholder="Explicación (si falta o sobra)"></textarea>

  <button id="btnTotalizar" class="boton totalizar">TOTALIZAR</button>
  <button id="btnHistorial" class="boton historial">📊 VER HISTORIAL</button>
  <button id="btnBorrar" class="boton borrar">BORRAR CAMBIO DE HOY Y REINICIAR</button>

  <div class="info" id="info"></div>
</div>

<script type="module">
import {
  leerColeccion,
  guardarColeccion,
  escucharColeccion,
  borrarDocumento
} from "./monolito-cloud.js";

const valores = [50,20,10,5,2,1,0.50,0.20,0.10,0.05,0.02,0.01];

const COLECCION_CAMBIO = "cambio";
const COLECCION_ESPERADO = "cambio_esperado";

let cantidades = {};
let cambios = [];
let esperadoCloud = [];
let cambioHoyCerrado = false;

function volver(){ window.location.href="index.html"; }

function usuarioActual(){
  return localStorage.getItem("usuario") || "OPERADOR";
}

function esAdmin(){
  const u = usuarioActual().toUpperCase();
  return u === "JAVI" || u === "JAVIER" || u === "SILVIA";
}

function hoyISO(){
  return new Date().toISOString().split("T")[0];
}

function claveFecha(){
  return new Date().toLocaleDateString("es-ES");
}

function idCambioHoy(){
  return "cambio_" + hoyISO().replaceAll("-","_");
}

function obtenerEsperado(){
  const doc = esperadoCloud.find(x => x.id === "actual");
  if(doc) return Number(doc.valor || 0);
  return Number(localStorage.getItem("cambio_esperado") || 0);
}

async function guardarEsperado(valor){
  const nuevo = {
    id:"actual",
    valor:Number(valor || 0),
    actualizadoPor:usuarioActual(),
    actualizadoEn:new Date().toISOString()
  };

  esperadoCloud = [nuevo];
  localStorage.setItem("cambio_esperado", Number(valor || 0));

  await guardarColeccion(COLECCION_ESPERADO, esperadoCloud);
}

function registroHoy(){
  return cambios.find(c =>
    String(c.id) === String(idCambioHoy()) ||
    c.fechaISO === hoyISO() ||
    c.clave === claveFecha()
  );
}

function pintar(){
  let html = "";

  valores.forEach(v=>{
    html += `
      <div class="linea">
        <div>${v} €</div>
        <input
          class="inputCambio"
          data-valor="${String(v)}"
          type="number"
          min="0"
          value="${cantidades[v] || 0}"
        >
      </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;

  document.querySelectorAll(".inputCambio").forEach(input=>{
    input.disabled = cambioHoyCerrado;

    input.addEventListener("focus", ()=>input.select());
    input.addEventListener("click", ()=>input.select());

    input.addEventListener("input", ()=>{
      if(cambioHoyCerrado) return;

      const valor = Number(input.dataset.valor);
      cantidades[valor] = Number(input.value || 0);
      calcular();
    });
  });
}

function calcular(){
  let total = 0;

  valores.forEach(v=>{
    total += (cantidades[v] || 0) * v;
  });

  document.getElementById("total").textContent =
    total.toFixed(2).replace(".",",") + " €";
}

function cargarEsperado(){
  const input = document.getElementById("esperado");
  input.value = obtenerEsperado();
  input.disabled = !esAdmin();
}

async function totalizar(){
  if(cambioHoyCerrado){
    alert("El cambio de hoy ya está totalizado. Si necesitas corregirlo, entra como JAVI o SILVIA y borra el cambio de hoy.");
    return;
  }

  let total = 0;

  valores.forEach(v=>{
    total += (cantidades[v] || 0) * v;
  });

  total = Number(total.toFixed(2));

  if(total <= 0){
    alert("Introduce el cambio antes de totalizar.");
    return;
  }

  const esperadoAnterior = obtenerEsperado();
  const diferencia = Number((total - esperadoAnterior).toFixed(2));
  const esperadoNuevo = Number((esperadoAnterior + diferencia).toFixed(2));

  let texto = "✅ CAMBIO CORRECTO";
  let clase = "ok";

  if(diferencia > 0){
    texto = "⚠ SOBRAN " + diferencia.toFixed(2) + " €";
    clase = "error";
  }

  if(diferencia < 0){
    texto = "⚠ FALTAN " + Math.abs(diferencia).toFixed(2) + " €";
    clase = "error";
  }

  document.getElementById("resultado").textContent = texto;
  document.getElementById("resultado").className = "resultado " + clase;
  document.getElementById("esperado").value = esperadoNuevo;

  await guardarEsperado(esperadoNuevo);
  await guardarCambio(total,diferencia,esperadoAnterior,esperadoNuevo);

  cambioHoyCerrado = true;
  pintar();
}

async function guardarCambio(total,diferencia,esperadoAnterior,esperadoNuevo){
  const ahora = new Date();

  const registro = {
    id:idCambioHoy(),
    fechaISO:hoyISO(),
    clave:claveFecha(),
    total,
    diferencia,
    esperadoAnterior,
    esperadoNuevo,
    cantidades:{...cantidades},
    nota:document.getElementById("nota").value,
    usuario:usuarioActual(),
    hora:ahora.toLocaleTimeString("es-ES"),
    fecha:ahora.toLocaleDateString("es-ES"),
    fechaMs:Date.now(),
    actualizadoEn:new Date().toISOString()
  };

  cambios = cambios.filter(c => String(c.id) !== String(registro.id));
  cambios.unshift(registro);

  await guardarColeccion(COLECCION_CAMBIO, cambios);

  document.getElementById("info").textContent =
    "Guardado por " + usuarioActual() + " · " + registro.hora;
}

function cargarRegistroHoy(){
  const r = registroHoy();

  if(!r){
    cambioHoyCerrado = false;
    cantidades = {};
    document.getElementById("resultado").textContent = "";
    document.getElementById("resultado").className = "resultado";
    document.getElementById("nota").value = "";
    document.getElementById("info").textContent = "";
    pintar();
    calcular();
    return;
  }

  cambioHoyCerrado = true;
  cantidades = r.cantidades || {};

  pintar();
  calcular();

  document.getElementById("nota").value = r.nota || "";
  document.getElementById("info").textContent =
    "Guardado por " + (r.usuario || "OPERADOR") + " · " + (r.hora || "");

  if(Number(r.diferencia || 0) === 0){
    document.getElementById("resultado").textContent = "✅ CAMBIO CORRECTO";
    document.getElementById("resultado").className = "resultado ok";
  }else if(Number(r.diferencia || 0) > 0){
    document.getElementById("resultado").textContent = "⚠ SOBRAN " + Number(r.diferencia).toFixed(2) + " €";
    document.getElementById("resultado").className = "resultado error";
  }else{
    document.getElementById("resultado").textContent = "⚠ FALTAN " + Math.abs(Number(r.diferencia || 0)).toFixed(2) + " €";
    document.getElementById("resultado").className = "resultado error";
  }
}

async function borrar(){
  if(!esAdmin()){
    alert("Solo Javi o Silvia pueden borrar.");
    return;
  }

  if(!confirm("¿Borrar el cambio de hoy y reiniciar la pantalla?")) return;

  cambios = cambios.filter(c =>
    String(c.id) !== String(idCambioHoy()) &&
    c.fechaISO !== hoyISO() &&
    c.clave !== claveFecha()
  );

  await borrarDocumento(COLECCION_CAMBIO, idCambioHoy());

  cambioHoyCerrado = false;
  cantidades = {};

  cargarRegistroHoy();
}

function activarBotones(){
  document.getElementById("btnVolver").addEventListener("click", volver);
  document.getElementById("btnTotalizar").addEventListener("click", totalizar);
  document.getElementById("btnHistorial").addEventListener("click", ()=>{
    window.location.href="cambio_historial.html";
  });
  document.getElementById("btnBorrar").addEventListener("click", borrar);

  const esperado = document.getElementById("esperado");

  esperado.addEventListener("focus", function(){this.select()});
  esperado.addEventListener("click", function(){this.select()});
  esperado.addEventListener("change", async function(){
    if(!esAdmin()) return;
    await guardarEsperado(Number(this.value || 0));
  });
}

async function iniciar(){
  activarBotones();

  document.getElementById("btnBorrar").style.display =
    esAdmin() ? "block" : "none";

  cambios = await leerColeccion(COLECCION_CAMBIO);
  esperadoCloud = await leerColeccion(COLECCION_ESPERADO);

  cargarEsperado();
  cargarRegistroHoy();

  escucharColeccion(COLECCION_CAMBIO, (lista)=>{
    cambios = lista;
    cargarRegistroHoy();
  });

  escucharColeccion(COLECCION_ESPERADO, (lista)=>{
    esperadoCloud = lista;
    cargarEsperado();
  });
}

iniciar();
</script>

</body>
</html>
