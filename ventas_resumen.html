<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESUMEN VENTAS · MONOLITO</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f5;color:#17303d}

header{
  background:#17303d;
  color:white;
  padding:16px;
  font-weight:900;
  font-size:20px;
  display:flex;
  align-items:center;
  gap:10px;
}

.volver{
  background:white;
  color:#17303d;
  border:0;
  border-radius:10px;
  padding:6px 10px;
  font-weight:900;
}

.contenedor{padding:16px}

.selector{
  width:100%;
  padding:12px;
  border-radius:12px;
  margin-bottom:14px;
  font-size:16px;
  border:1px solid #ccc;
}

.linea{
  background:white;
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
  display:flex;
  justify-content:space-between;
  font-weight:900;
}

.total{
  background:#17303d;
  color:white;
  padding:14px;
  border-radius:14px;
  font-size:20px;
  font-weight:900;
  margin-top:12px;
}

.media{
  background:#ffffff;
  padding:12px;
  border-radius:12px;
  font-weight:900;
  margin-top:10px;
  text-align:center;
}

.estado{
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  font-weight:900;
  text-align:center;
}

.flojo{background:#ffe5e5;color:#c00000}
.normal{background:#fff5cc;color:#b38f00}
.fuerte{background:#e5ffe5;color:#1a7f1a}

.vacio{
  text-align:center;
  font-weight:900;
  margin-top:20px;
}
</style>
</head>

<body>

<header>
  <button class="volver" onclick="volver()">←</button>
  📊 RESUMEN MES
</header>

<div class="contenedor">

<input type="month" id="selectorMes" class="selector" onchange="pintar()">

<div id="lista"></div>

<div class="total" id="totalMes">TOTAL: 0 €</div>

<div class="media" id="mediaMes"></div>

<div class="estado" id="estadoMes"></div>

</div>

<script>

function volver(){
  window.location.href="ventas.html";
}

function euros(n){
  return Number(n||0).toFixed(2).replace(".",",")+" €";
}

function parseFecha(fechaStr){
  let partes = fechaStr.split("/");
  return new Date(partes[2], partes[1]-1, partes[0]);
}

function pintar(){

  let data = JSON.parse(localStorage.getItem("ventas") || "{}");

  let valor = document.getElementById("selectorMes").value;
  if(!valor) return;

  let [year, mes] = valor.split("-");
  mes = Number(mes) - 1;

  let totalMes = 0;
  let dias = 0;
  let html = "";

  Object.keys(data).forEach(fecha => {

    let d = parseFecha(fecha);

    if(d.getFullYear() == year && d.getMonth() == mes){

      let total = Number(data[fecha].total || 0);

      totalMes += total;
      dias++;

      html += `
        <div class="linea">
          <div>${fecha}</div>
          <div>${euros(total)}</div>
        </div>
      `;
    }

  });

  if(html === ""){
    html = `<div class="vacio">No hay datos</div>`;
  }

  document.getElementById("lista").innerHTML = html;

  document.getElementById("totalMes").textContent =
    "TOTAL: " + euros(totalMes);

  let media = dias ? totalMes / dias : 0;

  document.getElementById("mediaMes").textContent =
    "MEDIA DÍA: " + euros(media);

  let estado = document.getElementById("estadoMes");

  if(media < 200){
    estado.textContent = "🔴 MES FLOJO";
    estado.className = "estado flojo";
  }else if(media < 400){
    estado.textContent = "🟡 MES NORMAL";
    estado.className = "estado normal";
  }else{
    estado.textContent = "🟢 MES FUERTE";
    estado.className = "estado fuerte";
  }
}

/* INIT */

let hoy = new Date();
let mesActual = hoy.toISOString().slice(0,7);
document.getElementById("selectorMes").value = mesActual;

pintar();

</script>

</body>
</html>
