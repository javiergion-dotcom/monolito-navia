<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REVISIÓN · MONOLITO</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#eef2f5;color:#17303d}
header{background:#17303d;color:white;padding:16px;display:flex;align-items:center;gap:10px;font-size:20px;font-weight:900}
.volver{background:white;color:#17303d;border:0;border-radius:12px;padding:8px 12px;font-weight:900}
.contenido{padding:16px}
.card{background:white;border-radius:22px;padding:16px;margin-bottom:14px;box-shadow:0 8px 18px rgba(0,0,0,.12)}
.titulo{font-size:22px;font-weight:900;margin-bottom:10px}
.detalle{color:#4f5f69;margin-top:6px;font-size:14px}
.estado{display:inline-block;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:900;margin-top:8px}
.rojo{background:#ffd6d6;color:#9b0000}
.amarillo{background:#fff3cd;color:#7a4d00}
.verde{background:#d4edda;color:#155724}
.azul{background:#eef2f5;color:#17303d}
button{width:100%;border:0;border-radius:14px;padding:12px;font-size:15px;font-weight:900;margin-top:10px;background:#17303d;color:white}
.hecho{background:#48a530}
.vacio{background:white;border-radius:22px;padding:20px;text-align:center;font-weight:900}
</style>
</head>

<body>

<header>
  <button class="volver" onclick="volver()">←</button>
  🔎 REVISIÓN
</header>

<div class="contenido">

  <div class="card">
    <div class="titulo">Centro de control</div>
    <div class="detalle">
      Aquí MONOLITO reúne lo que necesita atención:
      incidencias, comunicaciones, recordatorios y tareas.
    </div>
  </div>

  <div id="resumen"></div>
  <div id="tareas"></div>

</div>

<script>
function volver(){
  window.location.href="index.html";
}

function usuarioActual(){
  return localStorage.getItem("usuario") || "OPERADOR";
}

function leerIncidencias(){
  return JSON.parse(localStorage.getItem("incidencias") || "[]");
}

function leerComunicaciones(){
  const nuevas = JSON.parse(localStorage.getItem("comunicaciones_monolito") || "[]");
  const antiguas = JSON.parse(localStorage.getItem("comunicaciones") || "[]");
  return nuevas.concat(antiguas);
}

function leerCalendario(){
  return JSON.parse(localStorage.getItem("calendario") || "{}");
}

function leerTareas(){
  return JSON.parse(localStorage.getItem("tareas_revision_monolito") || "[]");
}

function guardarTareas(data){
  localStorage.setItem("tareas_revision_monolito", JSON.stringify(data));
}

function tareasBase(){
  return [
    "Revisar comunicaciones pendientes",
    "Revisar incidencias abiertas",
    "Revisar pagos pendientes",
    "Comprobar recordatorios de calendario",
    "Revisar documentación importante",
    "Comprobar tareas semanales"
  ];
}

function prepararTareas(){
  let data = leerTareas();

  if(data.length === 0){
    data = tareasBase().map(t=>({
      id:Date.now() + Math.random(),
      texto:t,
      hecha:false,
      usuarioHecha:"",
      fechaHecha:""
    }));

    guardarTareas(data);
  }

  return data;
}

function contarIncidencias(){
  return leerIncidencias().filter(x=>!x.resuelta).length;
}

function contarComunicaciones(){
  return leerComunicaciones().filter(x=>!x.resuelta && !x.hecha).length;
}

function contarCalendario(){
  const data = leerCalendario();

  const hoy = new Date();
  hoy.setHours(0,0,0,0);

  const limite = new Date(hoy);
  limite.setDate(hoy.getDate()+7);

  let total = 0;

  Object.values(data).forEach(r=>{
    if(!r.fecha || r.hecha) return;

    const f = new Date(r.fecha + "T12:00:00");

    if(f >= hoy && f <= limite){
      total++;
    }
  });

  return total;
}

function marcarTarea(id){
  let data = leerTareas();

  data = data.map(t=>{
    if(t.id === id){
      t.hecha = true;
      t.usuarioHecha = usuarioActual();
      t.fechaHecha = new Date().toLocaleString("es-ES");
    }
    return t;
  });

  guardarTareas(data);
  pintar();
}

function reiniciarTareas(){
  if(!confirm("¿Reiniciar tareas de revisión?")) return;

  localStorage.removeItem("tareas_revision_monolito");
  prepararTareas();
  pintar();
}

function pintarResumen(){
  const inc = contarIncidencias();
  const com = contarComunicaciones();
  const cal = contarCalendario();

  let html = "";

  html += `
    <div class="card">
      <div class="titulo">Estado actual</div>

      <div class="estado ${inc>0 ? "rojo" : "verde"}">
        ${inc>0 ? "🔴" : "🟢"} Incidencias: ${inc}
      </div>

      <div class="estado ${com>0 ? "amarillo" : "verde"}">
        ${com>0 ? "🟡" : "🟢"} Comunicaciones: ${com}
      </div>

      <div class="estado ${cal>0 ? "amarillo" : "verde"}">
        ${cal>0 ? "🟡" : "🟢"} Calendario 7 días: ${cal}
      </div>
    </div>
  `;

  document.getElementById("resumen").innerHTML = html;
}

function pintarTareas(){
  const data = prepararTareas();

  let html = `
    <div class="card">
      <div class="titulo">Tareas de revisión</div>
      <div class="detalle">
        Cada tarea marcada guarda usuario y hora automáticamente.
      </div>
      <button onclick="reiniciarTareas()">↻ Reiniciar revisión</button>
    </div>
  `;

  data.forEach(t=>{
    html += `
      <div class="card">
        <div class="titulo">${t.texto}</div>

        ${
          t.hecha
          ? `
            <div class="estado verde">✅ REALIZADA</div>
            <div class="detalle">Hecha por: ${t.usuarioHecha}</div>
            <div class="detalle">${t.fechaHecha}</div>
          `
          : `
            <div class="estado amarillo">🟡 PENDIENTE</div>
            <button class="hecho" onclick="marcarTarea(${t.id})">✅ Marcar hecha</button>
          `
        }
      </div>
    `;
  });

  document.getElementById("tareas").innerHTML = html;
}

function pintar(){
  pintarResumen();
  pintarTareas();
}

pintar();
</script>

</body>
</html>
