<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REVISIÓN · MONOLITO</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#eef2f5;color:#17303d}
header{background:#17303d;color:white;padding:16px;display:flex;align-items:center;gap:10px;font-size:20px;font-weight:900}
.volver{background:white;color:#17303d;border:0;border-radius:12px;padding:8px 12px;font-weight:900}
.contenido{padding:16px}
.card{background:white;border-radius:22px;padding:16px;margin-bottom:14px;box-shadow:0 8px 18px rgba(0,0,0,.12)}
.titulo{font-size:22px;font-weight:900;margin-bottom:10px}
.detalle{color:#4f5f69;margin-top:6px;font-size:14px}
.estado{display:inline-block;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:900;margin-top:8px}
.rojo{background:#ffd6d6;color:#9b0000}
.amarillo{background:#fff3cd;color:#7a4d00}
.verde{background:#d4edda;color:#155724}
button{width:100%;border:0;border-radius:14px;padding:12px;font-size:15px;font-weight:900;margin-top:10px;background:#17303d;color:white;cursor:pointer}
.hecho{background:#48a530}
.borrar{background:#c00000}
.crear{background:#17303d}
input{width:100%;padding:13px;border-radius:14px;border:1px solid #b8c2ca;font-size:16px;margin-top:8px}
.vacio{background:white;border-radius:22px;padding:20px;text-align:center;font-weight:900}
</style>
</head>

<body>

<header>
  <button id="btnVolver" class="volver">←</button>
  🔎 REVISIÓN
</header>

<div class="contenido">

  <div class="card">
    <div class="titulo">Centro de control</div>
    <div class="detalle">
      MONOLITO reúne aquí avisos importantes y tareas operativas del negocio.
    </div>
  </div>

  <div id="resumen"></div>

  <div class="card">
    <div class="titulo">➕ Nueva tarea</div>
    <input id="nuevaTarea" placeholder="Ejemplo: limpiar neveras">
    <button id="btnCrearTarea" class="crear">Crear tarea</button>
  </div>

  <div id="tareas"></div>

</div>

<script type="module">
import {
  leerColeccion,
  guardarColeccion,
  escucharColeccion,
  borrarDocumento
} from "./monolito-cloud.js";

const COLECCION_TAREAS = "tareas_revision_monolito";

let incidencias = [];
let comunicaciones = [];
let calendario = [];
let tareas = [];

function usuarioActual(){
  return localStorage.getItem("usuario") || "OPERADOR";
}

function nivelActual(){
  return localStorage.getItem("nivel") || "";
}

function esHosteleria(){
  const u = usuarioActual().toUpperCase();
  const n = nivelActual().toUpperCase();

  return (
    n === "HOSTELERIA" ||
    u === "JAVI" ||
    u === "JAVIER" ||
    u === "SILVIA" ||
    u === "HOSTELERO"
  );
}

function crearId(){
  return "revision_" + Date.now() + "_" + Math.random().toString(36).slice(2,7);
}

function esc(txt){
  return String(txt || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function diasHasta(fecha){
  if(!fecha) return 9999;

  const hoy = new Date();
  hoy.setHours(0,0,0,0);

  const f = new Date(fecha + "T00:00:00");
  f.setHours(0,0,0,0);

  return Math.round((f - hoy) / 86400000);
}

function diasDesde(fechaTexto){
  if(!fechaTexto) return null;

  const partes = fechaTexto.split(",");
  const fecha = partes[0];
  const trozos = fecha.split("/");

  if(trozos.length !== 3) return null;

  const d = new Date(Number(trozos[2]), Number(trozos[1]) - 1, Number(trozos[0]));
  const hoy = new Date();

  hoy.setHours(0,0,0,0);
  d.setHours(0,0,0,0);

  return Math.floor((hoy - d) / 86400000);
}

async function guardarTareas(){
  await guardarColeccion(COLECCION_TAREAS, tareas);
}

function contarIncidencias(){
  return incidencias.filter(x=>x.resuelta !== true).length;
}

function contarComunicaciones(){
  return comunicaciones.filter(x=>x.hecha !== true).length;
}

function contarCalendario(){
  return calendario.filter(e=>{
    if(e.hecha) return false;

    const faltan = diasHasta(e.fecha);
    const aviso = Number(e.recordatorio || 0);

    return e.tipo === "TAREA" || faltan <= aviso;
  }).length;
}

async function crearTarea(){
  const input = document.getElementById("nuevaTarea");
  const texto = input.value.trim();

  if(!texto){
    alert("Escribe una tarea.");
    return;
  }

  tareas.unshift({
    id:crearId(),
    texto,
    pendiente:true,
    ultimaFecha:"",
    ultimoUsuario:"",
    creado:new Date().toLocaleString("es-ES"),
    fechaMs:Date.now(),
    creadoPor:usuarioActual(),
    actualizadoEn:new Date().toISOString()
  });

  await guardarTareas();

  input.value="";
  pintar();
}

async function marcarTarea(id){
  tareas = tareas.map(t=>{
    if(String(t.id) === String(id)){
      return {
        ...t,
        pendiente:false,
        ultimaFecha:new Date().toLocaleString("es-ES"),
        ultimoUsuario:usuarioActual(),
        actualizadoEn:new Date().toISOString()
      };
    }
    return t;
  });

  await guardarTareas();
  pintar();
}

async function volverPendiente(id){
  tareas = tareas.map(t=>{
    if(String(t.id) === String(id)){
      return {
        ...t,
        pendiente:true,
        actualizadoEn:new Date().toISOString()
      };
    }
    return t;
  });

  await guardarTareas();
  pintar();
}

async function borrarTarea(id){
  if(!esHosteleria()){
    alert("Solo HOSTELERÍA puede borrar tareas.");
    return;
  }

  const tarea = tareas.find(t=>String(t.id) === String(id));
  if(!tarea) return;

  if(!confirm("Vas a borrar esta tarea:\n\n" + tarea.texto + "\n\n¿Estás seguro?")){
    return;
  }

  tareas = tareas.filter(t=>String(t.id) !== String(id));

  await borrarDocumento(COLECCION_TAREAS, id);

  pintar();
}

function pintarResumen(){
  const inc = contarIncidencias();
  const com = contarComunicaciones();
  const cal = contarCalendario();
  const pendientes = tareas.filter(t=>t.pendiente).length;

  document.getElementById("resumen").innerHTML = `
    <div class="card">
      <div class="titulo">Estado actual</div>

      <div class="estado ${inc>0 ? "rojo" : "verde"}">
        ${inc>0 ? "🔴" : "🟢"} Incidencias: ${inc}
      </div>

      <div class="estado ${com>0 ? "amarillo" : "verde"}">
        ${com>0 ? "🟡" : "🟢"} Comunicaciones: ${com}
      </div>

      <div class="estado ${cal>0 ? "amarillo" : "verde"}">
        ${cal>0 ? "🟡" : "🟢"} Calendario / avisos: ${cal}
      </div>

      <div class="estado ${pendientes>0 ? "amarillo" : "verde"}">
        ${pendientes>0 ? "🟡" : "🟢"} Tareas revisión: ${pendientes}
      </div>
    </div>
  `;
}

function pintarTareas(){
  let html = `
    <div class="card">
      <div class="titulo">Tareas operativas</div>
      <div class="detalle">
        Cada tarea guarda quién la realizó, cuándo se hizo y hace cuántos días.
      </div>
    </div>
  `;

  const ordenadas = [...tareas].sort((a,b)=>
    Number(b.fechaMs || 0) - Number(a.fechaMs || 0)
  );

  if(ordenadas.length === 0){
    html += `<div class="vacio">No hay tareas creadas.</div>`;
    document.getElementById("tareas").innerHTML = html;
    return;
  }

  ordenadas.forEach(t=>{
    const dias = diasDesde(t.ultimaFecha);

    html += `
      <div class="card">
        <div class="titulo">${esc(t.texto)}</div>

        ${
          t.pendiente
          ? `<div class="estado amarillo">🟡 PENDIENTE</div>`
          : `<div class="estado verde">✅ HECHA</div>`
        }

        ${
          t.ultimaFecha
          ? `
            <div class="detalle">Última vez: ${esc(t.ultimaFecha)}</div>
            <div class="detalle">Realizada por: ${esc(t.ultimoUsuario || "-")}</div>
            <div class="detalle">
              ${
                dias === 0
                ? "Hecha hoy"
                : "Hace " + dias + " día" + (dias===1 ? "" : "s")
              }
            </div>
          `
          : `<div class="detalle">Aún no se ha realizado nunca.</div>`
        }

        ${
          t.pendiente
          ? `<button class="hecho" data-accion="marcar" data-id="${esc(t.id)}">✅ Marcar hecha</button>`
          : `<button data-accion="pendiente" data-id="${esc(t.id)}">↻ Volver a pendiente</button>`
        }

        ${
          esHosteleria()
          ? `<button class="borrar" data-accion="borrar" data-id="${esc(t.id)}">🗑 Borrar tarea</button>`
          : ``
        }
      </div>
    `;
  });

  document.getElementById("tareas").innerHTML = html;
}

function pintar(){
  pintarResumen();
  pintarTareas();
}

function volver(){
  window.location.href="index.html";
}

function activarBotones(){
  document.getElementById("btnVolver").addEventListener("click", volver);
  document.getElementById("btnCrearTarea").addEventListener("click", crearTarea);

  document.getElementById("tareas").addEventListener("click", function(e){
    const btn = e.target.closest("button");
    if(!btn) return;

    const accion = btn.dataset.accion;
    const id = btn.dataset.id;

    if(accion === "marcar") marcarTarea(id);
    if(accion === "pendiente") volverPendiente(id);
    if(accion === "borrar") borrarTarea(id);
  });
}

async function iniciar(){
  activarBotones();

  incidencias = await leerColeccion("incidencias");
  comunicaciones = await leerColeccion("comunicaciones");
  calendario = await leerColeccion("calendario");
  tareas = await leerColeccion(COLECCION_TAREAS);

  pintar();

  escucharColeccion("incidencias", (lista)=>{
    incidencias = lista;
    pintar();
  });

  escucharColeccion("comunicaciones", (lista)=>{
    comunicaciones = lista;
    pintar();
  });

  escucharColeccion("calendario", (lista)=>{
    calendario = lista;
    pintar();
  });

  escucharColeccion(COLECCION_TAREAS, (lista)=>{
    tareas = lista;
    pintar();
  });
}

iniciar();
</script>

</body>
</html>
