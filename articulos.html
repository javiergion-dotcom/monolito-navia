<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARTÍCULOS · MONOLITO</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#eef2f5;color:#17303d}
header{background:#17303d;color:white;padding:16px;display:flex;justify-content:space-between;align-items:center;gap:12px}
header h2{margin:0;font-size:22px}
button{border:0;border-radius:14px;padding:11px 14px;font-weight:800;font-size:15px;cursor:pointer}
.volver{background:white;color:#17303d}
.contenido{padding:16px;width:100%}
.nuevo{width:100%;background:#ff9800;color:white;margin-bottom:12px;font-size:17px}
.importar{width:100%;background:#673ab7;color:white;margin-bottom:12px;font-size:17px}
.base{width:100%;background:#17303d;color:white;margin-bottom:12px;font-size:17px}
.borrar{width:100%;background:#b00020;color:white;margin-bottom:14px;font-size:17px}
#lista{width:100%;display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px}
.card{background:white;border-radius:22px;padding:16px;box-shadow:0 8px 18px rgba(0,0,0,.12)}
.card.inactivo{opacity:.45}
.nombre{font-size:21px;font-weight:900}
.detalle{margin-top:6px;color:#4f5f69;font-size:15px}
.precioFinal{font-size:22px;font-weight:900;margin-top:8px;color:#17303d}
.venta{font-size:20px;font-weight:900;margin-top:8px;color:#48a530}
.botones{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.editar{background:#2196f3;color:white}
.desactivar{background:#ff0000;color:white}
.reactivar{background:#48a530;color:white}
.ficha{background:white;border-radius:24px;padding:16px;box-shadow:0 10px 22px rgba(0,0,0,.16);width:100%}
label{display:block;font-weight:800;margin-top:12px}
input,select{width:100%;padding:12px;border-radius:14px;border:1px solid #b8c2ca;font-size:16px;margin-top:6px}
.guardar{width:100%;background:#48a530;color:white;margin-top:16px}
.cancelar{width:100%;background:#dfe6ec;color:#17303d;margin-top:10px}
.oculto{display:none}
.vacio{background:white;border-radius:22px;padding:18px;text-align:center;font-weight:800}
</style>
</head>

<body>

<header>
  <button id="btnVolver" class="volver">← Volver</button>
  <h2>📦 ARTÍCULOS</h2>
</header>

<div class="contenido">

  <div id="vistaLista">
    <button id="btnNuevo" class="nuevo">➕ Nuevo artículo</button>
    <button id="btnImportar" class="importar">📄 Importar carta digital</button>
    <input id="archivoCarta" type="file" accept=".txt,.csv,.json,.html,.htm,*/*" class="oculto">
    <button id="btnBase" class="base">📦 Cargar artículos base</button>
    <button id="btnBorrarTodo" class="borrar">🗑️ Borrar todos los artículos</button>
    <div id="lista"></div>
  </div>

  <div id="vistaFicha" class="oculto">
    <div class="ficha">
      <h3 id="tituloFicha">Artículo</h3>

      <input type="hidden" id="idArticulo">

      <label>Proveedor</label>
      <select id="proveedor"></select>

      <label>Artículo</label>
      <input id="articulo">

      <label>Precio compra sin IVA</label>
      <input id="precioUnidad" type="number" step="0.0001">

      <label>Formato / unidades</label>
      <input id="formato" type="number" step="0.01">

      <label>Tipo de formato</label>
      <select id="unidadFormato">
        <option value="UNIDAD">UNIDAD</option>
        <option value="CAJA">CAJA</option>
        <option value="BARRIL">BARRIL</option>
        <option value="TANQUE">TANQUE</option>
        <option value="KILOS">KILOS</option>
      </select>

      <label>IVA</label>
      <select id="iva">
        <option value="4">4%</option>
        <option value="10">10%</option>
        <option value="21">21%</option>
      </select>

      <label>Precio de venta</label>
      <input id="precioVenta" type="number" step="0.01">

      <button id="btnGuardar" class="guardar">💾 Guardar artículo</button>
      <button id="btnCancelar" class="cancelar">Cancelar</button>
    </div>
  </div>

</div>

<script type="module">
import {
  leerColeccion,
  guardarColeccion,
  escucharColeccion,
  borrarColeccion
} from "./monolito-cloud.js";

let articulos = [];
let proveedoresGlobal = [];

function usuarioActual(){
  const u = localStorage.getItem("usuario") || "JAVI";
  localStorage.setItem("usuario", u);
  return u;
}

function puedeEditar(){
  const u = usuarioActual();
  return u === "JAVI" || u === "JAVIER" || u === "SILVIA";
}

function crearId(texto){
  return String(texto || "")
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9]+/g,"_")
    .replace(/^_+|_+$/g,"")
    + "_" + Date.now() + "_" + Math.random().toString(36).slice(2,7);
}

function articulosIniciales(){
  return [
    {id:"cafe_natural", proveedor:"CANDELAS", articulo:"CAFÉ NATURAL", precioUnidad:17.00, formato:3, unidadFormato:"KILOS", iva:10, precioVenta:1.40, activo:true},
    {id:"coca_cola_lata_33cl", proveedor:"SANPEDRO", articulo:"COCA COLA LATA 33CL", precioUnidad:0.56, formato:24, unidadFormato:"CAJA", iva:21, precioVenta:2.30, activo:true},
    {id:"mahou_5_estrellas_13", proveedor:"TURRADO", articulo:"MAHOU 5 ESTRELLAS 1/3", precioUnidad:17.96, formato:1, unidadFormato:"CAJA", iva:21, precioVenta:2.50, activo:true}
  ];
}

function precioCompra(a){
  return Number(a.precioUnidad || 0) * Number(a.formato || 1);
}

function dinero(n){
  return Number(n || 0).toLocaleString("es-ES", {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  }) + " €";
}

async function cargarProveedores(){
  proveedoresGlobal = await leerColeccion("proveedores");
  proveedoresGlobal = proveedoresGlobal.filter(p => p.activo !== false);

  if(proveedoresGlobal.length === 0){
    proveedoresGlobal = [
      {nombre:""},
      {nombre:"CANDELAS"},
      {nombre:"TURRADO"},
      {nombre:"SANPEDRO"},
      {nombre:"DEO"}
    ];
  }
}

function cargarSelectProveedores(){
  const sel = document.getElementById("proveedor");
  sel.innerHTML = proveedoresGlobal.map(p =>
    `<option value="${p.nombre || ""}">${p.nombre || "SIN PROVEEDOR"}</option>`
  ).join("");
}

function pintar(){
  let html = "";

  if(articulos.length === 0){
    html = `<div class="vacio">No hay artículos todavía.</div>`;
  }

  articulos.forEach((a)=>{
    html += `
      <div class="card ${a.activo === false ? "inactivo" : ""}">
        <div class="nombre">${a.articulo || "SIN NOMBRE"}</div>
        <div class="detalle">${a.proveedor || "SIN PROVEEDOR"} · ${a.unidadFormato || "UNIDAD"}</div>
        <div class="detalle">Precio compra sin IVA: ${dinero(a.precioUnidad)}</div>
        <div class="detalle">Formato: ${a.formato || 1}</div>
        <div class="detalle">IVA: ${a.iva || 21}%</div>
        <div class="precioFinal">Compra total sin IVA: ${dinero(precioCompra(a))}</div>
        <div class="venta">Venta: ${dinero(a.precioVenta)}</div>
        ${puedeEditar() ? `
          <div class="botones">
            <button class="editar" data-accion="editar" data-id="${a.id}">Editar</button>
            ${
              a.activo === false
              ? `<button class="reactivar" data-accion="reactivar" data-id="${a.id}">Reactivar</button>`
              : `<button class="desactivar" data-accion="desactivar" data-id="${a.id}">Desactivar</button>`
            }
          </div>
        ` : ""}
      </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;
}

async function guardarLista(){
  await guardarColeccion("articulos", articulos);
}

async function cargarArticulosBase(){
  if(!puedeEditar()) return;

  if(confirm("¿Cargar artículos base?")){
    articulos = articulosIniciales();
    await guardarLista();
    pintar();
    alert("Artículos base cargados en la nube.");
  }
}

async function borrarTodosLosArticulos(){
  if(!puedeEditar()) return;

  const ok1 = confirm("¿Seguro que quieres borrar TODOS los artículos?");
  if(!ok1) return;

  const ok2 = confirm("Esta acción no se puede deshacer. ¿Confirmas el borrado total?");
  if(!ok2) return;

  const borrado = await borrarColeccion("articulos");

  if(borrado){
    articulos = [];
    localStorage.removeItem("articulos");
    pintar();
    alert("Artículos borrados correctamente.");
  }else{
    alert("No se pudieron borrar los artículos.");
  }
}

function abrirNuevo(){
  if(!puedeEditar()) return;

  cargarSelectProveedores();

  document.getElementById("tituloFicha").textContent = "Nuevo artículo";
  document.getElementById("idArticulo").value = "";
  document.getElementById("articulo").value = "";
  document.getElementById("precioUnidad").value = "";
  document.getElementById("formato").value = "1";
  document.getElementById("unidadFormato").value = "UNIDAD";
  document.getElementById("iva").value = "21";
  document.getElementById("precioVenta").value = "";

  document.getElementById("vistaLista").classList.add("oculto");
  document.getElementById("vistaFicha").classList.remove("oculto");
}

function abrirEditar(id){
  if(!puedeEditar()) return;

  cargarSelectProveedores();

  const a = articulos.find(x => x.id === id);
  if(!a){
    alert("No se encontró el artículo.");
    return;
  }

  document.getElementById("tituloFicha").textContent = "Editar artículo";
  document.getElementById("idArticulo").value = a.id;
  document.getElementById("proveedor").value = a.proveedor || "";
  document.getElementById("articulo").value = a.articulo || "";
  document.getElementById("precioUnidad").value = a.precioUnidad || 0;
  document.getElementById("formato").value = a.formato || 1;
  document.getElementById("unidadFormato").value = a.unidadFormato || "UNIDAD";
  document.getElementById("iva").value = a.iva || 21;
  document.getElementById("precioVenta").value = a.precioVenta || 0;

  document.getElementById("vistaLista").classList.add("oculto");
  document.getElementById("vistaFicha").classList.remove("oculto");
}

async function guardarFicha(){
  if(!puedeEditar()) return;

  const articulo = document.getElementById("articulo").value.trim().toUpperCase();

  if(!articulo){
    alert("Falta el nombre del artículo.");
    return;
  }

  const idActual = document.getElementById("idArticulo").value;
  const id = idActual || crearId(articulo);
  const anterior = articulos.find(x => x.id === id);

  const nuevo = {
    id,
    proveedor: document.getElementById("proveedor").value,
    articulo,
    precioUnidad: parseFloat(document.getElementById("precioUnidad").value || 0),
    formato: parseFloat(document.getElementById("formato").value || 1),
    unidadFormato: document.getElementById("unidadFormato").value.trim().toUpperCase(),
    iva: parseFloat(document.getElementById("iva").value || 21),
    precioVenta: parseFloat(document.getElementById("precioVenta").value || 0),
    activo: anterior ? anterior.activo !== false : true,
    actualizadoPor: usuarioActual(),
    actualizadoEn: new Date().toISOString()
  };

  if(anterior){
    articulos = articulos.map(a => a.id === id ? nuevo : a);
  }else{
    articulos.unshift(nuevo);
  }

  await guardarLista();
  cerrarFicha();
}

function cerrarFicha(){
  document.getElementById("vistaFicha").classList.add("oculto");
  document.getElementById("vistaLista").classList.remove("oculto");
  pintar();
}

async function desactivarArticulo(id){
  if(!puedeEditar()) return;

  if(confirm("¿Desactivar este artículo?")){
    articulos = articulos.map(a =>
      a.id === id
      ? {...a, activo:false, actualizadoPor:usuarioActual(), actualizadoEn:new Date().toISOString()}
      : a
    );

    await guardarLista();
    pintar();
  }
}

async function reactivarArticulo(id){
  if(!puedeEditar()) return;

  articulos = articulos.map(a =>
    a.id === id
    ? {...a, activo:true, actualizadoPor:usuarioActual(), actualizadoEn:new Date().toISOString()}
    : a
  );

  await guardarLista();
  pintar();
}

function normalizarTexto(t){
  return String(t || "")
    .replaceAll("�","É")
    .replace(/\s+/g," ")
    .trim();
}

function numeroPrecio(t){
  const m = String(t || "").match(/(\d+[,.]\d{1,2})/);
  if(!m) return 0;
  return parseFloat(m[1].replace(",","."));
}

function extraerArticulosCarta(texto){
  const lineas = String(texto || "").split(/\r?\n/);
  const encontrados = [];

  for(let i=0; i<lineas.length; i++){
    const linea = normalizarTexto(lineas[i]);

    if(!linea) continue;

    if(linea.startsWith("A;") || linea.includes(";A;") || linea.startsWith("A,")){
      const partes = linea.split(/[;,]/).map(x => normalizarTexto(x)).filter(Boolean);

      let nombre = "";
      let precio = 0;

      for(const p of partes){
        if(!nombre && /[A-Za-zÁÉÍÓÚÑÜáéíóúñü]/.test(p) && !p.startsWith("http") && p.length > 2 && p !== "A"){
          nombre = p;
        }

        const n = numeroPrecio(p);
        if(n > 0) precio = n;
      }

      if(!precio){
        for(let j=i+1; j<=i+4 && j<lineas.length; j++){
          const n = numeroPrecio(lineas[j]);
          if(n > 0){
            precio = n;
            break;
          }
        }
      }

      if(nombre && precio > 0){
        encontrados.push({
          articulo: nombre.toUpperCase(),
          precioVenta: precio
        });
      }
    }
  }

  if(encontrados.length === 0){
    for(let i=0; i<lineas.length; i++){
      const linea = normalizarTexto(lineas[i]);
      const precio = numeroPrecio(linea);

      if(precio > 0){
        let nombre = linea
          .replace(/(\d+[,.]\d{1,2}).*/,"")
          .replace(/precio/ig,"")
          .replace(/€/g,"")
          .trim();

        if(nombre.length < 3 && i > 0){
          nombre = normalizarTexto(lineas[i-1]);
        }

        if(nombre && nombre.length > 2){
          encontrados.push({
            articulo: nombre.toUpperCase(),
            precioVenta: precio
          });
        }
      }
    }
  }

  const mapa = new Map();

  encontrados.forEach(x=>{
    const clave = x.articulo;
    if(!mapa.has(clave)){
      mapa.set(clave, x);
    }
  });

  return Array.from(mapa.values());
}

async function importarCartaDigitalDesdeArchivo(file){
  if(!file) return;

  const texto = await file.text();
  const datos = extraerArticulosCarta(texto);

  if(datos.length === 0){
    alert("No encontré artículos con precio en ese archivo.");
    return;
  }

  const ok = confirm("He encontrado " + datos.length + " artículos. ¿Importarlos ahora?");
  if(!ok) return;

  const ahora = new Date().toISOString();

  const nuevos = datos.map(x => ({
    id: crearId(x.articulo),
    proveedor: "",
    articulo: x.articulo,
    precioUnidad: 0,
    formato: 1,
    unidadFormato: "UNIDAD",
    iva: 21,
    precioVenta: Number(x.precioVenta || 0),
    activo: true,
    origen: "CARTA DIGITAL",
    actualizadoPor: usuarioActual(),
    actualizadoEn: ahora
  }));

  articulos = nuevos;

  await guardarLista();
  pintar();

  alert("Importación terminada: " + nuevos.length + " artículos creados.");
}

function volver(){
  window.location.href = "index.html";
}

function activarBotones(){
  document.getElementById("btnVolver").addEventListener("click", volver);
  document.getElementById("btnNuevo").addEventListener("click", abrirNuevo);
  document.getElementById("btnBase").addEventListener("click", cargarArticulosBase);
  document.getElementById("btnBorrarTodo").addEventListener("click", borrarTodosLosArticulos);
  document.getElementById("btnGuardar").addEventListener("click", guardarFicha);
  document.getElementById("btnCancelar").addEventListener("click", cerrarFicha);

  document.getElementById("btnImportar").addEventListener("click", ()=>{
    document.getElementById("archivoCarta").click();
  });

  document.getElementById("archivoCarta").addEventListener("change", async function(){
    const file = this.files[0];
    await importarCartaDigitalDesdeArchivo(file);
    this.value = "";
  });

  document.getElementById("lista").addEventListener("click", function(e){
    const btn = e.target.closest("button");
    if(!btn) return;

    const accion = btn.dataset.accion;
    const id = btn.dataset.id;

    if(accion === "editar") abrirEditar(id);
    if(accion === "desactivar") desactivarArticulo(id);
    if(accion === "reactivar") reactivarArticulo(id);
  });
}

async function iniciar(){
  activarBotones();
  await cargarProveedores();

  escucharColeccion("articulos", (lista)=>{
    articulos = lista.sort((a,b)=>
      (a.articulo || "").localeCompare(b.articulo || "")
    );
    pintar();
  });
}

iniciar();
</script>

</body>
</html>
