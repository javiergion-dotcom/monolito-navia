<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARTÍCULOS</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f5;
}

header{
  background:#17303d;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.contenido{
  padding:15px;
}

.bloque{
  background:white;
  border-radius:12px;
  padding:15px;
  margin-bottom:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.nombre{
  font-weight:800;
  font-size:18px;
}

.detalle{
  color:#555;
  margin-top:4px;
}

.botones{
  margin-top:10px;
  display:flex;
  gap:10px;
}

button{
  border:none;
  padding:8px 10px;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
}

.editar{background:#4caf50;color:white}
.desactivar{background:#ff0000;color:white}
.reactivar{background:#2196f3;color:white}

.inactivo{
  opacity:0.4;
}
</style>
</head>

<body>

<header>
  <div onclick="volver()">← Volver</div>
  <div>ARTÍCULOS</div>
</header>

<div class="contenido" id="lista"></div>

<script>

/* ================= CONTROL USUARIO ================= */

function puedeEditar(){
  const usuario = (localStorage.getItem("usuario") || "").toUpperCase();
  return usuario === "JAVI" || usuario === "SILVIA";
}

/* ================= DATOS ================= */

function leer(){
  return JSON.parse(localStorage.getItem("articulos") || "[]");
}

function guardar(data){
  localStorage.setItem("articulos", JSON.stringify(data));
}

/* ================= UI ================= */

function pintar(){
  let data = leer();
  let html = "";

  data.forEach((a,i)=>{

    let clase = a.activo === false ? "bloque inactivo" : "bloque";

    html += `
    <div class="${clase}">
      <div class="nombre">${a.articulo}</div>
      <div class="detalle">${a.proveedor} · ${a.formato}</div>
      <div class="detalle">${a.precio.toFixed(2)} € · IVA ${a.iva}%</div>

      ${puedeEditar() ? `
      <div class="botones">
        <button class="editar" onclick="editar(${i})">Editar</button>
        ${
          a.activo === false
          ? `<button class="reactivar" onclick="reactivar(${i})">Reactivar</button>`
          : `<button class="desactivar" onclick="desactivar(${i})">Desactivar</button>`
        }
      </div>
      ` : ``}

    </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;
}

/* ================= ACCIONES ================= */

function editar(i){
  let data = leer();

  let nuevoPrecio = prompt("Nuevo precio:", data[i].precio);
  if(nuevoPrecio === null) return;

  data[i].precio = parseFloat(nuevoPrecio);
  guardar(data);
  pintar();
}

function desactivar(i){
  let data = leer();

  if(confirm("Desactivar artículo?")){
    data[i].activo = false;
    guardar(data);
    pintar();
  }
}

function reactivar(i){
  let data = leer();

  data[i].activo = true;
  guardar(data);
  pintar();
}

/* ================= VOLVER ================= */

function volver(){
  window.location.href="index.html";
}

/* ================= INIT ================= */

pintar();

</script>

</body>
</html>
