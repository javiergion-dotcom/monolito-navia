<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARTÍCULOS</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f5;
}

header{
background:#14323f;
color:white;
padding:15px;
display:flex;
align-items:center;
justify-content:space-between;
}

button{
border:none;
border-radius:10px;
padding:10px;
font-size:16px;
}

.volver{
background:#ccc;
}

.nuevo{
background:#ff9800;
color:white;
margin:15px;
width:calc(100% - 30px);
}

.card{
background:white;
margin:10px;
padding:15px;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.form{
background:white;
margin:10px;
padding:15px;
border-radius:15px;
display:none;
}

input, select{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

.guardar{
background:#4caf50;
color:white;
width:100%;
}

.borrar{
background:red;
color:white;
width:100%;
margin-top:5px;
}
</style>

</head>
<body>

<header>
<button class="volver" onclick="volver()">← Volver</button>
<h2>📦 ARTÍCULOS</h2>
</header>

<button class="nuevo" onclick="abrirFicha()">+ Nuevo artículo</button>

<div id="lista"></div>

<div class="form" id="formulario">
<h3>Artículo</h3>

<label>Proveedor</label>
<select id="proveedor">
<option>SANPEDRO</option>
<option>MAHOU</option>
<option>CAFE CANDELAS</option>
</select>

<label>Nombre</label>
<input id="nombre">

<label>Precio unidad (€)</label>
<input id="precioUnidad" type="number" step="0.01">

<label>Formato (ej: 24, 6, 1)</label>
<input id="formato" type="number">

<label>IVA (%)</label>
<select id="iva">
<option value="4">4</option>
<option value="10">10</option>
<option value="21" selected>21</option>
</select>

<button class="guardar" onclick="guardar()">Guardar</button>
<button class="borrar" onclick="borrar()">Eliminar</button>

</div>

<script>

function volver(){
history.back();
}

// 🔐 CONTROL USUARIO
function usuarioActual(){
return localStorage.getItem("usuario") || "EMPLEADO";
}

function puedeEditar(){
const u = usuarioActual();
return u === "JAVI" || u === "JAVIER" || u === "SILVIA";
}

// 📦 DATOS
function leer(){
return JSON.parse(localStorage.getItem("articulos") || "[]");
}

function guardarDatos(data){
localStorage.setItem("articulos", JSON.stringify(data));
}

// 🧠 UI
function render(){
const lista = document.getElementById("lista");
lista.innerHTML = "";

leer().forEach((a, i)=>{

const precioCompra = a.precioUnidad * a.formato;

lista.innerHTML += `
<div class="card">
<b>${a.nombre}</b><br>
${a.proveedor}<br>
Unidad: ${a.precioUnidad} €<br>
Formato: ${a.formato}<br>
<b>Compra: ${precioCompra.toFixed(2)} €</b><br>
IVA: ${a.iva}%

${puedeEditar() ? `<br><button onclick="editar(${i})">Editar</button>` : ""}
</div>
`;
});
}

// ➕ NUEVO
function abrirFicha(){
if(!puedeEditar()){
alert("Modo empleado");
return;
}
document.getElementById("formulario").style.display = "block";
}

// 💾 GUARDAR
function guardar(){
let data = leer();

const nuevo = {
proveedor: proveedor.value,
nombre: nombre.value,
precioUnidad: parseFloat(precioUnidad.value),
formato: parseFloat(formato.value),
iva: parseFloat(iva.value)
};

data.push(nuevo);
guardarDatos(data);
cerrar();
render();
}

// ✏️ EDITAR
let editando = null;

function editar(i){
if(!puedeEditar()) return;

const a = leer()[i];
editando = i;

proveedor.value = a.proveedor;
nombre.value = a.nombre;
precioUnidad.value = a.precioUnidad;
formato.value = a.formato;
iva.value = a.iva;

abrirFicha();
}

// 🗑️ BORRAR
function borrar(){
if(editando === null) return;

let data = leer();
data.splice(editando,1);
guardarDatos(data);

editando = null;
cerrar();
render();
}

// ❌ CERRAR
function cerrar(){
document.getElementById("formulario").style.display = "none";
nombre.value = "";
precioUnidad.value = "";
formato.value = "";
editando = null;
}

// 🚀 INICIO
render();

</script>

</body>
</html>
