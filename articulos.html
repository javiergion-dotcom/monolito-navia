<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARTÍCULOS</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f5;
}

header{
  background:#17303d;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.titulo{
  font-size:20px;
  font-weight:bold;
}

.add{
  font-size:28px;
  cursor:pointer;
}

.lista{
  padding:15px;
}

.item{
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.editar{
  cursor:pointer;
}

.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:white;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:400px;
}

input, select{
  width:100%;
  padding:10px;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:12px;
  background:#17303d;
  color:white;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<header>
  <div style="display:flex; align-items:center; gap:10px;">
    <div onclick="volver()" style="font-size:24px; cursor:pointer;">←</div>
    <div class="titulo">ARTÍCULOS</div>
  </div>

  <div class="add" onclick="nuevo()">+</div>
</header>

<div class="lista" id="lista"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">

    <input id="nombre" placeholder="Nombre del artículo">

    <select id="proveedor"></select>

    <input id="precio" placeholder="Precio sin IVA">

    <select id="iva">
      <option value="4">IVA 4%</option>
      <option value="10">IVA 10%</option>
      <option value="21">IVA 21%</option>
    </select>

    <button onclick="guardar()">GUARDAR</button>

  </div>
</div>

<script>

let articulos = JSON.parse(localStorage.getItem("articulos") || "[]");
let proveedores = JSON.parse(localStorage.getItem("proveedores") || "[]");
let editIndex = null;

/* PINTAR */
function pintar(){
  let html="";
  articulos.forEach((a,i)=>{
    html+=`
    <div class="item">
      <div>
        ${a.nombre}<br>
        <small>${a.proveedor} · ${a.precio}€</small>
      </div>
      <div class="editar" onclick="editar(${i})">✏</div>
    </div>`;
  });
  lista.innerHTML=html;
}

/* CARGAR PROVEEDORES */
function cargarProveedores(){
  proveedor.innerHTML="";
  proveedores.forEach(p=>{
    proveedor.innerHTML+=`<option>${p.nombre}</option>`;
  });
}

/* NUEVO */
function nuevo(){
  editIndex=null;
  limpiar();
  modal.style.display="flex";
}

/* EDITAR */
function editar(i){
  editIndex=i;
  let a=articulos[i];

  nombre.value=a.nombre;
  proveedor.value=a.proveedor;
  precio.value=a.precio;
  iva.value=a.iva;

  modal.style.display="flex";
}

/* LIMPIAR */
function limpiar(){
  nombre.value="";
  precio.value="";
}

/* GUARDAR */
function guardar(){

  let a={
    nombre:nombre.value,
    proveedor:proveedor.value,
    precio:parseFloat(precio.value),
    iva:parseInt(iva.value)
  };

  if(editIndex===null){
    articulos.push(a);
  }else{
    articulos[editIndex]=a;
  }

  localStorage.setItem("articulos", JSON.stringify(articulos));

  modal.style.display="none";
  pintar();
}

/* VOLVER */
function volver(){
  window.history.back();
}

/* INIT */
cargarProveedores();
pintar();

</script>

</body>
</html>
