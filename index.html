<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MONOLITO GPT PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#dfe6eb;
}

.header{
    background:#1f3c4d;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:14px;
}

.usuario{
    font-weight:bold;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    padding:20px;
}

.boton{
    background:#6e8797;
    border-radius:20px;
    padding:30px 10px;
    text-align:center;
    color:white;
    font-weight:bold;
    font-size:16px;
    box-shadow:0 8px 15px rgba(0,0,0,0.2);
    transition:all 0.15s ease;
}

.boton:active{
    transform:translateY(4px);
    box-shadow:0 3px 6px rgba(0,0,0,0.3);
}

.verde{
    background:#3db34a;
}

.naranja{
    background:#f4a100;
}

.rojo{
    background:#e53935;
}

</style>
</head>

<body>

<div class="header">
    <div>
        MONOLITO GPT PRO<br>
        <span id="franjaEstado"></span>
    </div>
    <div class="usuario" id="usuario"></div>
</div>

<div class="grid">

    <div class="boton" onclick="abrir('proveedores')">PROVEEDORES</div>
    <div class="boton" onclick="abrir('articulos')">ARTÍCULOS</div>
    <div class="boton" onclick="abrir('comparador')">COMPARADOR</div>

    <div class="boton" onclick="abrir('pedidos')">PEDIDOS</div>
    <div class="boton" onclick="abrir('pagos')">PAGOS</div>
    <div class="boton naranja" onclick="abrir('revision')">REVISIÓN</div>

    <div class="boton verde" onclick="abrir('historico')">HISTÓRICO</div>
    <div class="boton" onclick="abrir('ventas')">VENTAS</div>
    <div class="boton" onclick="abrir('calendario')">CALENDARIO</div>

    <div class="boton naranja" onclick="abrir('comunicacion')">COMUNICACIÓN</div>
    <div class="boton naranja" onclick="abrir('ayuda')">AYUDA</div>
    <div class="boton" onclick="abrir('configuracion')">CONFIGURACIÓN</div>

</div>

<script>

if(!sessionStorage.getItem("loginOK")){
    window.location.href = "login.html";
}

function abrir(modulo){
    window.location.href = modulo + ".html";
}

function reloj(){
    const d = new Date();
    document.getElementById("franjaEstado").innerHTML =
        d.toLocaleDateString("es-ES") + " · " +
        d.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"});
}

function saludo(){
    const h = new Date().getHours();
    if(h < 6) return "Buenas noches";
    if(h < 12) return "Buenos días";
    if(h < 21) return "Buenas tardes";
    return "Buenas noches";
}

function cargarUsuario(){
    const usuario = localStorage.getItem("usuario") || "OPERADOR";
    document.getElementById("usuario").textContent = usuario;
}

function actualizarFranja(){
    document.getElementById("franjaEstado").textContent =
        saludo() + " · Sin incidencias · Sin comunicaciones";
}

setInterval(() => {
    reloj();
    actualizarFranja();
}, 1000);

cargarUsuario();
reloj();
actualizarFranja();

</script>

</body>
</html>
