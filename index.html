<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>MONOLITO</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#e5e5e5;
}

/* CABECERA */

header{
background:#2b2b2b;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
font-size:18px;
}

.titulo{
font-weight:bold;
}

.top-icons{
display:flex;
gap:15px;
align-items:center;
font-size:18px;
}

/* GRID */

.panel{
max-width:900px;
margin:auto;
padding:30px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

/* TARJETAS */

.boton{
height:140px;
border-radius:10px;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-weight:bold;
text-align:center;
box-shadow:0 6px 10px rgba(0,0,0,0.25);
cursor:pointer;
transition:0.2s;
}

.boton:hover{
transform:translateY(-3px);
}

/* ICONO CIRCULAR */

.circulo{
width:60px;
height:60px;
border-radius:50%;
background:white;
color:#333;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
margin-bottom:10px;
}

/* COLORES */

.azul{background:#3f6ea5;}
.gris{background:#555;}
.gris2{background:#5f5f5f;}
.naranja{background:#f39c12;}
.verde{background:#4CAF50;}
.negro{background:#444;}
.negro2{background:#505050;}

/* AVISOS */

.avisos{
position:fixed;
bottom:0;
width:100%;
background:#2f2f2f;
color:white;
padding:12px 20px;
font-weight:bold;
display:flex;
justify-content:flex-end;
}

.indicador-rojo{
color:red;
font-size:18px;
}

.indicador-amarillo{
color:gold;
font-size:18px;
}

</style>

</head>

<body>

<header>

<div class="titulo">
MONOLITO – Sistema del Bar
</div>

<div class="top-icons">

<span class="indicador-rojo">●</span>
<span class="indicador-amarillo">●</span>

<span>📅</span>
<span>⬅</span>
<span>❓</span>

<span id="fecha"></span>

</div>

</header>


<div class="panel">

<div class="boton azul">
<div class="circulo">🚚</div>
PROVEEDORES
</div>

<div class="boton gris">
<div class="circulo">📋</div>
ARTÍCULOS
</div>

<div class="boton gris2">
<div class="circulo">📊</div>
COMPARADOR
</div>

<div class="boton azul">
<div class="circulo">📝</div>
PEDIDOS
</div>

<div class="boton naranja">
<div class="circulo">⚠️</div>
A TENER EN CUENTA
</div>

<div class="boton gris">
<div class="circulo">⚙️</div>
CONFIGURACIÓN
</div>

<div class="boton verde">
<div class="circulo">🗂️</div>
HISTÓRICO PEDIDOS
</div>

<div class="boton negro">
<div class="circulo">💰</div>
VENTAS
</div>

<div class="boton negro2">
<div class="circulo">📖</div>
DIARIO DEL BAR
</div>

<div class="boton negro">
<div class="circulo">💳</div>
PAGOS
</div>

</div>


<div class="avisos">
✉ AVISOS DEL BAR
</div>


<script>

const hoy = new Date();

document.getElementById("fecha").innerText =
hoy.toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"long"}) +
" • " +
hoy.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"});

</script>


</body>
</html>
