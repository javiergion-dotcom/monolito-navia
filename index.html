<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO · Sistema Principal</title>

<style>
    body {
        margin: 0;
        background: #000;
        font-family: Arial, sans-serif;
        color: white;
        text-align: center;
    }

    h1 {
        margin-top: 40px;
        font-size: 32px;
        font-weight: bold;
    }

    .boton {
        width: 260px;
        padding: 18px;
        margin: 14px auto;
        background: #222;
        border: 2px solid #555;
        border-radius: 10px;
        color: white;
        font-size: 20px;
        cursor: pointer;
        transition: 0.15s;
        display: block;
    }

    .boton:active {
        transform: scale(0.96);
        background: #444;
    }

    #pantalla, #modulos {
        display: none;
    }

    .visible {
        display: block;
    }
</style>

<script>
function mostrarPantalla(id) {
    document.getElementById("inicio").classList.remove("visible");
    document.getElementById("modulos").classList.remove("visible");
    document.getElementById(id).classList.add("visible");
}

function volver() {
    mostrarPantalla("inicio");
}
</script>

</head>
<body>

<!-- PANTALLA INICIAL -->
<div id="inicio" class="visible">
    <h1>PANTALLA INICIAL</h1>
    <button class="boton" onclick="mostrarPantalla('modulos')">ENTRAR</button>
    <button class="boton">AYUDA</button>
    <button class="boton">SALIR</button>
</div>

<!-- SELECTOR DE MÓDULOS -->
<div id="modulos">
    <h1>Selector de Módulos</h1>
    <button class="boton">Módulo 1</button>
    <button class="boton">Módulo 2</button>
    <button class="boton" onclick="volver()">VOLVER</button>
</div>

</body>
</html>
