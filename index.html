<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO GPT PRO</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:Segoe UI, Arial, sans-serif;
background:#dfe6ec;
min-height:100vh;
overflow:auto;
}

/* ===== CABECERA ===== */

.topbar{
height:80px;
background:#13222b;
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
position:sticky;
top:0;
z-index:10;
}

.title{
font-size:26px;
font-weight:700;
}

.operator{
font-size:14px;
opacity:0.8;
}

.datetime{
font-size:18px;
font-weight:600;
}

/* ===== PANEL ===== */

.panel{
padding:20px;
}

/* ===== GRID ===== */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:22px;
}

/* ===== BOTONES TPV ===== */

.btn{
height:150px;
background:linear-gradient(180deg,#6f8fa6,#4c6576);
border-radius:28px;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:700;
cursor:pointer;
position:relative;

box-shadow:
inset 0 3px 4px rgba(255,255,255,0.35),
0 15px 25px rgba(0,0,0,0.35);

transition:0.12s;
}

.btn:active{
transform:translateY(8px);
box-shadow:
inset 0 6px 10px rgba(0,0,0,0.6),
0 5px 10px rgba(0,0,0,0.5);
}

.icon{
font-size:46px;
margin-bottom:8px;
}

.green{
background:linear-gradient(180deg,#71bf55,#3d8f2b);
}

.orange{
background:linear-gradient(180deg,#f6a623,#d57900);
}

.counter{
position:absolute;
top:10px;
right:16px;
font-size:14px;
opacity:0.9;
}

/* ===== RESPONSIVE MÓVIL ===== */

@media(max-width:700px){
.grid{
grid-template-columns:repeat(2,1fr);
}
.btn{
height:130px;
font-size:18px;
}
.icon{
font-size:38px;
}
}

</style>
</head>

<body>

<div class="topbar">
<div>
<div class="title">MONOLITO GPT PRO</div>
<div class="operator">Operador activo</div>
</div>

<div class="datetime" id="reloj"></div>
</div>

<div class="panel">
<div class="grid">

<div class="btn" onclick="abrir('proveedores')">
<div class="counter">1</div>
<div class="icon">🚚</div>
PROVEEDORES
</div>

<div class="btn" onclick="abrir('articulos')">
<div class="icon">📦</div>
ARTÍCULOS
</div>

<div class="btn" onclick="abrir('comparador')">
<div class="icon">📊</div>
COMPARADOR
</div>

<div class="btn" onclick="abrir('pedidos')">
<div class="counter">2</div>
<div class="icon">📝</div>
PEDIDOS
</div>

<div class="btn" onclick="abrir('pagos')">
<div class="icon">💳</div>
PAGOS
</div>

<div class="btn orange" onclick="abrir('revision')">
<div class="counter">1</div>
<div class="icon">🔎</div>
REVISIÓN
</div>

<div class="btn green" onclick="abrir('historico')">
<div class="icon">📁</div>
HISTÓRICO
</div>

<div class="btn" onclick="abrir('ventas')">
<div class="icon">💰</div>
VENTAS
</div>

<div class="btn" onclick="abrir('calendario')">
<div class="icon">📅</div>
CALENDARIO
</div>

<div class="btn orange" onclick="abrir('comunicacion')">
<div class="counter">3</div>
<div class="icon">✉️</div>
COMUNICACIÓN
</div>

<div class="btn orange" onclick="abrir('ia')">
<div class="icon">🤖</div>
AYUDA
</div>

<div class="btn" onclick="abrir('configuracion')">
<div class="icon">⚙️</div>
CONFIGURACIÓN
</div>

</div>
</div>

<script>

function abrir(seccion){
try{
navigator.vibrate(40);
}catch(e){}
alert("Abrir módulo: "+seccion);
}

function reloj(){
let d=new Date();
document.getElementById("reloj").innerHTML=
d.toLocaleDateString()+" · "+d.toLocaleTimeString().slice(0,5);
}

setInterval(reloj,1000);
reloj();

</script>

</body>
</html>
