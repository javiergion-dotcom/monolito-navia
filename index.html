<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO GPT PRO</title><style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#e9eef2;
overflow:hidden;
}

/* BARRA SUPERIOR */

.top{
background:#0f2029;
color:white;
padding:14px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:18px;
}

/* GRID BOTONES */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:22px;
padding:22px;
height:calc(100vh - 60px);
box-sizing:border-box;
}

/* BOTONES */

.btn{
border-radius:26px;
color:white;
font-size:22px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
box-shadow:0 10px 20px rgba(0,0,0,0.25);
transition:.12s;
cursor:pointer;
user-select:none;
}

.btn:active{
transform:scale(.96);
box-shadow:0 4px 8px rgba(0,0,0,0.35);
}

/* COLORES */

.azul{background:linear-gradient(#6f8fa6,#3f5f75);}
.gris{background:linear-gradient(#7d8b94,#4e5b63);}
.naranja{background:linear-gradient(#f2a93b,#d88300);}
.verde{background:linear-gradient(#69c15a,#3e9c32);}

.icon{
font-size:46px;
margin-bottom:8px;
}

</style></head><body><div class="top">
<div>MONOLITO GPT PRO</div>
<div id="hora"></div>
</div><div class="grid"><div class="btn azul" onclick="abrir('proveedores')">
<div class="icon">🚚</div>
PROVEEDORES
</div><div class="btn gris" onclick="abrir('articulos')">
<div class="icon">📦</div>
ARTÍCULOS
</div><div class="btn azul" onclick="abrir('comparador')">
<div class="icon">📊</div>
COMPARADOR
</div><div class="btn azul" onclick="abrir('pedidos')">
<div class="icon">📝</div>
PEDIDOS
</div><div class="btn gris" onclick="abrir('pagos')">
<div class="icon">💳</div>
PAGOS
</div><div class="btn naranja" onclick="abrir('revision')">
<div class="icon">🔎</div>
REVISIÓN
</div><div class="btn verde" onclick="abrir('historico')">
<div class="icon">📂</div>
HISTÓRICO
</div><div class="btn gris" onclick="abrir('ventas')">
<div class="icon">💰</div>
VENTAS
</div><div class="btn gris" onclick="abrir('calendario')">
<div class="icon">📅</div>
CALENDARIO
</div><div class="btn naranja" onclick="abrir('comunicacion')">
<div class="icon">✉️</div>
COMUNICACIÓN
</div><div class="btn naranja" onclick="abrir('ia')">
<div class="icon">🤖</div>
AYUDA IA
</div><div class="btn gris" onclick="abrir('config')">
<div class="icon">⚙️</div>
CONFIGURACIÓN
</div></div><script>

function abrir(p){
navigator.vibrate(40);
alert("Abrir módulo: " + p);
}

function reloj(){
let f=new Date();
document.getElementById("hora").innerHTML=
f.toLocaleDateString()+" · "+f.toLocaleTimeString();
}

setInterval(reloj,1000);
reloj();

</script></body>
</html>
