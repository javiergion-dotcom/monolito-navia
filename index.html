<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO GPT PRO</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#e9eef2;
}

/* BARRA SUPERIOR */

.topbar{
background:#16232d;
color:white;
padding:14px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.title{
font-size:22px;
font-weight:700;
}

.subtitle{
font-size:12px;
opacity:0.7;
}

.icons{
font-size:20px;
display:flex;
gap:18px;
}

/* GRID */

.panel{
padding:18px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
}

/* BOTONES */

.btn{
background:linear-gradient(180deg,#6f8fa6,#4e6e85);
color:white;
border-radius:22px;
height:110px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:18px;
font-weight:700;
box-shadow:
inset 0 1px 0 rgba(255,255,255,0.4),
0 10px 18px rgba(0,0,0,0.25);
transition:0.15s;
cursor:pointer;
user-select:none;
}

.btn span{
font-size:36px;
margin-bottom:6px;
}

.btn:active{
transform:translateY(6px);
box-shadow:
inset 0 6px 12px rgba(0,0,0,0.5);
}

/* COLORES */

.green{background:linear-gradient(180deg,#6fbf55,#3d8c2f);}
.orange{background:linear-gradient(180deg,#f5a623,#d87c00);}
.dark{background:linear-gradient(180deg,#5f6f7a,#3f4f59);}

.badge{
position:absolute;
right:12px;
top:8px;
font-size:14px;
background:transparent;
color:white;
font-weight:bold;
}

.box{
position:relative;
}

</style>
</head>

<body>

<div class="topbar">
<div>
<div class="title">MONOLITO GPT PRO</div>
<div class="subtitle">Javier Gion & IA ChatGPT</div>
</div>

<div class="icons">
⚠️ 🔎 ❓ ↩️
</div>
</div>

<div class="panel">

<div class="btn"><span>🚚</span>PROVEEDORES</div>

<div class="btn dark"><span>📦</span>ARTÍCULOS</div>

<div class="btn"><span>📊</span>COMPARADOR</div>

<div class="btn"><span>📝</span>PEDIDOS</div>

<div class="btn dark"><span>💳</span>PAGOS</div>

<div class="btn orange"><span>🔎</span>REVISIÓN</div>

<div class="btn green"><span>📁</span>HISTÓRICO</div>

<div class="btn dark"><span>💰</span>VENTAS</div>

<div class="btn dark"><span>📅</span>CALENDARIO</div>

<div class="btn orange box">
<div class="badge">3</div>
<span>✉️</span>COMUNICACIÓN
</div>

<div class="btn orange"><span>🤖</span>AYUDA IA</div>

<div class="btn dark"><span>⚙️</span>CONFIGURACIÓN</div>

</div>

<script>

/* vibración al tocar */

document.querySelectorAll(".btn").forEach(b=>{
b.onclick=()=>{
if(navigator.vibrate) navigator.vibrate(40)
alert("Pantalla en construcción")
}
})

</script>

</body>
</html>
