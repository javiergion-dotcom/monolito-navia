<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO GPT PRO</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#dfe6ec;
}

/* CABECERA */

header{
  background:#17303d;
  color:white;
  padding:14px 22px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.title{
  font-size:18px;
  font-weight:700;
}

.sub{
  font-size:12px;
  opacity:.8;
}

.header-right{
  display:flex;
  gap:10px;
  align-items:center;
}

#usuario{
  background:#ffffff22;
  padding:6px 10px;
  border-radius:20px;
  font-size:13px;
  font-weight:700;
}

#hora{
  font-size:14px;
}

/* PANEL */

.panel{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

/* BOTONES */

.boton{
  border-radius:22px;
  padding:25px 10px;
  text-align:center;
  color:white;
  font-size:16px;
  font-weight:700;
  background:linear-gradient(180deg,#87a6bd,#547184);
  box-shadow:0 12px 20px rgba(0,0,0,0.25);
  cursor:pointer;
}

.boton:active{
  transform:translateY(4px);
  box-shadow:0 4px 8px rgba(0,0,0,0.3);
}

.azul{background:linear-gradient(180deg,#87a6bd,#547184);}
.naranja{background:linear-gradient(180deg,#f6ae1b,#df8b00);}
.verde{background:linear-gradient(180deg,#78cc4b,#48a530);}

/* CONTADORES */

.contador{
  position:absolute;
  top:10px;
  right:12px;
  background:red;
  color:white;
  font-size:12px;
  padding:4px 7px;
  border-radius:50%;
}

/* RESPONSIVE */

@media (max-width:900px){
  .panel{
    grid-template-columns:repeat(2,1fr);
  }
}
</style>
</head>

<body>

<header>
  <div>
    <div class="title">MONOLITO GPT PRO</div>
    <div class="sub">Sistema de control</div>
  </div>

  <div class="header-right">
    <div id="usuario">OPERADOR</div>
    <div id="hora"></div>
  </div>
</header>

<div class="panel">

  <div class="boton azul" onclick="abrir('proveedores')">PROVEEDORES</div>
  <div class="boton azul" onclick="abrir('articulos')">ARTÍCULOS</div>
  <div class="boton azul" onclick="abrir('comparador')">COMPARADOR</div>

  <div class="boton azul" onclick="abrir('pedidos')">PEDIDOS</div>
  <div class="boton azul" onclick="abrir('pagos')">PAGOS</div>
  <div class="boton naranja" onclick="abrir('revision')">REVISIÓN</div>

  <div class="boton verde" onclick="abrir('historico')">HISTÓRICO</div>
  <div class="boton azul" onclick="abrir('ventas')">VENTAS</div>
  <div class="boton azul" onclick="abrir('calendario')">CALENDARIO</div>

  <div class="boton naranja" onclick="abrir('comunicacion')">COMUNICACIÓN</div>
  <div class="boton naranja" onclick="abrir('ayuda')">AYUDA</div>
  <div class="boton azul" onclick="abrir('configuracion')">CONFIGURACIÓN</div>

</div>

<script>

function abrir(modulo){
  window.location.href = modulo + ".html";
}

function reloj(){
  const d = new Date();
  document.getElementById("hora").innerHTML =
    d.toLocaleDateString("es-ES") + " · " +
    d.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"});
}

function cargarUsuario(){
  const usuario = localStorage.getItem("usuario") || "OPERADOR";
  document.getElementById("usuario").textContent = usuario;
}

setInterval(reloj,1000);
cargarUsuario();
reloj();

</script>

</body>
</html>
