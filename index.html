<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial;
  background:#dfe6ec;
}

/* CABECERA */
header{
  background:#17303d;
  color:white;
  padding:14px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.title{
  font-size:18px;
  font-weight:700;
}

.info{
  text-align:right;
  font-size:14px;
}

/* PANEL */
.panel{
  padding:18px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}

/* BOTONES */
.boton{
  background:linear-gradient(#87a6bd,#547184);
  color:white;
  padding:20px;
  border-radius:16px;
  text-align:center;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
}

.naranja{background:linear-gradient(#f6ae1b,#df8b00);}
.verde{background:linear-gradient(#78cc4b,#48a530);}

.alerta{
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  color:white;
  border-radius:50%;
  padding:6px 10px;
  font-size:12px;
}

/* AVISO STOCK */
.stock-alerta{
  background:#ffefc2;
  margin:10px;
  padding:12px;
  border-radius:10px;
  font-size:16px;
  display:none;
}
</style>
</head>

<body>

<header>
  <div class="title">MONOLITO</div>
  <div class="info">
    <div id="usuario">OPERADOR</div>
    <div id="hora"></div>
  </div>
</header>

<div id="stockAviso" class="stock-alerta">
⚠️ CONTROL DE STOCK: revisar “cuántas hay / cuántas pido”
</div>

<div class="panel">

  <div class="boton" onclick="abrir('proveedores.html')">PROVEEDORES</div>
  <div class="boton" onclick="abrir('pedidos.html')">PEDIDOS</div>

  <div class="boton" onclick="abrir('pagos.html')">PAGOS</div>
  <div class="boton naranja" onclick="abrir('comunicacion.html')">COMUNICACIÓN</div>

  <div class="boton verde" onclick="abrir('historico.html')">HISTÓRICO</div>
  <div class="boton" onclick="abrir('configuracion.html')">CONFIGURACIÓN</div>

</div>

<script>

/* ABRIR PÁGINAS */
function abrir(destino){
  window.location.href = destino;
}

/* USUARIO (NO EDITABLE) */
function cargarUsuario(){
  let u = localStorage.getItem("usuario");
  if(!u){ u = "SIN IDENTIFICAR"; }
  document.getElementById("usuario").textContent = u;
}

/* RELOJ */
function reloj(){
  let d = new Date();
  document.getElementById("hora").textContent =
    d.toLocaleDateString("es-ES") + " " +
    d.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"});
}

/* CONTROL STOCK POR SEMANAS */
function controlStock(){

  let semanas = localStorage.getItem("controlSemanas") || 3;
  let ultima = localStorage.getItem("ultimaRevision");

  let hoy = new Date();

  if(!ultima){
    localStorage.setItem("ultimaRevision", hoy);
    return;
  }

  let ultimaFecha = new Date(ultima);
  let dias = (hoy - ultimaFecha) / (1000*60*60*24);

  if(dias >= (7 * semanas)){
    document.getElementById("stockAviso").style.display = "block";
  }
}

/* INICIO */
cargarUsuario();
reloj();
setInterval(reloj,1000);
controlStock();

</script>

</body>
</html>
