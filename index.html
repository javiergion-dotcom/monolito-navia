<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO</title>

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color: transparent;
}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#dfe6ec;
}

/* HEADER */
header{
  background:#17303d;
  color:white;
  padding:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.title{
  font-size:22px;
  font-weight:bold;
}

#usuario{
  background:rgba(255,255,255,0.15);
  padding:8px 12px;
  border-radius:20px;
  font-weight:bold;
}

/* FRANJA SUPERIOR (CLAVE) */
.franja{
  background:#eef2f5;
  padding:12px 16px;
  font-size:16px;
  font-weight:bold;
  text-align:center;
}

.ok{
  color:#4f8a3a;
}

.alerta{
  color:#b02a2a;
}

/* PANEL */
.panel{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

/* BOTONES */
.boton{
  height:120px;
  border-radius:20px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;

  background:linear-gradient(#8fb1c7,#4f6f82);

  box-shadow:
    inset 0 4px 8px rgba(255,255,255,0.2),
    inset 0 -10px 20px rgba(0,0,0,0.2),
    0 12px 20px rgba(0,0,0,0.3);

  transition:all 0.08s;
}

.boton:active{
  transform:translateY(8px) scale(0.96);
}

.icono{
  font-size:36px;
  margin-bottom:6px;
}

@media(max-width:900px){
  .panel{
    grid-template-columns:repeat(2,1fr);
  }
}
</style>
</head>

<body>

<header>
  <div class="title">MONOLITO</div>
  <div id="usuario">OPERADOR</div>
</header>

<div class="franja" id="estado"></div>

<div class="panel">

  <div class="boton" onclick="abrir('pedidos.html')">
    <div class="icono">📝</div>
    PEDIDOS
  </div>

  <div class="boton" onclick="abrir('pagos.html')">
    <div class="icono">💳</div>
    PAGOS
  </div>

  <div class="boton" onclick="abrir('proveedores.html')">
    <div class="icono">🚚</div>
    PROVEEDORES
  </div>

  <div class="boton" onclick="abrir('articulos.html')">
    <div class="icono">📦</div>
    ARTÍCULOS
  </div>

  <div class="boton" onclick="abrir('historico.html')">
    <div class="icono">📁</div>
    HISTÓRICO
  </div>

  <div class="boton" onclick="abrir('configuracion.html')">
    <div class="icono">⚙️</div>
    CONFIGURACIÓN
  </div>

</div>

<script>

/* 🔐 CONTROL DE ACCESO (MUY IMPORTANTE) */
const CODIGO_PERMITIDO = "2580"; // CAMBIA ESTE

if(localStorage.getItem("usuario") !== CODIGO_PERMITIDO){
  alert("Acceso no autorizado");
  window.location.href = "login.html";
}

/* USUARIO */
document.getElementById("usuario").innerText =
  localStorage.getItem("usuario") || "OPERADOR";

/* ABRIR */
function abrir(p){
  if(navigator.vibrate) navigator.vibrate(20);
  window.location.href = p;
}

/* ESTADO SUPERIOR */
function actualizarEstado(){

  let pagos = JSON.parse(localStorage.getItem("pagos_pendientes") || "[]");
  let comunicaciones = JSON.parse(localStorage.getItem("comunicaciones") || "[]");

  let incidencias = pagos.filter(p => p.estado === "incidencia").length;

  let texto = "";

  if(incidencias === 0){
    texto += "<span class='ok'>✔ Sin incidencias</span>";
  }else{
    texto += "<span class='alerta'>⚠ " + incidencias + " incidencias → revisar</span>";
  }

  texto += " · ";

  if(comunicaciones.length === 0){
    texto += "<span class='ok'>✔ Sin comunicaciones</span>";
  }else{
    texto += "<span class='alerta'>✉ " + comunicaciones.length + " comunicaciones</span>";
  }

  document.getElementById("estado").innerHTML = texto;
}

actualizarEstado();

</script>

</body>
</html>
