<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;width:100%;min-height:100%;font-family:Arial,Helvetica,sans-serif;background:#dfe6ec}
body{overflow-x:hidden}

header{background:#17303d;color:white;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 12px rgba(0,0,0,.25)}
.header-left{display:flex;flex-direction:column}
.title{font-size:22px;font-weight:700;letter-spacing:.3px}
.sub{font-size:13px;opacity:.85;margin-top:3px}
.header-right{display:flex;align-items:center;gap:16px}
#usuario{background:rgba(255,255,255,.14);padding:9px 14px;border-radius:999px;font-size:15px;font-weight:700;white-space:nowrap;cursor:pointer}
#hora{font-size:18px;font-weight:600;white-space:nowrap}

.selector{
  position:absolute;
  top:70px;
  right:24px;
  background:white;
  border-radius:12px;
  box-shadow:0 10px 20px rgba(0,0,0,.2);
  overflow:hidden;
  display:none;
  z-index:999;
}
.selector div{
  padding:10px 14px;
  font-weight:700;
  cursor:pointer;
}
.selector div:hover{
  background:#eef2f5;
}

.franja{background:#eef2f5;color:#4f5f69;padding:11px 24px;font-size:15px;border-bottom:1px solid rgba(0,0,0,.05);font-weight:700}

.panel{padding:24px;display:grid;grid-template-columns:repeat(3,1fr);gap:30px}

.boton{position:relative;min-height:132px;border-radius:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:white;font-size:22px;font-weight:700;letter-spacing:.4px;cursor:pointer;user-select:none;padding:20px 14px;touch-action:manipulation;background:linear-gradient(180deg,#8fb1c7 0%,#4f6f82 100%);box-shadow:inset 0 3px 6px rgba(255,255,255,.24),inset 0 -8px 16px rgba(0,0,0,.12),0 16px 30px rgba(0,0,0,.30);transition:transform .08s ease,box-shadow .08s ease,filter .08s ease}
.boton:active{transform:translateY(10px) scale(.96);box-shadow:inset 0 10px 18px rgba(0,0,0,.26),0 6px 12px rgba(0,0,0,.28);filter:brightness(.96)}

.azul{background:linear-gradient(180deg,#8fb1c7 0%,#4f6f82 100%)}
.naranja{background:linear-gradient(180deg,#f6ae1b 0%,#df8b00 100%)}
.verde{background:linear-gradient(180deg,#78cc4b 0%,#48a530 100%)}
.rojoBoton{background:linear-gradient(180deg,#ff4b4b 0%,#c40000 100%)}

.icono{font-size:46px;line-height:1;margin-bottom:12px}

.contador{position:absolute;top:11px;right:13px;min-width:30px;height:30px;padding:0 8px;border-radius:999px;display:none;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:white;box-shadow:0 3px 7px rgba(0,0,0,.22)}
.rojo{background:#ff0000}
.amarillo{background:#d99a00}
</style>
</head>

<body>

<header>
  <div class="header-left">
    <div class="title">MONOLITO</div>
    <div class="sub">Sistema de control · El Monolito</div>
  </div>

  <div class="header-right">
    <div id="usuario" onclick="toggleSelector()">OPERADOR</div>
    <div id="hora"></div>
  </div>
</header>

<div class="selector" id="selector">
  <div onclick="setUsuario('CAMARERO')">CAMARERO</div>
  <div onclick="setUsuario('JAVI')">JAVI</div>
  <div onclick="setUsuario('SILVIA')">SILVIA</div>
</div>

<div class="franja" id="franjaEstado">Cargando estado...</div>

<div class="panel">

  <!-- TODO TU PANEL IGUAL (no lo toco) -->

</div>

<script>

function toggleSelector(){
  const s = document.getElementById("selector");
  s.style.display = s.style.display==="block" ? "none" : "block";
}

function setUsuario(u){
  localStorage.setItem("usuario",u);
  document.getElementById("usuario").textContent = u;
  document.getElementById("selector").style.display="none";
}

function cargarUsuario(){
  const u = localStorage.getItem("usuario") || "OPERADOR";
  document.getElementById("usuario").textContent = u;
}

function reloj(){
  const d = new Date();
  document.getElementById("hora").innerHTML =
    d.toLocaleDateString("es-ES") + " · " +
    d.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"});
}

setInterval(reloj,1000);

cargarUsuario();
reloj();

</script>

</body>
</html>
