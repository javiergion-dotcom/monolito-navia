<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Monolito GPT Pro</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f2f2f2;
margin:0;
padding:0;
text-align:center;
}

header{
background:#111;
color:white;
padding:20px;
font-size:28px;
font-weight:bold;
}

.sub{
font-size:14px;
color:#ccc;
}

.panel{
display:grid;
grid-template-columns:1fr 1fr 1fr;gap:20px;
padding:30px;
max-width:900px;
margin:auto;
}

.boton{
background:white;
border-radius:14px;
padding:30px;
font-size:20px;
font-weight:bold;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
transition:0.2s;
}

.boton:hover{
transform:scale(1.05);
}

.icono{
font-size:36px;
display:block;
margin-bottom:10px;
}

.contador{
font-size:14px;
color:#666;
margin-top:8px;
}

footer{
margin-top:40px;
padding:20px;
font-size:14px;
color:#777;
}

</style>
</head>

<body>

<header>
Monolito GPT Pro
<div class="sub">Sistema del Bar</div>
</header>

<div class="panel">

<div class="boton" onclick="abrir('proveedores')">
<span class="icono">📦</span>
Proveedores
<div class="contador">(0)</div>
</div>

<div class="boton" onclick="abrir('articulos')">
<span class="icono">📦</span>
Artículos
<div class="contador">(0)</div>
</div>

<div class="boton" onclick="abrir('pedidos')">
<span class="icono">📝</span>
Pedidos
</div>

<div class="boton" onclick="abrir('historial')">
<span class="icono">📊</span>
Histórico
</div>

<div class="boton" onclick="abrir('ventas')">
<span class="icono">💰</span>
Ventas
</div>

<div class="boton" onclick="abrir('comparador')">
<span class="icono">⚖️</span>
Comparador precios
</div>

<div class="boton" onclick="abrir('configuracion')">
<span class="icono">⚙️</span>
Configuración
</div>

<div class="boton" onclick="abrir('buscar')">
<span class="icono">🔎</span>
Buscar artículo
</div>

<div class="boton" onclick="abrir('incidencias')">
<span class="icono">📄</span>
Incidencias
<div class="contador">(0)</div>
</div>

<div class="boton" onclick="abrir('comunicaciones')">
<span class="icono">✉️</span>
Comunicaciones
<div class="contador">(0)</div>
</div>

<div class="boton" onclick="abrir('calendario')">
<span class="icono">📅</span>
Calendario
</div>

<div class="boton" onclick="abrir('ayuda')">
<span class="icono">🤖</span>
Ayuda
</div>

</div>

<footer>
Monolito GPT Pro<br>
por Javier Gion<br>
IA ChatGPT
</footer>

<script>

function abrir(modulo){

if(modulo=="ayuda"){
alert("Ayuda Monolito GPT Pro\n\nSistema creado para control de compras, pedidos y gestión del bar.\n\nAsistente: ChatGPT");
return;
}

alert("Abrir módulo: " + modulo);

}

</script>

</body>
</html>
