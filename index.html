<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MONOLITO GPT Pro</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f2f2f2;
margin:0;
padding:0;
text-align:center;
}

/* CABECERA */

.header{
background:#222;
color:white;
padding:18px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
font-size:18px;
}

.header span{
cursor:pointer;
}

/* CONTENEDOR BOTONES */

.container{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:16px;
padding:16px;
max-width:650px;
margin:auto;
}

/* BOTONES */

.boton{
border-radius:14px;
color:white;
font-weight:bold;
padding:35px;
font-size:18px;
cursor:pointer;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
transition:0.15s;
}

.boton:active{
transform:scale(0.95);
filter:brightness(0.9);
}

.azul{background:#3c7ec4;}
.gris{background:#5d666d;}
.naranja{background:#e8892b;}
.verde{background:#5cab4b;}

/* PIE */

.footer{
margin-top:20px;
color:#777;
font-size:14px;
padding-bottom:20px;
}

</style>
</head>

<body>

<div class="header">
<span onclick="volver()">⬅ Volver</span>
<div>MONOLITO GPT Pro</div>
<span onclick="alert('Sistema de control del bar')">❓ Ayuda</span>
</div>

<div class="container">

<div class="boton azul" onclick="abrirProveedores()">🚚 PROVEEDORES</div>

<div class="boton gris" onclick="abrirArticulos()">📦 ARTÍCULOS</div>

<div class="boton azul" onclick="abrirPedidos()">📝 PEDIDOS</div>

<div class="boton verde" onclick="abrirHistorico()">📁 HISTÓRICO</div>

<div class="boton gris" onclick="abrirComparador()">📊 COMPARADOR</div>

<div class="boton gris" onclick="abrirConfiguracion()">⚙ CONFIGURACIÓN</div>

<div class="boton gris" onclick="abrirVentas()">💶 VENTAS</div>

<div class="boton gris" onclick="abrirDiario()">📖 DIARIO</div>

</div>

<div class="footer">
Monolito GPT Pro — Javier Gión + IA ChatGPT
</div>

<script>

/* VOLVER */

let salir=false;

function volver(){

if(!salir){
alert("Pulsa volver otra vez para cerrar el programa");
salir=true;

setTimeout(function(){
salir=false;
},2000);

}else{
location.reload();
}

}

/* PROVEEDORES */

function abrirProveedores(){

document.body.innerHTML=`

<div class="header">
<span onclick="location.reload()">⬅ Volver</span>
<div>PROVEEDORES</div>
<span>❓</span>
</div>

<div style="padding:20px">

<h2>Nuevo proveedor</h2>

<input placeholder="Nombre proveedor" style="width:90%;padding:12px;margin:6px">

<input placeholder="Teléfono" style="width:90%;padding:12px;margin:6px">

<input placeholder="Día de pedido" style="width:90%;padding:12px;margin:6px">

<input placeholder="Día de reparto" style="width:90%;padding:12px;margin:6px">

<select style="width:90%;padding:12px;margin:6px">
<option>Forma de pago</option>
<option>Reposición</option>
<option>Contado</option>
<option>Banco</option>
<option>Entrega a cuenta</option>
</select>

<button style="width:90%;padding:16px;margin-top:12px;background:#3c7ec4;color:white;border:none;border-radius:8px;font-size:16px">
Guardar proveedor
</button>

</div>

`;

}

/* PANTALLAS VACÍAS */

function abrirArticulos(){alert("Módulo artículos");}

function abrirPedidos(){alert("Módulo pedidos");}

function abrirHistorico(){alert("Módulo histórico");}

function abrirComparador(){alert("Módulo comparador");}

function abrirConfiguracion(){alert("Módulo configuración");}

function abrirVentas(){alert("Módulo ventas");}

function abrirDiario(){alert("Módulo diario");}

</script>

</body>
</html>
