<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monolito – Sistema del Bar</title><style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f0f0f0;
display:flex;
flex-direction:column;
height:100vh;
}

/* barra superior */

.barra-superior{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#2c2c2c;
color:white;
font-weight:bold;
}

.boton-top{
background:#444;
color:white;
border:none;
padding:8px 14px;
border-radius:8px;
font-size:14px;
cursor:pointer;
}

.boton-top:active{
transform:scale(0.95);
}

/* panel principal */

.panel{
flex:1;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-auto-rows:1fr;
gap:15px;
padding:15px;
}

/* botones */

.boton{
border-radius:12px;
color:white;
font-weight:bold;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:16px;
text-align:center;
cursor:pointer;
transition:0.1s;
}

.boton:active{
transform:scale(0.95);
filter:brightness(0.8);
}

.icono{
font-size:36px;
margin-bottom:8px;
}

/* colores */

.azul{background:#3b6ea8;}
.gris{background:#5b636a;}
.naranja{background:#f18a2a;}
.verde{background:#5fa84f;}

.footer{
background:#ffffff;
padding:10px;
text-align:center;
font-size:14px;
}

</style></head><body><div class="barra-superior"><button onclick="history.back()" class="boton-top">⬅ Atrás</button>

<div>MONOLITO – Sistema del Bar</div><button onclick="alert('Ayuda próximamente')" class="boton-top">🤖 Ayuda</button>

</div><div class="panel"><div class="boton azul">
<div class="icono">🚚</div>
PROVEEDORES
</div><div class="boton gris">
<div class="icono">📦</div>
ARTÍCULOS
</div><div class="boton gris">
<div class="icono">📊</div>
COMPARADOR
</div><div class="boton azul">
<div class="icono">📝</div>
PEDIDOS
</div><div class="boton naranja">
<div class="icono">⚠</div>
A TENER EN CUENTA
</div><div class="boton gris">
<div class="icono">⚙</div>
CONFIGURACIÓN
</div><div class="boton verde">
<div class="icono">🗂</div>
HISTÓRICO PEDIDOS
</div><div class="boton gris">
<div class="icono">💶</div>
CAJA
</div><div class="boton gris">
<div class="icono">📖</div>
DIARIO DEL BAR
</div><div class="boton gris">
<div class="icono">💰</div>
PAGOS
</div></div><div class="footer">
✉ Avisos del bar
</div></body>
</html>
