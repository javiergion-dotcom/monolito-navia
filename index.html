<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#e6e6e6;
}

/* CABECERA */

header{
background:linear-gradient(#3a3a3a,#1f1f1f);
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 25px;
font-size:20px;
}

.top-icons{
display:flex;
gap:15px;
align-items:center;
font-size:18px;
}

/* PANEL PRINCIPAL */

.panel{
max-width:1000px;
margin:auto;
padding:40px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:22px;
}

/* BOTONES */

.boton{
height:130px;
border-radius:10px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
font-weight:bold;
font-size:16px;
text-align:center;
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 10px 20px rgba(0,0,0,0.35);
}

/* COLORES */

.azul{
background:linear-gradient(#5d7fa5,#3e5f86);
}

.gris{
background:linear-gradient(#6a6a6a,#4c4c4c);
}

.verde{
background:linear-gradient(#63b565,#3f8e41);
}

.naranja{
background:linear-gradient(#f5b14a,#e68a00);
}

.negro{
background:linear-gradient(#585858,#3a3a3a);
}

/* ICONO */

.icono{
width:55px;
height:55px;
border-radius:50%;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
color:#333;
margin-bottom:10px;
}

/* AVISOS */

.avisos{
position:fixed;
bottom:0;
width:100%;
background:#2c2c2c;
color:white;
padding:12px 25px;
display:flex;
justify-content:flex-end;
font-weight:bold;
}

</style>
</head>

<body>

<header>

<div>
MONOLITO – Sistema del Bar
</div>

<div class="top-icons">
🔴
🟡
📅
←
❓
<span id="fecha"></span>
</div>

</header>


<div class="panel">

<div class="boton azul">
<div class="icono">🚚</div>
PROVEEDORES
</div>

<div class="boton gris">
<div class="icono">📋</div>
ARTÍCULOS
</div>

<div class="boton gris">
<div class="icono">📊</div>
COMPARADOR
</div>

<div class="boton azul">
<div class="icono">✏</div>
PEDIDOS
</div>

<div class="boton naranja">
<div class="icono">⚠</div>
A TENER EN CUENTA
</div>

<div class="boton gris">
<div class="icono">⚙</div>
CONFIGURACIÓN
</div>

<div class="boton verde">
<div class="icono">📁</div>
HISTÓRICO PEDIDOS
</div>

<div class="boton negro">
<div class="icono">💰</div>
VENTAS
</div>

<div class="boton negro">
<div class="icono">📅</div>
CALENDARIO
</div>

<div class="boton negro">
<div class="icono">💳</div>
PAGOS
</div>

</div>


<div class="avisos">
✉ AVISOS DEL BAR (2)
</div>


<script>

const hoy = new Date();

document.getElementById("fecha").innerText =
hoy.toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"long"}) +
" · " +
hoy.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"});

</script>

</body>
</html>
