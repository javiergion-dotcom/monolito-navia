<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO GPT PRO</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#e9e4dc;
}

/* HEADER */

.header{
background:#b89b84;
color:white;
text-align:center;
padding:25px;
}

.title{
font-size:28px;
font-weight:bold;
}

.subtitle{
font-size:14px;
opacity:0.9;
}

/* GRID */

.container{
padding:20px;
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:20px;
}

/* BOTONES */

.card{
border-radius:20px;
padding:30px;
text-align:center;
font-size:18px;
font-weight:600;
color:white;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
transition:0.2s;
cursor:pointer;
}

.card:hover{
transform:scale(1.03);
}

/* COLORES */

.blue{ background:#5f7f94; }
.green{ background:#4caf50; }
.orange{ background:#f39c12; }
.red{ background:#b71c1c; }

/* ICONO */

.icon{
font-size:35px;
margin-bottom:10px;
display:block;
}

</style>
</head>

<body>

<div class="header">
<div class="title">MONOLITO GPT PRO</div>
<div class="subtitle">Sistema de control · El Monolito</div>
</div>

<div class="container">

<div class="card blue" onclick="location.href='proveedores.html'">
<span class="icon">🚚</span>
PROVEEDORES
</div>

<div class="card blue" onclick="location.href='articulos.html'">
<span class="icon">📦</span>
ARTÍCULOS
</div>

<div class="card blue">
<span class="icon">📊</span>
COMPARADOR
</div>

<div class="card blue" onclick="location.href='pedidos.html'">
<span class="icon">📝</span>
PEDIDOS
</div>

<div class="card blue">
<span class="icon">💳</span>
PAGOS
</div>

<div class="card orange">
<span class="icon">🔍</span>
REVISIÓN
</div>

<div class="card green">
<span class="icon">📁</span>
HISTÓRICO
</div>

<div class="card blue">
<span class="icon">💰</span>
VENTAS
</div>

<div class="card blue">
<span class="icon">📅</span>
CALENDARIO
</div>

<div class="card orange">
<span class="icon">✉️</span>
COMUNICACIÓN
</div>

<div class="card orange">
<span class="icon">🤖</span>
AYUDA
</div>

<div class="card blue">
<span class="icon">⚙️</span>
CONFIGURACIÓN
</div>

</div>

</body>
</html>
