<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MONOLITO PRO</title>
    <style>
        :root {
            --bg-dark: #121212;
            --panel-bg: #1e1e1e;
            --accent-blue: #3a5a78;
            --accent-orange: #d35400;
            --accent-green: #27ae60;
            --accent-red: #c0392b;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* BARRA SUPERIOR DE MANDO */
        .header {
            background: #1a1a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 2px solid #333;
            height: 60px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-left { display: flex; gap: 20px; align-items: center; }
        .nav-right { display: flex; gap: 15px; align-items: center; font-size: 0.9em; }

        .btn-header {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .title { font-size: 1.5em; font-weight: bold; letter-spacing: 2px; }
        .operator-tag { background: #333; padding: 5px 10px; border-radius: 4px; border: 1px solid #555; }

        /* REJILLA DE 12 BOTONES (EL MONOLITO) */
        .dashboard {
            display: grid;
            gap: 15px;
            padding: 15px;
            margin-top: 5px;
        }

        /* Móvil (2 Columnas) */
        @media (max-width: 767px) {
            .dashboard { grid-template-columns: repeat(2, 1fr); }
        }

        /* Tablet Redmi Pad / PC (3 Columnas) */
        @media (min-width: 768px) {
            .dashboard { grid-template-columns: repeat(3, 1fr); }
        }

        .btn-tpv {
            aspect-ratio: 1.5 / 1;
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            border: 1px solid #333;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 6px 6px 12px #000000, -2px -2px 8px rgba(255,255,255,0.05);
            transition: all 0.1s ease;
            position: relative;
        }

        /* Efecto de Hundimiento Táctil */
        .btn-tpv:active {
            box-shadow: inset 4px 4px 8px #000000, inset -2px -2px 8px rgba(255,255,255,0.05);
            transform: scale(0.97);
        }

        .icon { font-size: 2.5em; margin-bottom: 10px; }
        
        /* Notificaciones (Numeritos) */
        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent-orange);
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.7em;
        }

        /* Estados Especiales */
        .btn-incidencia { border: 2px solid var(--accent-red); }
        .btn-incidencia .icon { color: var(--accent-red); animation: pulse 2s infinite; }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

    </style>
</head>
<body>

<div class="header">
    <div class="nav-left">
        <button class="btn-header" onclick="vibrar()"> < </button>
        <button class="btn-header" onclick="vibrar()" style="font-size: 22px;"> 🔍 </button>
    </div>
    <div class="title">MONOLITO</div>
    <div class="nav-right">
        <div class="operator-tag">G-3F-PAID</div>
        <div id="reloj">16:45</div>
    </div>
</div>

<div class="dashboard">
    <div class="btn-tpv" onclick="vibrar()">
        <span class="icon">🚚</span>
        <span>PROVEEDORES</span>
        <div class="badge">1</div>
    </div>
    <div class="btn-tpv" onclick="vibrar()">
        <span class="icon">📦</span>
        <span>PEDIDOS</span>
    </div>
    <div class="btn-tpv" onclick="vibrar()">
        <span class="icon">⚖️</span>
        <span>COMPARADOR</span>
    </div>
    <div class="btn-tpv btn-incidencia" onclick="vibrar()">
        <span class="icon">🚨</span>
        <span>REVISIÓN</span>
        <div class="badge" style="background: red;">3</div>
    </div>
    <div class="btn-tpv" onclick="vibrar()">
        <span class="icon">💰</span>
        <span>PAGOS</span>
    </div>
    <div class="btn-tpv" onclick="vibrar()">
        <span class="icon">📓</span>
        <span>DIARIO</span>
        <div class="badge">2</div>
    </div>
    <div class="btn-tpv" onclick="vibrar()">
        <span class="icon">📣</span>
        <span>COMUNICACIÓN</span>
    </div>
    <div class="btn-tpv" onclick="vibrar()">
        <span class="icon">💵</span>
        <span>VENTAS</span>
    </div>
    <div class="btn-tpv" onclick="vibrar()">
        <span class="icon">📅</span>
        <span>CALENDARIO</span>
    </div>
    <div class="btn-tpv" onclick="vibrar()">
        <span class="icon">📊</span>
        <span>HISTÓRICO</span>
    </div>
    <div class="btn-tpv" onclick="vibrar()" style="background: linear-gradient(145deg, #d3540022, #1a1a1a);">
        <span class="icon">❓</span>
        <span>AYUDA</span>
    </div>
    <div class="btn-tpv" onclick="vibrar()">
        <span class="icon">⚙️</span>
        <span>CONFIGURACIÓN</span>
    </div>
</div>

<script>
    // Función de vibración para el tacto real (solo en móviles/tablets compatibles)
    function vibrar() {
        if (navigator.vibrate) {
            navigator.vibrate(40); // 40ms de vibración corta
        }
    }

    // Reloj en tiempo real
    setInterval(() => {
        const now = new Date();
        document.getElementById('reloj').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }, 1000);
</script>

</body>
</html>
