<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO GPT PRO</title>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#0f1720;
color:white;
}

.topbar{
height:70px;
background:#121c26;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
box-shadow:0 2px 6px rgba(0,0,0,0.6);
}

.logo{
font-size:22px;
font-weight:700;
}

.sub{
font-size:12px;
opacity:.7;
}

.right{
display:flex;
align-items:center;
gap:18px;
font-size:14px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
padding:20px;
height:calc(100vh - 70px);
box-sizing:border-box;
}

.btn{
background:linear-gradient(180deg,#3b82f6,#1e3a8a);
border-radius:16px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:18px;
font-weight:600;
box-shadow:
0 8px 0 rgba(0,0,0,.6),
0 12px 20px rgba(0,0,0,.8);
transition:.08s;
}

.btn:active{
transform:translateY(6px);
box-shadow:
0 2px 0 rgba(0,0,0,.6),
0 4px 8px rgba(0,0,0,.8);
}

.orange{
background:linear-gradient(180deg,#fb923c,#c2410c);
}

.green{
background:linear-gradient(180deg,#4ade80,#166534);
}

.grey{
background:linear-gradient(180deg,#6b7280,#374151);
}

.icon{
font-size:34px;
margin-bottom:8px;
}

.counter{
position:absolute;
margin-left:90px;
margin-top:-60px;
font-size:14px;
opacity:.9;
}

</style>
</head>

<body>

<div class="topbar">
<div>
<div class="logo">MONOLITO GPT PRO</div>
<div class="sub">Javier Gion & IA ChatGPT</div>
</div>

<div class="right">
<div>📶</div>
<div>👤 Carlos</div>
<div>🕒 10:42</div>
<div>📅 Hoy</div>
</div>
</div>

<div class="grid">

<div class="btn"><div class="icon">🚚</div>Proveedores</div>
<div class="btn grey"><div class="icon">📦</div>Artículos</div>
<div class="btn"><div class="icon">📊</div>Comparador</div>

<div class="btn"><div class="icon">📝</div>Pedidos</div>
<div class="btn orange"><div class="icon">⚠️</div>A tener en cuenta</div>
<div class="btn grey"><div class="icon">⚙️</div>Configuración</div>

<div class="btn green"><div class="icon">📂</div>Histórico</div>
<div class="btn green"><div class="icon">💰</div>Ventas</div>
<div class="btn green"><div class="icon">💳</div>Pagos</div>

<div class="btn grey"><div class="icon">📅</div>Calendario</div>
<div class="btn"><div class="icon">✉️</div>Comunicación</div>
<div class="btn"><div class="icon">🤖</div>Ayuda IA</div>

</div>

</body>
</html>
