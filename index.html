<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO GPT PRO</title>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#e9edf1;
}

/* BARRA SUPERIOR */

.top{
background:#1c2430;
color:white;
padding:18px;
font-size:22px;
font-weight:600;
display:flex;
justify-content:space-between;
align-items:center;
}

/* PANEL */

.panel{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:22px;
padding:22px;
}

/* BOTONES */

.modulo{
background:white;
border-radius:22px;
padding:34px 10px;
text-align:center;
cursor:pointer;
transition:0.15s;
box-shadow:
0 12px 24px rgba(0,0,0,0.18),
0 2px 4px rgba(0,0,0,0.08);
}

.modulo:active{
transform:translateY(6px) scale(0.98);
box-shadow:
inset 0 4px 8px rgba(0,0,0,0.25);
}

/* ICONO GRANDE */

.ico{
font-size:60px;
margin-bottom:14px;
}

/* TEXTO */

.txt{
font-size:20px;
font-weight:700;
letter-spacing:0.5px;
}

/* COLORES */

.azul{border-top:8px solid #3b82f6;}
.verde{border-top:8px solid #22c55e;}
.naranja{border-top:8px solid #f97316;}
.gris{border-top:8px solid #64748b;}

/* FOOTER */

.foot{
text-align:center;
padding:14px;
font-size:13px;
color:#666;
}

</style>
</head>

<body>

<div class="top">
MONOLITO GPT PRO
<span style="font-size:14px;opacity:0.7;">Sistema del Bar</span>
</div>

<div class="panel">

<div class="modulo azul" onclick="ir('proveedores.html')">
<div class="ico">📦</div>
<div class="txt">PROVEEDORES</div>
</div>

<div class="modulo gris" onclick="ir('articulos.html')">
<div class="ico">🍺</div>
<div class="txt">ARTÍCULOS</div>
</div>

<div class="modulo naranja" onclick="ir('pedidos.html')">
<div class="ico">📝</div>
<div class="txt">PEDIDOS</div>
</div>

<div class="modulo verde" onclick="ir('pagos.html')">
<div class="ico">💳</div>
<div class="txt">PAGOS</div>
</div>

<div class="modulo azul" onclick="ir('incidencias.html')">
<div class="ico">⚠️</div>
<div class="txt">INCIDENCIAS</div>
</div>

<div class="modulo gris" onclick="ir('comparador.html')">
<div class="ico">📊</div>
<div class="txt">COMPARADOR</div>
</div>

<div class="modulo naranja" onclick="ir('calendario.html')">
<div class="ico">📅</div>
<div class="txt">CALENDARIO</div>
</div>

<div class="modulo verde" onclick="ir('avisos.html')">
<div class="ico">✉️</div>
<div class="txt">COMUNICACIÓN</div>
</div>

<div class="modulo gris" onclick="ir('configuracion.html')">
<div class="ico">⚙️</div>
<div class="txt">CONFIGURACIÓN</div>
</div>

</div>

<div class="foot">
Javier Gion & IA ChatGPT
</div>

<script>
function ir(p){
if(navigator.vibrate){navigator.vibrate(50);}
window.location=p;
}
</script>

</body>
</html>
