<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso Monolito</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f1a21;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

/* FRANJA EDITABLE */
.franja{
background:#14232c;
padding:12px;
text-align:center;
font-weight:bold;
font-size:18px;
color:#dbe7ef;
}

/* CONTENEDOR */
.contenedor{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
gap:20px;
}

/* BOTONES CAMAREROS */
.camarero{
width:100%;
max-width:420px;
padding:22px;
font-size:22px;
font-weight:bold;
background:linear-gradient(180deg,#6f8fa6,#4c6576);
border:none;
border-radius:18px;
color:white;
cursor:pointer;
text-align:center;
box-shadow:
inset 0 2px 3px rgba(255,255,255,0.2),
0 10px 20px rgba(0,0,0,0.4);
}

.camarero:active{
transform:translateY(4px);
box-shadow:
inset 0 4px 6px rgba(0,0,0,0.4),
0 4px 10px rgba(0,0,0,0.5);
}

</style>
</head>

<body>

<div class="franja">
Selecciona camarero
</div>

<div class="contenedor">

<button class="camarero" onclick="entrar('JAVI')">1 · JAVI</button>
<button class="camarero" onclick="entrar('SILVIA')">2 · SILVIA</button>
<button class="camarero" onclick="entrar('DARIO')">3 · DARIO</button>
<button class="camarero" onclick="entrar('TOÑO')">4 · TOÑO</button>
<button class="camarero" onclick="entrar('ANDREINA')">5 · ANDREINA</button>
<button class="camarero" onclick="entrar('FELI')">6 · FELI</button>

</div>

<script>
function entrar(nombre){
localStorage.setItem("usuario", nombre);
window.location.href="index.html";
}
</script>

</body>
</html>
