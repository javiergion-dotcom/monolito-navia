<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;padding:0;width:100%;min-height:100%;
  font-family:Arial, Helvetica, sans-serif;
  background:#dfe6ec;
}
body{overflow-x:hidden}

header{
  background:#17303d;color:white;padding:16px 24px;
  display:flex;justify-content:space-between;align-items:center;
}
.title{font-size:22px;font-weight:700}
.sub{font-size:13px;opacity:.85}
.header-right{display:flex;gap:16px;align-items:center}
#usuario{background:rgba(255,255,255,.15);padding:8px 12px;border-radius:999px;font-weight:700}
#hora{font-weight:700}

.franja{
  background:#eef2f5;padding:10px 20px;
  font-weight:700;color:#4f5f69;
}

.panel{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}

.boton{
  border-radius:24px;
  min-height:130px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-weight:700;color:white;
  position:relative;
}

.azul{background:linear-gradient(#8fb1c7,#4f6f82)}
.verde{background:linear-gradient(#78cc4b,#48a530)}
.naranja{background:linear-gradient(#f6ae1b,#df8b00)}
.rojoBoton{background:linear-gradient(#ff4b4b,#c40000)}

.icono{font-size:40px;margin-bottom:10px}

.contador{
  position:absolute;top:10px;right:10px;
  background:red;color:white;
  border-radius:999px;
  padding:5px 10px;
  font-size:14px;
  display:none;
}
</style>
</head>

<body>

<header>
  <div>
    <div class="title">MONOLITO</div>
    <div class="sub">Sistema de control · El Monolito</div>
  </div>
  <div class="header-right">
    <div id="usuario">OPERADOR</div>
    <div id="hora"></div>
  </div>
</header>

<div class="franja" id="franjaEstado"></div>

<div class="panel">

<div class="boton azul"><div class="icono">🚚</div>PROVEEDORES</div>
<div class="boton azul"><div class="icono">📦</div>ARTÍCULOS</div>
<div class="boton azul"><div class="icono">📊</div>COMPARADOR</div>
<div class="boton verde"><div class="icono">📝</div>PEDIDOS</div>
<div class="boton verde"><div class="icono">💳</div>PAGOS</div>

<div class="boton rojoBoton" onclick="location.href='incidencias.html'">
  <div class="icono">⚠️</div>INCIDENCIAS
  <div class="contador" id="contadorIncidencias">0</div>
</div>

<div class="boton naranja"><div class="icono">🔎</div>REVISIÓN</div>
<div class="boton azul"><div class="icono">📁</div>HISTÓRICO</div>
<div class="boton azul"><div class="icono">💰</div>VENTAS</div>

<div class="boton azul" onclick="location.href='calendario.html'">
  <div class="icono">📅</div>CALENDARIO
</div>

<div class="boton naranja"><div class="icono">✉️</div>COMUNICACIÓN</div>
<div class="boton naranja"><div class="icono">🤖</div>AYUDA</div>
<div class="boton azul"><div class="icono">⚙️</div>CONFIGURACIÓN</div>

</div>

<script>

/* ==== DATOS ==== */

function leerIncidencias(){
  return JSON.parse(localStorage.getItem("incidencias") || "[]");
}

function leerComunicaciones(){
  return JSON.parse(localStorage.getItem("comunicaciones") || "[]");
}

function leerCalendario(){
  return JSON.parse(localStorage.getItem("calendario") || "{}");
}

/* ==== CONTADORES ==== */

function contarIncidencias(){
  return leerIncidencias().filter(x=>!x.resuelta).length;
}

function contarComunicaciones(){
  return leerComunicaciones().filter(x=>!x.resuelta && !x.hecha).length;
}

function contarCalendario(){

  const data = leerCalendario();

  const hoy = new Date();
  hoy.setHours(0,0,0,0);

  const limite = new Date(hoy);
  limite.setDate(hoy.getDate()+7);

  let total = 0;

  Object.values(data).forEach(r=>{
    const f = new Date(r.fecha+"T12:00:00");
    if(f>=hoy && f<=limite){
      total++;
    }
  });

  return total;
}

/* ==== UI ==== */

function actualizarFranja(){

  let texto = saludo();

  const inc = contarIncidencias();
  const com = contarComunicaciones();
  const cal = contarCalendario();

  if(inc>0){
    texto += " · [INC] "+inc;
  }

  if(com>0){
    texto += " · [COM] "+com;
  }

  if(cal>0){
    texto += " · 📅 "+cal+" recordatorio"+(cal===1?"":"s");
  }

  if(inc===0 && com===0 && cal===0){
    texto += " · Sin avisos";
  }

  document.getElementById("franjaEstado").textContent = texto;
}

function actualizarContadores(){
  const inc = contarIncidencias();
  const el = document.getElementById("contadorIncidencias");

  if(inc>0){
    el.textContent = inc;
    el.style.display="block";
  }else{
    el.style.display="none";
  }
}

function saludo(){
  const h=new Date().getHours();
  if(h<12) return "Buenos días";
  if(h<21) return "Buenas tardes";
  return "Buenas noches";
}

function reloj(){
  const d=new Date();
  document.getElementById("hora").innerHTML =
    d.toLocaleDateString("es-ES")+" · "+
    d.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"});
}

function cargarUsuario(){
  document.getElementById("usuario").textContent =
    localStorage.getItem("usuario")||"OPERADOR";
}

/* ==== LOOP ==== */

setInterval(()=>{
  reloj();
  actualizarFranja();
  actualizarContadores();
},1000);

cargarUsuario();
reloj();
actualizarFranja();
actualizarContadores();

</script>

</body>
</html>
