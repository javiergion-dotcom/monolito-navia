<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f1a21;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

/* BARRA SUPERIOR */
.topbar{
background:#14232c;
padding:10px 15px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:14px;
}

.usuario{
font-weight:bold;
}

/* CONTENEDOR */
.container{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
padding:20px;
}

/* BOTONES */
.boton{
width:100%;
max-width:420px;
padding:20px;
font-size:20px;
font-weight:bold;
background:linear-gradient(180deg,#6f8fa6,#4c6576);
border:none;
border-radius:18px;
color:white;
cursor:pointer;
text-align:center;
box-shadow:
inset 0 2px 3px rgba(255,255,255,0.2),
0 10px 20px rgba(0,0,0,0.4);
}

.boton:active{
transform:translateY(3px);
}

/* AVISOS */
.badges{
position:absolute;
top:10px;
right:10px;
display:flex;
gap:10px;
}

.badge{
padding:6px 10px;
border-radius:10px;
font-size:12px;
font-weight:bold;
}

.rojo{background:#c0392b;}
.amarillo{background:#f39c12;}
</style>
</head>

<body>

<div class="topbar">
<div class="usuario" id="usuario">USUARIO</div>
<div>MONOLITO</div>
</div>

<div class="badges">
<div class="badge rojo">0</div>
<div class="badge amarillo">0</div>
</div>

<div class="container">



</div>

<script>
const usuario = localStorage.getItem("usuario") || "SIN USUARIO";
document.getElementById("usuario").textContent = usuario;
</script>

</body>
</html>
function ir(pagina){
window.location.href = pagina;
}
