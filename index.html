<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>MONOLITO</title>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#e9e9e9;
}

/* HEADER */

header{
background:#1e2a33;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 16px;
font-size:20px;
}

.header-icons{
display:flex;
gap:16px;
font-size:22px;
cursor:pointer;
}

/* GRID */

.grid{
display:grid;
gap:16px;
padding:16px;
}

/* móvil */

@media (max-width:700px){

.grid{
grid-template-columns:1fr 1fr;
}

}

/* tablet */

@media (min-width:701px){

.grid{
grid-template-columns:1fr 1fr 1fr;
max-width:900px;
margin:auto;
}

}

/* BOTONES */

.btn{

background:#6f7c86;
height:130px;
border-radius:12px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
font-weight:bold;
box-shadow:0 6px 12px rgba(0,0,0,.2);
position:relative;
cursor:pointer;

}

.btn span{

font-size:34px;
margin-bottom:8px;

}

/* COLORES */

.blue{background:#5a88b5;}
.orange{background:#f18700;}
.green{background:#5da649;}
.dark{background:#4f5f68;}

/* contador comunicaciones */

.badge{

position:absolute;
top:8px;
right:10px;
background:white;
color:#f18700;
font-weight:bold;
border-radius:50%;
width:26px;
height:26px;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;

}

</style>

</head>

<body>

<header>

<div>MONOLITO</div>

<div class="header-icons">

<div>⚠</div>
<div>🔍</div>
<div>❓</div>
<div>↩</div>

</div>

</header>


<div class="grid">

<div class="btn blue">
<span>🚚</span>
PROVEEDORES
</div>

<div class="btn">
<span>📋</span>
ARTÍCULOS
</div>

<div class="btn">
<span>📊</span>
COMPARADOR
</div>

<div class="btn blue">
<span>📝</span>
PEDIDOS
</div>

<div class="btn orange">
<span>🔍</span>
REVISIÓN
</div>

<div class="btn">
<span>⚙</span>
CONFIGURACIÓN
</div>

<div class="btn green">
<span>📂</span>
HISTÓRICO
</div>

<div class="btn">
<span>💰</span>
VENTAS
</div>

<div class="btn">
<span>📅</span>
CALENDARIO
</div>

<div class="btn orange">

<div class="badge">3</div>

<span>✉</span>
COMUNICACIÓN

</div>

<div class="btn dark">
<span>💳</span>
PAGOS
</div>

</div>

</body>
</html>
