<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>EL MONOLITO · Navia</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#111;
color:white;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
background:
linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
radial-gradient(circle at center,#2a2a2a,#000);
}

h1{
font-size:54px;
letter-spacing:4px;
margin:0;
}

h2{
font-weight:normal;
margin-top:10px;
color:#e8892b;
}

.desc{
margin-top:40px;
max-width:700px;
line-height:1.6;
font-size:20px;
color:#ddd;
}

.grid{
margin-top:60px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
width:100%;
max-width:900px;
}

.card{
background:#1d1d1d;
padding:30px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.icon{
font-size:42px;
margin-bottom:12px;
}

.footer{
position:absolute;
bottom:20px;
font-size:14px;
color:#777;
}

</style>
</head>

<body>

<div class="hero">

<h1>EL MONOLITO</h1>
<h2>NAVIA</h2>

<div class="desc">
Café ecológico Candelas · Mahou 5 Estrellas ·  
Ambiente tranquilo y público joven.  
Especialistas en cafés y punto de encuentro diario.
</div>

<div class="grid">

<div class="card">
<div class="icon">☕</div>
Cafés especiales ecológicos
</div>

<div class="card">
<div class="icon">🍺</div>
Mahou 5 Estrellas  
y próxima novedad Mahou Bodega
</div>

<div class="card">
<div class="icon">✨</div>
Ambiente relajado  
y muy bien valorado
</div>

</div>

<div class="footer">
EL MONOLITO · Navia
</div>

</div>

</body>
</html>
