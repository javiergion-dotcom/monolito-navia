<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO GPT PRO</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#dfe6ec;
}

/* ===== HEADER ===== */

header{
background:#1b2f3b;
color:white;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.title{
font-size:20px;
font-weight:bold;
}

.sub{
font-size:12px;
opacity:0.7;
}

/* ===== GRID ===== */

.panel{
padding:20px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

/* ===== BOTONES ===== */

.boton{
background:linear-gradient(#6f8fa6,#4c6576);
border-radius:20px;
padding:30px;
color:white;
text-align:center;
font-weight:bold;
font-size:16px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
position:relative;
}

.boton:active{
transform:scale(0.95);
}

/* ===== COLORES ===== */

.orange{background:linear-gradient(#f6a623,#d57900);}
.green{background:linear-gradient(#71bf55,#3d8f2b);}

/* ===== CONTADORES ===== */

.contador{
position:absolute;
top:10px;
right:15px;
background:red;
color:white;
border-radius:50%;
padding:4px 8px;
font-size:12px;
}

</style>
</head>

<body>

<header>
<div>
<div class="title">MONOLITO GPT PRO</div>
<div class="sub">Sistema de control · El Monolito</div>
</div>
<div id="hora"></div>
</header>

<div class="panel">

<div class="boton">🚚<br>PROVEEDORES<span class="contador">1</span></div>
<div class="boton">📦<br>ARTÍCULOS</div>
<div class="boton">📊<br>COMPARADOR</div>

<div class="boton">📝<br>PEDIDOS<span class="contador">2</span></div>
<div class="boton">💳<br>PAGOS</div>
<div class="boton orange">🔎<br>REVISIÓN<span class="contador">1</span></div>

<div class="boton green">📁<br>HISTÓRICO</div>
<div class="boton">💰<br>VENTAS</div>
<div class="boton">📅<br>CALENDARIO</div>

<div class="boton orange">✉️<br>COMUNICACIÓN<span class="contador">3</span></div>
<div class="boton orange">🤖<br>AYUDA</div>
<div class="boton">⚙️<br>CONFIGURACIÓN</div>

</div>

<script>

function reloj(){
let d=new Date()
document.getElementById("hora").innerHTML=
d.toLocaleDateString()+" · "+d.toLocaleTimeString().slice(0,5)
}
setInterval(reloj,1000)
reloj()

</script>

</body>
</html>
