<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MONOLITO</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#dcdcdc;
}

/* CABECERA */

.header{
background:#111;
color:white;
padding:14px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:22px;
}

.header button{
background:#444;
color:white;
border:none;
padding:8px 14px;
border-radius:8px;
font-size:16px;
}

/* BARRA ESTADO */

.status{
background:#eeeeee;
text-align:center;
padding:6px;
font-size:14px;
color:#333;
}

/* GRID */

.grid{
display:grid;
gap:22px;
padding:22px;
}

/* MOVIL */

@media (max-width:700px){
.grid{
grid-template-columns:1fr;
}
}

/* TABLET HORIZONTAL */

@media (min-width:701px){
.grid{
grid-template-columns:repeat(3,1fr);
}
}

/* BOTONES */

.boton{
border-radius:26px;
padding:34px;
text-align:center;
font-size:26px;
color:white;
font-weight:bold;
box-shadow:0 12px 0 rgba(0,0,0,0.25);
transition:0.15s;
user-select:none;
}

.boton:active{
transform:translateY(6px);
box-shadow:0 6px 0 rgba(0,0,0,0.25);
}

/* COLORES */

.azul{background:linear-gradient(#4e86c9,#3c6fa8);}
.gris{background:linear-gradient(#70777d,#575e63);}
.verde{background:linear-gradient(#6cc05c,#4f9e41);}
.naranja{background:linear-gradient(#f09a3a,#d87e1f);}

/* ICONO */

.icono{
font-size:64px;
margin-bottom:12px;
}

.footer{
text-align:center;
color:#666;
padding:18px;
font-size:14px;
}

</style>
</head>

<body>

<div class="header">
<button onclick="history.back()">← Volver</button>
<div>MONOLITO</div>
<button onclick="alert('Ayuda en desarrollo')">Ayuda</button>
</div>

<div class="status">
<span id="fecha"></span> ·
<span id="hora"></span> ·
Operador: Javier
</div>

<div class="grid">

<div class="boton azul" onclick="abrir('proveedores.html')">
<div class="icono">📦</div>
PROVEEDORES
</div>

<div class="boton gris" onclick="abrir('articulos.html')">
<div class="icono">🍺</div>
ARTÍCULOS
</div>

<div class="boton naranja" onclick="abrir('pedidos.html')">
<div class="icono">📝</div>
PEDIDOS
</div>

<div class="boton verde" onclick="abrir('pagos.html')">
<div class="icono">💳</div>
PAGOS
</div>

<div class="boton gris" onclick="abrir('incidencias.html')">
<div class="icono">⚠️</div>
INCIDENCIAS
</div>

<div class="boton azul" onclick="abrir('comparador.html')">
<div class="icono">📊</div>
COMPARADOR
</div>

<div class="boton naranja" onclick="abrir('calendario.html')">
<div class="icono">📅</div>
CALENDARIO
</div>

<div class="boton verde" onclick="abrir('avisos.html')">
<div class="icono">✉️</div>
MENSAJES
</div>

<div class="boton gris" onclick="abrir('configuracion.html')">
<div class="icono">⚙️</div>
CONFIGURACIÓN
</div>

</div>

<div class="footer">
Monolito GPT Pro — Control real del bar
</div>

<script>

function abrir(p){
vibrar()
setTimeout(()=>{
window.location=p
},120)
}

function vibrar(){
if(navigator.vibrate){
navigator.vibrate(60)
}
}

function reloj(){

const ahora = new Date()

const dias = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"]
const meses = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"]

document.getElementById("fecha").innerHTML =
dias[ahora.getDay()]+" "+ahora.getDate()+" "+meses[ahora.getMonth()]

document.getElementById("hora").innerHTML =
ahora.toLocaleTimeString()

}

setInterval(reloj,1000)
reloj()

</script>

</body>
</html>
