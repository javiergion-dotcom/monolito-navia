<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Monolito GPT Pro</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#e9edf2;
margin:0;
text-align:center;
}

.header{
background:#111;
color:white;
padding:18px;
font-size:28px;
font-weight:bold;
}

.sub{
font-size:14px;
color:#ccc;
}

.panel{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:30px;
max-width:900px;
margin:auto;
}

.boton{
border-radius:14px;
padding:22px;
font-size:18px;
font-weight:bold;
color:white;
cursor:pointer;
box-shadow:0 6px 12px rgba(0,0,0,0.35);
transition:0.15s;
}

.boton:active{
transform:scale(0.95);
}

.icono{
font-size:38px;
display:block;
margin-bottom:8px;
}

.azul{
background:linear-gradient(#5b8cc7,#2f5f8f);
}

.gris{
background:linear-gradient(#7a858f,#4e5963);
}

.naranja{
background:linear-gradient(#f1a53a,#d68018);
}

.verde{
background:linear-gradient(#69b95f,#3c8b34);
}

.footer{
margin-top:25px;
padding:15px;
font-size:14px;
color:#666;
}

</style>
</head>

<body>

<div class="header">
Monolito GPT Pro
<div class="sub">Sistema del Bar</div>
</div>

<div class="panel">

<div class="boton azul" onclick="abrir('proveedores')">
<span class="icono">🚚</span>
Proveedores
</div>

<div class="boton gris" onclick="abrir('articulos')">
<span class="icono">📦</span>
Artículos
</div>

<div class="boton azul" onclick="abrir('comparador')">
<span class="icono">📊</span>
Comparador precios
</div>

<div class="boton azul" onclick="abrir('pedidos')">
<span class="icono">📝</span>
Pedidos
</div>

<div class="boton naranja" onclick="abrir('avisos')">
<span class="icono">⚠️</span>
A tener en cuenta
</div>

<div class="boton gris" onclick="abrir('configuracion')">
<span class="icono">⚙️</span>
Configuración
</div>

<div class="boton verde" onclick="abrir('historico')">
<span class="icono">📁</span>
Histórico
</div>

<div class="boton azul" onclick="abrir('ventas')">
<span class="icono">💰</span>
Ventas
</div>

<div class="boton azul" onclick="abrir('pagos')">
<span class="icono">🪙</span>
Pagos proveedores
</div>

<div class="boton azul" onclick="abrir('calendario')">
<span class="icono">📅</span>
Calendario
</div>

<div class="boton gris" onclick="abrir('comprobaciones')">
<span class="icono">🔍</span>
Comprobaciones
</div>

</div>

<div class="footer">
Monolito GPT Pro<br>
por Javier Gion<br>
IA ChatGPT
</div>

<script>

function abrir(modulo){
alert("Abrir módulo: " + modulo);
}

</script>

</body>
</html><!-- cambio -->

<header style="background:#111;color:white;height:80px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;font-size:20px;">

<div>
<button onclick="history.back()" style="font-size:20px;">⬅</button>
</div>

<div style="font-weight:bold;">
MONOLITO GPT PRO
</div>

<div>
<button style="font-size:20px;">🔍</button>
<button style="font-size:20px;">❓</button>
</div>

</header>
