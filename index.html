<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Monolito GPT Pro</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f2f2f2;
margin:0;
padding:0;
text-align:center;
}

header{
background:#111;
color:white;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
padding:20px;
max-width:900px;
margin:auto;
}

.boton{
background:#3b82f6;
color:white;
padding:25px;
border-radius:10px;
font-size:18px;
cursor:pointer;
box-shadow:0 3px 6px rgba(0,0,0,0.2);
}

.boton:hover{
background:#2563eb;
}

</style>

</head>

<body>

<header>
MONOLITO – Sistema del Bar
</header>

<div class="container">

<div class="boton">PROVEEDORES</div>
<div class="boton">ARTÍCULOS</div>
<div class="boton">COMPARADOR</div>

<div class="boton">PEDIDOS</div>
<div class="boton">A TENER EN CUENTA</div>
<div class="boton">CONFIGURACIÓN</div>

<div class="boton">HISTÓRICO PEDIDOS</div>
<div class="boton">CAJA</div>
<div class="boton">DIARIO DEL BAR</div>

</div>

</body>
</html>
