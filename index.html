<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO GPT PRO</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#e9eef2;
overflow-y:auto;
}

.topbar{
background:#0f2029;
color:white;
padding:14px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:18px;
}

.grid{
display:grid;
grid-template-columns:repeat(3, 1fr);
gap:22px;
padding:22px;
}

.btn{
height:150px;
border-radius:22px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
font-size:20px;
font-weight:bold;
box-shadow:0 10px 18px rgba(0,0,0,0.25);
transition:0.15s;
cursor:pointer;
user-select:none;
}

.btn:active{
transform:scale(0.94);
box-shadow:0 4px 6px rgba(0,0,0,0.4);
}

.prov{background:linear-gradient(#6f93ad,#4e6f86);}
.art{background:linear-gradient(#666,#444);}
.comp{background:linear-gradient(#6f93ad,#4e6f86);}
.ped{background:linear-gradient(#6f93ad,#4e6f86);}
.pag{background:linear-gradient(#666,#444);}
.rev{background:linear-gradient(#f5a623,#d97c00);}
.his{background:linear-gradient(#5db04f,#3f8f34);}
.ven{background:linear-gradient(#666,#444);}
.cal{background:linear-gradient(#666,#444);}
.com{background:linear-gradient(#f5a623,#d97c00);}
.ia{background:linear-gradient(#f5a623,#d97c00);}
.conf{background:linear-gradient(#666,#444);}

.icon{
font-size:42px;
margin-bottom:8px;
}

.badge{
position:absolute;
right:18px;
top:14px;
font-size:16px;
}

.btnwrap{
position:relative;
}

</style>
</head>

<body>

<div class="topbar">
<div>MONOLITO GPT PRO</div>
<div id="fecha"></div>
</div>

<div class="grid">

<div class="btnwrap">
<div class="badge">1</div>
<div class="btn prov" onclick="abrir('proveedores')">
<div class="icon">🚚</div>
PROVEEDORES
</div>
</div>

<div class="btn art" onclick="abrir('articulos')">
<div class="icon">📦</div>
ARTÍCULOS
</div>

<div class="btn comp" onclick="abrir('comparador')">
<div class="icon">📊</div>
COMPARADOR
</div>

<div class="btn ped" onclick="abrir('pedidos')">
<div class="icon">📝</div>
PEDIDOS
</div>

<div class="btn pag" onclick="abrir('pagos')">
<div class="icon">💳</div>
PAGOS
</div>

<div class="btn rev" onclick="abrir('revision')">
<div class="icon">🔎</div>
REVISIÓN
</div>

<div class="btn his" onclick="abrir('historico')">
<div class="icon">📁</div>
HISTÓRICO
</div>

<div class="btn ven" onclick="abrir('ventas')">
<div class="icon">💰</div>
VENTAS
</div>

<div class="btn cal" onclick="abrir('calendario')">
<div class="icon">📅</div>
CALENDARIO
</div>

<div class="btn com" onclick="abrir('comunicacion')">
<div class="icon">✉️</div>
COMUNICACIÓN
</div>

<div class="btn ia" onclick="abrir('ia')">
<div class="icon">🤖</div>
AYUDA IA
</div>

<div class="btn conf" onclick="abrir('config')">
<div class="icon">⚙️</div>
CONFIGURACIÓN
</div>

</div>

<script>

function abrir(p){
navigator.vibrate(60);
alert("Entrar en: "+p);
}

function reloj(){
let f=new Date();
document.getElementById("fecha").innerHTML=
f.toLocaleDateString()+" "+f.toLocaleTimeString().substring(0,5);
}
setInterval(reloj,1000);
reloj();

</script>

</body>
</html>
