<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#e6e6e6;
height:100vh;
display:flex;
flex-direction:column;
}

/* BARRA SUPERIOR */

.header{
background:#111;
color:white;
padding:16px;
font-size:24px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
}

.topbtn{
background:#444;
padding:8px 14px;
border-radius:8px;
font-size:14px;
}

/* GRID */

.grid{
flex:1;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(3,1fr);
gap:14px;
padding:14px;
}

/* BOTONES */

.boton{
border-radius:24px;
color:white;
font-size:22px;
font-weight:bold;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
box-shadow:0 10px 0 rgba(0,0,0,0.35);
transition:0.12s;
text-decoration:none;
}

.boton:active{
transform:translateY(7px);
box-shadow:0 3px 0 rgba(0,0,0,0.35);
}

.icono{
font-size:70px;
margin-bottom:10px;
}

/* COLORES */

.azul{background:linear-gradient(#4a90e2,#2f6fb5);}
.gris{background:linear-gradient(#7a7a7a,#505050);}
.naranja{background:linear-gradient(#f29c1f,#d97800);}
.verde{background:linear-gradient(#69b34c,#3e8e2f);}

</style>
</head>

<body>

<div class="header">
<div class="topbtn">← Volver</div>
<div>MONOLITO</div>
<div class="topbtn">Ayuda</div>
</div>

<div class="grid">

<a href="proveedores.html" class="boton azul"><div class="icono">📦</div>PROVEEDORES</a>
<a href="articulos.html" class="boton gris"><div class="icono">🍺</div>ARTÍCULOS</a>
<a href="pedidos.html" class="boton naranja"><div class="icono">📝</div>PEDIDOS</a>

<a href="pagos.html" class="boton verde"><div class="icono">💳</div>PAGOS</a>
<a href="incidencias.html" class="boton gris"><div class="icono">⚠️</div>INCIDENCIAS</a>
<a href="comparador.html" class="boton azul"><div class="icono">📊</div>COMPARADOR</a>

<a href="calendario.html" class="boton naranja"><div class="icono">📅</div>CALENDARIO</a>
<a href="avisos.html" class="boton gris"><div class="icono">✉️</div>MENSAJES</a>
<a href="configuracion.html" class="boton azul"><div class="icono">⚙️</div>CONFIG</a>

</div>

<script>
if ("vibrate" in navigator) {
document.querySelectorAll(".boton").forEach(b=>{
b.addEventListener("click",()=>navigator.vibrate(40))
})
}
</script>

</body>
</html>
