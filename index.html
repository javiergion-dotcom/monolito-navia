<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monolito GPT Pro</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f2f2f2;
margin:0;
padding:0;
text-align:center;
}

.header{
background:#222;
color:white;
padding:14px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
padding:20px;
max-width:1000px;
margin:auto;
}

.boton{
border-radius:14px;
color:white;
font-weight:bold;
padding:30px;
cursor:pointer;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
transition:0.15s;
font-size:18px;
}

.boton i{
font-size:28px;
margin-bottom:8px;
}

.boton:active{
transform:scale(0.95);
}

.azul{background:#3c7ec4;}
.gris{background:#5d666d;}
.naranja{background:#e8892b;}
.verde{background:#5cab4b;}

.footer{
margin-top:20px;
color:#777;
font-size:14px;
}

</style>

</head>

<body>

<div class="header">
<span>⬅ Volver</span>
<div>MONOLITO GPT Pro</div>
<span>❓ Ayuda</span>
</div>

<div class="container">

<div class="boton azul">
<i class="fa-solid fa-truck"></i>
PROVEEDORES
</div>

<div class="boton gris">
<i class="fa-solid fa-box"></i>
ARTÍCULOS
</div>

<div class="boton naranja">
<i class="fa-solid fa-scale-balanced"></i>
COMPARADOR
</div>

<div class="boton azul">
<i class="fa-solid fa-cart-shopping"></i>
PEDIDOS
</div>

<div class="boton azul">
<i class="fa-solid fa-money-bill-wave"></i>
PAGOS
</div>

<div class="boton gris">
<i class="fa-solid fa-gear"></i>
CONFIGURACIÓN
</div>

<div class="boton verde">
<i class="fa-solid fa-clock-rotate-left"></i>
HISTÓRICO
</div>

<div class="boton azul">
<i class="fa-solid fa-calendar-days"></i>
CALENDARIO
</div>

<div class="boton naranja">
<i class="fa-solid fa-triangle-exclamation"></i>
INCIDENCIAS
</div>

<div class="boton naranja">
<i class="fa-solid fa-bell"></i>
AVISOS
</div>

</div>

<div class="footer">
Monolito GPT Pro — Javier Gión & IA ChatGPT
</div>

</body>
</html>
