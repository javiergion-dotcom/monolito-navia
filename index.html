<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Camareros</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: white;
            font-family: Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .center {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
        }

        img {
            width: 180px;
            margin-bottom: 40px;
        }

        .btn {
            width: 260px;
            padding: 18px;
            margin: 10px;
            font-size: 24px;
            font-weight: bold;
            background-color: #222;
            color: white;
            border: 2px solid #444;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.12s ease, background-color 0.12s ease;
        }

        .btn:active {
            transform: scale(0.94);
            background-color: #555;
        }

        .screen {
            display: none;
            height: 100%;
            width: 100%;
        }

        .title {
            font-size: 40px;
            margin-bottom: 40px;
        }

        .back {
            margin-top: 40px;
            background-color: #333;
            border: 2px solid #555;
        }
    </style>

    <script>
        function vibrar(boton) {
            if (navigator.vibrate) navigator.vibrate(35);
            boton.style.transform = "scale(0.94)";
            setTimeout(() => boton.style.transform = "scale(1)", 120);
        }

        function showScreen(id, boton) {
            vibrar(boton);
            document.getElementById("main").style.display = "none";
            document.querySelectorAll(".screen").forEach(s => s.style.display = "none");
            document.getElementById(id).style.display = "flex";
        }

        function goBack(boton) {
            vibrar(boton);
            document.querySelectorAll(".screen").forEach(s => s.style.display = "none");
            document.getElementById("main").style.display = "flex";
        }

        function prueba(boton) {
            vibrar(boton);
            boton.innerText = "✔ OK";
            boton.style.backgroundColor = "#0a0";
        }
    </script>
</head>

<body>

    <!-- PANTALLA PRINCIPAL -->
    <div id="main" class="center">
        <img src="logo.png" alt="Logo">

        <button class="btn" onclick="showScreen('javi', this)">JAVI</button>
        <button class="btn" onclick="showScreen('silvia', this)">SILVIA</button>
        <button class="btn" onclick="showScreen('dario', this)">DARIO</button>
        <button class="btn" onclick="showScreen('tono', this)">TOÑO</button>
        <button class="btn" onclick="showScreen('andreina', this)">ANDREINA</button>
        <button class="btn" onclick="showScreen('feli', this)">FELI</button>

        <!-- ENLACE DE PRUEBA -->
        <button class="btn" onclick="showScreen('prueba', this)">ENLACE DE PRUEBA</button>
    </div>

    <!-- PANTALLAS INTERNAS -->

    <div id="javi" class="screen center">
        <div class="title">JAVI</div>
        <button class="btn back" onclick="goBack(this)">VOLVER</button>
    </div>

    <div id="silvia" class="screen center">
        <div class="title">SILVIA</div>
        <button class="btn back" onclick="goBack(this)">VOLVER</button>
    </div>

    <div id="dario" class="screen center">
        <div class="title">DARIO</div>
        <button class="btn back" onclick="goBack(this)">VOLVER</button>
    </div>

    <div id="tono" class="screen center">
        <div class="title">TOÑO</div>
        <button class="btn back" onclick="goBack(this)">VOLVER</button>
    </div>

    <div id="andreina" class="screen center">
        <div class="title">ANDREINA</div>
        <button class="btn back" onclick="goBack(this)">VOLVER</button>
    </div>

    <div id="feli" class="screen center">
        <div class="title">FELI</div>
        <button class="btn back" onclick="goBack(this)">VOLVER</button>
    </div>

    <!-- PANTALLA DE PRUEBA -->
    <div id="prueba" class="screen center">
        <div class="title">PANTALLA DE PRUEBA</div>
        <button class="btn" onclick="prueba(this)">PRUEBA</button>
        <button class="btn back" onclick="goBack(this)">VOLVER</button>
    </div>

</body>
</html>
