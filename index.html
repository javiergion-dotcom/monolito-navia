<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MONOLITO</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#e4e4e4;
}

/* CABECERA */

header{
background:#1f1f1f;
color:white;
padding:20px;
font-size:28px;
text-align:center;
letter-spacing:2px;
}

/* PANEL */

.panel{
max-width:900px;
margin:auto;
padding:40px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
}

/* BOTONES */

.boton{
height:95px;
display:flex;
align-items:center;
justify-content:center;

border-radius:12px;
font-size:18px;
font-weight:bold;
color:white;

cursor:pointer;

box-shadow:
0 6px 12px rgba(0,0,0,0.25),
inset 0 1px 0 rgba(255,255,255,0.15);

transition:0.2s;
}

.boton:hover{
transform:translateY(-4px);
}

/* COLORES */

.proveedores{background:#3a6ea5;}
.articulos{background:#5a5a5a;}
.comparador{background:#666666;}

.pedidos{background:#4a7bd0;}
.alerta{background:#f39c12;}

.config{background:#707070;}

.historico{background:#4CAF50;}

.caja{background:#4b4b4b;}
.diario{background:#5a5a5a;}
.pagos{background:#444444;}

</style>

</head>


<body>

<header>
MONOLITO
</header>


<div class="panel">

<div class="boton proveedores" onclick="location.href='proveedores.html'">
PROVEEDORES
</div>

<div class="boton articulos" onclick="location.href='articulos.html'">
ARTÍCULOS
</div>

<div class="boton comparador">
COMPARADOR
</div>

<div class="boton pedidos">
PEDIDOS
</div>

<div class="boton alerta">
A TENER EN CUENTA
</div>

<div class="boton config">
CONFIGURACIÓN
</div>

<div class="boton historico">
HISTÓRICO
</div>

<div class="boton caja">
CAJA
</div>

<div class="boton diario">
DIARIO
</div>

<div class="boton pagos">
PAGOS
</div>

</div>

</body>
</html>
