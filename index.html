<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MONOLITO GPT PRO</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f1419;
color:white;
}

/* HEADER */

header{
padding:15px;
background:linear-gradient(90deg,#0f2027,#203a43,#2c5364);
text-align:center;
font-size:20px;
font-weight:bold;
}

/* GRID BOTONES */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
padding:20px;
}

.boton{
background:#1c252b;
border-radius:15px;
padding:25px;
text-align:center;
font-size:18px;
cursor:pointer;
transition:0.2s;
}

.boton:hover{
background:#2c3e50;
transform:scale(1.05);
}

.icono{
font-size:30px;
margin-bottom:10px;
}

/* ALERTAS */

.alerta-roja{
position:absolute;
top:10px;
right:10px;
background:red;
color:white;
border-radius:50%;
padding:5px 8px;
font-size:12px;
}

.alerta-amarilla{
position:absolute;
top:10px;
right:10px;
background:gold;
color:black;
border-radius:50%;
padding:5px 8px;
font-size:12px;
}

.boton-wrapper{
position:relative;
}

</style>
</head>

<body>

<header>
MONOLITO GPT PRO
</header>

<div class="grid">

<div class="boton-wrapper">
  <div class="boton" onclick="ir('proveedores.html')">
    <div class="icono">🚚</div>
    PROVEEDORES
  </div>
</div>

<div class="boton-wrapper">
  <div class="boton" onclick="ir('articulos.html')">
    <div class="icono">📦</div>
    ARTÍCULOS
  </div>
</div>

<div class="boton-wrapper">
  <div class="boton" onclick="ir('pedidos.html')">
    <div class="icono">📝</div>
    PEDIDOS
  </div>
</div>

<div class="boton-wrapper">
  <div class="boton">
    <div class="icono">💳</div>
    PAGOS
  </div>
</div>

<div class="boton-wrapper">
  <div class="boton">
    <div class="icono">📁</div>
    HISTÓRICO
  </div>
</div>

<div class="boton-wrapper">
  <div class="boton">
    <div class="icono">📅</div>
    CALENDARIO
  </div>
</div>

<div class="boton-wrapper">
  <div class="boton">
    <div class="icono">✉️</div>
    COMUNICACIÓN
  </div>
</div>

<div class="boton-wrapper">
  <div class="boton">
    <div class="icono">⚙️</div>
    CONFIGURACIÓN
  </div>
</div>

</div>

<script>
function ir(pagina){
  window.location.href = pagina;
}
</script>

</body>
</html>
