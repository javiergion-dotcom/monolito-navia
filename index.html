<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO GPT PRO</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:Segoe UI,Arial;
background:#dfe6ec;
height:100vh;
overflow:hidden;
}

/* CABECERA */

.topbar{
height:80px;
background:#13222b;
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
box-shadow:0 6px 20px rgba(0,0,0,0.4);
}

.title{
font-size:28px;
font-weight:700;
}

.operator{
font-size:14px;
opacity:0.8;
}

.datetime{
font-size:20px;
font-weight:600;
}

/* PANEL */

.panel{
height:calc(100vh - 80px);
padding:20px;
}

/* GRID */

.grid{
height:100%;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(4,1fr);
gap:20px;
}

/* BOTONES TPV */

.btn{
background:linear-gradient(180deg,#6f8fa6,#4c6576);
border-radius:30px;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:700;
cursor:pointer;
position:relative;

box-shadow:
inset 0 3px 4px rgba(255,255,255,0.35),
0 18px 30px rgba(0,0,0,0.35);

transition:0.12s;
}

.btn:active{
transform:translateY(10px);
box-shadow:
inset 0 8px 14px rgba(0,0,0,0.6),
0 6px 12px rgba(0,0,0,0.5);
}

.icon{
font-size:52px;
margin-bottom:10px;
}

.green{
background:linear-gradient(180deg,#71bf55,#3d8f2b);
}

.orange{
background:linear-gradient(180deg,#f6a623,#d57900);
}

.counter{
position:absolute;
top:14px;
right:20px;
font-size:16px;
opacity:0.9;
}

/* RESPONSIVE MOVIL */

@media (max-width:900px){

.grid{
grid-template-columns:repeat(2,1fr);
grid-template-rows:auto;
}

.topbar{
height:70px;
}

.panel{
height:calc(100vh - 70px);
}

}

</style>
</head>

<body>

<div class="topbar">
<div>
<div class="title">MONOLITO GPT PRO</div>
<div class="operator">Operador activo</div>
</div>

<div class="datetime" id="reloj"></div>
</div>

<div class="panel">
<div class="grid">

<div class="btn" onclick="abrir('proveedores')">
<div class="counter">1</div>
<div class="icon">🚚</div>
PROVEEDORES
</div>

<div class="btn" onclick="abrir('articulos')">
<div class="icon">📦</div>
ARTÍCULOS
</div>

<div class="btn" onclick="abrir('comparador')">
<div class="icon">📊</div>
COMPARADOR
</div>

<div class="btn" onclick="abrir('pedidos')">
<div class="counter">2</div>
<div class="icon">📝</div>
PEDIDOS
</div>

<div class="btn" onclick="abrir('pagos')">
<div class="icon">💳</div>
PAGOS
</div>

<div class="btn orange" onclick="abrir('revision')">
<div class="counter">1</div>
<div class="icon">🔎</div>
REVISIÓN
</div>

<div class="btn green" onclick="abrir('historico')">
<div class="icon">📁</div>
HISTÓRICO
</div>

<div class="btn" onclick="abrir('ventas')">
<div class="icon">💰</div>
VENTAS
</div>

<div class="btn" onclick="abrir('calendario')">
<div class="icon">📅</div>
CALENDARIO
</div>

<div class="btn orange" onclick="abrir('comunicacion')">
<div class="counter">3</div>
<div class="icon">✉️</div>
COMUNICACIÓN
</div>

<div class="btn orange" onclick="abrir('ia')">
<div class="icon">🤖</div>
AYUDA
</div>

<div class="btn" onclick="abrir('config')">
<div class="icon">⚙️</div>
CONFIGURACIÓN
</div>

</div>
</div>

<script>

function abrir(sec){
if(navigator.vibrate) navigator.vibrate(60)
alert("Abrir módulo: "+sec)
}

function reloj(){
let d=new Date()
document.getElementById("reloj").innerHTML =
d.toLocaleDateString()+" · "+d.toLocaleTimeString().slice(0,5)
}

setInterval(reloj,1000)
reloj()

</script>

</body>
</html>
