<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Monolito – Sistema del Bar</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f4f4;
margin:0;
text-align:center;
}

header{
background:#222;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

#estado{
background:#e8e8e8;
padding:10px;
font-size:14px;
}

.panel{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:40px;
max-width:900px;
margin:auto;
}

.boton{
background:white;
border-radius:12px;
padding:30px;
font-size:18px;
box-shadow:0 4px 8px rgba(0,0,0,0.2);
cursor:pointer;
transition:.2s;
}

.boton:hover{
transform:scale(1.04);
}

footer{
margin-top:20px;
padding:15px;
font-size:14px;
}

.herramientas{
margin-top:10px;
}

</style>
</head>

<body>

<header>

<div>
<b>MONOLITO – Sistema del Bar</b>
</div>

<div id="fechaHora"></div>

</header>

<div id="estado">
Buenos días · Sin comunicaciones · Sin diferencias
</div>

<div class="panel">

<div class="boton">Proveedores</div>
<div class="boton">Artículos</div>

<div class="boton">Pedidos</div>
<div class="boton">A tener en cuenta</div>

<div class="boton">Histórico pedidos</div>
<div class="boton">Caja</div>

<div class="boton">Pagos</div>
<div class="boton">Diario del bar</div>

<div class="boton">Comparador</div>
<div class="boton">Configuración</div>

</div>

<footer>

<div>
✉ Avisos del bar
</div>

<div class="herramientas">
🔎 Buscar | 🖨 Imprimir | 📤 Compartir | ❓ Ayuda | ⛔ Salir
</div>

</footer>

<script>

function actualizarHora(){

let ahora = new Date();

let fecha = ahora.toLocaleDateString("es-ES",{weekday:'short',day:'numeric',month:'short'});

let hora = ahora.toLocaleTimeString("es-ES",{hour:'2-digit',minute:'2-digit'});

document.getElementById("fechaHora").innerHTML = fecha + " · " + hora;

}

setInterval(actualizarHora,1000);

actualizarHora();

</script>

</body>
</html>
