<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Monolito</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(180deg,#071821 0%, #0f2430 100%);
  color:white;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* FRANJA SUPERIOR EDITABLE */
.franja{
  width:100%;
  min-height:54px;
  background:rgba(255,255,255,0.06);
  border-bottom:1px solid rgba(255,255,255,0.08);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:10px 18px;
  text-align:center;
  font-size:18px;
  font-weight:700;
  color:#d7e6ef;
}

/* ZONA CENTRAL */
.centro{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:24px;
}

.logo{
  font-size:34px;
  font-weight:800;
  letter-spacing:.5px;
  margin-bottom:8px;
  text-align:center;
}

.sub{
  font-size:16px;
  color:#a9bfcc;
  margin-bottom:26px;
  text-align:center;
}

.pin{
  min-height:38px;
  font-size:30px;
  letter-spacing:12px;
  margin-bottom:18px;
  text-align:center;
}

.estado{
  min-height:24px;
  font-size:16px;
  color:#9fb3bf;
  margin-bottom:26px;
  text-align:center;
}

.teclado{
  display:grid;
  grid-template-columns:repeat(3,92px);
  gap:16px;
}

.tecla{
  background:#2b4150;
  height:92px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  border-radius:18px;
  cursor:pointer;
  user-select:none;
  box-shadow:
    inset 0 2px 3px rgba(255,255,255,0.06),
    0 10px 18px rgba(0,0,0,0.22);
}

.tecla:active{
  background:#1b2f3b;
  transform:translateY(2px);
}

@media (max-width: 700px){
  .franja{
    font-size:16px;
    min-height:50px;
  }

  .logo{
    font-size:30px;
  }

  .sub{
    font-size:15px;
  }

  .teclado{
    grid-template-columns:repeat(3,82px);
    gap:14px;
  }

  .tecla{
    height:82px;
    font-size:28px;
  }
}
</style>
</head>

<body>

<div class="franja" contenteditable="true">
  EDITA ESTA FRANJA SUPERIOR
</div>

<div class="centro">
  <div class="logo">MONOLITO</div>
  <div class="sub">Introduce tu código</div>
  <div class="pin" id="pin"></div>
  <div class="estado" id="estado">0 cifras</div>

  <div class="teclado">
    <div class="tecla" onclick="num('1')">1</div>
    <div class="tecla" onclick="num('2')">2</div>
    <div class="tecla" onclick="num('3')">3</div>
    <div class="tecla" onclick="num('4')">4</div>
    <div class="tecla" onclick="num('5')">5</div>
    <div class="tecla" onclick="num('6')">6</div>
    <div class="tecla" onclick="num('7')">7</div>
    <div class="tecla" onclick="num('8')">8</div>
    <div class="tecla" onclick="num('9')">9</div>
    <div class="tecla" onclick="borrar()">←</div>
    <div class="tecla" onclick="num('0')">0</div>
    <div class="tecla" onclick="reset()">C</div>
  </div>
</div>

<script>
let codigo = "";

const usuarios = {
  "0985":"JAVI",
  "1111":"DARIO",
  "2222":"TOÑO",
  "4544":"SILVIA",
  "4040":"JAVI"
};

function refrescar(){
  document.getElementById("pin").textContent = "• ".repeat(codigo.length);
  document.getElementById("estado").textContent = codigo.length + " cifras";
}

function num(n){
  if(codigo.length >= 4) return;

  codigo += n;
  refrescar();

  if(codigo.length === 4){
    if(usuarios[codigo]){
      localStorage.setItem("usuario", usuarios[codigo]);
      window.location.href = "index.html";
    } else {
      setTimeout(() => {
        alert("Código incorrecto");
        codigo = "";
        refrescar();
      }, 60);
    }
  }
}

function borrar(){
  codigo = codigo.slice(0,-1);
  refrescar();
}

function reset(){
  codigo = "";
  refrescar();
}

refrescar();
</script>

</body>
</html>
