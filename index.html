<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<title>MONOLITO NAVIA</title><style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    text-align:center;
}

header {
    padding:30px;
}

.logo img{
    width:180px;
}

.botones{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
    padding:30px;
}

button{
    padding:25px;
    font-size:20px;
    border:none;
    border-radius:10px;
    color:white;
}

.b1{background:#2E86DE;}
.b2{background:#27AE60;}
.b3{background:#E67E22;}
.b4{background:#8E44AD;}
.b5{background:#C0392B;}
.b6{background:#16A085;}
.b7{background:#2980B9;}
.b8{background:#F1C40F;color:black;}

</style></head><body><header>
<div class="logo">
<img src="monolito.png">
</div>
<h1>MONOLITO NAVIA</h1>
</header><div class="botones"><button class="b1">ARTÍCULOS</button>
<button class="b2">PROVEEDORES</button>
<button class="b3">PEDIDOS</button>
<button class="b4">VENTAS</button>
<button class="b5">CAJA</button>
<button class="b6">ANÁLISIS</button>
<button class="b7">CLIENTES</button>
<button class="b8">CONFIGURACIÓN</button>

</div></body>
</html>
