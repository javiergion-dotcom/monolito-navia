<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUZÓN · MONOLITO</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#eef2f5;color:#17303d}
header{background:#17303d;color:white;padding:16px;display:flex;align-items:center;gap:12px}
button{border:0;border-radius:14px;padding:11px 14px;font-weight:900;font-size:15px;cursor:pointer}
.volver{background:white;color:#17303d}
.contenedor{padding:16px;max-width:950px;margin:auto}
.card{background:white;border-radius:22px;padding:16px;margin-bottom:14px;box-shadow:0 8px 18px rgba(0,0,0,.12)}
h2,h3{margin:0 0 12px}
label{display:block;font-weight:900;margin-top:12px;margin-bottom:6px}
input,select,textarea{width:100%;padding:12px;border-radius:14px;border:1px solid #b8c2ca;font-size:16px}
textarea{min-height:120px}
.guardar{background:#48a530;color:white;width:100%;margin-top:14px;font-size:17px}
.limpiar{background:#ff9800;color:white;width:100%;margin-top:10px}
.item{border-top:1px solid #dfe6ec;padding-top:12px;margin-top:12px}
.detalle{font-size:14px;color:#4f5f69;margin-top:6px}
.etiqueta{display:inline-block;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:900;margin-top:8px;margin-right:5px}
.PENDIENTE{background:#fff3c4;color:#9a7300}
.REVISADO{background:#e4f5ff;color:#17627f}
.SOLUCIONADO{background:#e5ffe5;color:#1a7f1a}
.DEFECTO{background:#ffe0e0;color:#c00000}
.MEJORA{background:#e9e5ff;color:#47308a}
.SUGERENCIA{background:#e4f5ff;color:#17627f}
.INCIDENCIA{background:#ffd6d6;color:#9b0000}
.acciones{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.acciones button{flex:1;min-width:120px}
.azul{background:#17627f;color:white}
.ok{background:#48a530;color:white}
.borrar{background:#c00000;color:white}
.vacio{text-align:center;font-weight:900;padding:18px}
</style>
</head>

<body>

<header>
<button id="btnVolver" class="volver">←</button>
<h2>📬 BUZÓN</h2>
</header>

<div class="contenedor">

<div class="card">
<h3>📬 Buzón de sugerencias y mejoras</h3>

<label>Nombre</label>
<input id="nombre" placeholder="Nombre">

<label>Apellidos</label>
<input id="apellidos" placeholder="Apellidos">

<label>Empresa</label>
<input id="empresa" placeholder="Empresa">

<label>Cargo</label>
<input id="cargo" placeholder="Cargo">

<label>Tipo</label>
<select id="tipo">
  <option value="SUGERENCIA">SUGERENCIA</option>
  <option value="MEJORA">MEJORA DEL SISTEMA</option>
  <option value="DEFECTO">DEFECTO / ERROR</option>
  <option value="INCIDENCIA">INCIDENCIA</option>
</select>

<label>Sugerencia / comentario</label>
<textarea id="mensaje" placeholder="Escribe aquí la sugerencia, defecto detectado o mejora propuesta..."></textarea>

<button id="btnGuardar" class="guardar">💾 Guardar en buzón</button>
<button id="btnLimpiar" class="limpiar">➕ Limpiar formulario</button>
</div>

<div class="card">
<h3>📋 Entradas del buzón</h3>
<div id="listado"></div>
</div>

</div>

<script type="module">
import {
  leerColeccion,
  guardarColeccion,
  escucharColeccion,
  borrarDocumento
} from "./monolito-cloud.js";

const COLECCION = "buzon_monolito";
const CLAVE_LOCAL_VIEJA = "buzonMonolito";

let entradas = [];

function usuarioActual(){
  return localStorage.getItem("usuario") || "OPERADOR";
}

function puedeBorrar(){
  const u = usuarioActual().toUpperCase();
  return u === "JAVI" || u === "JAVIER" || u === "SILVIA";
}

function crearId(){
  return "BZ-" + Date.now() + "-" + Math.random().toString(36).slice(2,7);
}

function esc(txt){
  return String(txt || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

async function guardarLista(){
  await guardarColeccion(COLECCION, entradas);
}

async function guardarBuzon(){
  const nombre = document.getElementById("nombre").value.trim();
  const apellidos = document.getElementById("apellidos").value.trim();
  const empresa = document.getElementById("empresa").value.trim();
  const cargo = document.getElementById("cargo").value.trim();
  const tipo = document.getElementById("tipo").value;
  const mensaje = document.getElementById("mensaje").value.trim();

  if(!nombre || !apellidos || !empresa || !cargo || !mensaje){
    alert("Completa nombre, apellidos, empresa, cargo y sugerencia.");
    return;
  }

  const entrada = {
    id: crearId(),
    nombre,
    apellidos,
    empresa,
    cargo,
    tipo,
    mensaje,
    estado: "PENDIENTE",
    creadaPor: usuarioActual(),
    fecha: new Date().toLocaleString("es-ES"),
    fechaMs: Date.now(),
    actualizadoEn: new Date().toISOString()
  };

  entradas.unshift(entrada);
  await guardarLista();

  limpiarFormulario();
  pintarBuzon();

  alert("Entrada guardada en el buzón.");
}

function limpiarFormulario(){
  document.getElementById("nombre").value = "";
  document.getElementById("apellidos").value = "";
  document.getElementById("empresa").value = "";
  document.getElementById("cargo").value = "";
  document.getElementById("tipo").value = "SUGERENCIA";
  document.getElementById("mensaje").value = "";
}

async function cambiarEstado(id, estado){
  entradas = entradas.map(e=>{
    if(String(e.id) === String(id)){
      return {
        ...e,
        estado,
        actualizadoPor: usuarioActual(),
        fechaActualizacion: new Date().toLocaleString("es-ES"),
        actualizadoEn: new Date().toISOString()
      };
    }
    return e;
  });

  await guardarLista();
  pintarBuzon();
}

async function borrarEntrada(id){
  if(!puedeBorrar()){
    alert("Solo Javi o Silvia pueden borrar entradas.");
    return;
  }

  if(!confirm("¿Borrar esta entrada del buzón?")) return;

  entradas = entradas.filter(e => String(e.id) !== String(id));
  await borrarDocumento(COLECCION, id);

  pintarBuzon();
}

function pintarBuzon(){
  const cont = document.getElementById("listado");

  const data = [...entradas].sort((a,b)=>
    Number(b.fechaMs || 0) - Number(a.fechaMs || 0)
  );

  if(data.length === 0){
    cont.innerHTML = `<div class="vacio">No hay entradas en el buzón.</div>`;
    return;
  }

  let html = "";

  data.forEach(e=>{
    html += `
      <div class="item">
        <strong>${esc(e.nombre)} ${esc(e.apellidos)}</strong>
        <div class="detalle">${esc(e.empresa)} · ${esc(e.cargo)}</div>

        <span class="etiqueta ${esc(e.tipo)}">${esc(e.tipo)}</span>
        <span class="etiqueta ${esc(e.estado)}">${esc(e.estado)}</span>

        <div style="margin-top:10px">${esc(e.mensaje).replace(/\n/g,"<br>")}</div>

        <div class="detalle">
          Registrado por: ${esc(e.creadaPor)} · ${esc(e.fecha)}
          ${e.fechaActualizacion ? `<br>Actualizado por: ${esc(e.actualizadoPor)} · ${esc(e.fechaActualizacion)}` : ""}
        </div>

        <div class="acciones">
          <button class="azul" data-accion="revisado" data-id="${esc(e.id)}">Revisado</button>
          <button class="ok" data-accion="solucionado" data-id="${esc(e.id)}">Solucionado</button>
          ${
            puedeBorrar()
            ? `<button class="borrar" data-accion="borrar" data-id="${esc(e.id)}">Borrar</button>`
            : ""
          }
        </div>
      </div>
    `;
  });

  cont.innerHTML = html;
}

function volver(){
  window.location.href = "index.html";
}

function activarBotones(){
  document.getElementById("btnVolver").addEventListener("click", volver);
  document.getElementById("btnGuardar").addEventListener("click", guardarBuzon);
  document.getElementById("btnLimpiar").addEventListener("click", limpiarFormulario);

  document.getElementById("listado").addEventListener("click", function(e){
    const btn = e.target.closest("button");
    if(!btn) return;

    const accion = btn.dataset.accion;
    const id = btn.dataset.id;

    if(accion === "revisado") cambiarEstado(id, "REVISADO");
    if(accion === "solucionado") cambiarEstado(id, "SOLUCIONADO");
    if(accion === "borrar") borrarEntrada(id);
  });
}

async function migrarLocalSiHaceFalta(){
  const nube = await leerColeccion(COLECCION);

  if(nube.length > 0) return;

  const local = localStorage.getItem(CLAVE_LOCAL_VIEJA);
  if(!local) return;

  try{
    const recuperadas = JSON.parse(local).map(e=>({
      ...e,
      id:e.id || crearId(),
      fechaMs:e.fechaMs || Date.now(),
      actualizadoEn:e.actualizadoEn || new Date().toISOString()
    }));

    if(recuperadas.length > 0){
      entradas = recuperadas;
      await guardarLista();
    }
  }catch(e){}
}

async function iniciar(){
  activarBotones();

  await migrarLocalSiHaceFalta();

  entradas = await leerColeccion(COLECCION);
  pintarBuzon();

  escucharColeccion(COLECCION, (lista)=>{
    entradas = lista;
    pintarBuzon();
  });
}

iniciar();
</script>

</body>
</html>
