<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROVEEDORES</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#eef2f5;
  color:#2b2b2b;
}

/* CABECERA */
header{
  background:#17303d;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.titulo{
  font-size:20px;
  font-weight:bold;
}

.add{
  font-size:28px;
  cursor:pointer;
  font-weight:bold;
}

/* LISTA */
.lista{
  padding:15px;
}

.proveedor{
  padding:16px;
  border-radius:16px;
  margin-bottom:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 6px 14px rgba(0,0,0,0.08);
}

.proveedor-info{
  display:flex;
  flex-direction:column;
  gap:3px;
}

.proveedor small{
  font-weight:normal;
  opacity:0.8;
}

.lado-derecho{
  display:flex;
  align-items:center;
  gap:12px;
}

.check{
  font-size:22px;
  color:#4f8a3a;
}

.editar{
  cursor:pointer;
  font-size:20px;
}

/* COLORES SUAVES */
.c1{background:#f4efe6;}
.c2{background:#eae3d6;}
.c3{background:#f0f1f2;}
.c4{background:#f3ecd2;}
.c5{background:#ede4d8;}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.45);
  display:none;
  justify-content:center;
  align-items:center;
  padding:16px;
}

.modal-box{
  background:white;
  padding:20px;
  border-radius:14px;
  width:100%;
  max-width:420px;
}

input, select, button{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  font-size:16px;
}

button{
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.btn-guardar{
  background:#17303d;
  color:white;
}

/* FICHA PROVEEDOR */
.ficha{
  display:none;
  padding:15px;
}

.tarjeta{
  background:white;
  border-radius:16px;
  padding:16px;
  box-shadow:0 6px 14px rgba(0,0,0,0.08);
  margin-bottom:14px;
}

.nombre-ficha{
  font-size:24px;
  font-weight:bold;
  margin-bottom:10px;
}

.dato{
  margin-bottom:8px;
  font-size:16px;
}

.acciones{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  margin-top:14px;
}

.btn{
  padding:14px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
}

.btn-volver{
  background:#d8dde1;
}

.btn-pedido{
  background:#4f8a3a;
  color:white;
}

.btn-editar{
  background:#17303d;
  color:white;
}

.subtitulo{
  font-size:18px;
  font-weight:bold;
  margin-bottom:10px;
}

.articulo{
  background:#f8f8f8;
  border-radius:10px;
  padding:12px;
  margin-bottom:8px;
  display:flex;
  justify-content:space-between;
  gap:10px;
}

.vacio{
  background:#f8f8f8;
  border-radius:10px;
  padding:12px;
  color:#666;
}

@media(max-width:700px){
  .acciones{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<header>
  <div class="titulo">PROVEEDORES</div>
  <div class="add" onclick="nuevo()">+</div>
</header>

<!-- LISTA -->
<div class="lista" id="lista"></div>

<!-- FICHA -->
<div class="ficha" id="ficha">
  <div class="tarjeta" id="tarjetaFicha"></div>

  <div class="tarjeta">
    <div class="subtitulo">ARTÍCULOS DEL PROVEEDOR</div>
    <div id="listaArticulosProveedor"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">

    <input id="nombre" placeholder="Nombre">
    <input id="telefono" placeholder="Teléfono">
    <input id="producto" placeholder="Producto principal">
    <input id="diaPedido" placeholder="Día de pedido">
    <input id="diaReparto" placeholder="Día de reparto">

    <select id="pago">
      <option value="contado">Contado</option>
      <option value="reposicion">Reposición</option>
      <option value="banco">Banco</option>
      <option value="cuenta">Entregas a cuenta</option>
    </select>

    <select id="color">
      <option value="c1">Crema</option>
      <option value="c2">Cartón</option>
      <option value="c3">Gris</option>
      <option value="c4">Mostaza suave</option>
      <option value="c5">Café con leche</option>
    </select>

    <button class="btn-guardar" onclick="guardar()">GUARDAR</button>

  </div>
</div>

<script>
let proveedores = JSON.parse(localStorage.getItem("proveedores") || "[]");
let editIndex = null;
let fichaIndex = null;

/* BASE SI NO HAY NADA */
if(proveedores.length === 0){
  proveedores = [
    {
      nombre:"Cafés Candelas",
      telefono:"",
      producto:"Café",
      diaPedido:"",
      diaReparto:"",
      pago:"contado",
      color:"c1"
    },
    {
      nombre:"Turrado",
      telefono:"",
      producto:"Mahou",
      diaPedido:"",
      diaReparto:"",
      pago:"reposicion",
      color:"c2"
    }
  ];
  localStorage.setItem("proveedores", JSON.stringify(proveedores));
}

/* PINTAR LISTA */
function pintar(){
  let html = "";

  proveedores.forEach((p,i)=>{
    let check = localStorage.getItem("pedido_" + p.nombre) ? "✔" : "";

    html += `
    <div class="proveedor ${p.color}" onclick="abrirFicha(${i})">
      <div class="proveedor-info">
        <div>${p.nombre}</div>
        <small>${p.producto || ""}</small>
      </div>

      <div class="lado-derecho">
        <div class="check">${check}</div>
        <div class="editar" onclick="eventoEditar(event, ${i})">✏</div>
      </div>
    </div>`;
  });

  document.getElementById("lista").innerHTML = html;
}

/* EVITAR QUE AL DAR AL LÁPIZ ABRA LA FICHA */
function eventoEditar(e, i){
  e.stopPropagation();
  editar(i);
}

/* NUEVO */
function nuevo(){
  editIndex = null;
  limpiar();
  document.getElementById("modal").style.display = "flex";
}

/* EDITAR */
function editar(i){
  editIndex = i;
  let p = proveedores[i];

  nombre.value = p.nombre || "";
  telefono.value = p.telefono || "";
  producto.value = p.producto || "";
  diaPedido.value = p.diaPedido || "";
  diaReparto.value = p.diaReparto || "";
  pago.value = p.pago || "contado";
  color.value = p.color || "c1";

  document.getElementById("modal").style.display = "flex";
}

/* LIMPIAR */
function limpiar(){
  nombre.value = "";
  telefono.value = "";
  producto.value = "";
  diaPedido.value = "";
  diaReparto.value = "";
  pago.value = "contado";
  color.value = "c1";
}

/* GUARDAR */
function guardar(){
  let p = {
    nombre:nombre.value.trim(),
    telefono:telefono.value.trim(),
    producto:producto.value.trim(),
    diaPedido:diaPedido.value.trim(),
    diaReparto:diaReparto.value.trim(),
    pago:pago.value,
    color:color.value
  };

  if(!p.nombre){
    alert("Pon nombre al proveedor");
    return;
  }

  if(editIndex === null){
    proveedores.push(p);
  }else{
    proveedores[editIndex] = p;
  }

  localStorage.setItem("proveedores", JSON.stringify(proveedores));
  document.getElementById("modal").style.display = "none";

  pintar();

  if(fichaIndex !== null){
    abrirFicha(fichaIndex);
  }
}

/* ABRIR FICHA */
function abrirFicha(i){
  fichaIndex = i;
  let p = proveedores[i];

  document.getElementById("lista").style.display = "none";
  document.getElementById("ficha").style.display = "block";

  let check = localStorage.getItem("pedido_" + p.nombre) ? "✔ Pedido ya hecho" : "Sin pedido hecho";

  document.getElementById("tarjetaFicha").innerHTML = `
    <div class="nombre-ficha">${p.nombre}</div>
    <div class="dato"><b>Teléfono:</b> ${p.telefono || "-"}</div>
    <div class="dato"><b>Producto principal:</b> ${p.producto || "-"}</div>
    <div class="dato"><b>Día de pedido:</b> ${p.diaPedido || "-"}</div>
    <div class="dato"><b>Día de reparto:</b> ${p.diaReparto || "-"}</div>
    <div class="dato"><b>Forma de pago:</b> ${textoPago(p.pago)}</div>
    <div class="dato"><b>Estado:</b> ${check}</div>

    <div class="acciones">
      <button class="btn btn-volver" onclick="volverLista()">VOLVER</button>
      <button class="btn btn-pedido" onclick="irAPedidos()">PEDIDOS</button>
      <button class="btn btn-editar" onclick="editar(${i})">EDITAR</button>
    </div>
  `;

  pintarArticulosProveedor(p.nombre);
}

/* VOLVER A LISTA */
function volverLista(){
  fichaIndex = null;
  document.getElementById("ficha").style.display = "none";
  document.getElementById("lista").style.display = "block";
  pintar();
}

/* TEXTO FORMA PAGO */
function textoPago(v){
  if(v === "contado") return "Contado";
  if(v === "reposicion") return "Reposición";
  if(v === "banco") return "Banco";
  if(v === "cuenta") return "Entregas a cuenta";
  return v || "-";
}

/* IR A PEDIDOS */
function irAPedidos(){
  if(fichaIndex === null) return;
  let p = proveedores[fichaIndex];
  localStorage.setItem("proveedorSeleccionado", p.nombre);
  window.location.href = "pedidos.html";
}

/* PINTAR ARTÍCULOS DEL PROVEEDOR */
function pintarArticulosProveedor(nombreProveedor){
  let contenedor = document.getElementById("listaArticulosProveedor");
  let articulos = JSON.parse(localStorage.getItem("articulos") || "[]");

  let filtrados = articulos.filter(a =>
    a.proveedor === nombreProveedor ||
    a.proveedorNombre === nombreProveedor
  );

  if(filtrados.length === 0){
    contenedor.innerHTML = `
      <div class="vacio">
        No hay artículos enlazados todavía a este proveedor.
      </div>
    `;
    return;
  }

  let html = "";
  filtrados.forEach((a,i)=>{
    html += `
      <div class="articulo">
        <div>${i+1}. ${a.nombre || a.articulo || "Artículo"}</div>
        <div>${a.precio || ""}</div>
      </div>
    `;
  });

  contenedor.innerHTML = html;
}

/* INIT */
pintar();
</script>

</body>
</html>
