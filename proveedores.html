<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PROVEEDORES</title>

<style>

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f6f8;
}

/* HEADER */
header{
    background:#1f3c48;
    color:white;
    padding:15px;
    display:flex;
    align-items:center;
    gap:10px;
}

.volver{
    background:white;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
}

/* CONTENIDO */
.contenido{
    padding:15px;
}

/* BOTÓN NUEVO */
.nuevo{
    width:100%;
    padding:12px;
    background:#ff9800; /* 🔥 naranja */
    color:white;
    border:none;
    border-radius:10px;
    margin-bottom:15px;
    font-size:16px;
}

/* TARJETAS */
.card{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:12px;
    box-shadow:0 2px 6px rgba(0,0,0,.1);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.inactivo{
    opacity:.4;
}

/* BOTONES */
.acciones button{
    margin-left:6px;
    border:none;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
}

.editar{
    background:#2196f3;
    color:white;
}

.borrar{
    background:#f44336;
    color:white;
}

.aviso{
    background:#fff3cd;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
    display:none;
}

</style>
</head>

<body>

<header>
    <button class="volver" onclick="history.back()">← Volver</button>
    <h2>🚚 PROVEEDORES</h2>
</header>

<div class="contenido">

    <div id="avisoPermiso" class="aviso"></div>

    <button class="nuevo" id="btnNuevo" onclick="nuevoProveedor()">+ Nuevo proveedor</button>

    <div id="lista"></div>

</div>

<script>

/* 🔐 USUARIO AUTOMÁTICO (modo desarrollo) */
function usuarioActual(){
    localStorage.setItem("usuario", "JAVI");
    return "JAVI";
}

/* 🔒 PERMISOS */
function puedeEditar(){
    const u = usuarioActual();
    return u === "JAVI" || u === "JAVIER" || u === "SILVIA";
}

/* 📦 DATOS INICIALES */
function proveedoresIniciales(){
    return [
        {nombre:"CANDELAS", formaPago:"BANCO", activo:true},
        {nombre:"TURRADO", formaPago:"BANCO", activo:true},
        {nombre:"SANPEDRO", formaPago:"CONTADO", activo:true},
        {nombre:"DEO", formaPago:"BANCO", activo:true}
    ];
}

/* 📥 LEER */
function leerProveedores(){
    return JSON.parse(localStorage.getItem("proveedores") || "null") || proveedoresIniciales();
}

/* 💾 GUARDAR */
function guardarProveedores(data){
    localStorage.setItem("proveedores", JSON.stringify(data));
}

/* 🧱 PINTAR */
function pintar(){
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    const proveedores = leerProveedores();

    proveedores.forEach((p, i)=>{
        const div = document.createElement("div");
        div.className = "card" + (p.activo ? "" : " inactivo");

        div.innerHTML = `
            <div>
                <b>${p.nombre}</b><br>
                Pago: ${p.formaPago}
            </div>

            <div class="acciones">
                ${puedeEditar() ? `
                    <button class="editar" onclick="editar(${i})">✏️</button>
                    <button class="borrar" onclick="borrar(${i})">🗑️</button>
                ` : ""}
            </div>
        `;

        lista.appendChild(div);
    });

    /* aviso permisos */
    if(!puedeEditar()){
        document.getElementById("avisoPermiso").style.display="block";
        document.getElementById("avisoPermiso").innerText="Modo empleado (sin permisos)";
        document.getElementById("btnNuevo").style.display="none";
    }
}

/* ➕ NUEVO */
function nuevoProveedor(){
    if(!puedeEditar()) return;

    let nombre = prompt("Nombre proveedor");
    if(!nombre) return;

    nombre = nombre.toUpperCase();

    let formaPago = prompt("Forma de pago (BANCO / CONTADO / REPOSICION)") || "BANCO";

    const proveedores = leerProveedores();

    proveedores.push({
        nombre,
        formaPago:formaPago.toUpperCase(),
        activo:true
    });

    guardarProveedores(proveedores);
    pintar();
}

/* ✏️ EDITAR */
function editar(i){
    if(!puedeEditar()) return;

    const proveedores = leerProveedores();

    let nombre = prompt("Nuevo nombre", proveedores[i].nombre);
    if(!nombre) return;

    proveedores[i].nombre = nombre.toUpperCase();

    guardarProveedores(proveedores);
    pintar();
}

/* 🗑️ BORRAR */
function borrar(i){
    if(!puedeEditar()) return;

    if(!confirm("¿Eliminar proveedor?")) return;

    const proveedores = leerProveedores();

    proveedores.splice(i,1);

    guardarProveedores(proveedores);
    pintar();
}

/* INIT */
pintar();

</script>

</body>
</html>
