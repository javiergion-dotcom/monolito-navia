<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROVEEDORES - MONOLITO</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#dfe6ec;
}

/* CABECERA */
header{
  background:#17303d;
  color:white;
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.title{
  font-size:18px;
  font-weight:700;
}

.volver{
  background:rgba(255,255,255,0.15);
  padding:8px 14px;
  border-radius:999px;
  cursor:pointer;
  font-weight:700;
}

/* CONTENIDO */
.contenedor{
  padding:20px;
}

/* LISTA PROVEEDORES */
.proveedor{
  background:linear-gradient(#8fb0c8,#4e6b7c);
  color:white;
  padding:14px 16px;
  border-radius:14px;
  margin-bottom:12px;
  cursor:pointer;
  font-weight:700;
}

/* TABLA PRECIOS */
.tabla{
  margin-top:20px;
  background:white;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 6px 12px rgba(0,0,0,0.15);
}

.fila{
  display:flex;
  justify-content:space-between;
  padding:12px 14px;
  border-bottom:1px solid #eee;
}

.fila:nth-child(1){
  background:#f4f6f8;
  font-weight:700;
}

input{
  width:90px;
  padding:6px;
  border-radius:6px;
  border:1px solid #ccc;
  text-align:right;
}

.guardar{
  margin-top:20px;
  background:linear-gradient(#78cc4b,#48a530);
  color:white;
  padding:14px;
  text-align:center;
  border-radius:14px;
  font-weight:700;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div class="title">PROVEEDORES</div>
  <div class="volver" onclick="volver()">← VOLVER</div>
</header>

<div class="contenedor">

  <div id="listaProveedores"></div>

  <div id="zonaPrecios" style="display:none;">
    <div class="tabla" id="tablaPrecios"></div>
    <div class="guardar" onclick="guardar()">GUARDAR PRECIOS</div>
  </div>

</div>

<script>

/* PROVEEDORES REALES */
let proveedores = {

  "Cafés Candelas": [
    {articulo:"Café mezcla", precio:17.00},
    {articulo:"Café natural", precio:18.50},
    {articulo:"Café torrado", precio:16.80},
    {articulo:"Descafeinado", precio:19.00},
    {articulo:"Café molido", precio:16.50},
    {articulo:"Azúcar", precio:1.20},
    {articulo:"Sacarina", precio:2.10}
  ],

  "Mahou": [
    {articulo:"Barril 50L", precio:78.00},
    {articulo:"Caja tercios", precio:16.00},
    {articulo:"Caja quintos", precio:14.50},
    {articulo:"Mahou 0,0", precio:15.20}
  ]

};

let proveedorActual = "";

/* LISTA */
function cargarProveedores(){
  let html = "";
  for(let p in proveedores){
    html += `<div class="proveedor" onclick="abrirProveedor('${p}')">${p}</div>`;
  }
  document.getElementById("listaProveedores").innerHTML = html;
}

/* ABRIR */
function abrirProveedor(nombre){
  proveedorActual = nombre;
  document.getElementById("zonaPrecios").style.display = "block";

  let datos = proveedores[nombre];
  let html = `
    <div class="fila">
      <div>ARTÍCULO</div>
      <div>PRECIO</div>
    </div>
  `;

  datos.forEach((item,i)=>{
    html += `
      <div class="fila">
        <div>${item.articulo}</div>
        <div>
          <input type="number" step="0.01" value="${item.precio}" id="p${i}">
        </div>
      </div>
    `;
  });

  document.getElementById("tablaPrecios").innerHTML = html;
}

/* GUARDAR */
function guardar(){
  let datos = proveedores[proveedorActual];

  datos.forEach((item,i)=>{
    let valor = document.getElementById("p"+i).value;
    item.precio = parseFloat(valor);
  });

  alert("Precios guardados");
}

/* VOLVER */
function volver(){
  window.location.href = "index.html";
}

/* INIT */
cargarProveedores();

</script>

</body>
</html>
