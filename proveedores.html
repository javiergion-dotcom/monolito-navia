<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROVEEDORES</title>

<style>
body{
  font-family:Arial;
  background:#dfe6ec;
  margin:0;
}

/* CABECERA */
header{
  background:#17303d;
  color:white;
  padding:18px;
  font-size:20px;
  font-weight:700;
}

/* LISTA */
.proveedor{
  background:#547184;
  color:white;
  margin:14px;
  padding:18px;
  border-radius:12px;
  font-size:20px;
  cursor:pointer;
}

/* TABLA */
.tabla{
  margin:14px;
  background:white;
  border-radius:12px;
  padding:14px;
}

.fila{
  display:flex;
  justify-content:space-between;
  padding:14px 6px;
  border-bottom:1px solid #ddd;
  font-size:18px;
}

input{
  width:90px;
  font-size:18px;
}
</style>
</head>

<body>

<header>PROVEEDORES</header>

<div id="lista"></div>
<div id="tabla"></div>

<script>

let proveedores = {

  "Cafés Candelas (Café)": [
    {articulo:"Café mezcla", precio:17.00},
    {articulo:"Café natural", precio:18.50},
    {articulo:"Descafeinado", precio:19.00}
  ],

  "Turrado (Mahou)": [
    {articulo:"Barril 50L", precio:78.00},
    {articulo:"Caja tercios", precio:16.00},
    {articulo:"Caja quintos", precio:14.50}
  ]

};

function cargar(){
  let html="";
  for(let p in proveedores){
    html += `<div class="proveedor" onclick="ver('${p}')">${p}</div>`;
  }
  document.getElementById("lista").innerHTML = html;
}

function ver(p){
  let datos = proveedores[p];

  let html = `<div class="tabla">`;

  datos.forEach((d,i)=>{
    html += `
      <div class="fila">
        <div>${d.articulo}</div>
        <input type="number" step="0.01" value="${d.precio}">
      </div>
    `;
  });

  html += `</div>`;

  document.getElementById("tabla").innerHTML = html;
}

cargar();

</script>

</body>
</html>
