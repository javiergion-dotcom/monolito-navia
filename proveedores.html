<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROVEEDORES</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f5;
}

/* HEADER */
header{
  background:#17303d;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.titulo{
  font-size:20px;
  font-weight:bold;
}

.add{
  font-size:28px;
  cursor:pointer;
}

/* LISTA */
.lista{
  padding:15px;
}

.proveedor{
  padding:15px;
  border-radius:15px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
}

/* COLORES SUAVES */
.c1{background:#f4efe6;}
.c2{background:#eae3d6;}
.c3{background:#f0f1f2;}
.c4{background:#f3ecd2;}
.c5{background:#ede4d8;}

.editar{
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:white;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:400px;
}

input, select{
  width:100%;
  padding:10px;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:12px;
  background:#17303d;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div style="display:flex; align-items:center; gap:12px;">

    <div onclick="volver()" style="
      font-size:26px;
      cursor:pointer;
      padding:6px 10px;
      border-radius:10px;
      background:rgba(255,255,255,0.1);
    ">
      ←
    </div>

    <div class="titulo">PROVEEDORES</div>

  </div>

  <div class="add" onclick="nuevo()">+</div>
</header>

<div class="lista" id="lista"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">

    <input id="nombre" placeholder="Nombre">
    <input id="telefono" placeholder="Teléfono">
    <input id="producto" placeholder="Producto principal">

    <input id="diaPedido" placeholder="Día de pedido">
    <input id="diaReparto" placeholder="Día de reparto">

    <select id="pago">
      <option value="contado">Contado</option>
      <option value="reposicion">Reposición</option>
      <option value="banco">Banco</option>
      <option value="cuenta">Entregas a cuenta</option>
    </select>

    <select id="color">
      <option value="c1">Crema</option>
      <option value="c2">Cartón</option>
      <option value="c3">Gris</option>
      <option value="c4">Mostaza suave</option>
      <option value="c5">Café con leche</option>
    </select>

    <button onclick="guardar()">GUARDAR</button>

  </div>
</div>

<script>

let proveedores = JSON.parse(localStorage.getItem("proveedores") || "[]");
let editIndex = null;

/* PINTAR */
function pintar(){
  let html="";
  proveedores.forEach((p,i)=>{
    html+=`
    <div class="proveedor ${p.color}">
      <div>
        ${p.nombre}<br>
        <small>${p.producto}</small>
      </div>
      <div class="editar" onclick="editar(${i})">✏</div>
    </div>`;
  });
  document.getElementById("lista").innerHTML=html;
}

/* NUEVO */
function nuevo(){
  editIndex=null;
  limpiar();
  document.getElementById("modal").style.display="flex";
}

/* EDITAR */
function editar(i){
  editIndex=i;
  let p=proveedores[i];

  nombre.value=p.nombre;
  telefono.value=p.telefono;
  producto.value=p.producto;
  diaPedido.value=p.diaPedido;
  diaReparto.value=p.diaReparto;
  pago.value=p.pago;
  color.value=p.color;

  modal.style.display="flex";
}

/* LIMPIAR */
function limpiar(){
  nombre.value="";
  telefono.value="";
  producto.value="";
  diaPedido.value="";
  diaReparto.value="";
}

/* GUARDAR */
function guardar(){

  let p={
    nombre:nombre.value,
    telefono:telefono.value,
    producto:producto.value,
    diaPedido:diaPedido.value,
    diaReparto:diaReparto.value,
    pago:pago.value,
    color:color.value
  };

  if(editIndex===null){
    proveedores.push(p);
  }else{
    proveedores[editIndex]=p;
  }

  localStorage.setItem("proveedores", JSON.stringify(proveedores));

  modal.style.display="none";
  pintar();
}

/* INIT */
pintar();

</script>

</body>
</html>
