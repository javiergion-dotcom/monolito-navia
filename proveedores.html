<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROVEEDORES</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#eef2f5;
  color:#2b2b2b;
}

header{
  background:#17303d;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.titulo{
  font-size:20px;
  font-weight:bold;
}

.add{
  font-size:28px;
  cursor:pointer;
  user-select:none;
}

.contenido{
  padding:15px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.proveedor{
  padding:16px;
  border-radius:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  font-weight:bold;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.proveedor:active{
  transform:scale(.98);
}

.info-proveedor{
  line-height:1.25;
}

.info-proveedor small{
  font-weight:normal;
  opacity:.8;
}

.editar{
  font-size:20px;
  cursor:pointer;
  padding:8px;
  border-radius:10px;
  background:rgba(255,255,255,.5);
}

/* colores suaves */
.c1{background:#f4efe6;}
.c2{background:#eae3d6;}
.c3{background:#f0f1f2;}
.c4{background:#f3ecd2;}
.c5{background:#ede4d8;}

.detalle{
  margin-top:18px;
  background:white;
  border-radius:16px;
  padding:16px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.detalle h3{
  margin:0 0 12px 0;
}

.fila{
  padding:10px 0;
  border-bottom:1px solid #eee;
}

.fila:last-child{
  border-bottom:none;
}

.vacio{
  margin-top:18px;
  background:white;
  border-radius:16px;
  padding:16px;
  color:#666;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}

/* modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  justify-content:center;
  align-items:center;
  padding:16px;
}

.modal-box{
  background:white;
  width:100%;
  max-width:420px;
  border-radius:16px;
  padding:18px;
}

input, select{
  width:100%;
  padding:11px;
  margin-bottom:10px;
  font-size:16px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#17303d;
  color:white;
  font-size:16px;
  cursor:pointer;
}

@media(max-width:900px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header>
  <div class="titulo">PROVEEDORES</div>
  <div class="add" onclick="nuevo()">+</div>
</header>

<div class="contenido">
  <div class="grid" id="lista"></div>
  <div id="detalleZona"></div>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <input id="nombre" placeholder="Nombre">
    <input id="telefono" placeholder="Teléfono">
    <input id="producto" placeholder="Producto principal">
    <input id="diaPedido" placeholder="Día de pedido">
    <input id="diaReparto" placeholder="Día de reparto">

    <select id="pago">
      <option value="contado">Contado</option>
      <option value="reposicion">Reposición</option>
      <option value="banco">Banco</option>
      <option value="cuenta">Entregas a cuenta</option>
    </select>

    <select id="color">
      <option value="c1">Crema</option>
      <option value="c2">Cartón</option>
      <option value="c3">Gris</option>
      <option value="c4">Mostaza suave</option>
      <option value="c5">Café con leche</option>
    </select>

    <button onclick="guardar()">GUARDAR</button>
  </div>
</div>

<script>
let proveedores = JSON.parse(localStorage.getItem("proveedores") || "[]");
let editIndex = null;

function pintar(){
  let html = "";

  proveedores.forEach((p, i) => {
    html += `
      <div class="proveedor ${p.color}" onclick="abrirProveedor(${i})">
        <div class="info-proveedor">
          ${p.nombre}<br>
          <small>${p.producto || ""}</small>
        </div>
        <div class="editar" onclick="editar(event, ${i})">✏</div>
      </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;

  if(proveedores.length === 0){
    document.getElementById("detalleZona").innerHTML =
      `<div class="vacio">No hay proveedores todavía. Pulsa + para crear el primero.</div>`;
  }
}

function abrirProveedor(i){
  const p = proveedores[i];

  document.getElementById("detalleZona").innerHTML = `
    <div class="detalle ${p.color}">
      <h3>${p.nombre}</h3>
      <div class="fila"><strong>Teléfono:</strong> ${p.telefono || "-"}</div>
      <div class="fila"><strong>Producto principal:</strong> ${p.producto || "-"}</div>
      <div class="fila"><strong>Día de pedido:</strong> ${p.diaPedido || "-"}</div>
      <div class="fila"><strong>Día de reparto:</strong> ${p.diaReparto || "-"}</div>
      <div class="fila"><strong>Forma de pago:</strong> ${textoPago(p.pago)}</div>
    </div>
  `;
}

function textoPago(v){
  if(v === "contado") return "Contado";
  if(v === "reposicion") return "Reposición";
  if(v === "banco") return "Banco";
  if(v === "cuenta") return "Entregas a cuenta";
  return "-";
}

function nuevo(){
  editIndex = null;
  limpiar();
  document.getElementById("modal").style.display = "flex";
}

function editar(ev, i){
  ev.stopPropagation();

  editIndex = i;
  const p = proveedores[i];

  nombre.value = p.nombre || "";
  telefono.value = p.telefono || "";
  producto.value = p.producto || "";
  diaPedido.value = p.diaPedido || "";
  diaReparto.value = p.diaReparto || "";
  pago.value = p.pago || "contado";
  color.value = p.color || "c1";

  document.getElementById("modal").style.display = "flex";
}

function limpiar(){
  nombre.value = "";
  telefono.value = "";
  producto.value = "";
  diaPedido.value = "";
  diaReparto.value = "";
  pago.value = "contado";
  color.value = "c1";
}

function guardar(){
  const p = {
    nombre: nombre.value,
    telefono: telefono.value,
    producto: producto.value,
    diaPedido: diaPedido.value,
    diaReparto: diaReparto.value,
    pago: pago.value,
    color: color.value
  };

  if(editIndex === null){
    proveedores.push(p);
  }else{
    proveedores[editIndex] = p;
  }

  localStorage.setItem("proveedores", JSON.stringify(proveedores));
  document.getElementById("modal").style.display = "none";
  pintar();
}

pintar();
</script>

</body>
</html>
