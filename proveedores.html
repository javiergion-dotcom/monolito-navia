<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO</title>

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#eef2f5;
}

/* HEADER */
header{
background:#17303d;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.titulo{
font-size:22px;
font-weight:bold;
}

.usuario{
background:rgba(255,255,255,0.2);
padding:6px 12px;
border-radius:20px;
}

/* ESTADO */
.estado{
padding:10px;
text-align:center;
font-weight:bold;
}

/* BOTONES */
.panel{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:20px;
}

.boton{
background:linear-gradient(180deg,#8fb1c7,#4f6f82);
color:white;
border-radius:20px;
height:120px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:20px;
cursor:pointer;
}

.rojo{
background:linear-gradient(180deg,#d65454,#a83333);
}

.amarillo{
background:linear-gradient(180deg,#e6b800,#c99700);
}

</style>
</head>

<body>

<header>
<div class="titulo">MONOLITO</div>
<div class="usuario" id="usuario">OPERADOR</div>
</header>

<div class="estado" id="estado">
Sin incidencias · Sin comunicaciones
</div>

<div class="panel">

<div class="boton" onclick="ir('proveedores.html')">🚚<br>PROVEEDORES</div>

<div class="boton" onclick="ir('articulos.html')">📦<br>ARTÍCULOS</div>

<div class="boton" onclick="ir('comparador.html')">📊<br>COMPARADOR</div>

<div class="boton" onclick="ir('pedidos.html')">📝<br>PEDIDOS</div>

<div class="boton" onclick="ir('pagos.html')">💳<br>PAGOS</div>

<div class="boton rojo" onclick="ir('incidencias.html')">🔴<br>INCIDENCIAS</div>

<div class="boton amarillo" onclick="ir('avisos.html')">🟡<br>COMUNICACIÓN</div>

</div>

<script>

function ir(pagina){
window.location.href = pagina;
}

function cargar(){
let user = localStorage.getItem("usuario") || "OPERADOR";
document.getElementById("usuario").textContent = user;

let incidencias = JSON.parse(localStorage.getItem("incidencias") || "[]");
let avisos = JSON.parse(localStorage.getItem("avisos") || "[]");

let estado = "";

if(incidencias.length > 0){
estado += "🔴 Incidencias activas ";
}else{
estado += "Sin incidencias ";
}

if(avisos.length > 0){
estado += "· 🟡 Comunicaciones activas";
}else{
estado += "· Sin comunicaciones";
}

document.getElementById("estado").textContent = estado;

if(incidencias.length > 0){
navigator.vibrate(200);
}

}

cargar();

</script>

</body>
</html>
