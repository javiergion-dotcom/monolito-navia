<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HISTORIAL CAMBIO · MONOLITO</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f5;color:#17303d}

header{
  background:#17303d;
  color:white;
  padding:16px;
  font-weight:900;
  font-size:20px;
  text-align:center;
}

.contenedor{padding:16px}

.item{
  background:white;
  border-radius:12px;
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 4px 10px rgba(0,0,0,.1);
}

.fecha{
  font-weight:900;
  margin-bottom:6px;
}

.linea{
  font-size:14px;
  margin:3px 0;
}

.ok{color:#2e7d32}
.error{color:#c00000}

.nota{
  margin-top:6px;
  font-style:italic;
  color:#555;
}

.vacio{
  text-align:center;
  margin-top:40px;
  color:#777;
  font-weight:600;
}
</style>
</head>

<body>

<header>📊 HISTORIAL DE CAMBIO</header>

<div class="contenedor" id="lista"></div>

<script>

function cargar(){

  let data = JSON.parse(localStorage.getItem("cambio") || "{}");

  let claves = Object.keys(data);

  if(claves.length === 0){
    document.getElementById("lista").innerHTML =
      "<div class='vacio'>Sin registros de cambio</div>";
    return;
  }

  let html="";

  claves.sort((a,b)=>{
    return new Date(b.split("/").reverse().join("-")) -
           new Date(a.split("/").reverse().join("-"));
  });

  claves.forEach(fecha=>{

    let d = data[fecha];

    if(!d.total) return;

    let clase = d.diferencia === 0 ? "ok" : "error";

    html += `
    <div class="item">
      <div class="fecha">📅 ${fecha}</div>

      <div class="linea">💰 Contado: ${d.total.toFixed(2)} €</div>

      <div class="linea ${clase}">
        ${d.diferencia === 0
          ? "✅ Sin diferencia"
          : d.diferencia > 0
            ? "⚠ Sobran " + d.diferencia.toFixed(2) + " €"
            : "⚠ Faltan " + Math.abs(d.diferencia).toFixed(2) + " €"}
      </div>

      ${d.nota ? `<div class="nota">📝 ${d.nota}</div>` : ""}
    </div>
    `;
  });

  document.getElementById("lista").innerHTML = html || "<div class='vacio'>Sin datos</div>";
}

cargar();

</script>

</body>
</html>
