<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MONOLITO GPT PRO · Ventas</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3eadc;
      color: #2b2118;
    }

    header {
      background: #2b2118;
      color: white;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .volver {
      background: #c9a46a;
      color: #2b2118;
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    .titulo {
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .fecha {
      font-size: 16px;
      opacity: 0.9;
    }

    main {
      padding: 22px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #fffaf1;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
      margin-bottom: 22px;
    }

    h2 {
      margin-top: 0;
      border-bottom: 2px solid #c9a46a;
      padding-bottom: 10px;
    }

    .fila {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 14px;
      align-items: center;
      margin-bottom: 14px;
      font-size: 20px;
    }

    input {
      font-size: 22px;
      padding: 12px;
      border-radius: 12px;
      border: 2px solid #d2b98c;
      text-align: right;
      background: white;
    }

    .total {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 2px dashed #c9a46a;
      font-size: 24px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
    }

    .total-dia {
      background: #2b2118;
      color: white;
      border-radius: 18px;
      padding: 24px;
      font-size: 30px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
    }

    .guardar {
      width: 100%;
      margin-top: 24px;
      padding: 18px;
      border: none;
      border-radius: 16px;
      background: #c9a46a;
      color: #2b2118;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <button class="volver" onclick="volver()">‹ Volver</button>
  <div class="titulo">VENTAS</div>
  <div class="fecha" id="fechaHora"></div>
</header>

<main>

  <section class="card">
    <h2>Turno de mañana</h2>

    <div class="fila">
      <label>Camarero 1</label>
      <input type="number" id="manana1" value="0" oninput="calcularVentas()">
    </div>

    <div class="fila">
      <label>Camarero 2</label>
      <input type="number" id="manana2" value="0" oninput="calcularVentas()">
    </div>

    <div class="total">
      <span>Total mañana</span>
      <span id="totalManana">0,00 €</span>
    </div>
  </section>

  <section class="card">
    <h2>Turno de tarde</h2>

    <div class="fila">
      <label>Camarero 1</label>
      <input type="number" id="tarde1" value="0" oninput="calcularVentas()">
    </div>

    <div class="fila">
      <label>Camarero 2</label>
      <input type="number" id="tarde2" value="0" oninput="calcularVentas()">
    </div>

    <div class="total">
      <span>Total tarde</span>
      <span id="totalTarde">0,00 €</span>
    </div>
  </section>

  <section class="total-dia">
    <span>TOTAL DÍA</span>
    <span id="totalDia">0,00 €</span>
  </section>

  <button class="guardar" onclick="guardarVentas()">Guardar ventas</button>

</main>

<script>
  function vibrar() {
    if (navigator.vibrate) navigator.vibrate(40);
  }

  function sonidoClick() {
    try {
      const audio = new Audio("click.mp3");
      audio.play().catch(() => {});
    } catch (e) {}
  }

  function volver() {
    vibrar();
    sonidoClick();
    window.location.href = "index.html";
  }

  function euros(valor) {
    return valor.toLocaleString("es-ES", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    }) + " €";
  }

  function numero(id) {
    return parseFloat(document.getElementById(id).value) || 0;
  }

  function calcularVentas() {
    const manana1 = numero("manana1");
    const manana2 = numero("manana2");
    const tarde1 = numero("tarde1");
    const tarde2 = numero("tarde2");

    const totalManana = manana1 + manana2;
    const totalTarde = tarde1 + tarde2;
    const totalDia = totalManana + totalTarde;

    document.getElementById("totalManana").textContent = euros(totalManana);
    document.getElementById("totalTarde").textContent = euros(totalTarde);
    document.getElementById("totalDia").textContent = euros(totalDia);
  }

  function guardarVentas() {
    vibrar();
    sonidoClick();

    const ventas = {
      fecha: new Date().toISOString(),
      manana: {
        camarero1: numero("manana1"),
        camarero2: numero("manana2")
      },
      tarde: {
        camarero1: numero("tarde1"),
        camarero2: numero("tarde2")
      },
      totalManana: numero("manana1") + numero("manana2"),
      totalTarde: numero("tarde1") + numero("tarde2"),
      totalDia:
        numero("manana1") +
        numero("manana2") +
        numero("tarde1") +
        numero("tarde2")
    };

    localStorage.setItem("ventas_dia", JSON.stringify(ventas));
    alert("Ventas guardadas correctamente");
  }

  function actualizarFechaHora() {
    const ahora = new Date();
    document.getElementById("fechaHora").textContent =
      ahora.toLocaleDateString("es-ES") + " · " +
      ahora.toLocaleTimeString("es-ES");
  }

  actualizarFechaHora();
  calcularVentas();
  setInterval(actualizarFechaHora, 1000);
</script>

</body>
</html>
