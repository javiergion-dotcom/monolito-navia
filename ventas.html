
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VENTAS · MONOLITO</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f5;color:#17303d}

header{
  background:#17303d;
  color:white;
  padding:16px;
  font-weight:900;
  font-size:20px;
}

.contenedor{padding:16px}

input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
}

.boton{
  width:100%;
  padding:14px;
  border:0;
  border-radius:14px;
  font-weight:900;
  margin-top:10px;
}

.guardar{background:#4caf50;color:white}

.bloqueo{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.75);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal{
  background:white;
  padding:20px;
  border-radius:14px;
  width:90%;
  max-width:400px;
  text-align:center;
}

.modal p{
  font-size:15px;
  line-height:1.4;
}

.modal button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:0;
  border-radius:10px;
  font-weight:900;
}

.irCambio{background:#17303d;color:white}
.continuar{background:#c00000;color:white}
</style>
</head>

<body>

<header>💰 VENTAS</header>

<div class="contenedor">

<input id="ventasDia" type="number" placeholder="Ventas del día"
onfocus="this.select()" onclick="this.select()">

<button class="boton guardar" onclick="guardarVentas()">GUARDAR</button>

</div>

<!-- BLOQUEO / AVISO -->
<div class="bloqueo" id="bloqueo">
  <div class="modal">

    <p>
    ⚠ CONTROL DE CAMBIO OBLIGATORIO<br><br>

    Debes realizar el control de cambio antes de registrar ventas.<br><br>

    Si continúas sin hacerlo, quedará registrado con tu usuario, fecha y hora, y el sistema podrá bloquearse.
    </p>

    <button class="irCambio" onclick="irCambio()">IR A CAMBIO</button>
    <button class="continuar" onclick="continuar()">CONTINUAR BAJO RESPONSABILIDAD</button>

  </div>
</div>

<script>

function usuarioActual(){
  return localStorage.getItem("usuario") || "OPERADOR";
}

/* ===== COMPROBAR CAMBIO ===== */

function hayCambioHoy(){
  let data = JSON.parse(localStorage.getItem("cambio") || "{}");
  let hoy = new Date().toLocaleDateString("es-ES");
  return data[hoy];
}

/* ===== GUARDAR ===== */

function guardarVentas(){

  if(!hayCambioHoy()){
    document.getElementById("bloqueo").style.display="flex";
    return;
  }

  guardarFinal(false);
}

/* ===== CONTINUAR SIN CAMBIO ===== */

function continuar(){
  document.getElementById("bloqueo").style.display="none";
  guardarFinal(true);
}

/* ===== IR A CAMBIO ===== */

function irCambio(){
  window.location.href="cambio.html";
}

/* ===== GUARDADO REAL ===== */

function guardarFinal(sinCambio){

  let ventas = Number(document.getElementById("ventasDia").value || 0);

  if(ventas <= 0){
    alert("Introduce ventas");
    return;
  }

  let data = JSON.parse(localStorage.getItem("ventas") || "{}");

  let ahora = new Date();
  let clave = ahora.toLocaleDateString("es-ES");

  data[clave]={
    ventas,
    usuario:usuarioActual(),
    hora:ahora.toLocaleTimeString("es-ES"),
    sinCambio:sinCambio
  };

  localStorage.setItem("ventas", JSON.stringify(data));

  alert("Ventas guardadas");

  document.getElementById("ventasDia").value="";
}

</script>

</body>
</html>
