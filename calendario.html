<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CALENDARIO · MONOLITO</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#eef2f5;color:#17303d}
header{background:#17303d;color:white;padding:16px;display:flex;align-items:center;gap:12px}
header h2{margin:0;font-size:20px}
button{border:0;border-radius:14px;padding:12px;font-size:15px;font-weight:900;cursor:pointer}
.volver{background:white;color:#17303d}
.contenedor{padding:16px}
.card{background:white;border-radius:22px;padding:16px;margin-bottom:14px;box-shadow:0 8px 18px rgba(0,0,0,.10)}
label{display:block;font-weight:900;margin-top:12px}
input,select,textarea{width:100%;padding:12px;border-radius:14px;border:1px solid #b8c2ca;font-size:16px;margin-top:6px}
textarea{min-height:90px}
.guardar{width:100%;background:#17303d;color:white;margin-top:14px}
.seccion{font-size:21px;font-weight:900;margin:20px 0 10px}
.tarea{border-left:8px solid #17303d}
.semanal{border-left:8px solid #7b61ff;background:#f5f2ff}
.puntual{border-left:8px solid #2196f3;background:#eef7ff}
.acuerdo{border-left:8px solid #ff9800;background:#fff8ea}
.aviso{border-left:8px solid #f2c94c;background:#fffbea}
.diario{border-left:8px solid #48a530;background:#f1fff4}
.recordatorio{border-left:8px solid #c00000;background:#fff0f0}
.hecha{opacity:.55;text-decoration:line-through}
.titulo{font-size:20px;font-weight:900}
.detalle{margin-top:6px;color:#56646f;font-weight:700}
.fecha{font-size:13px;color:#666;margin-top:8px}
.acciones{display:flex;gap:8px;margin-top:10px}
.ok{background:#27ae60;color:white}
.borrar{background:#c0392b;color:white}
.vacio{background:white;border-radius:22px;padding:18px;text-align:center;font-weight:900;margin-bottom:14px}
.etiqueta{display:inline-block;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:900;margin-top:8px;background:#eef2f5}
.alerta{background:#ffd6d6;color:#9b0000}
</style>
</head>

<body>

<header>
  <button id="btnVolver" class="volver">← Volver</button>
  <h2>📅 CALENDARIO / DIARIO</h2>
</header>

<div class="contenedor">

  <div class="card">
    <div class="titulo">Nueva entrada</div>

    <label>Tipo</label>
    <select id="tipo">
      <option value="TAREA">TAREA</option>
      <option value="AVISO">AVISO</option>
      <option value="ACUERDO">ACUERDO</option>
      <option value="DIARIO">DIARIO</option>
    </select>

    <label>Fecha</label>
    <input id="fecha" type="date">

    <label>Hora opcional</label>
    <input id="hora" type="time">

    <label>Recordar antes</label>
    <select id="recordatorio">
      <option value="0">El mismo día</option>
      <option value="1">1 día antes</option>
      <option value="7">1 semana antes</option>
      <option value="10">10 días antes</option>
      <option value="15">15 días antes</option>
      <option value="30">1 mes antes</option>
    </select>

    <label>Repetición</label>
    <select id="repeticion">
      <option value="PUNTUAL">PUNTUAL</option>
      <option value="SEMANAL">SEMANAL</option>
      <option value="ANUAL">ANUAL</option>
    </select>

    <label>Texto</label>
    <textarea id="texto" placeholder="Ej: Revisar acuerdo Mahou. En Navidad abrimos a las 10:00. En estas fechas compramos más refrescos..."></textarea>

    <button id="btnGuardar" class="guardar">💾 GUARDAR</button>
  </div>

  <div class="seccion">🛎️ RECORDATORIOS ACTIVOS</div>
  <div id="recordatorios"></div>

  <div class="seccion">📌 TAREAS PENDIENTES</div>
  <div id="pendientes"></div>

  <div class="seccion">🔄 TAREAS SEMANALES</div>
  <div id="semanales"></div>

  <div class="seccion">📅 TAREAS PUNTUALES</div>
  <div id="puntuales"></div>

  <div class="seccion">📖 DIARIO / ACUERDOS DEL NEGOCIO</div>
  <div id="diario"></div>

</div>

<script type="module">
import {
  leerColeccion,
  guardarColeccion,
  escucharColeccion,
  borrarDocumento
} from "./monolito-cloud.js";

const COLECCION = "calendario";
let entradas = [];

function usuarioActual(){
  return localStorage.getItem("usuario") || "JAVI";
}

function crearId(){
  return "calendario_" + Date.now() + "_" + Math.random().toString(36).slice(2,7);
}

function hoyISO(){
  return new Date().toISOString().slice(0,10);
}

function esc(txt){
  return String(txt || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function fechaMs(fecha){
  return new Date(fecha + "T00:00:00").getTime();
}

function diasHasta(fecha){
  const hoy = new Date();
  hoy.setHours(0,0,0,0);

  const f = new Date(fecha + "T00:00:00");
  f.setHours(0,0,0,0);

  return Math.round((f - hoy) / 86400000);
}

async function guardarLista(){
  await guardarColeccion(COLECCION, entradas);
}

async function guardarEntrada(){
  const tipo = document.getElementById("tipo").value;
  const fecha = document.getElementById("fecha").value;
  const hora = document.getElementById("hora").value;
  const recordatorio = Number(document.getElementById("recordatorio").value || 0);
  const repeticion = document.getElementById("repeticion").value;
  const texto = document.getElementById("texto").value.trim();

  if(!fecha){
    alert("Elige una fecha.");
    return;
  }

  if(!texto){
    alert("Escribe el texto.");
    return;
  }

  const nueva = {
    id: crearId(),
    tipo,
    fecha,
    hora,
    recordatorio,
    repeticion,
    texto,
    hecha:false,
    usuario:usuarioActual(),
    creado:new Date().toLocaleString("es-ES"),
    fechaMs:fechaMs(fecha),
    actualizadoEn:new Date().toISOString()
  };

  entradas.unshift(nueva);
  await guardarLista();

  document.getElementById("texto").value = "";
  document.getElementById("hora").value = "";
  document.getElementById("tipo").value = "TAREA";
  document.getElementById("recordatorio").value = "0";
  document.getElementById("repeticion").value = "PUNTUAL";
  document.getElementById("fecha").value = hoyISO();

  pintar();
  alert("Entrada guardada.");
}

async function marcarHecha(id){
  entradas = entradas.map(e=>{
    if(String(e.id) === String(id)){
      return {
        ...e,
        hecha:!e.hecha,
        actualizadoEn:new Date().toISOString()
      };
    }
    return e;
  });

  await guardarLista();
  pintar();
}

async function borrarEntrada(id){
  if(!confirm("¿Borrar esta entrada?")) return;

  entradas = entradas.filter(e => String(e.id) !== String(id));
  await borrarDocumento(COLECCION, id);
  pintar();
}

function claseEntrada(e){
  if(e.tipo === "ACUERDO") return "acuerdo";
  if(e.tipo === "AVISO") return "aviso";
  if(e.tipo === "DIARIO") return "diario";
  if(e.repeticion === "SEMANAL") return "semanal";
  if(e.repeticion === "PUNTUAL") return "puntual";
  return "tarea";
}

function textoRecordatorio(dias){
  dias = Number(dias || 0);
  if(dias === 0) return "El mismo día";
  if(dias === 1) return "1 día antes";
  if(dias === 7) return "1 semana antes";
  if(dias === 10) return "10 días antes";
  if(dias === 15) return "15 días antes";
  if(dias === 30) return "1 mes antes";
  return dias + " días antes";
}

function pintarGrupo(idContenedor, data, vacio){
  const cont = document.getElementById(idContenedor);

  if(data.length === 0){
    cont.innerHTML = `<div class="vacio">${vacio}</div>`;
    return;
  }

  cont.innerHTML = data.map(e=>{
    const faltan = diasHasta(e.fecha);

    return `
      <div class="card ${claseEntrada(e)} ${e.hecha ? "hecha" : ""}">
        <div class="titulo">${esc(e.texto)}</div>

        <div class="etiqueta ${faltan <= Number(e.recordatorio || 0) && !e.hecha ? "alerta" : ""}">
          ${esc(e.tipo)} · ${esc(e.repeticion || "PUNTUAL")}
        </div>

        <div class="detalle">
          Fecha: ${esc(e.fecha)} ${e.hora ? "· " + esc(e.hora) : ""}
        </div>

        <div class="detalle">
          Aviso: ${esc(textoRecordatorio(e.recordatorio))}
        </div>

        <div class="detalle">
          ${
            faltan < 0
            ? "Vencido hace " + Math.abs(faltan) + " día(s)"
            : faltan === 0
              ? "Toca hoy"
              : "Faltan " + faltan + " día(s)"
          }
        </div>

        <div class="fecha">
          Creado por: ${esc(e.usuario || "JAVI")} · ${esc(e.creado || "")}
        </div>

        <div class="acciones">
          <button class="ok" data-accion="hecha" data-id="${esc(e.id)}">
            ${e.hecha ? "REABRIR" : "HECHA"}
          </button>
          <button class="borrar" data-accion="borrar" data-id="${esc(e.id)}">
            BORRAR
          </button>
        </div>
      </div>
    `;
  }).join("");
}

function pintar(){
  const ordenadas = [...entradas].sort((a,b)=>
    Number(a.fechaMs || 0) - Number(b.fechaMs || 0)
  );

  const recordatorios = ordenadas.filter(e=>{
    if(e.hecha) return false;
    const faltan = diasHasta(e.fecha);
    return faltan <= Number(e.recordatorio || 0);
  });

  const pendientes = ordenadas.filter(e=>
    e.tipo === "TAREA" && !e.hecha
  );

  const semanales = ordenadas.filter(e=>
    e.tipo === "TAREA" && e.repeticion === "SEMANAL"
  );

  const puntuales = ordenadas.filter(e=>
    e.tipo === "TAREA" && e.repeticion === "PUNTUAL"
  );

  const diario = ordenadas.filter(e=>
    e.tipo === "DIARIO" || e.tipo === "ACUERDO" || e.tipo === "AVISO"
  );

  pintarGrupo("recordatorios", recordatorios, "No hay recordatorios activos.");
  pintarGrupo("pendientes", pendientes, "No hay tareas pendientes.");
  pintarGrupo("semanales", semanales, "No hay tareas semanales.");
  pintarGrupo("puntuales", puntuales, "No hay tareas puntuales.");
  pintarGrupo("diario", diario, "No hay entradas de diario, acuerdos o avisos.");
}

function volver(){
  window.location.href = "index.html";
}

function activarBotones(){
  document.getElementById("btnVolver").addEventListener("click", volver);
  document.getElementById("btnGuardar").addEventListener("click", guardarEntrada);

  document.body.addEventListener("click", function(e){
    const btn = e.target.closest("button");
    if(!btn) return;

    const accion = btn.dataset.accion;
    const id = btn.dataset.id;

    if(accion === "hecha") marcarHecha(id);
    if(accion === "borrar") borrarEntrada(id);
  });
}

async function iniciar(){
  activarBotones();
  document.getElementById("fecha").value = hoyISO();

  escucharColeccion(COLECCION, (lista)=>{
    entradas = lista;
    pintar();
  });

  const nube = await leerColeccion(COLECCION);
  entradas = nube;
  pintar();
}

iniciar();
</script>

</body>
</html>
