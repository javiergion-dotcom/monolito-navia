<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HISTÓRICO</title>

<style>
body{font-family:Arial;background:#eef2f5;margin:0;color:#17303d}
header{background:#17303d;color:white;padding:16px;display:flex;justify-content:space-between;align-items:center}
button{border:0;border-radius:12px;padding:10px 14px;font-weight:800}
.volver{background:white;color:#17303d}
.card{background:white;margin:12px;padding:14px;border-radius:16px}
.nombre{font-size:22px;font-weight:900}
.total{font-size:24px;font-weight:900;margin-top:8px}
.detalle{color:#4f5f69;margin-top:6px}
.lineas{display:none;margin-top:10px;border-top:1px solid #ddd;padding-top:8px}
.linea{padding:8px 0;border-bottom:1px solid #ddd}
.ok{color:green;font-weight:900}
.error{color:red;font-weight:900}
.ver{background:#17303d;color:white;margin-top:10px}
</style>
</head>

<body>

<header>
  <button class="volver" onclick="location.href='index.html'">← Volver</button>
  <h2>📁 HISTÓRICO</h2>
</header>

<div id="lista"></div>

<script>
function leer(){
  return JSON.parse(localStorage.getItem("historico_pedidos") || "[]");
}

function euros(n){
  return Number(n||0).toFixed(2).replace(".",",")+" €";
}

function pintar(){
  let data = leer();
  let html = "";

  if(data.length===0){
    html = "<div style='padding:16px'>Sin datos</div>";
  }

  data.forEach((p,i)=>{

    let lineasHTML = "";

    if(p.lineas && p.lineas.length){
      p.lineas.forEach(l=>{
        let precio = Number(l.precioSinIva || 0);
        let cantidad = Number(l.cantidad || 0);
        let base = Number(l.base || cantidad * precio);

        lineasHTML += `
          <div class="linea">
            <b>${l.articulo || "Artículo"}</b><br>
            ${cantidad} × ${euros(precio)} = ${euros(base)}
          </div>`;
      });
    }

    html += `
      <div class="card">
        <div class="nombre">${p.proveedor || "SIN PROVEEDOR"}</div>
        <div class="detalle">${p.fechaPago || p.fecha || "-"}</div>
        <div class="detalle">${p.formaPago || "-"}</div>
        <div class="total">${euros(p.total)}</div>

        ${p.estado==="OK" ? `<div class="ok">✔ OK</div>` : ""}
        ${p.estado==="INCIDENCIA" || p.estado==="PAGADO CON INCIDENCIA" ? `<div class="error">⚠ INCIDENCIA</div>` : ""}

        <button class="ver" onclick="ver(${i})">Ver pedido</button>

        <div class="lineas" id="l-${i}">
          ${lineasHTML}
        </div>
      </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;
}

function ver(i){
  let d = document.getElementById("l-"+i);
  d.style.display = d.style.display==="block" ? "none" : "block";
}

pintar();
</script>

</body>
</html>
