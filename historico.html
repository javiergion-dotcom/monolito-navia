<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HISTÓRICO · MONOLITO</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#eef2f5;color:#17303d}

header{
  background:#17303d;
  color:white;
  padding:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  border:0;
  border-radius:14px;
  padding:12px 16px;
  font-weight:800;
}

.volver{background:white;color:#17303d}

.contenido{padding:16px}

.mes{
  margin-top:30px;
  font-size:22px;
  border-bottom:2px solid #17303d;
  padding-bottom:6px;
}

.resumenMes{
  background:white;
  border-radius:16px;
  padding:14px;
  margin:10px 0 16px 0;
  font-weight:800;
  line-height:1.8;
}

.card{
  background:white;
  border-radius:22px;
  padding:16px;
  margin-bottom:12px;
  box-shadow:0 6px 14px rgba(0,0,0,.12);
}

.nombre{font-size:22px;font-weight:900}
.detalle{margin-top:6px;color:#4f5f69}
.importe{font-size:24px;font-weight:900;margin-top:8px}

.sello{
  display:inline-block;
  margin-top:10px;
  margin-right:6px;
  padding:6px 12px;
  border-radius:999px;
  font-size:14px;
  font-weight:900;
}

.pagado{background:#48a530;color:white}
.incidencia{background:#ff0000;color:white}

.ver{
  width:100%;
  background:#17303d;
  color:white;
  margin-top:12px;
}

.lineas{
  display:none;
  margin-top:10px;
  border-top:1px solid #ddd;
  padding-top:10px;
}

.linea{
  padding:6px 0;
  border-bottom:1px solid #eee;
  font-size:16px;
}

.resumen{
  margin-top:10px;
  font-weight:900;
  font-size:18px;
}

.vacio{
  background:white;
  border-radius:22px;
  padding:20px;
  text-align:center;
  font-weight:800;
}
</style>
</head>

<body>

<header>
<button class="volver" onclick="location.href='index.html'">← Volver</button>
<h2>📁 HISTÓRICO</h2>
</header>

<div class="contenido" id="lista"></div>

<script>

function leerHistorico(){
  return JSON.parse(localStorage.getItem("historico_pedidos") || "[]");
}

function euros(n){
  return Number(n||0).toFixed(2).replace(".",",")+" €";
}

function pintar(){

  const data = leerHistorico();

  if(data.length===0){
    document.getElementById("lista").innerHTML =
      `<div class="vacio">Sin pedidos todavía</div>`;
    return;
  }

  let grupos = {};

  data.forEach(p=>{

    let f = p.fechaPago || p.fecha;
    let fecha = f ? new Date(f) : new Date();

    let mes = fecha.toLocaleString("es-ES",{month:"long"});
    let año = fecha.getFullYear();

    let clave = mes.toUpperCase()+" "+año;

    if(!grupos[clave]) grupos[clave]=[];
    grupos[clave].push(p);
  });

  let html="";

  Object.keys(grupos).forEach(mesClave=>{

    let pedidos = grupos[mesClave];

    let totalMes=0;
    let banco=0, contado=0, reposicion=0, cuenta=0;

    pedidos.forEach(p=>{
      totalMes += Number(p.total||0);

      let tipo = (p.formaPago||"").toUpperCase();

      if(tipo==="BANCO") banco += Number(p.total||0);
      else if(tipo==="CONTADO") contado += Number(p.total||0);
      else if(tipo==="REPOSICION") reposicion += Number(p.total||0);
      else if(tipo==="CUENTA") cuenta += Number(p.total||0);
    });

    html += `<div class="mes">${mesClave}</div>`;

    html += `
      <div class="resumenMes">
        Total mes: ${euros(totalMes)}<br>
        BANCO: ${euros(banco)}<br>
        CONTADO: ${euros(contado)}<br>
        REPOSICIÓN: ${euros(reposicion)}<br>
        A CUENTA: ${euros(cuenta)}
      </div>
    `;

    pedidos.forEach((p,i)=>{

      let lineasHtml="";

      if(p.lineas){
        lineasHtml = `<div class="lineas" id="l-${mesClave}-${i}">`;

        p.lineas.forEach(l=>{
          lineasHtml += `
            <div class="linea">
              <strong>${l.articulo}</strong><br>
              Cantidad: ${l.cantidad}<br>
              Base: ${euros(l.base)}
            </div>
          `;
        });

        lineasHtml += `
          <div class="resumen">
            TOTAL: ${euros(p.total)}
          </div>
        </div>`;
      }

      html += `
        <div class="card">

          <div class="nombre">${p.proveedor}</div>
          <div class="detalle">${p.fechaPago || p.fecha || "-"}</div>
          <div class="detalle">${p.formaPago || "-"}</div>

          <div class="importe">${euros(p.total)}</div>

          <span class="sello pagado">PAGADO</span>

          ${
            p.estado==="PAGADO CON INCIDENCIA"
            ? `<span class="sello incidencia">INCIDENCIA</span>
               <div class="detalle"><b>Motivo:</b> ${p.motivoIncidencia||""}</div>
               <div class="detalle"><b>Solución:</b> ${p.solucionIncidencia||""}</div>`
            : ""
          }

          <button class="ver" onclick="ver('${mesClave}',${i})">
            Ver pedido completo
          </button>

          ${lineasHtml}

        </div>
      `;
    });

  });

  document.getElementById("lista").innerHTML = html;
}

function ver(m,i){
  const d = document.getElementById("l-"+m+"-"+i);
  if(d) d.style.display = d.style.display==="block"?"none":"block";
}

pintar();

</script>

</body>
</html>
