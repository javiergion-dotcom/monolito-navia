<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HISTÓRICO · MONOLITO</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#eef2f5;color:#17303d}
header{background:#17303d;color:white;padding:16px;display:flex;align-items:center;gap:12px}
header h2{margin:0;font-size:22px}
button{border:0;border-radius:14px;padding:12px;font-size:15px;font-weight:900;cursor:pointer}
.volver{background:white;color:#17303d}
.contenedor{padding:16px}
.busqueda{width:100%;padding:14px;border-radius:16px;border:1px solid #c5d0d8;font-size:16px;margin-bottom:18px}
.card{background:white;border-radius:22px;padding:16px;margin-bottom:16px;box-shadow:0 8px 18px rgba(0,0,0,.12)}
.cardIncidencia{border:3px solid #c00000;background:#fff2f2}
.proveedor{font-size:24px;font-weight:900}
.detalle{margin-top:6px;color:#56646f;font-weight:700}
.total{font-size:28px;font-weight:900;margin-top:10px}
.estado{margin-top:10px;padding:10px;border-radius:14px;font-weight:900}
.estadoOK{background:#e7f7ea;color:#1b7f2f}
.estadoIncidencia{background:#ffd6d6;color:#9b0000}
.historialPagos{margin-top:12px;background:#edf7ed;border-radius:14px;padding:12px;font-size:14px}
.lineas{display:none;margin-top:12px;border-top:1px solid #d7dfe5;padding-top:12px}
.linea{padding:10px 0;border-bottom:1px solid #e0e6ea}
.ver{width:100%;background:#17303d;color:white;margin-top:12px}
.vacio{background:white;border-radius:22px;padding:20px;text-align:center;font-weight:900}
</style>
</head>

<body>

<header>
  <button id="btnVolver" class="volver">←</button>
  <h2>📁 HISTÓRICO</h2>
</header>

<div class="contenedor">

  <input
    type="text"
    id="buscar"
    class="busqueda"
    placeholder="Buscar proveedor..."
  >

  <div id="lista"></div>

</div>

<script type="module">
import {
  leerColeccion,
  escucharColeccion
} from "./monolito-cloud.js";

let historico = [];

function euros(n){
  return Number(n || 0).toFixed(2).replace(".",",") + " €";
}

function esc(txt){
  return String(txt || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function pintar(){
  const texto = document.getElementById("buscar").value.toLowerCase();

  let data = historico.filter(p=>{
    const proveedor = (p.proveedor || "").toLowerCase();
    return proveedor.includes(texto);
  });

  data = data.sort((a,b)=>
    Number(b.fechaMs || 0) - Number(a.fechaMs || 0)
  );

  let html = "";

  if(data.length === 0){
    html = `<div class="vacio">No hay registros en histórico</div>`;
  }else{
    data.forEach((p,i)=>{

      const incidencia = p.estado === "INCIDENCIA";

      let lineasHTML = "";

      if(p.lineas && p.lineas.length){
        p.lineas.forEach(l=>{

          const cantidad = Number(l.cantidad || l.unidades || l.uds || 0);
          const precio = Number(l.precioSinIva || l.precio || l.precioUnidad || 0);
          const base = Number(l.base || l.subtotal || l.importe || cantidad * precio);

          lineasHTML += `
            <div class="linea">
              <b>${esc(l.articulo || l.nombre || l.producto || "Artículo")}</b><br>
              ${cantidad} × ${euros(precio)} = <b>${euros(base)}</b>
            </div>
          `;
        });
      }

      html += `
        <div class="card ${incidencia ? "cardIncidencia" : ""}">

          <div class="proveedor">${esc(p.proveedor || "SIN PROVEEDOR")}</div>

          <div class="detalle">Pedido: ${esc(p.fecha || "-")}</div>
          <div class="detalle">Pago: ${esc(p.fechaPago || "-")}</div>
          <div class="detalle">Tipo: ${esc(p.tipoPago || "-")}</div>

          <div class="total">${euros(p.total)}</div>

          ${
            incidencia
            ? `<div class="estado estadoIncidencia">⚠ INCIDENCIA</div>`
            : `<div class="estado estadoOK">✔ PAGADO</div>`
          }

          ${
            p.historialPagos && p.historialPagos.length
            ? `
              <div class="historialPagos">
                <b>Historial pagos:</b><br><br>
                ${
                  p.historialPagos.map(h=>`
                    • ${esc(h.fecha)} → ${euros(h.importe)} (${esc(h.tipo)})
                  `).join("<br>")
                }
              </div>
            `
            : ""
          }

          <button class="ver" data-accion="ver" data-indice="${i}">
            Ver pedido
          </button>

          <div class="lineas" id="lineas${i}">
            ${lineasHTML}
          </div>

        </div>
      `;
    });
  }

  document.getElementById("lista").innerHTML = html;
}

function ver(i){
  const caja = document.getElementById("lineas"+i);
  if(!caja) return;

  caja.style.display =
    caja.style.display === "block"
    ? "none"
    : "block";
}

function volver(){
  window.location.href = "index.html";
}

function activarBotones(){
  document.getElementById("btnVolver").addEventListener("click", volver);
  document.getElementById("buscar").addEventListener("input", pintar);

  document.getElementById("lista").addEventListener("click", function(e){
    const btn = e.target.closest("button");
    if(!btn) return;

    if(btn.dataset.accion === "ver"){
      ver(Number(btn.dataset.indice));
    }
  });
}

async function iniciar(){
  activarBotones();

  historico = await leerColeccion("pagos_historico");
  pintar();

  escucharColeccion("pagos_historico", (lista)=>{
    historico = lista;
    pintar();
  });
}

iniciar();
</script>

</body>
</html>
