<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HISTÓRICO · MONOLITO</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#eef2f5;color:#17303d}

header{
  background:#17303d;
  color:white;
  padding:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  border:0;
  border-radius:14px;
  padding:10px 14px;
  font-weight:800;
}

.volver{background:white;color:#17303d}
.contenido{padding:16px}

.semana{
  margin-top:30px;
  font-size:22px;
  border-bottom:2px solid #17303d;
  padding-bottom:6px;
}

.resumen{
  background:white;
  border-radius:16px;
  padding:14px;
  margin:10px 0 16px 0;
  font-weight:800;
  line-height:1.8;
}

.card{
  background:white;
  border-radius:22px;
  padding:16px;
  margin-bottom:12px;
  box-shadow:0 6px 14px rgba(0,0,0,.12);
}

.nombre{font-size:22px;font-weight:900}
.detalle{margin-top:6px;color:#4f5f69}
.importe{font-size:24px;font-weight:900;margin-top:8px}

.sello{
  display:inline-block;
  margin-top:10px;
  margin-right:6px;
  padding:6px 12px;
  border-radius:999px;
  font-size:14px;
  font-weight:900;
}

.pagado{background:#48a530;color:white}
.incidencia{background:#ff0000;color:white}
.revisado{background:#0a7cff;color:white}

.botones{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.ver{background:#17303d;color:white}
.btnRevisado{background:#0a7cff;color:white}

.lineas{
  display:none;
  margin-top:10px;
  border-top:1px solid #ddd;
  padding-top:10px;
}

.vacio{
  background:white;
  border-radius:22px;
  padding:20px;
  text-align:center;
  font-weight:800;
}
</style>
</head>

<body>

<header>
<button class="volver" onclick="location.href='index.html'">← Volver</button>
<h2>📁 HISTÓRICO</h2>
</header>

<div class="contenido" id="lista"></div>

<script>

// ===== UTIL =====
function leerHistorico(){
  return JSON.parse(localStorage.getItem("historico_pedidos") || "[]");
}

function guardarHistorico(data){
  localStorage.setItem("historico_pedidos", JSON.stringify(data));
}

function euros(n){
  return Number(n||0).toFixed(2).replace(".",",")+" €";
}

function fechaSegura(p){
  let f = p.fechaPago || p.fecha;
  let d = new Date(f);
  if(!f || isNaN(d.getTime())) d = new Date();
  return d;
}

// ===== SEMANA =====
function getSemana(fecha){
  let d = new Date(fecha);
  let dia = d.getDay() || 7;
  d.setDate(d.getDate() + 4 - dia);
  let inicioAño = new Date(d.getFullYear(),0,1);
  return Math.ceil((((d - inicioAño) / 86400000) + 1)/7);
}

function rangoSemana(fecha){
  let d = new Date(fecha);
  let dia = d.getDay() || 7;

  let inicio = new Date(d);
  inicio.setDate(d.getDate() - dia + 1);

  let fin = new Date(inicio);
  fin.setDate(inicio.getDate() + 6);

  let ini = inicio.toLocaleDateString("es-ES",{day:"numeric",month:"short"});
  let fi = fin.toLocaleDateString("es-ES",{day:"numeric",month:"short"});

  return `${ini} - ${fi}`;
}

// ===== PINTAR =====
function pintar(){

  const data = leerHistorico();

  if(data.length===0){
    document.getElementById("lista").innerHTML =
      `<div class="vacio">Sin pedidos todavía</div>`;
    return;
  }

  let grupos = {};

  data.forEach(p=>{
    let fecha = fechaSegura(p);
    let semana = getSemana(fecha);
    let rango = rangoSemana(fecha);
    let año = fecha.getFullYear();

    let clave = `SEMANA ${semana} (${rango} ${año})`;

    if(!grupos[clave]) grupos[clave]=[];
    grupos[clave].push(p);
  });

  let html="";

  Object.keys(grupos).forEach(clave=>{

    let pedidos = grupos[clave];

    let total=0;
    let banco=0;
    let revisado=0;

    pedidos.forEach(p=>{
      total += Number(p.total||0);

      if((p.formaPago||"").toUpperCase()==="BANCO"){
        banco += Number(p.total||0);
        if(p.revisado) revisado += Number(p.total||0);
      }
    });

    let pendiente = banco - revisado;

    html += `<div class="semana">${clave}</div>`;

    html += `
      <div class="resumen">
        Total semana: ${euros(total)}<br><br>
        BANCO: ${euros(banco)}<br>
        ✔ Revisado: ${euros(revisado)}<br>
        ⚠ Pendiente: ${euros(pendiente)}
      </div>
    `;

    pedidos.forEach((p,i)=>{

      let lineasHtml = `<div class="lineas" id="l-${clave}-${i}">`;

      if(p.lineas){
        p.lineas.forEach(l=>{
          lineasHtml += `
            <div style="padding:10px 0; border-bottom:1px dashed #ccc">
              <div style="font-weight:900; font-size:16px;">
                ${l.articulo}
              </div>

              <div style="display:flex; justify-content:space-between; font-size:14px; margin-top:4px;">
                <span>${l.cantidad} unidades</span>
                <span>${euros(l.base)}</span>
              </div>
            </div>
          `;
        });
      }

      lineasHtml += `
        <div style="
          margin-top:12px;
          padding-top:10px;
          border-top:2px solid #000;
          font-weight:900;
          font-size:18px;
          display:flex;
          justify-content:space-between;
        ">
          <span>TOTAL</span>
          <span>${euros(p.total)}</span>
        </div>
      </div>
      `;

      html += `
        <div class="card">

          <div class="nombre">${p.proveedor}</div>
          <div class="detalle">${p.fechaPago || p.fecha || "-"}</div>
          <div class="detalle">${p.formaPago || "-"}</div>

          <div class="importe">${euros(p.total)}</div>

          <span class="sello pagado">PAGADO</span>

          ${
            p.estado==="PAGADO CON INCIDENCIA"
            ? `<span class="sello incidencia">INCIDENCIA</span>
               <div class="detalle"><b>Motivo:</b> ${p.motivoIncidencia||""}</div>
               <div class="detalle"><b>Solución:</b> ${p.solucionIncidencia||""}</div>`
            : ""
          }

          ${p.revisado ? `<span class="sello revisado">REVISADO</span>` : ""}

          <div class="botones">
            <button class="ver" onclick="ver('${clave}',${i})">Ver pedido</button>

            ${
              !p.revisado
              ? `<button class="btnRevisado" onclick="marcar('${clave}',${i})">
                   ✔ Revisado
                 </button>`
              : ""
            }
          </div>

          ${lineasHtml}

        </div>
      `;
    });

  });

  document.getElementById("lista").innerHTML = html;
}

// ===== ACCIONES =====
function ver(c,i){
  const d = document.getElementById("l-"+c+"-"+i);
  if(d) d.style.display = d.style.display==="block"?"none":"block";
}

function marcar(c,i){
  let data = leerHistorico();
  let contador=0;

  data.forEach((p,idx)=>{
    let fecha = fechaSegura(p);
    let semana = getSemana(fecha);
    let rango = rangoSemana(fecha);
    let año = fecha.getFullYear();
    let clave = `SEMANA ${semana} (${rango} ${año})`;

    if(clave===c){
      if(contador===i){
        data[idx].revisado = true;
      }
      contador++;
    }
  });

  guardarHistorico(data);
  pintar();
}

pintar();

</script>

</body>
</html>
