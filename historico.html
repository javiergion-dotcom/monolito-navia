<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HISTÓRICO · MONOLITO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#eef2f5;color:#17303d}
header{background:#17303d;color:white;padding:16px;display:flex;justify-content:space-between;align-items:center}
button{border:0;border-radius:14px;padding:10px 14px;font-weight:800}
.volver{background:white;color:#17303d}
.contenido{padding:16px}

.card{background:white;border-radius:22px;padding:16px;margin-bottom:14px;box-shadow:0 6px 14px rgba(0,0,0,.12)}
.nombre{font-size:22px;font-weight:900}
.detalle{margin-top:6px;color:#4f5f69}
.importe{font-size:24px;font-weight:900;margin-top:8px}

.sello{display:inline-block;margin-top:10px;margin-right:6px;padding:6px 12px;border-radius:999px;font-size:14px;font-weight:900}
.pagado{background:#48a530;color:white}
.revisado{background:#0a7cff;color:white}

.botones{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.ver{background:#17303d;color:white}
.pdf{background:#ff9800;color:white}
.comparar{background:#9c27b0;color:white}

.lineas{display:none;margin-top:14px;border-top:1px solid #ddd;padding-top:12px}
.lineaAlbaran{padding:12px 0;border-bottom:1px dashed #ccc}
.articuloLinea{font-weight:900}
.detalleLinea{display:flex;justify-content:space-between;font-size:15px;margin-top:5px}
.totalAlbaran{margin-top:14px;padding-top:12px;border-top:3px solid #17303d;font-weight:900;font-size:18px;display:flex;justify-content:space-between}
</style>
</head>

<body>

<header>
<button class="volver" onclick="location.href='index.html'">← Volver</button>
<h2>📁 HISTÓRICO</h2>
</header>

<div class="contenido" id="lista"></div>

<script>

function leer(){
  return JSON.parse(localStorage.getItem("historico_pedidos") || "[]");
}

function euros(n){
  return Number(n||0).toFixed(2).replace(".",",")+" €";
}

function pintar(){
  const data = leer();
  let html = "";

  data.forEach((p,i)=>{

    let lineasHtml = `<div class="lineas" id="l-${i}">`;

    if(p.lineas){
      p.lineas.forEach(l=>{
        const cantidad = Number(l.cantidad || 0);
        const precio = Number(l.precioSinIva || 0);
        const base = Number(l.base || cantidad * precio);

        lineasHtml += `
          <div class="lineaAlbaran">
            <div class="articuloLinea">${l.articulo}</div>
            <div class="detalleLinea">
              <span>${cantidad} × ${euros(precio)}</span>
              <strong>${euros(base)}</strong>
            </div>
          </div>
        `;
      });
    }

    lineasHtml += `
      <div class="totalAlbaran">
        <span>TOTAL</span>
        <span>${euros(p.total)}</span>
      </div>
    </div>
    `;

    html += `
      <div class="card" id="pedido-${i}">
        <div class="nombre">${p.proveedor}</div>
        <div class="detalle">${p.fecha}</div>
        <div class="importe">${euros(p.total)}</div>

        <span class="sello pagado">PAGADO</span>

        <div class="botones">
          <button class="ver" onclick="ver(${i})">Ver</button>
          <button class="pdf" onclick="pdf(${i})">PDF</button>
          <button class="comparar" onclick="comparar(${i})">Comparar</button>
        </div>

        ${lineasHtml}
      </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;
}

function ver(i){
  const d = document.getElementById("l-"+i);
  d.style.display = d.style.display==="block"?"none":"block";
}

function pdf(i){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const data = leer();
  const p = data[i];

  let y = 10;

  doc.text("PROVEEDOR: " + p.proveedor,10,y); y+=10;

  p.lineas.forEach(l=>{
    doc.text(`${l.articulo} ${l.cantidad}x${l.precioSinIva}`,10,y);
    y+=7;
  });

  y+=5;
  doc.text("TOTAL: "+p.total,10,y);

  doc.save("pedido_"+i+".pdf");
}

function comparar(i){
  const data = leer();
  const p = data[i];

  let resultado="";

  p.lineas.forEach(l=>{
    let cant = prompt(`Cantidad real ${l.articulo}`,l.cantidad);
    let precio = prompt(`Precio real ${l.articulo}`,l.precioSinIva);

    let error="";

    if(Number(cant)!=Number(l.cantidad)) error+="UNIDADES ";
    if(Number(precio)!=Number(l.precioSinIva)) error+="PRECIO ";

    if(error==""){
      resultado+=`✔ ${l.articulo}\n`;
    }else{
      resultado+=`🔴 ${l.articulo}: ${error}\n`;
    }
  });

  alert(resultado);
}

pintar();

</script>

</body>
</html>
