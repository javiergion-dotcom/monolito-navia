<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HISTÓRICO · MONOLITO</title>

<!-- LIBRERÍA PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#eef2f5;color:#17303d}
header{background:#17303d;color:white;padding:16px;display:flex;justify-content:space-between;align-items:center}
button{border:0;border-radius:14px;padding:10px 14px;font-weight:800}
.volver{background:white;color:#17303d}
.contenido{padding:16px}

.card{
  background:white;
  border-radius:22px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:0 6px 14px rgba(0,0,0,.12);
}

.nombre{font-size:22px;font-weight:900}
.detalle{margin-top:6px;color:#4f5f69}
.importe{font-size:24px;font-weight:900;margin-top:8px}

.sello{
  display:inline-block;
  margin-top:10px;
  margin-right:6px;
  padding:6px 12px;
  border-radius:999px;
  font-size:14px;
  font-weight:900;
}

.pagado{background:#48a530;color:white}
.revisado{background:#0a7cff;color:white}

.botones{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.ver{background:#17303d;color:white}
.pdf{background:#ff9800;color:white}

.lineas{
  display:none;
  margin-top:14px;
  border-top:1px solid #ddd;
  padding-top:12px;
}

.lineaAlbaran{
  padding:12px 0;
  border-bottom:1px dashed #ccc;
}

.articuloLinea{font-weight:900;font-size:17px}

.detalleLinea{
  display:flex;
  justify-content:space-between;
  font-size:15px;
  margin-top:5px;
}

.totalAlbaran{
  margin-top:14px;
  padding-top:12px;
  border-top:3px solid #17303d;
  font-weight:900;
  font-size:20px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<header>
<button class="volver" onclick="location.href='index.html'">← Volver</button>
<h2>📁 HISTÓRICO</h2>
</header>

<div class="contenido" id="lista"></div>

<script>

function leer(){
  return JSON.parse(localStorage.getItem("historico_pedidos") || "[]");
}

function euros(n){
  return Number(n||0).toFixed(2).replace(".",",")+" €";
}

function pintar(){

  const data = leer();
  let html = "";

  data.forEach((p,i)=>{

    let lineasHtml = `<div class="lineas" id="l-${i}">`;

    if(p.lineas){
      p.lineas.forEach(l=>{
        const cantidad = Number(l.cantidad || 0);
        const precio = Number(l.precioSinIva || 0);
        const base = Number(l.base || cantidad * precio);

        lineasHtml += `
          <div class="lineaAlbaran">
            <div class="articuloLinea">${l.articulo}</div>

            <div class="detalleLinea">
              <span>${cantidad} × ${euros(precio)}</span>
              <strong>${euros(base)}</strong>
            </div>

            <div class="detalle" style="font-size:14px">
              Formato: ${l.formato || "-"} · IVA ${l.iva || "-"}%
            </div>
          </div>
        `;
      });
    }

    lineasHtml += `
      <div class="totalAlbaran">
        <span>TOTAL</span>
        <span>${euros(p.total)}</span>
      </div>
    </div>
    `;

    html += `
      <div class="card" id="pedido-${i}">

        <div class="nombre">${p.proveedor}</div>
        <div class="detalle">${p.fecha || "-"}</div>
        <div class="detalle">${p.formaPago || "-"}</div>

        <div class="importe">${euros(p.total)}</div>

        <span class="sello pagado">PAGADO</span>
        ${p.revisado ? `<span class="sello revisado">REVISADO</span>` : ""}

        <div class="botones">
          <button class="ver" onclick="ver(${i})">Ver pedido</button>
          <button class="pdf" onclick="descargarPDF(${i})">PDF</button>
        </div>

        ${lineasHtml}

      </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;
}

function ver(i){
  const d = document.getElementById("l-"+i);
  d.style.display = d.style.display==="block"?"none":"block";
}

function descargarPDF(i){

  const elemento = document.getElementById("pedido-"+i);

  const opt = {
    margin: 10,
    filename: 'pedido.pdf',
    image: { type: 'jpeg', quality: 1 },
    html2canvas: { scale: 2 },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };

  html2pdf().set(opt).from(elemento).save();
}

pintar();

</script>

</body>
</html>
