<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HISTÓRICO · MONOLITO</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#eef2f5;color:#17303d}

header{
  background:#17303d;
  color:white;
  padding:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  border:0;
  border-radius:14px;
  padding:10px 14px;
  font-weight:800;
}

.volver{background:white;color:#17303d}

.contenido{padding:16px}

.mes{
  margin-top:30px;
  font-size:22px;
  border-bottom:2px solid #17303d;
  padding-bottom:6px;
}

.resumenMes{
  background:white;
  border-radius:16px;
  padding:14px;
  margin:10px 0 16px 0;
  font-weight:800;
  line-height:1.8;
}

.card{
  background:white;
  border-radius:22px;
  padding:16px;
  margin-bottom:12px;
  box-shadow:0 6px 14px rgba(0,0,0,.12);
}

.nombre{font-size:22px;font-weight:900}
.detalle{margin-top:6px;color:#4f5f69}
.importe{font-size:24px;font-weight:900;margin-top:8px}

.sello{
  display:inline-block;
  margin-top:10px;
  margin-right:6px;
  padding:6px 12px;
  border-radius:999px;
  font-size:14px;
  font-weight:900;
}

.pagado{background:#48a530;color:white}
.incidencia{background:#ff0000;color:white}
.revisado{background:#0a7cff;color:white}

.botones{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:10px;
}

.ver{background:#17303d;color:white}
.btnRevisado{background:#0a7cff;color:white}

.lineas{
  display:none;
  margin-top:10px;
  border-top:1px solid #ddd;
  padding-top:10px;
}

.linea{
  padding:6px 0;
  border-bottom:1px solid #eee;
}

.vacio{
  background:white;
  border-radius:22px;
  padding:20px;
  text-align:center;
  font-weight:800;
}
</style>
</head>

<body>

<header>
<button class="volver" onclick="location.href='index.html'">← Volver</button>
<h2>📁 HISTÓRICO</h2>
</header>

<div class="contenido" id="lista"></div>

<script>

function leerHistorico(){
  return JSON.parse(localStorage.getItem("historico_pedidos") || "[]");
}

function guardarHistorico(data){
  localStorage.setItem("historico_pedidos", JSON.stringify(data));
}

function euros(n){
  return Number(n||0).toFixed(2).replace(".",",")+" €";
}

function pintar(){

  const data = leerHistorico();

  if(data.length===0){
    document.getElementById("lista").innerHTML =
      `<div class="vacio">Sin pedidos todavía</div>`;
    return;
  }

  let grupos = {};

  data.forEach(p=>{
    let f = p.fechaPago || p.fecha;
    let fecha = new Date(f);

if (!f || isNaN(fecha.getTime())) {
  fecha = new Date();
}

    let mes = fecha.toLocaleString("es-ES",{month:"long"});
    let año = fecha.getFullYear();
    let clave = mes.toUpperCase()+" "+año;

    if(!grupos[clave]) grupos[clave]=[];
    grupos[clave].push(p);
  });

  let html="";

  Object.keys(grupos).forEach(mesClave=>{

    let pedidos = grupos[mesClave];

    let totalMes=0;
    let banco=0;
    let bancoRevisado=0;

    pedidos.forEach(p=>{
      totalMes += Number(p.total||0);

      let tipo = (p.formaPago||"").toUpperCase();

      if(tipo==="BANCO"){
        banco += Number(p.total||0);
        if(p.revisado){
          bancoRevisado += Number(p.total||0);
        }
      }
    });

    let bancoPendiente = banco - bancoRevisado;

    html += `<div class="mes">${mesClave}</div>`;

    html += `
      <div class="resumenMes">
        Total mes: ${euros(totalMes)}<br><br>

        BANCO: ${euros(banco)}<br>
        ✔ Revisado: ${euros(bancoRevisado)}<br>
        ⚠ Pendiente: ${euros(bancoPendiente)}
      </div>
    `;

    pedidos.forEach((p,i)=>{

      let lineasHtml="";
      if(p.lineas){
        lineasHtml = `<div class="lineas" id="l-${mesClave}-${i}">`;
        p.lineas.forEach(l=>{
          lineasHtml += `
            <div class="linea">
              ${l.articulo} · ${l.cantidad} · ${euros(l.base)}
            </div>`;
        });
        lineasHtml += `</div>`;
      }

      html += `
        <div class="card">

          <div class="nombre">${p.proveedor}</div>
          <div class="detalle">${p.fechaPago || p.fecha}</div>
          <div class="detalle">${p.formaPago}</div>

          <div class="importe">${euros(p.total)}</div>

          <span class="sello pagado">PAGADO</span>

          ${
            p.estado==="PAGADO CON INCIDENCIA"
            ? `<span class="sello incidencia">INCIDENCIA</span>
               <div class="detalle"><b>Motivo:</b> ${p.motivoIncidencia||""}</div>
               <div class="detalle"><b>Solución:</b> ${p.solucionIncidencia||""}</div>`
            : ""
          }

          ${p.revisado ? `<span class="sello revisado">REVISADO</span>` : ""}

          <div class="botones">
            <button class="ver" onclick="ver('${mesClave}',${i})">Ver pedido</button>

            ${
              !p.revisado
              ? `<button class="btnRevisado" onclick="marcarRevisado('${mesClave}',${i})">
                   ✔ Revisado
                 </button>`
              : ""
            }
          </div>

          ${lineasHtml}

        </div>
      `;
    });

  });

  document.getElementById("lista").innerHTML = html;
}

function ver(m,i){
  const d = document.getElementById("l-"+m+"-"+i);
  if(d) d.style.display = d.style.display==="block"?"none":"block";
}

function marcarRevisado(m,i){

  let data = leerHistorico();

  // encontrar índice real
  let indexReal = -1;
  let contador = 0;

  data.forEach((p,idx)=>{
    let f = p.fechaPago || p.fecha;
    let fecha = f ? new Date(f) : new Date();
    let mes = fecha.toLocaleString("es-ES",{month:"long"}).toUpperCase()+" "+fecha.getFullYear();

    if(mes===m){
      if(contador===i){
        indexReal = idx;
      }
      contador++;
    }
  });

  if(indexReal>=0){
    data[indexReal].revisado = true;
    guardarHistorico(data);
    pintar();
  }
}

pintar();

</script>

</body>
</html>
