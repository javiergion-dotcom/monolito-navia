<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HISTÓRICO</title>

<style>
body{font-family:Arial;background:#eef2f5;margin:0}
.card{background:white;margin:12px;padding:14px;border-radius:16px}
.nombre{font-size:20px;font-weight:900}
.total{font-size:22px;font-weight:900}
.lineas{display:none;margin-top:10px}
.linea{padding:6px 0;border-bottom:1px solid #ddd}
.ok{color:green;font-weight:900}
.error{color:red;font-weight:900}
button{margin-top:8px;padding:6px 10px;border-radius:8px;border:0;font-weight:800}
</style>
</head>

<body>

<h2 style="padding:12px;">📁 HISTÓRICO</h2>

<div id="lista"></div>

<script>

function leer(){
  return JSON.parse(localStorage.getItem("historico_pedidos") || "[]");
}

function euros(n){
  return Number(n||0).toFixed(2).replace(".",",")+"€";
}

function pintar(){

  let data = leer();
  let html = "";

  if(data.length===0){
    html = "<div style='padding:12px'>Sin datos</div>";
  }

  data.forEach((p,i)=>{

    let lineasHTML = "";

    if(p.lineas){
      p.lineas.forEach(l=>{
        let base = l.base || (l.cantidad*l.precioSinIva);

        lineasHTML += `
        <div class="linea">
          ${l.articulo} → ${l.cantidad} × ${euros(l.precioSinIva)} = ${euros(base)}
        </div>`;
      });
    }

    html += `
    <div class="card">
      <div class="nombre">${p.proveedor || "SIN NOMBRE"}</div>
      <div>${p.fecha || "-"}</div>
      <div class="total">${euros(p.total)}</div>

      ${p.estado==="OK" ? `<div class="ok">✔ OK</div>` : ""}
      ${p.estado==="INCIDENCIA" ? `<div class="error">⚠ INCIDENCIA</div>` : ""}

      <button onclick="ver(${i})">Ver</button>

      <div class="lineas" id="l-${i}">
        ${lineasHTML}
      </div>
    </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;
}

function ver(i){
  let d = document.getElementById("l-"+i);
  d.style.display = d.style.display==="block"?"none":"block";
}

pintar();

</script>

</body>
</html>
