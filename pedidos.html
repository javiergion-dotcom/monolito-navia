<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEDIDOS PROVEEDORES · MONOLITO</title>
    <style>
        body{font-family:Arial;margin:0;background:#f2f2f2;padding:15px;}
        .card{background:white;padding:20px;border-radius:15px;box-shadow:0 4px 6px rgba(0,0,0,0.1);margin-bottom:15px;}
        select, textarea{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #ccc;display:block;}
        button{width:100%;padding:15px;background:#17303d;color:white;border:none;border-radius:8px;font-weight:900;cursor:pointer;}
        .registro{background:white;padding:10px;margin-top:10px;border-radius:5px;border-left:5px solid #17303d;margin-bottom:8px;}
    </style>
</head>
<body>

    <div class="card">
        <h2>📦 Registrar Pedido</h2>
        <select id="proveedor">
            <option value="Mahou">Distribuciones Mahou S.L.</option>
            <option value="Frutas Paquito">Frutas y Verduras Paquito</option>
            <option value="Disbepo">Disbepo Bebidas</option>
        </select>
        <textarea id="detalle" placeholder="Detalle del pedido o incidencia..."></textarea>
        <button onclick="guardarPedido()">Registrar en la Nube</button>
    </div>

    <div id="listaPedidos"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAxbU-eWFeKfI74_X_V-A8zX_YOUR_KEY_MATCHED",
            projectId: "monolito-ed87d"
        };
        const db = getFirestore(initializeApp(firebaseConfig));

        // Función para guardar el pedido
        window.guardarPedido = async () => {
            const prov = document.getElementById("proveedor").value;
            const det = document.getElementById("detalle").value;
            if(!det) return alert("Escribe el detalle del pedido");
            
            await addDoc(collection(db, "pedidos"), { 
                proveedor: prov, 
                detalle: det, 
                fecha: Date.now() 
            });
            document.getElementById("detalle").value = "";
            alert("Pedido registrado en el Monolito.");
        };

        // Escuchar los pedidos en tiempo real
        onSnapshot(query(collection(db, "pedidos"), orderBy("fecha", "desc")), (snap) => {
            let html = "<h3>Últimos pedidos:</h3>";
            snap.forEach(doc => { 
                const d = doc.data();
                html += `<div class="registro"><strong>${d.proveedor}</strong>: ${d.detalle}</div>`; 
            });
            document.getElementById("listaPedidos").innerHTML = html;
        });
    </script>
</body>
</html>
