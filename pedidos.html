<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pedidos - MONOLITO</title>

<style>
body{
font-family:Arial;
background:#0f1419;
color:white;
margin:0;
}

header{
background:#1c2833;
padding:15px;
display:flex;
align-items:center;
justify-content:space-between;
}

.flecha{
font-size:22px;
cursor:pointer;
}

.admin{
cursor:pointer;
}

.container{
padding:15px;
}

select, input{
padding:8px;
margin:5px;
}

table{
width:100%;
margin-top:10px;
border-collapse:collapse;
}

td, th{
border:1px solid #444;
padding:8px;
text-align:center;
}

.linea{
transition:.2s;
}

button{
padding:8px;
margin:5px;
cursor:pointer;
}

.rojo{
background:#c0392b;
color:white;
}

.verde{
background:#27ae60;
color:white;
}

.alerta{
color:red;
font-weight:bold;
margin-top:10px;
}
</style>
</head>

<body>

<header>
<span class="flecha" onclick="volver()">⬅</span>
<span>📝 PEDIDOS</span>
<span class="admin" onclick="modoAdmin()">🔒</span>
</header>

<div class="container">

<table>
<thead>
<tr>
<th>Artículo</th>
<th>Unidades</th>
<th>Precio</th>
<th>Total</th>
<th class="admin-col" style="display:none;">Acción</th>
</tr>
</thead>

<tbody id="lineas"></tbody>
</table>

<button class="verde" onclick="añadirLinea()">➕ Añadir línea</button>

<h3>Subtotal: <span id="subtotal">0</span> €</h3>
<h2>Total: <span id="total">0</span> €</h2>

<input type="number" id="factura" placeholder="Total factura proveedor">
<button onclick="validar()">✔ Validar</button>

<div id="alerta" class="alerta"></div>

</div>

<script>

// 🔐 PIN ADMIN
const PIN = "1234";
let adminActivo = false;

// 🧠 ARTÍCULOS (usa los tuyos)
let articulos = [
  {nombre:"Café", precio:17/105, iva:10, proveedor:"Café Rico", color:"#a0522d"},
  {nombre:"Cerveza", precio:0.8, iva:21, proveedor:"Mahou", color:"#b22222"}
];

// ➕ Añadir línea
function añadirLinea(){

  const fila = document.createElement("tr");
  fila.className = "linea";

  const select = document.createElement("select");

  articulos.forEach(a=>{
    const option = document.createElement("option");
    option.value = a.nombre;
    option.textContent = a.nombre;
    select.appendChild(option);
  });

  const tdArticulo = document.createElement("td");
  tdArticulo.appendChild(select);

  const tdUnidades = document.createElement("td");
  const inputU = document.createElement("input");
  inputU.type = "number";
  inputU.value = 1;
  tdUnidades.appendChild(inputU);

  const tdPrecio = document.createElement("td");
  const inputP = document.createElement("input");
  inputP.type = "number";
  inputP.step = "0.01";
  tdPrecio.appendChild(inputP);

  const tdTotal = document.createElement("td");
  tdTotal.innerText = "0";

  const tdAccion = document.createElement("td");
  tdAccion.style.display = adminActivo ? "block" : "none";

  const btnEliminar = document.createElement("button");
  btnEliminar.innerText = "🗑";
  btnEliminar.className = "rojo";
  btnEliminar.onclick = ()=> fila.remove();

  tdAccion.appendChild(btnEliminar);

  fila.appendChild(tdArticulo);
  fila.appendChild(tdUnidades);
  fila.appendChild(tdPrecio);
  fila.appendChild(tdTotal);
  fila.appendChild(tdAccion);

  document.getElementById("lineas").appendChild(fila);

  // auto rellenar al elegir artículo
  function actualizarArticulo(){
    const art = articulos.find(a=>a.nombre === select.value);

    inputP.value = art.precio;
    fila.style.borderLeft = "8px solid " + art.color;

    calcular();
  }

  select.onchange = actualizarArticulo;
  inputU.oninput = calcular;
  inputP.oninput = calcular;

  actualizarArticulo();
}

// 🧮 Calcular
function calcular(){

  let subtotal = 0;

  document.querySelectorAll("#lineas tr").forEach(fila=>{
    const u = fila.children[1].querySelector("input").value;
    const p = fila.children[2].querySelector("input").value;

    const total = u * p;
    fila.children[3].innerText = total.toFixed(2);

    subtotal += total;
  });

  document.getElementById("subtotal").innerText = subtotal.toFixed(2);
  document.getElementById("total").innerText = subtotal.toFixed(2);
}

// ✔ Validar factura
function validar(){

  const sistema = parseFloat(document.getElementById("total").innerText);
  const factura = parseFloat(document.getElementById("factura").value);

  if(!factura){
    alert("Introduce total factura");
    return;
  }

  const dif = (factura - sistema).toFixed(2);

  if(Math.abs(dif) > 0.5){
    document.getElementById("alerta").innerText =
    "⚠ INCIDENCIA: diferencia de " + dif + " €";
  } else {
    document.getElementById("alerta").innerText =
    "✔ Pedido correcto";
  }
}

// 🔒 Modo admin
function modoAdmin(){

  const pin = prompt("PIN administrador");

  if(pin === PIN){
    adminActivo = !adminActivo;

    document.querySelectorAll(".admin-col").forEach(e=>{
      e.style.display = adminActivo ? "block" : "none";
    });

    document.querySelectorAll("#lineas tr").forEach(fila=>{
      fila.lastChild.style.display = adminActivo ? "block" : "none";
    });

    alert("Modo admin " + (adminActivo ? "ACTIVO" : "DESACTIVADO"));
  } else {
    alert("PIN incorrecto");
  }
}

// ⬅ Volver
function volver(){
  history.back();
}

</script>

</body>
</html>
