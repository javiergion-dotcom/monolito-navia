<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEDIDOS</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#dfe6ec;
  color:#111;
}

header{
  background:#17303d;
  color:white;
  padding:12px 14px;
  display:grid;
  grid-template-columns:80px 1fr 120px;
  align-items:center;
  gap:10px;
}

.btn-volver{
  background:#547184;
  color:white;
  border:none;
  border-radius:10px;
  padding:10px 12px;
  font-weight:bold;
  cursor:pointer;
}

.cabecera-centro{
  text-align:center;
}

.cabecera-centro .titulo{
  font-size:20px;
  font-weight:700;
}

.cabecera-centro .sub{
  font-size:13px;
  opacity:.9;
  margin-top:2px;
}

.usuario{
  text-align:right;
  font-size:14px;
  font-weight:700;
}

.panel{
  padding:16px;
  max-width:1100px;
  margin:0 auto;
}

.tarjeta{
  background:white;
  border-radius:16px;
  padding:14px;
  box-shadow:0 6px 14px rgba(0,0,0,.10);
  margin-bottom:14px;
}

.grid-top{
  display:grid;
  grid-template-columns:1.2fr 1fr 1fr;
  gap:12px;
}

label{
  display:block;
  font-size:12px;
  font-weight:700;
  margin-bottom:6px;
  color:#355162;
  text-transform:uppercase;
  letter-spacing:.3px;
}

  width:100%;
  padding:11px 12px;

  border:1px solid #c7
