<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEDIDOS · MONOLITO</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f5;color:#17303d}
header{background:#17303d;color:white;padding:16px;font-weight:900;font-size:20px}
.contenedor{padding:16px}
select,.buscador{width:100%;padding:14px;border-radius:18px;margin-bottom:16px;font-size:18px;border:2px solid #111;box-sizing:border-box;background:white}
.buscador{border:1px solid #d5dde3}
.card{background:white;border-radius:24px;padding:18px;margin-bottom:18px}
.nombre{font-weight:900;font-size:23px}
.detalle{color:#4f5f69;font-size:17px;margin-top:8px}
.stockBox{margin-top:18px}
.stockFila{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.stockCol{border-radius:18px;padding:12px;text-align:center}
.stockCol.almacen{background:#eef7ff;border:3px solid #cfe5ff}
.stockCol.pedido{background:#f1fff1;border:3px solid #bde9bd}
.stockCol label{display:block;font-size:18px;font-weight:900;margin-bottom:10px;color:#17303d}
.stockCol input{width:90%;padding:14px;border-radius:16px;border:1px solid #ccc;text-align:center;font-size:34px;font-weight:900;color:#666}
.promo{margin-top:14px;background:#fff6cf;border:2px solid #ffe066;border-radius:14px;padding:12px;font-size:15px;font-weight:900;color:#8a6a00}
.promoOk{margin-top:10px;background:#e5ffe5;border:2px solid #8bd98b;border-radius:14px;padding:12px;font-size:15px;font-weight:900;color:#1a7f1a}
.promoAuto{margin-top:10px;background:#eaf2ff;border:2px solid #9fc5ff;border-radius:14px;padding:12px;font-size:15px;font-weight:900;color:#174b8a}
.totalFinal{font-size:30px;font-weight:900;margin-top:22px}
button{width:100%;padding:16px;margin-top:18px;border:0;border-radius:18px;font-weight:900;font-size:18px;cursor:pointer}
.guardar{background:#48a530;color:white}
.volver{background:white;color:#17303d;width:auto;margin:0 10px 0 0;padding:7px 11px}
.avisosBox{background:#fff8db;border:3px solid #f0c94a;border-radius:18px;padding:14px;margin-bottom:16px}
.avisosTitulo{font-weight:900;font-size:18px;margin-bottom:8px;color:#8a6a00}
.avisoLinea{background:white;border-radius:12px;padding:10px;margin-top:8px;font-weight:900;color:#17303d}
.btnResolverAviso{margin-top:10px;background:#48a530;color:white;border:0;border-radius:12px;padding:10px;font-weight:900;width:100%}
</style>
</head>

<body>

<header>
  <button id="btnVolver" class="volver">←</button>
  📝 PEDIDOS
</header>

<div class="contenedor">

  <div id="avisosPedidos"></div>

  <select id="proveedor"></select>

  <input id="buscarArticulo" class="buscador" placeholder="🔍 Buscar artículo..." />

  <div id="articulos"></div>

  <div class="totalFinal" id="totalFinal">TOTAL PAGO: 0.00 €</div>

  <button id="btnGuardarPedido" class="guardar">Guardar pedido</button>

</div>

<script type="module">
import {
  leerColeccion,
  guardarColeccion,
  escucharColeccion,
  borrarDocumento
} from "./monolito-cloud.js";

let pedido = [];
let articulosGlobal = [];
let proveedoresGlobal = [];
let promocionesGlobal = [];
let avisosCloud = [];
let historicoPedidos = [];
let pagosPendientes = [];

function usuarioActual(){
  return localStorage.getItem("usuario") || "JAVI";
}

function volver(){
  window.location.href = "index.html";
}

function normalizar(t){
  return String(t || "")
    .trim()
    .toUpperCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

function esc(txt){
  return String(txt || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function crearId(prefijo){
  return String(prefijo || "pedido")
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9]+/g,"_")
    .replace(/^_+|_+$/g,"")
    + "_" + Date.now() + "_" + Math.random().toString(36).slice(2,7);
}

function parseFecha(valor, finDia=false){
  if(!valor) return null;

  const txt = String(valor).trim();

  if(txt.includes("/")){
    const p = txt.split("/");
    if(p.length === 3){
      const d = Number(p[0]);
      const m = Number(p[1]) - 1;
      const y = Number(p[2]);
      const fecha = new Date(y,m,d);
      if(finDia) fecha.setHours(23,59,59,999);
      else fecha.setHours(0,0,0,0);
      return fecha;
    }
  }

  const fecha = new Date(txt);
  if(isNaN(fecha.getTime())) return null;

  if(finDia) fecha.setHours(23,59,59,999);
  else fecha.setHours(0,0,0,0);

  return fecha;
}

function promoVigente(p){
  const hoy = new Date();
  hoy.setHours(0,0,0,0);

  const inicio = parseFecha(p.fechaInicio || p.inicio || p.desde || "", false);
  const fin = parseFecha(p.fechaFin || p.fin || p.hasta || "", true);

  if(inicio && hoy < inicio) return false;
  if(fin && hoy > fin) return false;

  if(p.activa === false) return false;

  return true;
}

function leerArticulos(){
  return articulosGlobal.filter(a => a.activo !== false);
}

function leerProveedores(){
  let p = proveedoresGlobal.filter(x => x.activo !== false);

  if(p.length === 0){
    p = [
      {nombre:"CANDELAS"},
      {nombre:"TURRADO"},
      {nombre:"SANPEDRO"},
      {nombre:"DEO"}
    ];
  }

  return p;
}

function leerPromociones(){
  return promocionesGlobal || [];
}

function pintarAvisosPedidos(){
  if(avisosCloud.length === 0){
    document.getElementById("avisosPedidos").innerHTML = "";
    return;
  }

  let html = `
    <div class="avisosBox">
      <div class="avisosTitulo">🛎️ AVISOS PARA PEDIDOS</div>
  `;

  avisosCloud.forEach((a)=>{
    html += `
      <div class="avisoLinea">
        🛎️ ${esc(a.texto || "")}
        <button class="btnResolverAviso" data-accion="resolverAviso" data-id="${esc(a.id)}">
          ✅ RESUELTO
        </button>
      </div>
    `;
  });

  html += `</div>`;
  document.getElementById("avisosPedidos").innerHTML = html;
}

async function resolverAvisoPedido(id){
  if(!confirm("¿Eliminar aviso de pedidos?")) return;
  await borrarDocumento("avisos_pedidos", id);
}

function cargarProveedores(){
  const proveedores = leerProveedores();

  document.getElementById("proveedor").innerHTML =
    `<option value="">Selecciona proveedor</option>` +
    proveedores.map(p =>
      `<option value="${esc(p.nombre)}">${esc(p.nombre)}</option>`
    ).join("");
}

function cargarArticulos(){
  const proveedor = document.getElementById("proveedor").value;

  const articulos = leerArticulos().filter(a =>
    normalizar(a.proveedor) === normalizar(proveedor)
  );

  pedido = articulos.map(a => ({
    ...a,
    stockActual:"0",
    pedir:"0",
    esPromoAutomatica:false
  }));

  añadirPromosAutomaticasProveedor(proveedor);

  pintar();
}

function esPromoAutomatica(p){
  return p.automatica === true ||
         p.auto === true ||
         p.autoPedido === true ||
         p.pedirSiempre === true ||
         p.añadirAutomaticamente === true ||
         p.anadirAutomaticamente === true ||
         normalizar(p.tipoAplicacion).includes("MIENTRAS") ||
         normalizar(p.tipoAplicacion).includes("SIEMPRE") ||
         normalizar(p.aplicacion).includes("MIENTRAS") ||
         normalizar(p.aplicacion).includes("SIEMPRE");
}

function nombrePromo(p){
  return p.articulo ||
         p.producto ||
         p.nombreArticulo ||
         p.promocion ||
         p.nombre ||
         "PROMOCIÓN";
}

function añadirPromosAutomaticasProveedor(proveedor){
  const promos = leerPromociones().filter(p =>
    normalizar(p.proveedor) === normalizar(proveedor) &&
    promoVigente(p) &&
    esPromoAutomatica(p)
  );

  promos.forEach(p=>{
    const nombre = nombrePromo(p);

    const yaExiste = pedido.some(a =>
      normalizar(a.articulo) === normalizar(nombre)
    );

    if(yaExiste) return;

    const conCargo = Number(p.unidadesConCargo || p.conCargo || p.pagadas || p.cargo || 0);
    const gratis = Number(p.unidadesGratis || p.unidadesCoste0 || p.sinCargo || p.gratis || 0);

    pedido.push({
      articulo:nombre,
      proveedor:proveedor,
      unidadFormato:p.unidadFormato || p.formatoTexto || "PROMO",
      precioUnidad:Number(p.precioUnidad || p.precio || 0),
      formato:Number(p.formato || 1),
      iva:Number(p.iva || 21),
      stockActual:"0",
      pedir:String(conCargo > 0 ? conCargo : 0),
      esPromoAutomatica:true,
      promoAutomatica:p,
      cantidadGratisAutomatica:gratis
    });
  });
}

function promoArticulo(a){
  if(a.promoAutomatica) return a.promoAutomatica;

  const promos = leerPromociones();

  const nombreArticulo = normalizar(a.articulo);
  const proveedorArticulo = normalizar(a.proveedor);

  return promos.find(p => {
    if(!promoVigente(p)) return false;

    const proveedorPromo = normalizar(p.proveedor);
    if(proveedorPromo !== proveedorArticulo) return false;

    const textoPromo = normalizar(
      (p.articulo || "") + " " +
      (p.producto || "") + " " +
      (p.nombreArticulo || "") + " " +
      (p.promocion || "") + " " +
      (p.nombre || "")
    );

    if(!textoPromo) return false;

    return textoPromo.includes(nombreArticulo) ||
           nombreArticulo.includes(textoPromo);
  });
}

function datosPromo(a){
  const promo = promoArticulo(a);
  if(!promo) return null;

  const conCargo = Number(
    promo.unidadesConCargo ||
    promo.conCargo ||
    promo.pagadas ||
    promo.cargo ||
    0
  );

  const gratis = Number(
    promo.unidadesGratis ||
    promo.unidadesCoste0 ||
    promo.sinCargo ||
    promo.gratis ||
    0
  );

  const descuento = Number(
    promo.descuento ||
    promo.porcentaje ||
    promo.porcentajeDescuento ||
    0
  );

  if(conCargo <= 0 && gratis <= 0 && descuento <= 0) return null;

  const pedidoUsuario = Number(a.pedir || 0);

  let cantidadCargo = pedidoUsuario;
  let cantidadGratis = 0;

  if(conCargo > 0 && gratis > 0 && pedidoUsuario > 0){
    const bloques = Math.ceil(pedidoUsuario / conCargo);
    cantidadCargo = bloques * conCargo;
    cantidadGratis = bloques * gratis;
  }

  if(a.esPromoAutomatica && conCargo <= 0 && gratis > 0){
    cantidadCargo = 0;
    cantidadGratis = gratis;
  }

  return {
    promo,
    conCargo,
    gratis,
    descuento,
    pedidoUsuario,
    cantidadCargo,
    cantidadGratis,
    textoPedido: cantidadGratis > 0
      ? cantidadCargo + " con cargo + " + cantidadGratis + " sin cargo"
      : cantidadCargo + " con cargo"
  };
}

function avisoPromoHTML(a){
  const d = datosPromo(a);

  if(!d) return "";

  let html = "";

  if(a.esPromoAutomatica){
    html += `
      <div class="promoAuto">
        🔵 PROMO AUTOMÁTICA CONFIGURADA<br>
        Aparece sola mientras esté vigente.
      </div>
    `;
  }

  if(d.conCargo > 0 && d.gratis > 0){
    html += `
      <div class="promo">
        🎁 PROMO ACTIVA · ${d.conCargo} + ${d.gratis} SIN CARGO
      </div>
    `;
  }

  if(d.descuento > 0){
    html += `
      <div class="promo">
        🎁 DESCUENTO ACTIVO · ${d.descuento}%
      </div>
    `;
  }

  if((d.pedidoUsuario > 0 || a.esPromoAutomatica) && (d.cantidadCargo > 0 || d.cantidadGratis > 0)){
    html += `
      <div class="promoOk">
        ✅ SE APLICA AUTOMÁTICAMENTE<br>
        ${d.textoPedido}
      </div>
    `;
  }

  return html;
}

function precioCaja(a){
  return Number(a.precioUnidad || 0) * Number(a.formato || 1);
}

function precioConPromo(a){
  const precio = precioCaja(a);
  const d = datosPromo(a);

  if(d && d.descuento > 0){
    return precio * (1 - d.descuento / 100);
  }

  return precio;
}

function pintar(){
  const busqueda = normalizar(document.getElementById("buscarArticulo").value);
  let html = "";

  pedido.forEach((a,i)=>{
    if(busqueda && !normalizar(a.articulo).includes(busqueda)) return;

    html += `
    <div class="card">

      <div class="nombre">${esc(a.articulo)}</div>

      <div class="detalle">
        ${esc(a.unidadFormato || "")} ·
        ${Number(a.precioUnidad || 0).toFixed(2)} € ·
        IVA ${Number(a.iva || 21)}%
      </div>

      ${avisoPromoHTML(a)}

      <div class="stockBox">
        <div class="stockFila">

          <div class="stockCol almacen">
            <label>📦 ALMACÉN</label>
            <input
              type="number"
              placeholder="0"
              value="${esc(a.stockActual)}"
              data-accion="stockActual"
              data-indice="${i}"
            >
          </div>

          <div class="stockCol pedido">
            <label>🛒 PEDIDO</label>
            <input
              class="cantidadPedido"
              data-accion="stockPedir"
              data-indice="${i}"
              type="number"
              placeholder="0"
              value="${esc(a.pedir)}"
            >
          </div>

        </div>
      </div>

    </div>
    `;
  });

  document.getElementById("articulos").innerHTML = html;
  calcular();
}

function siguienteConEnter(e,i){
  if(e.key !== "Enter") return;

  e.preventDefault();

  setTimeout(function(){
    const inputs = document.querySelectorAll(".cantidadPedido");

    if(inputs[i+1]){
      inputs[i+1].focus();
      inputs[i+1].select();
    }
  },80);
}

function stockActual(i,v){
  if(!pedido[i]) return;
  pedido[i].stockActual = v;
}

function stockPedir(i,v){
  if(!pedido[i]) return;
  pedido[i].pedir = v;
  calcular();
}

function calcular(){
  let totalPago = 0;

  pedido.forEach((a)=>{
    const d = datosPromo(a);
    const cantidad = d ? d.cantidadCargo : Number(a.pedir || 0);
    const precio = precioConPromo(a);

    totalPago += cantidad * precio;
  });

  document.getElementById("totalFinal").textContent =
    "TOTAL PAGO: " + totalPago.toFixed(2) + " €";
}

function crearLineasDeArticulo(a, proveedor){
  const precioOriginalSinIva = precioCaja(a);
  const precioFinal = precioConPromo(a);
  const dPromo = datosPromo(a);

  const cantidadBase = Number(a.pedir || 0);

  if(cantidadBase <= 0 && !a.esPromoAutomatica){
    return [];
  }

  const cantidadCargo = dPromo ? dPromo.cantidadCargo : cantidadBase;
  const cantidadGratis = dPromo ? dPromo.cantidadGratis : 0;
  const subtotal = cantidadCargo * precioFinal;

  const lineas = [];

  if(cantidadCargo > 0){
    lineas.push({
      articulo: a.articulo,
      nombre: a.articulo,
      producto: a.articulo,
      proveedor: proveedor,

      tipoLinea: "CON_CARGO",
      cantidad: cantidadCargo,
      unidades: cantidadCargo,
      uds: cantidadCargo,
      pedir: cantidadCargo,

      unidadFormato: a.unidadFormato || "",
      formato: Number(a.formato || 1),
      iva: Number(a.iva || 21),
      tipoIva: Number(a.iva || 21),

      precioOriginalSinIva: precioOriginalSinIva,
      precioSinIva: precioFinal,
      precio: precioFinal,
      precioUnidad: precioFinal,
      precio_unitario: precioFinal,
      importeUnidad: precioFinal,

      subtotal: subtotal,
      importe: subtotal,
      totalLinea: subtotal,

      stockActual:a.stockActual || "0",

      promocionActiva: dPromo ? true : false,
      promocionTexto: dPromo ? (
        dPromo.conCargo > 0 && dPromo.gratis > 0
          ? dPromo.conCargo + " + " + dPromo.gratis
          : dPromo.descuento + "% descuento"
      ) : "",
      unidadesConCargoPromo: dPromo ? dPromo.conCargo : 0,
      unidadesGratisPromo: dPromo ? dPromo.gratis : 0,
      unidadesGratisCalculadas: cantidadGratis,
      textoPedidoPromo: dPromo ? dPromo.textoPedido : "",
      esPromoAutomatica:a.esPromoAutomatica === true
    });
  }

  if(cantidadGratis > 0){
    lineas.push({
      articulo: a.articulo,
      nombre: a.articulo,
      producto: a.articulo,
      proveedor: proveedor,

      tipoLinea: "SIN_CARGO_PROMO",
      cantidad: cantidadGratis,
      unidades: cantidadGratis,
      uds: cantidadGratis,
      pedir: cantidadGratis,

      unidadFormato: a.unidadFormato || "",
      formato: Number(a.formato || 1),
      iva: Number(a.iva || 21),
      tipoIva: Number(a.iva || 21),

      precioOriginalSinIva: precioOriginalSinIva,
      precioSinIva: 0,
      precio: 0,
      precioUnidad: 0,
      precio_unitario: 0,
      importeUnidad: 0,

      subtotal: 0,
      importe: 0,
      totalLinea: 0,

      stockActual:a.stockActual || "0",

      promocionActiva: true,
      promocionTexto: dPromo ? dPromo.conCargo + " + " + dPromo.gratis : "",
      unidadesConCargoPromo: dPromo ? dPromo.conCargo : 0,
      unidadesGratisPromo: dPromo ? dPromo.gratis : 0,
      unidadesGratisCalculadas: cantidadGratis,
      textoPedidoPromo: dPromo ? dPromo.textoPedido : "",
      sinCargo:true,
      costeCero:true,
      excluirRappel:false,
      esPromoAutomatica:a.esPromoAutomatica === true
    });
  }

  return lineas;
}

async function guardarPedido(){
  const proveedor = document.getElementById("proveedor").value;

  if(!proveedor){
    alert("Selecciona proveedor");
    return;
  }

  const lineasFinal = [];

  pedido.forEach(a=>{
    const lineas = crearLineasDeArticulo(a, proveedor);
    lineasFinal.push(...lineas);
  });

  if(lineasFinal.length === 0){
    alert("Sin cantidades pedidas");
    return;
  }

  const ahora = new Date();
  const pedidoId = crearId("pedido_" + proveedor);

  const totalPago = lineasFinal.reduce((t,l)=>
    t + Number(l.subtotal || 0)
  ,0);

  const pedidoGuardado = {
    id: pedidoId,
    proveedor,
    fecha: ahora.toLocaleString("es-ES"),
    fechaMs: ahora.getTime(),
    actualizadoEn: ahora.toISOString(),
    usuario: usuarioActual(),
    total: totalPago,
    totalPago,
    pendiente: totalPago,
    estado: "PENDIENTE",
    lineas: lineasFinal
  };

  historicoPedidos.unshift(pedidoGuardado);
  await guardarColeccion("pedidos_historico", historicoPedidos);

  const pagoId = crearId("pago_" + proveedor);

  pagosPendientes.unshift({
    id: pagoId,
    pedidoId,
    proveedor,
    fecha: ahora.toLocaleString("es-ES"),
    fechaMs: ahora.getTime(),
    actualizadoEn: ahora.toISOString(),
    total: totalPago,
    totalPago,
    pendiente: totalPago,
    estado: "PENDIENTE",
    usuario: usuarioActual(),
    lineas: lineasFinal
  });

  await guardarColeccion("pagos_pendientes", pagosPendientes);

  alert("Pedido guardado correctamente");

  document.getElementById("proveedor").value = "";
  document.getElementById("buscarArticulo").value = "";
  pedido = [];
  pintar();
}

function activarEventos(){
  document.getElementById("btnVolver").addEventListener("click", volver);
  document.getElementById("proveedor").addEventListener("change", cargarArticulos);
  document.getElementById("buscarArticulo").addEventListener("input", pintar);
  document.getElementById("btnGuardarPedido").addEventListener("click", guardarPedido);

  document.getElementById("avisosPedidos").addEventListener("click", function(e){
    const btn = e.target.closest("button");
    if(!btn) return;

    if(btn.dataset.accion === "resolverAviso"){
      resolverAvisoPedido(btn.dataset.id);
    }
  });

  document.getElementById("articulos").addEventListener("input", function(e){
    const el = e.target;
    const accion = el.dataset.accion;
    const i = Number(el.dataset.indice);

    if(accion === "stockActual") stockActual(i, el.value);
    if(accion === "stockPedir") stockPedir(i, el.value);
  });

  document.getElementById("articulos").addEventListener("keydown", function(e){
    const el = e.target;
    if(!el.classList.contains("cantidadPedido")) return;

    const i = Number(el.dataset.indice);
    siguienteConEnter(e, i);
  });

  document.getElementById("articulos").addEventListener("blur", function(e){
    const el = e.target;
    if(!el.classList.contains("cantidadPedido")) return;
    pintar();
  }, true);
}

async function iniciar(){
  activarEventos();

  articulosGlobal = await leerColeccion("articulos");
  proveedoresGlobal = await leerColeccion("proveedores");
  promocionesGlobal = await leerColeccion("promociones_monolito");
  historicoPedidos = await leerColeccion("pedidos_historico");
  pagosPendientes = await leerColeccion("pagos_pendientes");

  cargarProveedores();
  pintar();

  escucharColeccion("articulos", (lista)=>{
    articulosGlobal = lista;
    const proveedorActual = document.getElementById("proveedor").value;
    if(proveedorActual) cargarArticulos();
  });

  escucharColeccion("proveedores", (lista)=>{
    proveedoresGlobal = lista;
    cargarProveedores();
  });

  escucharColeccion("promociones_monolito", (lista)=>{
    promocionesGlobal = lista;
    const proveedorActual = document.getElementById("proveedor").value;
    if(proveedorActual) cargarArticulos();
    else pintar();
  });

  escucharColeccion("avisos_pedidos", (lista)=>{
    avisosCloud = lista.sort((a,b)=>
      Number(b.fechaMs || 0) - Number(a.fechaMs || 0)
    );
    pintarAvisosPedidos();
  });

  escucharColeccion("pedidos_historico", (lista)=>{
    historicoPedidos = lista.sort((a,b)=>
      Number(b.fechaMs || 0) - Number(a.fechaMs || 0)
    );
  });

  escucharColeccion("pagos_pendientes", (lista)=>{
    pagosPendientes = lista.sort((a,b)=>
      Number(b.fechaMs || 0) - Number(a.fechaMs || 0)
    );
  });
}

iniciar();
</script>
