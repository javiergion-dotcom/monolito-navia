<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEDIDOS · MONOLITO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f5;
  color:#17303d;
}

header{
  background:#17303d;
  color:white;
  padding:16px;
  font-weight:900;
  font-size:20px;
}

.contenedor{
  padding:16px;
}

select{
  width:100%;
  padding:12px;
  border-radius:14px;
  margin-bottom:15px;
  font-size:16px;
}

.card{
  background:white;
  border-radius:16px;
  padding:12px;
  margin-bottom:10px;
}

.nombre{
  font-weight:900;
  font-size:17px;
}

.detalle{
  color:#4f5f69;
  font-size:14px;
}

.fila{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:8px;
}

input{
  width:80px;
  padding:10px;
  border-radius:12px;
  border:1px solid #ccc;
  text-align:center;
  font-size:16px;
}

.totalLinea{
  font-weight:900;
  font-size:16px;
}

.totalFinal{
  font-size:22px;
  font-weight:900;
  margin-top:20px;
}

button{
  width:100%;
  padding:14px;
  margin-top:15px;
  border:0;
  border-radius:14px;
  font-weight:900;
  font-size:16px;
}

.guardar{
  background:#48a530;
  color:white;
}
</style>
</head>

<body>

<header>📝 PEDIDOS</header>

<div class="contenedor">

<select id="proveedor" onchange="cargarArticulos()"></select>

<div id="articulos"></div>

<div class="totalFinal" id="totalFinal">TOTAL: 0,00 €</div>

<button class="guardar" onclick="guardarPedido()">Guardar pedido</button>

</div>

<script>

/* ===== DATOS ===== */

function leerArticulos(){
  return JSON.parse(localStorage.getItem("articulos") || "[]")
    .filter(a => a.activo !== false);
}

function leerProveedores(){
  let p = JSON.parse(localStorage.getItem("proveedores") || "[]")
    .filter(x => x.activo !== false);

  if(p.length===0){
    p = [
      {nombre:"CANDELAS"},
      {nombre:"TURRADO"},
      {nombre:"SANPEDRO"},
      {nombre:"DEO"}
    ];
  }

  return p;
}

/* ===== INICIO ===== */

function cargarProveedores(){

  const proveedores = leerProveedores();

  document.getElementById("proveedor").innerHTML =
    `<option value="">Selecciona proveedor</option>` +
    proveedores.map(p =>
      `<option value="${p.nombre}">${p.nombre}</option>`
    ).join("");
}

let pedido = [];

/* ===== ARTICULOS ===== */

function cargarArticulos(){

  const proveedor = document.getElementById("proveedor").value;

  const articulos = leerArticulos().filter(a =>
    a.proveedor === proveedor
  );

  pedido = articulos.map(a => ({
    ...a,
    cantidad:0
  }));

  pintar();
}

function pintar(){

  let html = "";

  pedido.forEach((a,i)=>{

    html += `
    <div class="card">

      <div class="nombre">${a.articulo}</div>

      <div class="detalle">
        ${a.unidadFormato} · ${a.precioUnidad.toFixed(2)} € sin IVA · IVA ${a.iva}%
      </div>

      <div class="fila">
        <input type="number" value="${a.cantidad}"
          onchange="cambiar(${i}, this.value)">

        <div class="totalLinea" id="t${i}">0,00 €</div>
      </div>

    </div>
    `;
  });

  document.getElementById("articulos").innerHTML = html;

  calcular();
}

/* ===== CAMBIO ===== */

function cambiar(i, valor){
  pedido[i].cantidad = Number(valor);
  calcular();
}

/* ===== CALCULO ===== */

function calcular(){

  let total = 0;

  pedido.forEach((a,i)=>{

    let precio = Number(a.precioUnidad) * Number(a.formato);
    let linea = a.cantidad * precio;

    total += linea;

    let el = document.getElementById("t"+i);
    if(el){
      el.textContent = linea.toFixed(2) + " €";
    }

  });

  document.getElementById("totalFinal").textContent =
    "TOTAL: " + total.toFixed(2) + " €";
}

/* ===== GUARDAR ===== */

function guardarPedido(){

  const proveedor = document.getElementById("proveedor").value;

  if(!proveedor){
    alert("Selecciona proveedor");
    return;
  }

  const lineas = pedido.filter(a => a.cantidad > 0);

  if(lineas.length === 0){
    alert("Sin cantidades");
    return;
  }

  const total = lineas.reduce((t,a)=>
    t + (a.cantidad * a.precioUnidad * a.formato)
  ,0);

  let pagos = JSON.parse(localStorage.getItem("pagos_pendientes") || "[]");

  pagos.unshift({
    proveedor,
    fecha: new Date().toLocaleString(),
    total,
    lineas
  });

  localStorage.setItem("pagos_pendientes", JSON.stringify(pagos));

  alert("Pedido guardado");

  location.reload();
}

/* ===== INIT ===== */

cargarProveedores();

</script>

</body>
</html>
