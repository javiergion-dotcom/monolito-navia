<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PEDIDOS</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{
background:#1f3c4c;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.bloque{
background:white;
margin:15px;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input, select{
padding:10px;
margin:5px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
}

.add{
background:#ddd;
}

.finalizar{
background:#4CAF50;
color:white;
width:100%;
font-size:18px;
}

.total{
font-size:22px;
text-align:right;
margin-top:10px;
}
</style>
</head>

<body>

<header>
<div onclick="history.back()">← Volver</div>
<div>PEDIDOS</div>
</header>

<div class="bloque">
<label>Proveedor</label>
<select id="proveedor"></select>

<label>Forma de pago</label>
<select id="formaPago">
<option>CONTADO</option>
<option>TRANSFERENCIA</option>
<option>REPOSICION</option>
</select>
</div>

<div class="bloque">
<h3>Artículos</h3>

<select id="articulo"></select>
<input type="number" id="cantidad" value="1">
<input type="number" id="precio" step="0.01">

<button class="add" onclick="añadir()">+ Añadir</button>

<div id="lista"></div>
</div>

<div class="bloque">
<div>Base: <span id="base">0</span> €</div>
<div>IVA 4%: <span id="iva4">0</span> €</div>
<div>IVA 10%: <span id="iva10">0</span> €</div>
<div>IVA 21%: <span id="iva21">0</span> €</div>

<div class="total">TOTAL: <span id="total">0</span> €</div>

<button class="finalizar" onclick="finalizar()">FINALIZAR</button>
</div>

<script>

let articulos = JSON.parse(localStorage.getItem("articulos")) || [];
let proveedores = JSON.parse(localStorage.getItem("proveedores")) || [];
let lineas = [];

let selProveedor = document.getElementById("proveedor");
let selArticulo = document.getElementById("articulo");

// Cargar proveedores
proveedores.forEach(p=>{
let op = document.createElement("option");
op.value = p.nombre;
op.textContent = p.nombre;
selProveedor.appendChild(op);
});

// Filtrar artículos por proveedor
selProveedor.addEventListener("change", cargarArticulos);

function cargarArticulos(){
selArticulo.innerHTML="";
let proveedor = selProveedor.value;

articulos
.filter(a => a.proveedor === proveedor)
.forEach(a=>{
let op = document.createElement("option");
op.value = JSON.stringify(a);
op.textContent = a.nombre;
selArticulo.appendChild(op);
});
}

cargarArticulos();

function añadir(){
let art = JSON.parse(selArticulo.value);
let cantidad = parseFloat(document.getElementById("cantidad").value);
let precio = parseFloat(document.getElementById("precio").value);

lineas.push({
nombre: art.nombre,
cantidad,
precio,
iva: art.iva
});

render();
}

function render(){
let lista = document.getElementById("lista");
lista.innerHTML = "";

let base = 0;
let iva4 = 0;
let iva10 = 0;
let iva21 = 0;

lineas.forEach(l=>{
let subtotal = l.precio * l.cantidad;
base += subtotal;

let iva = subtotal * (l.iva / 100);

if(l.iva == 4) iva4 += iva;
if(l.iva == 10) iva10 += iva;
if(l.iva == 21) iva21 += iva;

let div = document.createElement("div");
div.innerHTML = `${l.nombre} - ${l.cantidad} x ${l.precio}€`;
lista.appendChild(div);
});

let total = base + iva4 + iva10 + iva21;

document.getElementById("base").textContent = base.toFixed(2);
document.getElementById("iva4").textContent = iva4.toFixed(2);
document.getElementById("iva10").textContent = iva10.toFixed(2);
document.getElementById("iva21").textContent = iva21.toFixed(2);
document.getElementById("total").textContent = total.toFixed(2);
}

function finalizar(){

if(lineas.length === 0){
alert("Añade artículos");
return;
}

let proveedor = selProveedor.value;
let formaPago = document.getElementById("formaPago").value;

let base = parseFloat(document.getElementById("base").textContent);
let iva4 = parseFloat(document.getElementById("iva4").textContent);
let iva10 = parseFloat(document.getElementById("iva10").textContent);
let iva21 = parseFloat(document.getElementById("iva21").textContent);
let total = parseFloat(document.getElementById("total").textContent);

// GUARDAR EN PAGOS
let pagos = JSON.parse(localStorage.getItem("pagos_pendientes") || "[]");

pagos.push({
proveedor,
formaPago,
base,
iva4,
iva10,
iva21,
total,
fecha: new Date().toISOString()
});

localStorage.setItem("pagos_pendientes", JSON.stringify(pagos));

// GUARDAR EN HISTÓRICO
let historico = JSON.parse(localStorage.getItem("historico_pedidos") || "[]");

historico.push({
proveedor,
lineas,
total,
fecha: new Date().toISOString()
});

localStorage.setItem("historico_pedidos", JSON.stringify(historico));

// LIMPIAR
lineas = [];
render();

alert("Pedido guardado correctamente");

window.location.href = "pagos.html";
}

</script>

</body>
</html>
