<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEDIDOS</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#dfe6ec;
}

/* CABECERA */

header{
background:#17303d;
color:white;
padding:14px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.bloque-top{
display:flex;
gap:15px;
align-items:center;
}

select, input{
padding:8px;
border-radius:8px;
border:none;
}

/* PANEL */

.panel{
padding:20px;
}

/* LINEAS */

.linea{
display:grid;
grid-template-columns:2fr 1fr 1fr;
gap:10px;
background:white;
padding:10px;
border-radius:10px;
margin-bottom:8px;
align-items:center;
}

/* BOTONES */

button{
padding:8px 12px;
border:none;
border-radius:8px;
background:#547184;
color:white;
cursor:pointer;
}

/* TOTALES */

.totales{
margin-top:20px;
background:white;
padding:15px;
border-radius:10px;
}

.totales div{
margin-bottom:6px;
font-weight:bold;
}

</style>
</head>

<body>

<header>
<button onclick="volver()">←</button>

<div class="bloque-top">
<select id="proveedor">
<option>MAHOU</option>
<option>COCA-COLA</option>
<option>PROVEEDOR 3</option>
</select>

<input type="date" id="fecha">
</div>

<div id="usuario"></div>
</header>

<div class="panel">

<!-- AÑADIR LINEA -->
<div class="linea">
<select id="articulo">
<option value="CERVEZA|1.20|21">CERVEZA</option>
<option value="COCA-COLA|1.00|21">COCA-COLA</option>
<option value="AGUA|0.50|10">AGUA</option>
</select>

<input type="number" id="cantidad" placeholder="Unidades">

<button onclick="agregar()">Añadir</button>
</div>

<!-- LISTA -->
<div id="lista"></div>

<!-- TOTALES -->
<div class="totales">
<div>SUBTOTAL: <span id="subtotal">0</span> €</div>
<div>IVA: <span id="iva">0</span> €</div>
<div>TOTAL: <span id="total">0</span> €</div>
</div>

</div>

<script>

let pedido = [];

function agregar(){
let datos = document.getElementById("articulo").value.split("|");

let nombre = datos[0];
let precio = parseFloat(datos[1]);
let iva = parseFloat(datos[2]);
let cantidad = parseInt(document.getElementById("cantidad").value);

if(!cantidad) return;

pedido.push({
nombre,
precio,
iva,
cantidad
});

render();
}

function render(){

let lista = document.getElementById("lista");
lista.innerHTML = "";

let subtotal = 0;
let totalIVA = 0;

pedido.forEach(item=>{

let linea = document.createElement("div");
linea.className="linea";

let importe = item.precio * item.cantidad;
let ivaCalc = importe * (item.iva / 100);

subtotal += importe;
totalIVA += ivaCalc;

linea.innerHTML = `
<div>${item.nombre}</div>
<div>x${item.cantidad}</div>
<div>${importe.toFixed(2)} €</div>
`;

lista.appendChild(linea);

});

document.getElementById("subtotal").innerText = subtotal.toFixed(2);
document.getElementById("iva").innerText = totalIVA.toFixed(2);
document.getElementById("total").innerText = (subtotal + totalIVA).toFixed(2);

}

function volver(){
window.location.href="index.html";
}

document.getElementById("usuario").innerText =
localStorage.getItem("usuario") || "";

document.getElementById("fecha").valueAsDate = new Date();

</script>

</body>
</html>
