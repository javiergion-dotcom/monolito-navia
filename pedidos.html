<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEDIDOS · MONOLITO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f5;
  color:#17303d;
}

header{
  background:#17303d;
  color:white;
  padding:16px;
  font-weight:900;
  font-size:20px;
}

.contenedor{
  padding:16px;
}

select, input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  font-size:16px;
}

button{
  padding:10px;
  border:0;
  border-radius:10px;
  font-weight:800;
  margin-top:10px;
}

.add{background:#17303d;color:white}
.guardar{background:#4caf50;color:white}

.linea{
  background:white;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.aviso{
  background:#ffe5e5;
  color:#c00000;
  padding:10px;
  border-radius:10px;
  font-weight:900;
  margin-bottom:10px;
}
</style>
</head>

<body>

<header>📝 PEDIDOS</header>

<div class="contenedor">

<select id="proveedor" onchange="cambioProveedor()">
  <option value="">Selecciona proveedor</option>
  <option value="MAHOU">MAHOU</option>
  <option value="COCA_COLA">COCA_COLA</option>
  <option value="PANADERIA">PANADERIA</option>
</select>

<div id="avisoIncidencias"></div>

<div id="lineas"></div>

<button class="add" onclick="agregarLinea()">+ Añadir línea</button>

<div style="margin-top:15px;font-weight:900" id="total"></div>

<button class="guardar" onclick="guardarPedido()">Guardar pedido</button>

</div>

<script>

let lineas = [];

/* ==== INCIDENCIAS ==== */

function leerIncidencias(){
  return JSON.parse(localStorage.getItem("incidencias") || "[]");
}

function cambioProveedor(){

  let proveedor = document.getElementById("proveedor").value;
  let incidencias = leerIncidencias();

  let abiertas = incidencias.filter(i =>
    i.proveedor === proveedor && !i.resuelta
  );

  let aviso = document.getElementById("avisoIncidencias");

  if(abiertas.length){
    aviso.innerHTML = `
      <div class="aviso">
        ⚠ ${proveedor} tiene ${abiertas.length} incidencia${abiertas.length===1?"":"s"} abierta${abiertas.length===1?"":"s"}
      </div>`;
  }else{
    aviso.innerHTML = "";
  }

}

/* ==== LINEAS ==== */

function agregarLinea(){

  lineas.push({
    articulo:"",
    cantidad:0,
    precio:0
  });

  pintarLineas();
}

function pintarLineas(){

  let html = "";

  lineas.forEach((l,i)=>{

    html += `
    <div class="linea">

      <input placeholder="Artículo"
        value="${l.articulo}"
        onchange="cambiar(${i},'articulo',this.value)">

      <input type="number" placeholder="Cantidad"
        value="${l.cantidad}"
        onchange="cambiar(${i},'cantidad',this.value)">

      <input type="number" placeholder="Precio sin IVA"
        value="${l.precio}"
        onchange="cambiar(${i},'precio',this.value)">

    </div>
    `;
  });

  document.getElementById("lineas").innerHTML = html;

  calcular();
}

function cambiar(i,campo,valor){
  lineas[i][campo] = campo === "articulo" ? valor : Number(valor);
  calcular();
}

/* ==== TOTAL ==== */

function calcular(){

  let total = 0;

  lineas.forEach(l=>{
    total += l.cantidad * l.precio;
  });

  document.getElementById("total").innerHTML =
    "TOTAL (sin IVA): " + total.toFixed(2) + " €";
}

/* ==== GUARDAR ==== */

function guardarPedido(){

  let proveedor = document.getElementById("proveedor").value;

  if(!proveedor){
    alert("Selecciona proveedor");
    return;
  }

  if(!lineas.length){
    alert("Añade líneas");
    return;
  }

  let pagos = JSON.parse(localStorage.getItem("pagos_pendientes") || "[]");

  let pedido = {
    proveedor: proveedor,
    fecha: new Date().toLocaleString(),
    lineas: lineas,
    total: lineas.reduce((t,l)=>t+(l.cantidad*l.precio),0)
  };

  pagos.unshift(pedido);

  localStorage.setItem("pagos_pendientes", JSON.stringify(pagos));

  alert("Pedido guardado en pagos");

  location.reload();
}

</script>

</body>
</html>
