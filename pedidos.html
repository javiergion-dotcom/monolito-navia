<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PEDIDOS</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef3f5;
}

.barra{
  background:#14313d;
  color:white;
  padding:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:26px;
  font-weight:bold;
}

.barra span{
  font-size:38px;
  cursor:pointer;
}

.container{
  padding:16px;
}

select,input{
  width:100%;
  padding:14px;
  margin:6px 0;
  font-size:18px;
  border-radius:10px;
  border:1px solid #ccc;
}

.boton{
  width:100%;
  padding:16px;
  border-radius:12px;
  border:0;
  font-size:20px;
  font-weight:bold;
  margin-top:10px;
  cursor:pointer;
}

.verde{ background:#4b8f36; color:white; }
.azul{ background:#14313d; color:white; }
.rojo{ background:#b8332f; color:white; }

.aviso{
  display:none;
  background:#fff3cd;
  padding:12px;
  border-radius:10px;
  font-weight:bold;
  margin-top:6px;
}

table{
  width:100%;
  margin-top:10px;
  border-collapse:collapse;
  background:white;
  border-radius:12px;
  overflow:hidden;
}

th,td{
  padding:10px;
  text-align:center;
  border-bottom:1px solid #eee;
}

.total{
  font-size:20px;
  font-weight:bold;
  margin-top:12px;
}

.admin{
  display:none;
}

.admin-activo .admin{
  display:block;
}
</style>
</head>

<body>

<div class="barra">
  <span onclick="history.back()">←</span>
  PEDIDOS
  <span onclick="activarAdmin()">🔒</span>
</div>

<div class="container">

<select id="proveedor"></select>

<select id="articulo"></select>

<div id="aviso" class="aviso"></div>

<input type="number" id="cantidad" placeholder="Cantidad">

<button class="boton verde" onclick="añadir()">+ AÑADIR PRODUCTO</button>

<table>
<thead>
<tr>
<th>Artículo</th>
<th>Ud</th>
<th>Precio</th>
<th>IVA</th>
<th>Total</th>
<th class="admin">X</th>
</tr>
</thead>

<tbody id="lineas"></tbody>
</table>

<div class="total">Subtotal: <span id="subtotal">0</span> €</div>
<div>IVA 4%: <span id="iva4">0</span></div>
<div>IVA 10%: <span id="iva10">0</span></div>
<div>IVA 21%: <span id="iva21">0</span></div>
<div class="total">TOTAL: <span id="total">0</span> €</div>

<button class="boton azul" onclick="validarPedido()">VALIDAR PEDIDO</button>

</div>

<script>

const PIN="1234";

let admin=false;
let lineas=[];

let proveedores=JSON.parse(localStorage.getItem("proveedores")||"[]");
let articulos=JSON.parse(localStorage.getItem("articulos")||"[]");

function cargarProveedores(){
  let sel=document.getElementById("proveedor");
  sel.innerHTML="<option>Proveedor</option>";

  proveedores.forEach(p=>{
    let op=document.createElement("option");
    op.value=p.nombre;
    op.textContent=p.nombre;
    sel.appendChild(op);
  });
}

function cargarArticulos(){
  let prov=document.getElementById("proveedor").value;
  let sel=document.getElementById("articulo");
  sel.innerHTML="";

  articulos.filter(a=>a.proveedor===prov)
  .forEach(a=>{
    let op=document.createElement("option");
    op.value=a.nombre;
    op.textContent=a.nombre;
    sel.appendChild(op);
  });

  avisarOferta();
}

document.getElementById("proveedor").onchange=cargarArticulos;
document.getElementById("articulo").onchange=avisarOferta;

function avisarOferta(){
  let nombre=document.getElementById("articulo").value;
  let art=articulos.find(a=>a.nombre===nombre);
  let aviso=document.getElementById("aviso");

  if(art && art.oferta){
    aviso.style.display="block";
    aviso.innerText="⚠ OFERTA: "+art.oferta;
  }else{
    aviso.style.display="none";
  }
}

function añadir(){

  let nombre=document.getElementById("articulo").value;
  let cantidad=Number(document.getElementById("cantidad").value);

  if(!nombre || cantidad<=0) return;

  let art=articulos.find(a=>a.nombre===nombre);

  lineas.push({
    nombre,
    cantidad,
    precio:art.precio,
    iva:art.iva,
    oferta:art.oferta
  });

  pintar();
}

function pintar(){

  let tbody=document.getElementById("lineas");
  tbody.innerHTML="";

  let subtotal=0,iva4=0,iva10=0,iva21=0;

  lineas.forEach((l,i)=>{

    let total=l.cantidad*l.precio;
    subtotal+=total;

    if(l.iva==4) iva4+=total*0.04;
    if(l.iva==10) iva10+=total*0.10;
    if(l.iva==21) iva21+=total*0.21;

    let tr=document.createElement("tr");

    tr.innerHTML=`
      <td>${l.nombre}${l.oferta?" ⚠":""}</td>
      <td>${l.cantidad}</td>
      <td>${l.precio.toFixed(2)}</td>
      <td>${l.iva}%</td>
      <td>${total.toFixed(2)}</td>
      <td class="admin"><button onclick="borrar(${i})">X</button></td>
    `;

    tbody.appendChild(tr);
  });

  let total=subtotal+iva4+iva10+iva21;

  document.getElementById("subtotal").innerText=subtotal.toFixed(2);
  document.getElementById("iva4").innerText=iva4.toFixed(2);
  document.getElementById("iva10").innerText=iva10.toFixed(2);
  document.getElementById("iva21").innerText=iva21.toFixed(2);
  document.getElementById("total").innerText=total.toFixed(2);
}

function borrar(i){
  if(!admin) return alert("Solo admin");
  lineas.splice(i,1);
  pintar();
}

function validarPedido(){

  let proveedor=document.getElementById("proveedor").value;

  if(!proveedor) return alert("Selecciona proveedor");
  if(lineas.length==0) return alert("Sin productos");

  let total=document.getElementById("total").innerText;

  let ok=confirm("¿Confirmas pedido?\n\n"+proveedor+"\n"+total+" €");

  if(!ok) return;

  cerrarPedido();
}

function cerrarPedido(){

  let proveedor=document.getElementById("proveedor").value;
  let total=document.getElementById("total").innerText;

  let pagos=JSON.parse(localStorage.getItem("pagos")||"[]");

  pagos.push({
    proveedor,
    total,
    fecha:new Date().toLocaleDateString(),
    estado:"pendiente"
  });

  localStorage.setItem("pagos",JSON.stringify(pagos));

  alert("Pedido enviado a pagos");

  lineas=[];
  pintar();
}

function activarAdmin(){
  let pin=prompt("PIN");
  if(pin!==PIN) return alert("Incorrecto");

  admin=!admin;
  document.body.classList.toggle("admin-activo");
}

cargarProveedores();

</script>

</body>
</html>
