<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PEDIDOS</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#eef3f5;
  color:#222;
}

.barra{
  background:#17303d;
  color:white;
  padding:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:28px;
  font-weight:bold;
}

.barra span{
  font-size:40px;
  cursor:pointer;
}

.container{
  padding:16px;
}

select,input{
  width:100%;
  padding:14px;
  margin:7px 0;
  font-size:20px;
  border-radius:12px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:16px;
  border-radius:14px;
  border:0;
  font-size:22px;
  font-weight:bold;
  margin-top:10px;
  cursor:pointer;
}

.verde{
  background:#4b8f36;
  color:white;
}

.azul{
  background:#17303d;
  color:white;
}

.rojo{
  background:#b8332f;
  color:white;
}

.aviso{
  display:none;
  background:#fff3cd;
  color:#7a4b00;
  padding:14px;
  border-radius:12px;
  font-weight:bold;
  margin:8px 0;
  font-size:18px;
}

table{
  width:100%;
  margin-top:14px;
  border-collapse:collapse;
  background:white;
  border-radius:14px;
  overflow:hidden;
}

th{
  background:#17303d;
  color:white;
  padding:10px;
  font-size:16px;
}

td{
  padding:10px;
  text-align:center;
  border-bottom:1px solid #eee;
  font-size:17px;
}

td:first-child{
  text-align:left;
  font-weight:bold;
}

.resumen{
  background:white;
  padding:16px;
  border-radius:16px;
  margin-top:16px;
  font-size:22px;
  line-height:1.7;
}

.resumen strong{
  font-size:25px;
}

.admin{
  display:none;
}

.admin-activo .admin{
  display:table-cell;
}
</style>
</head>

<body>

<div class="barra">
  <span onclick="volver()">←</span>
  <div>PEDIDOS</div>
  <span onclick="activarAdmin()">🔒</span>
</div>

<div class="container">

<select id="proveedor"></select>

<select id="articulo"></select>

<div id="aviso" class="aviso"></div>

<input type="number" id="cantidad" placeholder="Cantidad" min="0" step="1">

<button class="verde" onclick="anadirProducto()">+ AÑADIR PRODUCTO</button>

<table>
<thead>
<tr>
  <th>Artículo</th>
  <th>Ud</th>
  <th>Precio</th>
  <th>IVA</th>
  <th>Total</th>
  <th class="admin">X</th>
</tr>
</thead>

<tbody id="lineas"></tbody>
</table>

<div class="resumen">
  <div><strong>Subtotal sin IVA:</strong> <span id="subtotal">0,00</span> €</div>
  <div>IVA 4%: <span id="iva4">0,00</span> €</div>
  <div>IVA 10%: <span id="iva10">0,00</span> €</div>
  <div>IVA 21%: <span id="iva21">0,00</span> €</div>
  <hr>
  <div><strong>TOTAL PEDIDO:</strong> <span id="total">0,00</span> €</div>
</div>

<button class="azul" onclick="validarPedido()">VALIDAR PEDIDO</button>

</div>

<script>
const PIN = "1234";

let admin = false;
let lineasPedido = [];

let proveedores = JSON.parse(localStorage.getItem("proveedores") || "[]");
let articulos = JSON.parse(localStorage.getItem("articulos") || "[]");

function volver(){
  history.back();
}

function formato(numero){
  return Number(numero || 0).toFixed(2).replace(".", ",");
}

function numero(valor){
  if(valor === undefined || valor === null || valor === "") return 0;
  return Number(String(valor).replace(",", "."));
}

function cargarProveedores(){
  const sel = document.getElementById("proveedor");
  sel.innerHTML = '<option value="">Seleccionar proveedor</option>';

  proveedores.forEach(p=>{
    const op = document.createElement("option");
    op.value = p.nombre;
    op.textContent = p.nombre;
    sel.appendChild(op);
  });

  cargarArticulos();
}

function cargarArticulos(){
  const prov = document.getElementById("proveedor").value;
  const sel = document.getElementById("articulo");

  sel.innerHTML = '<option value="">Seleccionar artículo</option>';

  articulos
    .filter(a => a.proveedor === prov)
    .forEach(a=>{
      const op = document.createElement("option");
      op.value = a.nombre;
      op.textContent = a.nombre;
      sel.appendChild(op);
    });

  avisarOferta();
}

function buscarArticulo(){
  const prov = document.getElementById("proveedor").value;
  const nombre = document.getElementById("articulo").value;

  return articulos.find(a => a.proveedor === prov && a.nombre === nombre);
}

function avisarOferta(){
  const art = buscarArticulo();
  const aviso = document.getElementById("aviso");

  if(art && art.oferta){
    aviso.style.display = "block";
    aviso.innerText = "⚠ OFERTA ACTIVA: " + art.oferta;
  }else{
    aviso.style.display = "none";
    aviso.innerText = "";
  }
}

function anadirProducto(){
  const proveedor = document.getElementById("proveedor").value;
  const nombre = document.getElementById("articulo").value;
  const cantidad = numero(document.getElementById("cantidad").value);

  if(!proveedor){
    alert("Selecciona proveedor");
    return;
  }

  if(!nombre){
    alert("Selecciona artículo");
    return;
  }

  if(cantidad <= 0){
    alert("La cantidad tiene que ser mayor que 0");
    return;
  }

  const art = buscarArticulo();

  if(!art){
    alert("No encuentro el artículo");
    return;
  }

  lineasPedido.push({
    nombre: art.nombre,
    cantidad: cantidad,
    precio: numero(art.precio),
    iva: numero(art.iva),
    oferta: art.oferta || ""
  });

  document.getElementById("cantidad").value = "";
  pintarLineas();
}

function pintarLineas(){
  const tbody = document.getElementById("lineas");
  tbody.innerHTML = "";

  lineasPedido.forEach((l,i)=>{
    const totalLinea = numero(l.cantidad) * numero(l.precio);

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${l.nombre}${l.oferta ? " ⚠" : ""}</td>
      <td>${l.cantidad}</td>
      <td>${formato(l.precio)} €</td>
      <td>${l.iva}%</td>
      <td>${formato(totalLinea)} €</td>
      <td class="admin">
        <button class="rojo" onclick="borrarLinea(${i})">X</button>
      </td>
    `;

    tbody.appendChild(tr);
  });

  calcularTotales();
}

function calcularTotales(){
  let subtotal = 0;
  let iva4 = 0;
  let iva10 = 0;
  let iva21 = 0;

  lineasPedido.forEach(l=>{
    const base = numero(l.cantidad) * numero(l.precio);
    const iva = numero(l.iva);

    subtotal += base;

    if(iva === 4) iva4 += base * 0.04;
    if(iva === 10) iva10 += base * 0.10;
    if(iva === 21) iva21 += base * 0.21;
  });

  const total = subtotal + iva4 + iva10 + iva21;

  document.getElementById("subtotal").innerText = formato(subtotal);
  document.getElementById("iva4").innerText = formato(iva4);
  document.getElementById("iva10").innerText = formato(iva10);
  document.getElementById("iva21").innerText = formato(iva21);
  document.getElementById("total").innerText = formato(total);
}

function borrarLinea(i){
  if(!admin){
    alert("Solo administrador");
    return;
  }

  lineasPedido.splice(i,1);
  pintarLineas();
}

function validarPedido(){
  const proveedor = document.getElementById("proveedor").value;

  if(!proveedor){
    alert("Selecciona proveedor");
    return;
  }

  if(lineasPedido.length === 0){
    alert("No hay productos en el pedido");
    return;
  }

  calcularTotales();

  const total = document.getElementById("total").innerText;

  const ok = confirm(
    "¿Confirmas el pedido?\n\nProveedor: " + proveedor +
    "\nTotal: " + total + " €"
  );

  if(!ok) return;

  cerrarPedido();
}

function cerrarPedido(){
  const proveedor = document.getElementById("proveedor").value;
  const total = document.getElementById("total").innerText;

  const pedidos = JSON.parse(localStorage.getItem("pedidos") || "[]");
  const pagos = JSON.parse(localStorage.getItem("pagos") || "[]");

  pedidos.push({
    fecha: new Date().toLocaleDateString("es-ES"),
    proveedor: proveedor,
    lineas: lineasPedido,
    total: total,
    estado: "cerrado"
  });

  pagos.push({
    fecha: new Date().toLocaleDateString("es-ES"),
    proveedor: proveedor,
    importe: total,
    estado: "pendiente"
  });

  localStorage.setItem("pedidos", JSON.stringify(pedidos));
  localStorage.setItem("pagos", JSON.stringify(pagos));

  alert("Pedido cerrado y enviado a pagos");

  lineasPedido = [];
  pintarLineas();
}

function activarAdmin(){
  const pin = prompt("PIN administrador");

  if(pin !== PIN){
    alert("Código incorrecto");
    return;
  }

  admin = !admin;

  if(admin){
    document.body.classList.add("admin-activo");
    alert("Administrador activado");
  }else{
    document.body.classList.remove("admin-activo");
    alert("Administrador desactivado");
  }
}

document.getElementById("proveedor").addEventListener("change", cargarArticulos);
document.getElementById("articulo").addEventListener("change", avisarOferta);

cargarProveedores();
calcularTotales();
</script>

</body>
</html>
