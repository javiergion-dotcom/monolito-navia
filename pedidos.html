<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEDIDOS</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f5;
}

header{
  background:#17303d;
  color:white;
  padding:14px;
  display:flex;
  justify-content:space-between;
}

.contenido{
  padding:16px;
}

.bloque{
  background:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:12px;
}

select, input{
  width:100%;
  padding:10px;
  font-size:16px;
  margin-top:6px;
}

table{
  width:100%;
  border-collapse:collapse;
}

td{
  padding:8px;
}

input[type=number]{
  width:60px;
}

.total{
  font-size:18px;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
  <div id="usuario">OPERADOR</div>
  <div id="fecha"></div>
</header>

<div class="contenido">

<div class="bloque">
  PROVEEDOR
  <select id="proveedor" onchange="cargarArticulos()">
    <option>Cafés Candelas</option>
    <option>Turrado (Mahou)</option>
  </select>
</div>

<div class="bloque">
  <table id="tabla"></table>
</div>

<div class="bloque total" id="total"></div>

</div>

<script>

let datos = {
  "Cafés Candelas":[
    {nombre:"Café mezcla", precio:17},
    {nombre:"Café natural", precio:18.5},
    {nombre:"Descafeinado", precio:19}
  ],
  "Turrado (Mahou)":[
    {nombre:"Barril 50L", precio:78},
    {nombre:"Caja tercios", precio:16},
    {nombre:"Caja quintos", precio:14.5}
  ]
};

function cargarUsuario(){
  document.getElementById("usuario").innerText =
    localStorage.getItem("usuario") || "OPERADOR";
}

function fecha(){
  let d = new Date();
  document.getElementById("fecha").innerText =
    d.toLocaleDateString() + " " + d.toLocaleTimeString();
}

function cargarArticulos(){
  let prov = document.getElementById("proveedor").value;
  let tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  datos[prov].forEach((a,i)=>{
    tabla.innerHTML += `
    <tr>
      <td><input type="number" value="0" onchange="calcular()"></td>
      <td>${a.nombre}</td>
      <td>${a.precio}</td>
      <td class="imp">0</td>
    </tr>`;
  });
}

function calcular(){
  let filas = document.querySelectorAll("#tabla tr");
  let prov = document.getElementById("proveedor").value;

  let total = 0;

  filas.forEach((f,i)=>{
    let unidades = f.children[0].children[0].value;
    let precio = datos[prov][i].precio;
    let imp = unidades * precio;

    f.children[3].innerText = imp.toFixed(2);
    total += imp;
  });

  document.getElementById("total").innerText =
    "TOTAL: " + total.toFixed(2) + " €";
}

cargarUsuario();
fecha();
cargarArticulos();

</script>

</body>
</html>
