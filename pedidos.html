<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEDIDOS - MONOLITO</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#eef3f5;
  color:#2b2b2b;
}

.barra{
  height:76px;
  background:#14313d;
  color:white;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 26px;
  font-size:34px;
  font-weight:bold;
}

.flecha{
  font-size:46px;
  cursor:pointer;
}

.mas{
  font-size:46px;
  cursor:pointer;
}

.contenedor{
  padding:26px;
}

.tarjeta{
  background:white;
  border-radius:28px;
  padding:28px;
  margin-bottom:26px;
  box-shadow:0 8px 22px rgba(0,0,0,.08);
}

.titulo{
  font-size:32px;
  font-weight:bold;
  margin-bottom:22px;
}

.campo{
  width:100%;
  padding:18px;
  margin:10px 0;
  font-size:22px;
  border-radius:14px;
  border:1px solid #ddd;
  box-sizing:border-box;
}

.linea{
  background:#f7f7f7;
  border-radius:18px;
  padding:18px;
  margin-bottom:16px;
  border-left:16px solid #14313d;
}

.linea-total{
  font-size:24px;
  font-weight:bold;
  margin-top:10px;
}

.boton{
  width:100%;
  padding:22px;
  border:0;
  border-radius:18px;
  margin-top:18px;
  font-size:26px;
  font-weight:bold;
  cursor:pointer;
}

.verde{
  background:#4b8f36;
  color:white;
}

.azul{
  background:#14313d;
  color:white;
}

.gris{
  background:#d7dbe1;
  color:#111;
}

.rojo{
  background:#b8332f;
  color:white;
}

.resumen{
  font-size:26px;
  line-height:1.7;
}

.resumen strong{
  font-size:30px;
}

.oculto{
  display:none;
}

.alerta{
  margin-top:20px;
  padding:18px;
  border-radius:18px;
  font-size:24px;
  font-weight:bold;
}

.alerta-roja{
  background:#ffe0e0;
  color:#9b0000;
}

.alerta-ok{
  background:#e0ffe4;
  color:#146b22;
}
</style>
</head>

<body>

<div class="barra">
  <div class="flecha" onclick="volver()">←</div>
  <div>PEDIDOS</div>
  <div class="mas" onclick="activarAdmin()">🔒</div>
</div>

<div class="contenedor">

  <div class="tarjeta">
    <div class="titulo">Nuevo pedido</div>

    <select id="proveedorPedido" class="campo" onchange="cargarArticulosProveedor()">
      <option value="">Seleccionar proveedor</option>
    </select>

    <button class="boton verde" onclick="añadirLinea()">+ AÑADIR ARTÍCULO</button>
  </div>

  <div class="tarjeta">
    <div class="titulo">Líneas del pedido</div>
    <div id="lineasPedido"></div>
  </div>

  <div class="tarjeta resumen">
    <div><strong>Subtotal sin IVA:</strong> <span id="subtotal">0,00</span> €</div>
    <div>IVA 4%: <span id="iva4">0,00</span> €</div>
    <div>IVA 10%: <span id="iva10">0,00</span> €</div>
    <div>IVA 21%: <span id="iva21">0,00</span> €</div>
    <hr>
    <div><strong>Total:</strong> <span id="total">0,00</span> €</div>
  </div>

  <div class="tarjeta">
    <div class="titulo">Control factura</div>

    <input id="totalFactura" class="campo" type="number" step="0.01" placeholder="Total factura proveedor">

    <button class="boton azul" onclick="validarFactura()">VALIDAR FACTURA</button>

    <div id="mensajeIncidencia"></div>
  </div>

</div>

<script>
const PIN_ADMIN = "1234";
let adminActivo = false;
let lineas = [];

/* Carga datos ya existentes */
let proveedores = JSON.parse(localStorage.getItem("proveedores") || "[]");
let articulos = JSON.parse(localStorage.getItem("articulos") || "[]");

/* Si tus claves tienen otro nombre, esto intenta recuperarlas */
if(proveedores.length === 0){
  proveedores = JSON.parse(localStorage.getItem("listaProveedores") || "[]");
}
if(articulos.length === 0){
  articulos = JSON.parse(localStorage.getItem("listaArticulos") || "[]");
}

function formato(num){
  return Number(num || 0).toFixed(2).replace(".", ",");
}

function volver(){
  window.location.href = "index.html";
}

function cargarProveedores(){
  const select = document.getElementById("proveedorPedido");
  select.innerHTML = '<option value="">Seleccionar proveedor</option>';

  proveedores.forEach(p=>{
    const nombre = p.nombre || p.proveedor || p.name;
    if(!nombre) return;

    const op = document.createElement("option");
    op.value = nombre;
    op.textContent = nombre;
    select.appendChild(op);
  });
}

function articulosDelProveedor(){
  const proveedor = document.getElementById("proveedorPedido").value;

  return articulos.filter(a=>{
    const provArticulo = a.proveedor || a.proveedorNombre || a.nombreProveedor;
    return provArticulo === proveedor;
  });
}

function cargarArticulosProveedor(){
  lineas = [];
  pintarLineas();
  calcular();
}

function añadirLinea(){
  const proveedor = document.getElementById("proveedorPedido").value;

  if(!proveedor){
    alert("Primero selecciona proveedor");
    return;
  }

  const lista = articulosDelProveedor();

  if(lista.length === 0){
    alert("Este proveedor no tiene artículos creados");
    return;
  }

  lineas.push({
    articulo:"",
    unidades:1
  });

  pintarLineas();
}

function pintarLineas(){
  const cont = document.getElementById("lineasPedido");
  cont.innerHTML = "";

  const lista = articulosDelProveedor();

  lineas.forEach((linea, index)=>{
    const div = document.createElement("div");
    div.className = "linea";

    const articuloSeleccionado = lista.find(a => (a.nombre || a.articulo || a.name) === linea.articulo);
    const color = articuloSeleccionado?.color || articuloSeleccionado?.colorProveedor || "#14313d";
    div.style.borderLeftColor = color;

    let opciones = '<option value="">Seleccionar artículo</option>';

    lista.forEach(a=>{
      const nombre = a.nombre || a.articulo || a.name;
      opciones += `<option value="${nombre}" ${linea.articulo === nombre ? "selected" : ""}>${nombre}</option>`;
    });

    div.innerHTML = `
      <select class="campo" onchange="cambiarArticulo(${index}, this.value)">
        ${opciones}
      </select>

      <input class="campo" type="number" min="0" step="1" value="${linea.unidades}" 
      placeholder="Unidades" oninput="cambiarUnidades(${index}, this.value)">

      <div class="linea-total">
        Total línea: ${formato(calcularLinea(index))} €
      </div>

      <button class="boton rojo ${adminActivo ? "" : "oculto"}" onclick="eliminarLinea(${index})">
        ELIMINAR
      </button>
    `;

    cont.appendChild(div);
  });
}

function cambiarArticulo(index, valor){
  lineas[index].articulo = valor;
  pintarLineas();
  calcular();
}

function cambiarUnidades(index, valor){
  lineas[index].unidades = Number(valor || 0);
  pintarLineas();
  calcular();
}

function datosArticulo(nombre){
  return articulos.find(a=>{
    const n = a.nombre || a.articulo || a.name;
    return n === nombre;
  });
}

function calcularLinea(index){
  const linea = lineas[index];
  const art = datosArticulo(linea.articulo);

  if(!art) return 0;

  const precio = Number(art.precio || art.precioSinIva || art.precio_compra || 0);
  return Number(linea.unidades || 0) * precio;
}

function calcular(){
  let subtotal = 0;
  let iva4 = 0;
  let iva10 = 0;
  let iva21 = 0;

  lineas.forEach((linea, index)=>{
    const art = datosArticulo(linea.articulo);
    if(!art) return;

    const base = calcularLinea(index);
    const iva = Number(art.iva || art.tipoIva || 10);

    subtotal += base;

    if(iva === 4) iva4 += base * 0.04;
    if(iva === 10) iva10 += base * 0.10;
    if(iva === 21) iva21 += base * 0.21;
  });

  const total = subtotal + iva4 + iva10 + iva21;

  document.getElementById("subtotal").textContent = formato(subtotal);
  document.getElementById("iva4").textContent = formato(iva4);
  document.getElementById("iva10").textContent = formato(iva10);
  document.getElementById("iva21").textContent = formato(iva21);
  document.getElementById("total").textContent = formato(total);
}

function validarFactura(){
  calcular();

  const totalSistema = Number(
    document.getElementById("total").textContent.replace(",", ".")
  );

  const totalFactura = Number(document.getElementById("totalFactura").value || 0);
  const cont = document.getElementById("mensajeIncidencia");

  if(!totalFactura){
    alert("Introduce el total de la factura");
    return;
  }

  const diferencia = totalFactura - totalSistema;

  if(Math.abs(diferencia) > 0.01){
    cont.className = "alerta alerta-roja";
    cont.textContent = "⚠ INCIDENCIA: diferencia de " + formato(diferencia) + " €";
  }else{
    cont.className = "alerta alerta-ok";
    cont.textContent = "✔ Pedido correcto. No hay diferencia.";
  }
}

function activarAdmin(){
  const pin = prompt("Código administrador");

  if(pin !== PIN_ADMIN){
    alert("Código incorrecto");
    return;
  }

  adminActivo = !adminActivo;
  pintarLineas();

  alert(adminActivo ? "Administrador activado" : "Administrador desactivado");
}

cargarProveedores();
calcular();
</script>

</body>
</html>
