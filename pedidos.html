<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f7f8;
}

/* HEADER */
header{
    background:#17303d;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

/* PROVEEDORES */
.zona-proveedores{
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding:15px;
}

.proveedor{
    min-width:180px;
    padding:15px;
    border-radius:15px;
    cursor:pointer;
    text-align:center;
    font-weight:bold;
}

/* COLORES SUAVES */
.cafe{ background:#ede4d8; }
.gris{ background:#f0f1f2; }
.carton{ background:#f3e7d3; }
.blanco{ background:#f7f7f5; }
.mostaza{ background:#f3ecd2; }

/* HOJA PEDIDO */
.hoja{
    display:none;
    padding:15px;
}

.nombre-proveedor{
    font-size:22px;
    margin-bottom:10px;
}

table{
    width:100%;
    border-collapse:collapse;
}

td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

input{
    width:60px;
}

/* BOTONES */
.botones{
    margin-top:15px;
    display:flex;
    gap:10px;
}

button{
    flex:1;
    padding:15px;
    border:none;
    border-radius:10px;
    font-weight:bold;
}

.guardar{ background:#4f8a3a; color:white; }
.borrar{ background:#b04b4b; color:white; }

.totales{
    margin-top:15px;
    padding:15px;
    background:white;
    border-radius:10px;
}
</style>
</head>

<body>

<header>
    <div>PEDIDOS</div>
    <div id="fecha"></div>
</header>

<div id="zonaProveedores" class="zona-proveedores"></div>

<div id="hoja" class="hoja">
    <div class="nombre-proveedor" id="nombre"></div>

    <table id="tabla"></table>

    <div class="totales" id="totales"></div>

    <div class="botones">
        <button class="guardar" onclick="cerrarPedido()">GUARDAR PEDIDO</button>
        <button class="borrar" onclick="volver()">VOLVER</button>
    </div>
</div>

<script>
let proveedorActivo = "";
let pedidoActivo = false;

/* DATOS */
const proveedores = {
    "Mahou": {
        color:"cafe",
        articulos:[
            {nombre:"Barril 50L", precio:78, iva:21},
            {nombre:"Caja tercios", precio:16, iva:21}
        ]
    },
    "Cafés": {
        color:"mostaza",
        articulos:[
            {nombre:"Café natural", precio:12, iva:10}
        ]
    }
};

/* FECHA */
function fecha(){
    document.getElementById("fecha").innerText =
    new Date().toLocaleString();
}

/* PINTAR PROVEEDORES */
function pintarProveedores(){
    let zona = document.getElementById("zonaProveedores");
    zona.innerHTML="";

    for(let p in proveedores){
        let check = localStorage.getItem("pedido_"+p) ? "✔️" : "";

        zona.innerHTML += `
        <div class="proveedor ${proveedores[p].color}" onclick="abrir('${p}')">
            ${p}<br>${check}
        </div>`;
    }
}

/* ABRIR PROVEEDOR */
function abrir(p){
    if(pedidoActivo){
        if(!confirm("Tienes un pedido abierto")) return;
    }

    proveedorActivo = p;
    pedidoActivo = false;

    document.getElementById("zonaProveedores").style.display="none";
    document.getElementById("hoja").style.display="block";
    document.getElementById("nombre").innerText = p;

    pintarTabla();
}

/* TABLA */
function pintarTabla(){
    let tabla = document.getElementById("tabla");
    tabla.innerHTML="";

    let guardado = JSON.parse(localStorage.getItem("pedido_"+proveedorActivo) || "[]");

    proveedores[proveedorActivo].articulos.forEach((a,i)=>{

        let u = guardado[i] || "";

        tabla.innerHTML += `
        <tr>
            <td><input type="number" value="${u}" oninput="calcular()"></td>
            <td>${a.nombre}</td>
            <td>${a.precio}</td>
            <td class="imp"></td>
        </tr>`;
    });

    calcular();
}

/* CALCULAR */
function calcular(){
    let filas = document.querySelectorAll("#tabla tr");
    let subtotal = 0;
    let ivaTotal = 0;
    let datos = [];

    filas.forEach((f,i)=>{
        let u = f.children[0].children[0].value;

        if(u > 0){
            pedidoActivo = true;

            let art = proveedores[proveedorActivo].articulos[i];
            let base = u * art.precio;
            let iva = base * art.iva /100;

            subtotal += base;
            ivaTotal += iva;

            f.children[3].innerText = base.toFixed(2);

            datos[i] = u;
        }else{
            f.children[3].innerText="";
        }
    });

    localStorage.setItem("pedido_"+proveedorActivo, JSON.stringify(datos));

    let total = subtotal + ivaTotal;

    document.getElementById("totales").innerHTML =
    "SUBTOTAL: "+subtotal.toFixed(2)+" €<br>"+
    "IVA: "+ivaTotal.toFixed(2)+" €<br>"+
    "TOTAL: "+total.toFixed(2)+" €";
}

/* CERRAR PEDIDO */
function cerrarPedido(){
    if(!pedidoActivo){
        alert("No hay pedido");
        return;
    }

    if(!confirm("¿Seguro cerrar pedido?")) return;
    if(!confirm("Se enviará a histórico y pagos")) return;

    localStorage.removeItem("pedido_"+proveedorActivo);

    pedidoActivo = false;

    alert("Pedido guardado");

    volver();
}

/* VOLVER */
function volver(){
    document.getElementById("zonaProveedores").style.display="flex";
    document.getElementById("hoja").style.display="none";
    proveedorActivo="";
    pintarProveedores();
}

/* INIT */
fecha();
pintarProveedores();
</script>

</body>
</html>
