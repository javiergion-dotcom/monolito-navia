<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEDIDOS · MONOLITO</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f5;color:#17303d}
header{background:#17303d;color:white;padding:16px;font-weight:900;font-size:20px}
.contenedor{padding:16px}
select{width:100%;padding:12px;border-radius:14px;margin-bottom:15px;font-size:16px}
.card{background:white;border-radius:16px;padding:12px;margin-bottom:10px}
.card.costeCero{border:3px solid #ff9800;background:#fff8ea}
.nombre{font-weight:900;font-size:17px}
.detalle{color:#4f5f69;font-size:14px;margin-top:4px}
.fila{display:flex;justify-content:space-between;align-items:center;margin-top:8px;gap:10px}
input{width:80px;padding:10px;border-radius:12px;border:1px solid #ccc;text-align:center;font-size:16px}
.totalLinea{font-weight:900;font-size:16px}
.avisoCero{margin-top:8px;color:#c06b00;font-weight:900;font-size:13px}
.botonCero{width:100%;margin-top:10px;padding:10px;border:0;border-radius:12px;font-weight:900;font-size:14px;background:#17303d;color:white}
.botonCero.activo{background:#ff9800;color:white}
.totalFinal{font-size:22px;font-weight:900;margin-top:20px}
button{width:100%;padding:14px;margin-top:15px;border:0;border-radius:14px;font-weight:900;font-size:16px;cursor:pointer}
.guardar{background:#48a530;color:white}
.volver{background:white;color:#17303d;width:auto;margin:0 10px 0 0;padding:7px 11px}
.promo{margin-top:10px;background:#fff6cf;border:2px solid #ffe066;border-radius:12px;padding:10px;font-size:13px;font-weight:900;color:#8a6a00}
.promoOk{margin-top:8px;background:#e5ffe5;border:2px solid #8bd98b;border-radius:12px;padding:9px;font-size:13px;font-weight:900;color:#1a7f1a}
.promoAlerta{margin-top:8px;background:#ffe5e5;border:2px solid #ff9b9b;border-radius:12px;padding:9px;font-size:13px;font-weight:900;color:#c00000}
.stockBox{margin-top:10px;background:#eef7ff;border:2px solid #cfe5ff;border-radius:12px;padding:10px}
.stockTitulo{font-size:13px;font-weight:900;margin-bottom:8px}
.stockFila{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stockCol{background:white;border-radius:12px;padding:8px}
.stockCol label{display:block;font-size:12px;font-weight:900;margin-bottom:5px;color:#17303d;text-align:center}
.stockCol input{width:100%}
.totalExistencias{margin-top:10px;background:#17303d;color:white;border-radius:12px;padding:10px;text-align:center;font-weight:900}
.avisosBox{background:#fff8db;border:3px solid #f0c94a;border-radius:18px;padding:14px;margin-bottom:16px}
.avisosTitulo{font-weight:900;font-size:18px;margin-bottom:8px;color:#8a6a00}
.avisoLinea{background:white;border-radius:12px;padding:10px;margin-top:8px;font-weight:900;color:#17303d}
.btnResolverAviso{margin-top:10px;background:#48a530;color:white;border:0;border-radius:12px;padding:10px;font-weight:900;width:100%}
</style>
</head>

<body>

<header>
  <button id="btnVolver" class="volver">←</button>
  📝 PEDIDOS
</header>

<div class="contenedor">

  <div id="avisosPedidos"></div>

  <select id="proveedor"></select>

  <div id="articulos"></div>

  <div class="totalFinal" id="totalFinal">TOTAL PAGO: 0,00 €</div>

  <button id="btnGuardarPedido" class="guardar">Guardar pedido</button>

</div>

<script type="module">
import {
  leerColeccion,
  guardarColeccion,
  escucharColeccion,
  borrarDocumento
} from "./monolito-cloud.js";

let pedido = [];
let articulosGlobal = [];
let proveedoresGlobal = [];
let promocionesGlobal = [];
let avisosCloud = [];
let historicoPedidos = [];
let pagosPendientes = [];

function usuarioActual(){
  return localStorage.getItem("usuario") || "JAVI";
}

function esHostelero(){
  const u = usuarioActual().toUpperCase();
  return u === "JAVI" || u === "JAVIER" || u === "SILVIA";
}

function volver(){
  window.location.href = "index.html";
}

function normalizar(t){
  return String(t || "")
    .trim()
    .toUpperCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

function esc(txt){
  return String(txt || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function crearId(prefijo){
  return String(prefijo || "pedido")
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9]+/g,"_")
    .replace(/^_+|_+$/g,"")
    + "_" + Date.now() + "_" + Math.random().toString(36).slice(2,7);
}

function leerArticulos(){
  return articulosGlobal.filter(a => a.activo !== false);
}

function leerProveedores(){
  let p = proveedoresGlobal.filter(x => x.activo !== false);

  if(p.length === 0){
    p = [
      {nombre:"CANDELAS"},
      {nombre:"TURRADO"},
      {nombre:"SANPEDRO"},
      {nombre:"DEO"}
    ];
  }

  return p;
}

function leerPromociones(){
  return promocionesGlobal || [];
}

function pintarAvisosPedidos(){
  if(avisosCloud.length === 0){
    document.getElementById("avisosPedidos").innerHTML = "";
    return;
  }

  let html = `
    <div class="avisosBox">
      <div class="avisosTitulo">🛎️ AVISOS PARA PEDIDOS</div>
  `;

  avisosCloud.forEach((a)=>{
    html += `
      <div class="avisoLinea">
        🛎️ ${esc(a.texto || "")}
        <button class="btnResolverAviso" data-accion="resolverAviso" data-id="${esc(a.id)}">
          ✅ RESUELTO
        </button>
      </div>
    `;
  });

  html += `</div>`;
  document.getElementById("avisosPedidos").innerHTML = html;
}

async function resolverAvisoPedido(id){
  if(!confirm("¿Eliminar aviso de pedidos?")) return;

  await borrarDocumento("avisos_pedidos", id);
}

function cargarProveedores(){
  const proveedores = leerProveedores();

  document.getElementById("proveedor").innerHTML =
    `<option value="">Selecciona proveedor</option>` +
    proveedores.map(p =>
      `<option value="${esc(p.nombre)}">${esc(p.nombre)}</option>`
    ).join("");
}

function cargarArticulos(){
  const proveedor = document.getElementById("proveedor").value;

  const articulos = leerArticulos().filter(a =>
    normalizar(a.proveedor) === normalizar(proveedor)
  );

  pedido = articulos.map(a => ({
    ...a,
    cantidad:"",
    costeCero:false,
    excluirRappel:false,
    stockActual:"",
    pedir:""
  }));

  pintar();
}

function promoArticulo(a){
  const promos = leerPromociones();

  const nombreArticulo = normalizar(a.articulo);
  const proveedorArticulo = normalizar(a.proveedor);

  const hoy = new Date();
  hoy.setHours(0,0,0,0);

  return promos.find(p => {
    const proveedorPromo = normalizar(p.proveedor);

    if(proveedorPromo !== proveedorArticulo){
      return false;
    }

    const inicio = p.fechaInicio || p.inicio || p.desde || "";
    const fin = p.fechaFin || p.fin || p.hasta || "";

    if(inicio){
      const dInicio = new Date(inicio + "T00:00:00");
      if(hoy < dInicio) return false;
    }

    if(fin){
      const dFin = new Date(fin + "T23:59:59");
      if(hoy > dFin) return false;
    }

    const textoPromo = normalizar(
      (p.articulo || "") + " " +
      (p.producto || "") + " " +
      (p.nombreArticulo || "") + " " +
      (p.promocion || "") + " " +
      (p.nombre || "")
    );

    if(!textoPromo){
      return false;
    }

    return textoPromo.includes(nombreArticulo) ||
           nombreArticulo.includes(textoPromo);
  });
}

function datosPromo(a){
  const promo = promoArticulo(a);

  if(!promo) return null;

  const conCargo = Number(
    promo.unidadesConCargo ||
    promo.conCargo ||
    promo.pagadas ||
    promo.cargo ||
    0
  );

  const gratis = Number(
    promo.unidadesGratis ||
    promo.unidadesCoste0 ||
    promo.sinCargo ||
    promo.gratis ||
    0
  );

  if(conCargo <= 0 || gratis <= 0){
    return null;
  }

  const cantidad = Number(a.pedir || 0);
  const bloques = Math.floor(cantidad / conCargo);
  const resto = cantidad % conCargo;
  const gratisTotal = bloques * gratis;
  const faltan = resto === 0 ? 0 : conCargo - resto;

  let textoPedido = "";

  if(gratisTotal > 0){
    textoPedido = cantidad + " + " + gratisTotal;
  }

  return {
    promo,
    conCargo,
    gratis,
    cantidad,
    bloques,
    resto,
    gratisTotal,
    faltan,
    textoPedido
  };
}

function avisoPromoHTML(a){
  const d = datosPromo(a);

  if(!d) return "";

  let html = `
    <div class="promo">
      🟡 PROMOCIÓN ACTIVA<br>
      ${d.conCargo} + ${d.gratis}
    </div>
  `;

  if(d.cantidad > 0 && d.gratisTotal > 0){
    html += `
      <div class="promoOk">
        ✅ EN PEDIDO: ${d.textoPedido}<br>
        ${d.cantidad} con cargo + ${d.gratisTotal} sin cargo<br>
        Cuenta para RAPPEL: ${d.cantidad + d.gratisTotal}
      </div>
    `;
  }else if(d.cantidad > 0 && d.faltan > 0){
    html += `
      <div class="promoAlerta">
        ⚠ Estás pidiendo ${d.cantidad}.<br>
        Con ${d.conCargo} entra promoción ${d.conCargo} + ${d.gratis}.<br>
        Faltan ${d.faltan}.
      </div>
    `;
  }

  return html;
}

function totalExistencias(a){
  return Number(a.stockActual || 0) + Number(a.pedir || 0);
}

function precioCaja(a){
  return Number(a.precioUnidad || 0) * Number(a.formato || 1);
}

function pintar(){
  let html = "";

  pedido.forEach((a,i)=>{
    const precio = precioCaja(a);
    const lineaPago = a.costeCero ? 0 : Number(a.pedir || 0) * precio;

    html += `
    <div class="card ${a.costeCero ? "costeCero" : ""}">

      <div class="nombre">${esc(a.articulo)}</div>

      <div class="detalle">
        ${esc(a.unidadFormato || "")} ·
        ${Number(a.precioUnidad || 0).toFixed(2)} € ·
        IVA ${Number(a.iva || 21)}%
      </div>

      ${avisoPromoHTML(a)}

      <div class="stockBox">
        <div class="stockTitulo">📦 ALMACÉN / PEDIDO</div>

        <div class="stockFila">

          <div class="stockCol">
            <label>CUÁNTAS HAY</label>
            <input
              type="number"
              placeholder="Hay"
              value="${esc(a.stockActual)}"
              data-accion="stockActual"
              data-indice="${i}"
            >
          </div>

          <div class="stockCol">
            <label>CUÁNTAS PIDO</label>
            <input
              class="cantidadPedido"
              data-accion="stockPedir"
              data-indice="${i}"
              type="number"
              placeholder="Pido"
              value="${esc(a.pedir)}"
            >
          </div>

        </div>

        <div class="totalExistencias" id="existencias${i}">
          TOTAL EXISTENCIAS: ${totalExistencias(a)}
        </div>
      </div>

      <div class="fila">
        <div class="totalLinea" id="t${i}">
          ${lineaPago.toFixed(2)} €
        </div>
      </div>

      ${
        esHostelero()
        ?
        `
          <button
            class="botonCero ${a.costeCero ? "activo" : ""}"
            data-accion="costeCero"
            data-indice="${i}"
          >
            ${a.costeCero ? "✅ COSTE 0 € ACTIVADO" : "Marcar COSTE 0 €"}
          </button>
        `
        : ""
      }

      ${
        a.costeCero
        ?
        `
          <div class="avisoCero">
            COSTE 0 € manual · No suma pagos · No suma RAPPEL
          </div>
        `
        : ""
      }

    </div>
    `;
  });

  document.getElementById("articulos").innerHTML = html;

  calcular();
}

function siguienteConEnter(e,i){
  if(e.key !== "Enter") return;

  e.preventDefault();

  setTimeout(function(){
    const inputs = document.querySelectorAll(".cantidadPedido");

    if(inputs[i+1]){
      inputs[i+1].focus();
      inputs[i+1].select();
    }
  },80);
}

function stockActual(i,v){
  if(!pedido[i]) return;

  pedido[i].stockActual = v;

  const celda = document.getElementById("existencias"+i);
  if(celda){
    celda.textContent = "TOTAL EXISTENCIAS: " + totalExistencias(pedido[i]);
  }
}

function stockPedir(i,v){
  if(!pedido[i]) return;

  pedido[i].pedir = v;

  const celda = document.getElementById("existencias"+i);
  if(celda){
    celda.textContent = "TOTAL EXISTENCIAS: " + totalExistencias(pedido[i]);
  }

  calcular();
}

function toggleCosteCero(i){
  if(!esHostelero()){
    alert("Solo hostelería puede marcar coste 0 €");
    return;
  }

  if(!pedido[i]) return;

  pedido[i].costeCero = !pedido[i].costeCero;
  pedido[i].excluirRappel = pedido[i].costeCero;

  pintar();
}

function calcular(){
  let totalPago = 0;

  pedido.forEach((a,i)=>{
    const precio = precioCaja(a);

    let linea = Number(a.pedir || 0) * precio;
    let lineaPago = a.costeCero ? 0 : linea;

    totalPago += lineaPago;

    const celda = document.getElementById("t"+i);

    if(celda){
      celda.textContent = lineaPago.toFixed(2) + " €";
    }
  });

  document.getElementById("totalFinal").textContent =
    "TOTAL PAGO: " + totalPago.toFixed(2) + " €";
}

async function guardarPedido(){
  const proveedor = document.getElementById("proveedor").value;

  if(!proveedor){
    alert("Selecciona proveedor");
    return;
  }

  const lineas = pedido.filter(a =>
    Number(a.pedir || 0) > 0
  );

  if(lineas.length === 0){
    alert("Sin cantidades pedidas");
    return;
  }

  const ahora = new Date();
  const pedidoId = crearId("pedido_" + proveedor);

  const lineasFinal = lineas.map(a => {
    const precioOriginalSinIva =
      Number(a.precioUnidad || 0) *
      Number(a.formato || 1);

    const costeCero = a.costeCero === true;
    const dPromo = datosPromo(a);

    const cantidadCargo = Number(a.pedir || 0);
    const cantidadGratis = dPromo ? dPromo.gratisTotal : 0;
    const precioFinal = costeCero ? 0 : precioOriginalSinIva;
    const subtotal = cantidadCargo * precioFinal;

    return {
      articulo: a.articulo,
      nombre: a.articulo,
      producto: a.articulo,
      proveedor: proveedor,

      cantidad: cantidadCargo,
      unidades: cantidadCargo,
      uds: cantidadCargo,
      pedir: a.pedir || "",

      cantidadGratisPromo: cantidadGratis,
      cantidadTotalRappel: costeCero ? 0 : cantidadCargo + cantidadGratis,

      unidadFormato: a.unidadFormato || "",
      formato: Number(a.formato || 1),
      iva: Number(a.iva || 21),
      tipoIva: Number(a.iva || 21),

      precioOriginalSinIva: precioOriginalSinIva,
      precioSinIva: precioFinal,

      precio: precioFinal,
      precioUnidad: precioFinal,
      precio_unitario: precioFinal,
      importeUnidad: precioFinal,

      subtotal: subtotal,
      importe: subtotal,
      totalLinea: subtotal,

      costeCero: costeCero,
      excluirRappel: costeCero,
      cuentaConsumo:true,

      stockActual:a.stockActual || "",
      totalExistencias: totalExistencias(a),

      promocionActiva: dPromo ? true : false,
      promocionTexto: dPromo ? (dPromo.conCargo + " + " + dPromo.gratis) : "",
      unidadesConCargoPromo: dPromo ? dPromo.conCargo : 0,
      unidadesGratisPromo: dPromo ? dPromo.gratis : 0,
      unidadesGratisCalculadas: cantidadGratis,
      textoPedidoPromo: dPromo && dPromo.textoPedido ? dPromo.textoPedido : ""
    };
  });

  const totalPago = lineasFinal.reduce((t,l)=>
    t + Number(l.subtotal || 0)
  ,0);

  const pedidoGuardado = {
    id: pedidoId,
    proveedor,
    fecha: ahora.toLocaleString("es-ES"),
    fechaMs: ahora.getTime(),
    actualizadoEn: ahora.toISOString(),
    usuario: usuarioActual(),
    total: totalPago,
    totalPago,
    pendiente: totalPago,
    estado: "PENDIENTE",
    lineas: lineasFinal
  };

  historicoPedidos.unshift(pedidoGuardado);
  await guardarColeccion("pedidos_historico", historicoPedidos);

  if(totalPago > 0){
    const pagoId = crearId("pago_" + proveedor);

    pagosPendientes.unshift({
      id: pagoId,
      pedidoId,
      proveedor,
      fecha: ahora.toLocaleString("es-ES"),
      fechaMs: ahora.getTime(),
      actualizadoEn: ahora.toISOString(),
      total: totalPago,
      totalPago,
      pendiente: totalPago,
      estado: "PENDIENTE",
      usuario: usuarioActual(),
      lineas: lineasFinal.filter(l => !l.costeCero)
    });

    await guardarColeccion("pagos_pendientes", pagosPendientes);
  }

  if(totalPago === 0){
    alert("Pedido COSTE 0 € guardado. No genera pago.");
  }else{
    alert("Pedido guardado correctamente");
  }

  document.getElementById("proveedor").value = "";
  pedido = [];
  pintar();
}

function activarEventos(){
  document.getElementById("btnVolver").addEventListener("click", volver);
  document.getElementById("proveedor").addEventListener("change", cargarArticulos);
  document.getElementById("btnGuardarPedido").addEventListener("click", guardarPedido);

  document.getElementById("avisosPedidos").addEventListener("click", function(e){
    const btn = e.target.closest("button");
    if(!btn) return;

    if(btn.dataset.accion === "resolverAviso"){
      resolverAvisoPedido(btn.dataset.id);
    }
  });

  document.getElementById("articulos").addEventListener("input", function(e){
    const el = e.target;
    const accion = el.dataset.accion;
    const i = Number(el.dataset.indice);

    if(accion === "stockActual") stockActual(i, el.value);
    if(accion === "stockPedir") stockPedir(i, el.value);
  });

  document.getElementById("articulos").addEventListener("keydown", function(e){
    const el = e.target;
    if(!el.classList.contains("cantidadPedido")) return;

    const i = Number(el.dataset.indice);
    siguienteConEnter(e, i);
  });

  document.getElementById("articulos").addEventListener("click", function(e){
    const btn = e.target.closest("button");
    if(!btn) return;

    if(btn.dataset.accion === "costeCero"){
      toggleCosteCero(Number(btn.dataset.indice));
    }
  });
}

async function iniciar(){
  activarEventos();

  articulosGlobal = await leerColeccion("articulos");
  proveedoresGlobal = await leerColeccion("proveedores");
  promocionesGlobal = await leerColeccion("promociones_monolito");
  historicoPedidos = await leerColeccion("pedidos_historico");
  pagosPendientes = await leerColeccion("pagos_pendientes");

  cargarProveedores();
  pintar();

  escucharColeccion("articulos", (lista)=>{
    articulosGlobal = lista;
    const proveedorActual = document.getElementById("proveedor").value;
    if(proveedorActual) cargarArticulos();
  });

  escucharColeccion("proveedores", (lista)=>{
    proveedoresGlobal = lista;
    cargarProveedores();
  });

  escucharColeccion("promociones_monolito", (lista)=>{
    promocionesGlobal = lista;
    pintar();
  });

  escucharColeccion("avisos_pedidos", (lista)=>{
    avisosCloud = lista.sort((a,b)=>
      Number(b.fechaMs || 0) - Number(a.fechaMs || 0)
    );
    pintarAvisosPedidos();
  });

  escucharColeccion("pedidos_historico", (lista)=>{
    historicoPedidos = lista.sort((a,b)=>
      Number(b.fechaMs || 0) - Number(a.fechaMs || 0)
    );
  });

  escucharColeccion("pagos_pendientes", (lista)=>{
    pagosPendientes = lista.sort((a,b)=>
      Number(b.fechaMs || 0) - Number(a.fechaMs || 0)
    );
  });
}

iniciar();
</script>

</body>
</html>
