<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEDIDOS · MONOLITO</title>

<style>
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#dfe6ec;
  color:#17303d;
}

header{
  background:#17303d;
  color:white;
  padding:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  border:0;
  border-radius:12px;
  padding:12px;
  font-weight:700;
}

.volver{background:white}

.contenido{padding:16px}

.bloque{
  background:white;
  padding:16px;
  border-radius:18px;
  margin-bottom:14px;
  box-shadow:0 6px 14px rgba(0,0,0,.15);
}

label{font-weight:700}

select,input{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid #ccc;
}

.linea{
  display:grid;
  grid-template-columns:1fr 80px 80px;
  gap:8px;
  margin-top:10px;
}

.total{
  font-size:22px;
  font-weight:900;
  text-align:right;
  margin-top:10px;
}

.guardar{
  width:100%;
  background:#48a530;
  color:white;
  font-size:18px;
  margin-top:10px;
}
</style>
</head>

<body>

<header>
  <button class="volver" onclick="volver()">←</button>
  <h2>PEDIDOS</h2>
</header>

<div class="contenido">

<div class="bloque">
<label>Proveedor</label>
<select id="proveedor" onchange="cargarArticulos()"></select>

<label>Forma de pago</label>
<select id="formaPago">
  <option value="CONTADO">CONTADO</option>
  <option value="REPOSICION">REPOSICIÓN</option>
  <option value="BANCO">BANCO</option>
  <option value="A CUENTA">A CUENTA</option>
</select>
</div>

<div class="bloque">
<h3>Artículos</h3>
<div id="lineas"></div>
<button onclick="nuevaLinea()">+ Añadir</button>
</div>

<div class="bloque">
<div id="total" class="total">0.00 €</div>
<button class="guardar" onclick="finalizarPedido()">FINALIZAR</button>
</div>

</div>

<script>

/* ================= DATOS ================= */

const articulos = [
  {proveedor:"CANDELAS", nombre:"CAFÉ LATA", precio:17},
  {proveedor:"CANDELAS", nombre:"AZÚCAR", precio:13.20},

  {proveedor:"TURRADO", nombre:"MAHOU 5 ESTRELLAS", precio:17.96},
  {proveedor:"TURRADO", nombre:"MAHOU RESERVA", precio:22.46}
];

/* ================= UI ================= */

function volver(){
  window.location.href="index.html";
}

function cargarProveedores(){
  let provs = [...new Set(articulos.map(a=>a.proveedor))];
  let html="";
  provs.forEach(p=>{
    html+=`<option>${p}</option>`;
  });
  document.getElementById("proveedor").innerHTML=html;
  cargarArticulos();
}

function cargarArticulos(){
  document.getElementById("lineas").innerHTML="";
  nuevaLinea();
}

function nuevaLinea(){
  let proveedor = document.getElementById("proveedor").value;
  let arts = articulos.filter(a=>a.proveedor===proveedor);

  let div=document.createElement("div");
  div.className="linea";

  div.innerHTML=`
  <select class="articulo" onchange="calcular()">
    ${arts.map(a=>`<option value="${a.precio}">${a.nombre}</option>`).join("")}
  </select>

  <input type="number" class="cantidad" value="1" oninput="calcular()">

  <input class="lineaTotal" readonly>
  `;

  document.getElementById("lineas").appendChild(div);
  calcular();
}

/* ================= CALCULO ================= */

function calcular(){
  let filas=document.querySelectorAll(".linea");
  let total=0;

  filas.forEach(f=>{
    let precio=parseFloat(f.querySelector(".articulo").value);
    let cant=parseFloat(f.querySelector(".cantidad").value)||0;

    let t=precio*cant;
    f.querySelector(".lineaTotal").value=t.toFixed(2);

    total+=t;
  });

  document.getElementById("total").innerText=total.toFixed(2)+" €";
}

/* ================= FINALIZAR ================= */

function finalizarPedido(){

  let proveedor=document.getElementById("proveedor").value;
  let formaPago=document.getElementById("formaPago").value;
  let total=parseFloat(document.getElementById("total").innerText);

  if(!total || total<=0){
    alert("Pedido vacío");
    return;
  }

  let pagos = JSON.parse(localStorage.getItem("pagos_pendientes") || "[]");

  pagos.push({
    proveedor: proveedor,
    total: total,
    formaPago: formaPago,
    fecha: new Date().toISOString()
  });

  localStorage.setItem("pagos_pendientes", JSON.stringify(pagos));

  alert("Pedido enviado a PAGOS");

  location.reload();
}

/* ================= INIT ================= */

cargarProveedores();

</script>

</body>
</html>
