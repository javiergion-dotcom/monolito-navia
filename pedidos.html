<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEDIDOS · MONOLITO</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f5;color:#17303d}
header{background:#17303d;color:white;padding:16px;font-weight:900;font-size:20px}
.contenedor{padding:16px}
select,.buscador{width:100%;padding:14px;border-radius:18px;margin-bottom:14px;font-size:18px;border:1px solid #ccd6dd;box-sizing:border-box;background:white}
.card{background:white;border-radius:24px;padding:18px;margin-bottom:18px}
.nombre{font-weight:900;font-size:22px}
.detalle{color:#4f5f69;font-size:15px;margin-top:6px}
.stockFila{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
.stockCol{border-radius:18px;padding:12px;text-align:center}
.almacen{background:#eef7ff;border:3px solid #cfe5ff}
.pedidoBox{background:#f1fff1;border:3px solid #bde9bd}
.stockCol label{display:block;font-size:17px;font-weight:900;margin-bottom:8px}
.stockCol input{width:90%;padding:14px;border-radius:16px;border:1px solid #ccc;text-align:center;font-size:30px;font-weight:900}
button{width:100%;padding:15px;margin-top:14px;border:0;border-radius:16px;font-weight:900;font-size:17px}
.guardar{background:#48a530;color:white}
.volver{background:white;color:#17303d;width:auto;margin:0 10px 0 0;padding:7px 11px}
.totalFinal{font-size:26px;font-weight:900;margin-top:20px}
.avisosBox,.promosBox{background:#fff8db;border:3px solid #f0c94a;border-radius:20px;padding:14px;margin-bottom:16px}
.promosBox{background:#eef6ff;border-color:#8dbdf5}
.tituloBox{font-weight:900;font-size:18px;margin-bottom:10px}
.promoLinea{background:white;border-radius:14px;padding:11px;margin-top:8px;font-weight:900}
.promoPendiente{border-left:8px solid #f0c94a}
.promoRevisada{border-left:8px solid #48a530;opacity:.85}
.promoDetalle{background:#fff6cf;border:2px solid #ffe066;border-radius:14px;padding:12px;margin-top:12px;font-weight:900;color:#7a6200}
.promoBotones{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.si{background:#48a530;color:white}
.no{background:#c44;color:white}
</style>
</head>

<body>

<header>
  <button id="btnVolver" class="volver">←</button>
  📝 PEDIDOS
</header>

<div class="contenedor">
  <div id="avisosPedidos"></div>
  <div id="promosActivas"></div>

  <select id="proveedor"></select>
  <input id="buscarArticulo" class="buscador" placeholder="🔍 Buscar artículo...">

  <div id="promosProveedor"></div>
  <div id="articulos"></div>

  <div class="totalFinal" id="totalFinal">TOTAL PAGO: 0,00 €</div>

  <button id="btnGuardarPedido" class="guardar">Guardar pedido</button>
</div>

<script type="module">
import {
  leerColeccion,
  guardarColeccion,
  escucharColeccion,
  borrarDocumento
} from "./monolito-cloud.js";

let pedido = [];
let articulosGlobal = [];
let proveedoresGlobal = [];
let promocionesGlobal = [];
let avisosCloud = [];
let historicoPedidos = [];
let pagosPendientes = [];
let decisionesPromo = {};

function usuarioActual(){
  return localStorage.getItem("usuario") || "JAVI";
}

function volver(){
  window.location.href = "index.html";
}

function normalizar(t){
  return String(t || "")
    .trim()
    .toUpperCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

function esc(t){
  return String(t || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function dinero(n){
  return Number(n || 0).toLocaleString("es-ES", {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  }) + " €";
}

function crearId(prefijo){
  return String(prefijo || "id")
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9]+/g,"_")
    .replace(/^_+|_+$/g,"")
    + "_" + Date.now() + "_" + Math.random().toString(36).slice(2,7);
}

function ahoraAuditoria(){
  const d = new Date();
  return {
    fecha: d.toLocaleDateString("es-ES"),
    hora: d.toLocaleTimeString("es-ES"),
    fechaHora: d.toLocaleString("es-ES"),
    fechaMs: d.getTime(),
    iso: d.toISOString(),
    operador: usuarioActual()
  };
}

/* PROMOCIONES */

function promoVigente(p){
  if(p.activa === false) return false;
  if(p.activo === false) return false;
  if(p.visibleEnPedidos === false) return false;

  const hoy = new Date();
  hoy.setHours(0,0,0,0);

  const inicio = p.inicio || p.fechaInicio || "";
  const fin = p.fin || p.fechaFin || "";

  if(inicio){
    const ini = new Date(inicio + "T00:00:00");
    if(hoy < ini) return false;
  }

  if(fin){
    const f = new Date(fin + "T23:59:59");
    if(hoy > f) return false;
  }

  return true;
}

function leerPromosVigentes(){
  return (promocionesGlobal || []).filter(promoVigente);
}

function idPromo(p){
  return String(
    p.id ||
    normalizar((p.proveedor || p.proveedorNormalizado || "") + "_" + (p.nombre || p.promocion || ""))
  );
}

function promosDelProveedor(){
  const proveedor = document.getElementById("proveedor").value;

  return leerPromosVigentes().filter(p=>{
    const provPromo = normalizar(p.proveedor || p.proveedorNormalizado || "");
    return provPromo === normalizar(proveedor);
  });
}

function pintarPromosActivas(){
  const promos = leerPromosVigentes();

  if(promos.length === 0){
    document.getElementById("promosActivas").innerHTML = "";
    return;
  }

  let html = `<div class="promosBox"><div class="tituloBox">🎁 PROMOCIONES ACTIVAS</div>`;

  promos.forEach(p=>{
    const id = idPromo(p);
    const rev = decisionesPromo[id];

    html += `
      <div class="promoLinea ${rev ? "promoRevisada" : "promoPendiente"}">
        ${rev ? "🟢" : "🟡"} ${esc(p.proveedor || p.proveedorNormalizado || "")} · ${esc(p.nombre || p.promocion || "")}
      </div>
    `;
  });

  html += `</div>`;
  document.getElementById("promosActivas").innerHTML = html;
}

function pintarPromosProveedor(){
  const promos = promosDelProveedor();

  if(promos.length === 0){
    document.getElementById("promosProveedor").innerHTML = "";
    return;
  }

  let html = `<div class="promosBox"><div class="tituloBox">🎁 PROMOCIONES DEL PROVEEDOR</div>`;

  promos.forEach((p,i)=>{
    const id = idPromo(p);
    const dec = decisionesPromo[id];

    html += `
      <div class="promoDetalle">
        <div>${dec ? "🟢 REVISADA" : "🟡 PENDIENTE"} · ${esc(p.nombre || p.promocion || "")}</div>
        <div style="margin-top:6px">
          ${Number(p.descuento || 0) > 0 ? `${Number(p.descuento)}% descuento<br>` : ""}
          ${Number(p.cargo || 0)} con cargo · ${Number(p.gratis || 0)} gratis / regalo
        </div>
        ${p.nota ? `<div style="margin-top:6px">${esc(p.nota)}</div>` : ""}
        <div class="promoBotones">
          <button class="si" data-accion="promoSi" data-indice="${i}">SÍ</button>
          <button class="no" data-accion="promoNo" data-indice="${i}">NO</button>
        </div>
      </div>
    `;
  });

  html += `</div>`;
  document.getElementById("promosProveedor").innerHTML = html;
}

function registrarDecisionPromo(p, decision){
  const id = idPromo(p);

  decisionesPromo[id] = {
    promoId:id,
    proveedor:p.proveedor || p.proveedorNormalizado || "",
    nombre:p.nombre || p.promocion || "",
    descuento:Number(p.descuento || 0),
    cargo:Number(p.cargo || 0),
    gratis:Number(p.gratis || 0),
    decision,
    ...ahoraAuditoria()
  };

  pintarPromosActivas();
  pintarPromosProveedor();
  calcular();
}

/* AVISOS */

function pintarAvisosPedidos(){
  if(avisosCloud.length === 0){
    document.getElementById("avisosPedidos").innerHTML = "";
    return;
  }

  let html = `<div class="avisosBox"><div class="tituloBox">🛎️ AVISOS PARA PEDIDOS</div>`;

  avisosCloud.forEach(a=>{
    html += `
      <div class="promoLinea">
        ${esc(a.texto || "")}
        <button class="si" data-accion="resolverAviso" data-id="${esc(a.id)}">✅ RESUELTO</button>
      </div>
    `;
  });

  html += `</div>`;
  document.getElementById("avisosPedidos").innerHTML = html;
}

async function resolverAvisoPedido(id){
  if(!confirm("¿Eliminar aviso de pedidos?")) return;
  await borrarDocumento("avisos_pedidos", id);
}

/* PROVEEDORES Y ARTÍCULOS */

function cargarProveedores(){
  let proveedores = (proveedoresGlobal || []).filter(p=>p.activo !== false);

  if(proveedores.length === 0){
    proveedores = [
      {nombre:"CANDELAS"},
      {nombre:"TURRADO"},
      {nombre:"SANPEDRO"},
      {nombre:"DEO"}
    ];
  }

  document.getElementById("proveedor").innerHTML =
    `<option value="">Selecciona proveedor</option>` +
    proveedores.map(p=>`<option value="${esc(p.nombre)}">${esc(p.nombre)}</option>`).join("");
}

function cargarArticulos(){
  const proveedor = document.getElementById("proveedor").value;

  pedido = (articulosGlobal || [])
    .filter(a=>a.activo !== false)
    .filter(a=>normalizar(a.proveedor) === normalizar(proveedor))
    .map(a=>({
      ...a,
      stockActual:"",
      pedir:""
    }));

  pintarPromosProveedor();
  pintar();
}

/* IMPORTANTE:
   El precioUnidad es el precio del formato completo:
   caja, barril, tanque o kilos.
   NO se multiplica por formato.
*/
function precioCompra(a){
  return Number(a.precioUnidad || a.precio || a.precioSinIva || 0);
}

function descuentoProveedorAceptado(){
  const promos = promosDelProveedor();

  let dto = 0;

  promos.forEach(p=>{
    const id = idPromo(p);
    const dec = decisionesPromo[id];

    if(dec && dec.decision === "SI"){
      dto = Math.max(dto, Number(p.descuento || 0));
    }
  });

  return dto;
}

function precioFinal(a){
  const precio = precioCompra(a);
  const dto = descuentoProveedorAceptado();

  if(dto > 0){
    return precio * (1 - dto / 100);
  }

  return precio;
}

function pintar(){
  const busqueda = normalizar(document.getElementById("buscarArticulo").value || "");
  let html = "";

  pedido.forEach((a,i)=>{
    if(busqueda && !normalizar(a.articulo).includes(busqueda)) return;

    const dto = descuentoProveedorAceptado();

    html += `
      <div class="card">
        <div class="nombre">${esc(a.articulo)}</div>
        <div class="detalle">
          ${esc(a.unidadFormato || "")} ${a.formato ? "· " + esc(a.formato) : ""} · ${dinero(precioCompra(a))} · IVA ${Number(a.iva || 21)}%
          ${dto > 0 ? ` · 🎁 ${dto}% dto` : ""}
        </div>

        <div class="stockFila">
          <div class="stockCol almacen">
            <label>📦 ¿CUÁNTAS HAY?</label>
            <input type="number" placeholder="0" value="${esc(a.stockActual)}" data-accion="stockActual" data-indice="${i}">
          </div>

          <div class="stockCol pedidoBox">
            <label>🛒 ¿CUÁNTAS PIDO?</label>
            <input class="cantidadPedido" type="number" placeholder="0" value="${esc(a.pedir)}" data-accion="stockPedir" data-indice="${i}">
          </div>
        </div>
      </div>
    `;
  });

  document.getElementById("articulos").innerHTML = html;
  calcular();
}

function stockActual(i,v){
  if(!pedido[i]) return;
  pedido[i].stockActual = v;
}

function stockPedir(i,v){
  if(!pedido[i]) return;
  pedido[i].pedir = v;
  calcular();
}

function calcular(){
  let total = 0;

  pedido.forEach(a=>{
    total += Number(a.pedir || 0) * precioFinal(a);
  });

  document.getElementById("totalFinal").textContent =
    "TOTAL PAGO: " + total.toLocaleString("es-ES", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    }) + " €";
}

/* ENTER */

function siguientePedido(e){
  if(e.key !== "Enter") return;

  const actual = e.target;
  if(!actual.classList.contains("cantidadPedido")) return;

  e.preventDefault();

  const inputs = Array.from(document.querySelectorAll(".cantidadPedido"));
  const pos = inputs.indexOf(actual);

  if(inputs[pos+1]){
    inputs[pos+1].focus();
    inputs[pos+1].select();
  }
}

/* GUARDAR */

function crearLineaCargo(a, proveedor){
  const cantidad = Number(a.pedir || 0);
  if(cantidad <= 0) return null;

  const precioOriginal = precioCompra(a);
  const dto = descuentoProveedorAceptado();
  const precio = precioFinal(a);
  const subtotal = cantidad * precio;

  return {
    articulo:a.articulo,
    nombre:a.articulo,
    producto:a.articulo,
    proveedor,
    tipoLinea:"CON_CARGO",
    cantidad,
    unidades:cantidad,
    uds:cantidad,
    pedir:cantidad,
    unidadFormato:a.unidadFormato || "",
    formato:Number(a.formato || 1),
    iva:Number(a.iva || 21),
    tipoIva:Number(a.iva || 21),
    precioOriginalSinIva:precioOriginal,
    precioSinIva:precio,
    precio,
    precioUnidad:precio,
    descuentoAplicado:dto,
    subtotal,
    importe:subtotal,
    totalLinea:subtotal,
    stockActual:a.stockActual || "",
    ...ahoraAuditoria()
  };
}

function crearLineasPromosAceptadas(proveedor){
  const lineas = [];
  const promos = promosDelProveedor();

  promos.forEach(p=>{
    const id = idPromo(p);
    const dec = decisionesPromo[id];

    if(!dec || dec.decision !== "SI") return;

    const gratis = Number(p.gratis || 0);
    const articulo = p.nombre || p.promocion || "PROMOCIÓN";

    if(gratis > 0){
      lineas.push({
        articulo,
        nombre:articulo,
        producto:articulo,
        proveedor,
        tipoLinea:"PROMO_GRATIS_REGALO",
        promoId:id,
        promocion:articulo,
        cantidad:gratis,
        unidades:gratis,
        uds:gratis,
        pedir:gratis,
        precioSinIva:0,
        precio:0,
        precioUnidad:0,
        subtotal:0,
        importe:0,
        totalLinea:0,
        sinCargo:true,
        gratis:true,
        regalo:true,
        origen:"CONFIGURACION_PROMOCION",
        ...ahoraAuditoria()
      });
    }
  });

  return lineas;
}

async function guardarPedido(){
  const proveedor = document.getElementById("proveedor").value;

  if(!proveedor){
    alert("Selecciona proveedor");
    return;
  }

  const lineasFinal = [];

  pedido.forEach(a=>{
    const linea = crearLineaCargo(a, proveedor);
    if(linea) lineasFinal.push(linea);
  });

  lineasFinal.push(...crearLineasPromosAceptadas(proveedor));

  if(lineasFinal.length === 0){
    alert("Sin cantidades pedidas");
    return;
  }

  const auditoria = ahoraAuditoria();
  const pedidoId = crearId("pedido_" + proveedor);
  const totalPago = lineasFinal.reduce((t,l)=>t + Number(l.subtotal || 0),0);

  const decisionesProveedor = Object.values(decisionesPromo)
    .filter(d=>normalizar(d.proveedor) === normalizar(proveedor));

  const pedidoGuardado = {
    id:pedidoId,
    proveedor,
    fecha:auditoria.fechaHora,
    fechaMs:auditoria.fechaMs,
    actualizadoEn:auditoria.iso,
    usuario:auditoria.operador,
    operador:auditoria.operador,
    total:totalPago,
    totalPago,
    pendiente:totalPago,
    estado:"PENDIENTE",
    decisionesPromociones:decisionesProveedor,
    lineas:lineasFinal
  };

  historicoPedidos.unshift(pedidoGuardado);
  await guardarColeccion("pedidos_historico", historicoPedidos);

  pagosPendientes.unshift({
    id:crearId("pago_" + proveedor),
    pedidoId,
    proveedor,
    fecha:auditoria.fechaHora,
    fechaMs:auditoria.fechaMs,
    actualizadoEn:auditoria.iso,
    usuario:auditoria.operador,
    operador:auditoria.operador,
    total:totalPago,
    totalPago,
    pendiente:totalPago,
    estado:"PENDIENTE",
    decisionesPromociones:decisionesProveedor,
    lineas:lineasFinal
  });

  await guardarColeccion("pagos_pendientes", pagosPendientes);

  alert("Pedido guardado correctamente");

  document.getElementById("proveedor").value = "";
  document.getElementById("buscarArticulo").value = "";
  pedido = [];
  decisionesPromo = {};
  pintarPromosActivas();
  pintarPromosProveedor();
  pintar();
}

/* EVENTOS */

function activarEventos(){
  document.getElementById("btnVolver").addEventListener("click", volver);
  document.getElementById("proveedor").addEventListener("change", cargarArticulos);
  document.getElementById("buscarArticulo").addEventListener("input", pintar);
  document.getElementById("btnGuardarPedido").addEventListener("click", guardarPedido);

  document.getElementById("avisosPedidos").addEventListener("click", e=>{
    const btn = e.target.closest("button");
    if(btn && btn.dataset.accion === "resolverAviso"){
      resolverAvisoPedido(btn.dataset.id);
    }
  });

  document.getElementById("promosProveedor").addEventListener("click", e=>{
    const btn = e.target.closest("button");
    if(!btn) return;

    const promos = promosDelProveedor();
    const promo = promos[Number(btn.dataset.indice)];
    if(!promo) return;

    if(btn.dataset.accion === "promoSi") registrarDecisionPromo(promo,"SI");
    if(btn.dataset.accion === "promoNo") registrarDecisionPromo(promo,"NO");
  });

  document.getElementById("articulos").addEventListener("input", e=>{
    const el = e.target;
    const i = Number(el.dataset.indice);

    if(el.dataset.accion === "stockActual") stockActual(i, el.value);
    if(el.dataset.accion === "stockPedir") stockPedir(i, el.value);
  });

  document.getElementById("articulos").addEventListener("keydown", siguientePedido);

  document.getElementById("articulos").addEventListener("focusin", e=>{
    const el = e.target;
    if(el.tagName === "INPUT"){
      setTimeout(()=>el.select(),30);
    }
  });
}

/* INICIO */

async function iniciar(){
  activarEventos();

  articulosGlobal = await leerColeccion("articulos");
  proveedoresGlobal = await leerColeccion("proveedores");
  promocionesGlobal = await leerColeccion("promociones_monolito");
  historicoPedidos = await leerColeccion("pedidos_historico");
  pagosPendientes = await leerColeccion("pagos_pendientes");

  promocionesGlobal = promocionesGlobal.sort((a,b)=>Number(b.fechaMs || 0)-Number(a.fechaMs || 0));
  historicoPedidos = historicoPedidos.sort((a,b)=>Number(b.fechaMs || 0)-Number(a.fechaMs || 0));
  pagosPendientes = pagosPendientes.sort((a,b)=>Number(b.fechaMs || 0)-Number(a.fechaMs || 0));

  cargarProveedores();
  pintarPromosActivas();
  pintar();

  escucharColeccion("articulos", lista=>{
    articulosGlobal = lista;
    if(document.getElementById("proveedor").value) cargarArticulos();
  });

  escucharColeccion("proveedores", lista=>{
    proveedoresGlobal = lista;
    cargarProveedores();
  });

  escucharColeccion("promociones_monolito", lista=>{
    promocionesGlobal = lista.sort((a,b)=>Number(b.fechaMs || 0)-Number(a.fechaMs || 0));
    pintarPromosActivas();
    pintarPromosProveedor();
    pintar();
  });

  escucharColeccion("avisos_pedidos", lista=>{
    avisosCloud = lista.sort((a,b)=>Number(b.fechaMs || 0)-Number(a.fechaMs || 0));
    pintarAvisosPedidos();
  });

  escucharColeccion("pedidos_historico", lista=>{
    historicoPedidos = lista.sort((a,b)=>Number(b.fechaMs || 0)-Number(a.fechaMs || 0));
  });

  escucharColeccion("pagos_pendientes", lista=>{
    pagosPendientes = lista.sort((a,b)=>Number(b.fechaMs || 0)-Number(a.fechaMs || 0));
  });
}

iniciar();
</script>

</body>
</html>
