<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEDIDOS</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f5;
}

header{
  background:#17303d;
  color:white;
  padding:14px;
  display:flex;
  justify-content:space-between;
}

.contenido{
  padding:16px;
}

.bloque{
  background:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:12px;
}

select, input{
  width:100%;
  padding:10px;
  font-size:16px;
  margin-top:6px;
}

table{
  width:100%;
  border-collapse:collapse;
}

td{
  padding:8px;
}

input[type=number]{
  width:60px;
}

.total{
  font-size:18px;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
  <div id="usuario">OPERADOR</div>
  <div id="fecha"></div>
</header>

<div class="contenido">

<div class="bloque">
  PROVEEDOR
  <select id="proveedor" onchange="cargarArticulos()">
    <option>Cafés Candelas</option>
    <option>Turrado (Mahou)</option>
  </select>
</div>

<div class="bloque">
  <table id="tabla"></table>
</div>

<div class="bloque total" id="total"></div>

</div>

<script>

<script>

let datos = {
  "Cafés Candelas":[
    {nombre:"Café mezcla", precio:17, iva:10},
    {nombre:"Café natural", precio:18.5, iva:10},
    {nombre:"Descafeinado", precio:19, iva:10}
  ],
  "Turrado (Mahou)":[
    {nombre:"Barril 50L", precio:78, iva:21},
    {nombre:"Caja tercios", precio:16, iva:21},
    {nombre:"Caja quintos", precio:14.5, iva:21}
  ]
};

let pedidoActivo = false;

function cargarUsuario(){
  document.getElementById("usuario").innerText =
    localStorage.getItem("usuario") || "OPERADOR";
}

function fecha(){
  let d = new Date();
  document.getElementById("fecha").innerText =
    d.toLocaleDateString() + " " + d.toLocaleTimeString();
}

function cargarArticulos(){

  if(pedidoActivo){
  if(confirm("⚠️ Hay un pedido en curso. ¿Cambiar proveedor?") === false){
    document.getElementById("proveedor").value = proveedorActual;
    return;
  }
}

  proveedorActual = document.getElementById("proveedor").value;

  let tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  datos[proveedorActual].forEach((a,i)=>{
    tabla.innerHTML += `
    <tr>
      <td><input type="number" placeholder="" oninput="calcular()"></td>
      <td>${a.nombre}</td>
      <td>${a.precio}</td>
      <td class="imp"></td>
    </tr>`;
  });
}

let proveedorActual = "Cafés Candelas";

function calcular(){

  let filas = document.querySelectorAll("#tabla tr");
  let prov = document.getElementById("proveedor").value;

  let subtotal = 0;
  let ivaTotal = 0;

  filas.forEach((f,i)=>{

    let unidades = f.children[0].children[0].value;

    if(unidades > 0){
      f.style.opacity = 1;

      pedidoActivo = true;

      let precio = datos[prov][i].precio;
      let iva = datos[prov][i].iva;

      let base = unidades * precio;
      let ivaCalc = base * (iva/100);

      subtotal += base;
      ivaTotal += ivaCalc;

      f.children[3].innerText = base.toFixed(2);

    }else{
  f.children[3].innerText = "";
  f.style.opacity = 0.3;
}

  });

  let total = subtotal + ivaTotal;

  document.getElementById("total").innerHTML =
    "SUBTOTAL: " + subtotal.toFixed(2) + " €<br>" +
    "IVA: " + ivaTotal.toFixed(2) + " €<br>" +
    "TOTAL: " + total.toFixed(2) + " €";
}

cargarUsuario();
fecha();
cargarArticulos();

</script>
