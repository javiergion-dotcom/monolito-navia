<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEDIDOS · MONOLITO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f5;
  color:#17303d;
}

header{
  background:#17303d;
  color:white;
  padding:16px;
  font-weight:900;
  font-size:20px;
}

.contenedor{
  padding:16px;
}

select{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:1px solid #ccc;
  font-size:16px;
  margin-bottom:15px;
}

.articulo{
  background:white;
  padding:14px;
  border-radius:14px;
  margin-bottom:12px;
}

.nombre{
  font-weight:900;
  font-size:16px;
}

.detalle{
  font-size:13px;
  color:#666;
}

.fila{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:10px;
}

input{
  width:80px;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
  text-align:center;
}

.totalLinea{
  font-weight:900;
}

.totalFinal{
  font-size:22px;
  font-weight:900;
  margin-top:20px;
}

.guardar{
  margin-top:20px;
  width:100%;
  padding:14px;
  border-radius:14px;
  border:0;
  background:#48a530;
  color:white;
  font-weight:900;
  font-size:16px;
}
</style>
</head>

<body>

<header>📝 PEDIDOS</header>

<div class="contenedor">

<select id="proveedor" onchange="cargarArticulos()">
  <option value="">Selecciona proveedor</option>
</select>

<div id="listaArticulos"></div>

<div class="totalFinal" id="total">TOTAL: 0,00 €</div>

<button class="guardar" onclick="guardarPedido()">Guardar pedido</button>

</div>

<script>

let articulosFiltrados = [];
let cantidades = [];

/* ==== DATOS ==== */

function leerArticulos(){
  return JSON.parse(localStorage.getItem("articulos") || "[]")
    .filter(a => a.activo !== false);
}

function leerProveedores(){
  let proveedores = JSON.parse(localStorage.getItem("proveedores") || "[]")
    .filter(p => p.activo !== false);

  if(proveedores.length === 0){
    proveedores = [
      {nombre:"CANDELAS"},
      {nombre:"TURRADO"},
      {nombre:"SANPEDRO"},
      {nombre:"DEO"}
    ];
  }

  return proveedores;
}

/* ==== CARGAR PROVEEDORES ==== */

function cargarProveedores(){
  const proveedores = leerProveedores();
  const sel = document.getElementById("proveedor");

  sel.innerHTML = `<option value="">Selecciona proveedor</option>` +
    proveedores.map(p => `<option value="${p.nombre}">${p.nombre}</option>`).join("");
}

/* ==== CARGAR ARTICULOS ==== */

function cargarArticulos(){

  const proveedor = document.getElementById("proveedor").value;
  const todos = leerArticulos();

  articulosFiltrados = todos.filter(a => a.proveedor === proveedor);

  cantidades = articulosFiltrados.map(()=>0);

  pintar();
}

/* ==== PINTAR ==== */

function pintar(){

  let html = "";

  articulosFiltrados.forEach((a,i)=>{

    const precioUnidad = Number(a.precioUnidad || 0);
    const formato = Number(a.formato || 1);

    const precioCaja = precioUnidad * formato;
    const totalLinea = precioCaja * cantidades[i];

    html += `
      <div class="articulo">

        <div class="nombre">${a.articulo}</div>
        <div class="detalle">
          ${formato} · ${precioUnidad.toFixed(2)} € sin IVA · IVA ${a.iva}%
        </div>

        <div class="fila">
          <input type="number" min="0"
            value="${cantidades[i]}"
            onchange="cambiar(${i}, this.value)">

          <div class="totalLinea">${totalLinea.toFixed(2)} €</div>
        </div>

      </div>
    `;
  });

  document.getElementById("listaArticulos").innerHTML = html;

  calcularTotal();
}

/* ==== CAMBIAR ==== */

function cambiar(i,val){
  cantidades[i] = Number(val);
  pintar();
}

/* ==== TOTAL ==== */

function calcularTotal(){

  let total = 0;

  articulosFiltrados.forEach((a,i)=>{
    const precio = Number(a.precioUnidad || 0) * Number(a.formato || 1);
    total += precio * cantidades[i];
  });

  document.getElementById("total").innerHTML =
    "TOTAL: " + total.toFixed(2) + " €";
}

/* ==== GUARDAR ==== */

function guardarPedido(){

  const proveedor = document.getElementById("proveedor").value;

  if(!proveedor){
    alert("Selecciona proveedor");
    return;
  }

  let lineas = [];

  articulosFiltrados.forEach((a,i)=>{
    if(cantidades[i] > 0){
      lineas.push({
        articulo: a.articulo,
        cantidad: cantidades[i],
        precio: a.precioUnidad * a.formato
      });
    }
  });

  if(lineas.length === 0){
    alert("No hay cantidades");
    return;
  }

  let total = lineas.reduce((t,l)=>t+(l.cantidad*l.precio),0);

  let pagos = JSON.parse(localStorage.getItem("pagos_pendientes") || "[]");

  pagos.unshift({
    proveedor,
    fecha: new Date().toLocaleString(),
    lineas,
    total
  });

  localStorage.setItem("pagos_pendientes", JSON.stringify(pagos));

  alert("Pedido guardado correctamente");

  location.reload();
}

/* ==== INIT ==== */

cargarProveedores();

</script>

</body>
</html>
