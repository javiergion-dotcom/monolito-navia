<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEDIDOS</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#eef3f5;
  color:#1f2933;
}

.barra{
  background:#14313d;
  color:white;
  height:72px;
  padding:0 22px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:28px;
  font-weight:bold;
}

.barra span{
  cursor:pointer;
  font-size:38px;
}

.container{
  padding:18px;
}

select,input{
  width:100%;
  padding:16px;
  margin:8px 0;
  font-size:20px;
  border-radius:14px;
  border:1px solid #cfd8dc;
  box-sizing:border-box;
}

.boton{
  width:100%;
  padding:18px;
  border-radius:16px;
  border:0;
  font-size:22px;
  font-weight:bold;
  margin-top:10px;
  cursor:pointer;
}

.verde{
  background:#4b8f36;
  color:white;
}

.azul{
  background:#14313d;
  color:white;
}

.rojo{
  background:#b8332f;
  color:white;
}

.aviso-oferta{
  display:none;
  background:#fff3cd;
  color:#7a4b00;
  padding:14px;
  border-radius:14px;
  font-size:20px;
  font-weight:bold;
  margin:8px 0 12px 0;
  border:1px solid #f1d98b;
}

table{
  width:100%;
  margin-top:16px;
  border-collapse:collapse;
  background:white;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
}

th{
  background:#14313d;
  color:white;
  font-size:17px;
  padding:12px 8px;
}

td{
  padding:12px 8px;
  text-align:center;
  border-bottom:1px solid #e5e7eb;
  font-size:18px;
}

td:first-child{
  text-align:left;
  font-weight:bold;
}

.resumen{
  background:white;
  margin-top:18px;
  padding:18px;
  border-radius:18px;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
  font-size:22px;
  line-height:1.7;
}

.resumen strong{
  font-size:26px;
}

.fila-total{
  border-top:2px solid #ddd;
  margin-top:8px;
  padding-top:8px;
}

.admin-boton{
  display:none;
  padding:8px 10px;
  border-radius:10px;
  border:0;
  font-weight:bold;
  cursor:pointer;
}

.admin-activo .admin-boton{
  display:inline-block;
}
</style>
</head>

<body>

<div class="barra">
  <span onclick="volver()">←</span>
  <div>PEDIDOS</div>
  <span onclick="activarAdmin()">🔒</span>
</div>

<div class="container">

  <select id="proveedor"></select>

  <select id="articulo"></select>

  <div id="avisoOferta" class="aviso-oferta"></div>

  <input type="number" id="cantidad" placeholder="Cantidad" min="0" step="1">

  <button class="boton verde" onclick="anadirProducto()">+ AÑADIR PRODUCTO</button>

  <table>
    <thead>
      <tr>
        <th>Artículo</th>
        <th>Ud</th>
        <th>Precio</th>
        <th>IVA</th>
        <th>Total</th>
        <th>Admin</th>
      </tr>
    </thead>
    <tbody id="lineas"></tbody>
  </table>

  <div class="resumen">
    <div><strong>Subtotal sin IVA:</strong> <span id="subtotal">0,00</span> €</div>
    <div>IVA 4%: <span id="iva4">0,00</span> €</div>
    <div>IVA 10%: <span id="iva10">0,00</span> €</div>
    <div>IVA 21%: <span id="iva21">0,00</span> €</div>
    <div class="fila-total"><strong>TOTAL PEDIDO:</strong> <span id="total">0,00</span> €</div>
  </div>

  <button class="boton azul" onclick="cerrarPedido()">CERRAR PEDIDO</button>

</div>

<script>
const PIN_ADMIN = "1234";

let adminActivo = false;
let lineasPedido = [];

let proveedores = JSON.parse(localStorage.getItem("proveedores") || "[]");
let articulos = JSON.parse(localStorage.getItem("articulos") || "[]");

if(proveedores.length === 0){
  proveedores = JSON.parse(localStorage.getItem("listaProveedores") || "[]");
}

if(articulos.length === 0){
  articulos = JSON.parse(localStorage.getItem("listaArticulos") || "[]");
}

function volver(){
  window.location.href = "index.html";
}

function formato(numero){
  return Number(numero || 0).toFixed(2).replace(".", ",");
}

function normalizarPrecio(valor){
  if(typeof valor === "string"){
    return Number(valor.replace(",", "."));
  }
  return Number(valor || 0);
}

function nombreProveedor(p){
  return p.nombre || p.proveedor || p.name || "";
}

function nombreArticulo(a){
  return a.nombre || a.articulo || a.name || "";
}

function proveedorArticulo(a){
  return a.proveedor || a.proveedorNombre || a.nombreProveedor || "";
}

function precioArticulo(a){
  return normalizarPrecio(
    a.precioSinIva ||
    a.precio ||
    a.precio_compra ||
    a.precioCompra ||
    0
  );
}

function ivaArticulo(a){
  return Number(a.iva || a.tipoIva || a.tipo_iva || 10);
}

function ofertaArticulo(a){
  return a.oferta || a.promocion || a.promoción || a.promo || "";
}

function cargarProveedores(){
  const select = document.getElementById("proveedor");
  select.innerHTML = '<option value="">Seleccionar proveedor</option>';

  proveedores.forEach(p=>{
    const nombre = nombreProveedor(p);
    if(!nombre) return;

    const option = document.createElement("option");
    option.value = nombre;
    option.textContent = nombre;
    select.appendChild(option);
  });

  cargarArticulos();
}

function articulosDelProveedor(){
  const proveedor = document.getElementById("proveedor").value;

  return articulos.filter(a=>{
    return proveedorArticulo(a) === proveedor;
  });
}

function cargarArticulos(){
  const select = document.getElementById("articulo");
  select.innerHTML = '<option value="">Seleccionar artículo</option>';

  articulosDelProveedor().forEach(a=>{
    const nombre = nombreArticulo(a);
    if(!nombre) return;

    const option = document.createElement("option");
    option.value = nombre;
    option.textContent = nombre;
    select.appendChild(option);
  });

  document.getElementById("cantidad").value = "";
  avisarOfertaArticulo();
}

function buscarArticulo(nombre){
  const proveedor = document.getElementById("proveedor").value;

  return articulos.find(a=>{
    return nombreArticulo(a) === nombre && proveedorArticulo(a) === proveedor;
  });
}

function avisarOfertaArticulo(){
  const nombre = document.getElementById("articulo").value;
  const articulo = buscarArticulo(nombre);
  const aviso = document.getElementById("avisoOferta");

  if(articulo && ofertaArticulo(articulo)){
    aviso.textContent = "⚠ OFERTA ACTIVA: " + ofertaArticulo(articulo);
    aviso.style.display = "block";
  }else{
    aviso.textContent = "";
    aviso.style.display = "none";
  }
}

function anadirProducto(){
  const nombre = document.getElementById("articulo").value;
  const cantidad = Number(document.getElementById("cantidad").value || 0);

  if(!document.getElementById("proveedor").value){
    alert("Selecciona proveedor");
    return;
  }

  if(!nombre){
    alert("Selecciona artículo");
    return;
  }

  if(cantidad <= 0){
    alert("La cantidad tiene que ser mayor que 0");
    return;
  }

  const articulo = buscarArticulo(nombre);

  if(!articulo){
    alert("No encuentro el artículo");
    return;
  }

  lineasPedido.push({
    nombre:nombre,
    cantidad:cantidad,
    precio:precioArticulo(articulo),
    iva:ivaArticulo(articulo),
    oferta:ofertaArticulo(articulo)
  });

  document.getElementById("cantidad").value = "";
  pintarLineas();
}

function pintarLineas(){
  const tbody = document.getElementById("lineas");
  tbody.innerHTML = "";

  lineasPedido.forEach((linea,index)=>{
    const totalLinea = linea.cantidad * linea.precio;

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${linea.nombre}${linea.oferta ? " ⚠" : ""}</td>
      <td>${linea.cantidad}</td>
      <td>${formato(linea.precio)} €</td>
      <td>${linea.iva}%</td>
      <td>${formato(totalLinea)} €</td>
      <td>
        <button class="admin-boton rojo" onclick="eliminarLinea(${index})">Eliminar</button>
      </td>
    `;

    tbody.appendChild(tr);
  });

  calcularTotales();
}

function eliminarLinea(index){
  if(!adminActivo){
    alert("Solo administrador");
    return;
  }

  lineasPedido.splice(index,1);
  pintarLineas();
}

function calcularTotales(){
  let subtotal = 0;
  let iva4 = 0;
  let iva10 = 0;
  let iva21 = 0;

  lineasPedido.forEach(linea=>{
    const base = linea.cantidad * linea.precio;
    subtotal += base;

    if(Number(linea.iva) === 4) iva4 += base * 0.04;
    if(Number(linea.iva) === 10) iva10 += base * 0.10;
    if(Number(linea.iva) === 21) iva21 += base * 0.21;
  });

  const total = subtotal + iva4 + iva10 + iva21;

  document.getElementById("subtotal").textContent = formato(subtotal);
  document.getElementById("iva4").textContent = formato(iva4);
  document.getElementById("iva10").textContent = formato(iva10);
  document.getElementById("iva21").textContent = formato(iva21);
  document.getElementById("total").textContent = formato(total);
}

function cerrarPedido(){
  const proveedor = document.getElementById("proveedor").value;

  if(!proveedor){
    alert("Selecciona proveedor");
    return;
  }

  if(lineasPedido.length === 0){
    alert("No hay productos en el pedido");
    return;
  }

  calcularTotales();

  const totalPedido = document.getElementById("total").textContent;

  const pedidos = JSON.parse(localStorage.getItem("pedidos") || "[]");
  const pagos = JSON.parse(localStorage.getItem("pagos") || "[]");

  const pedido = {
    fecha:new Date().toLocaleDateString("es-ES"),
    proveedor:proveedor,
    lineas:lineasPedido,
    total:totalPedido,
    estado:"cerrado"
  };

  pedidos.push(pedido);

  pagos.push({
    fecha:new Date().toLocaleDateString("es-ES"),
    proveedor:proveedor,
    importe:totalPedido,
    estado:"pendiente"
  });

  localStorage.setItem("pedidos", JSON.stringify(pedidos));
  localStorage.setItem("pagos", JSON.stringify(pagos));

  alert("Pedido cerrado y enviado a pagos");

  lineasPedido = [];
  pintarLineas();
}

function activarAdmin(){
  const pin = prompt("Código administrador");

  if(pin !== PIN_ADMIN){
    alert("Código incorrecto");
    return;
  }

  adminActivo = !adminActivo;

  if(adminActivo){
    document.body.classList.add("admin-activo");
    alert("Administrador activado");
  }else{
    document.body.classList.remove("admin-activo");
    alert("Administrador desactivado");
  }
}

document.getElementById("proveedor").addEventListener("change", cargarArticulos);
document.getElementById("articulo").addEventListener("change", avisarOfertaArticulo);

cargarProveedores();
calcularTotales();
</script>

</body>
</html>
