<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEDIDOS</title>

<style>
body{
margin:0;
font-family:Arial;
background:#dfe6ec;
}

/* CABECERA */

header{
background:#17303d;
color:white;
padding:10px 15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.bloque-centro{
text-align:center;
}

.bloque-centro div{
font-size:12px;
}

/* PANEL */

.panel{
padding:15px;
}

/* LINEAS */

.linea{
display:grid;
grid-template-columns:2fr 1fr 1fr;
gap:10px;
background:white;
padding:10px;
border-radius:10px;
margin-bottom:8px;
align-items:center;
}

/* CONTROLES */

select, input{
padding:8px;
border-radius:8px;
border:none;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
background:#547184;
color:white;
cursor:pointer;
}

/* TOTALES */

.totales{
margin-top:20px;
background:white;
padding:15px;
border-radius:10px;
font-weight:bold;
}
</style>
</head>

<body>

<header>

<button onclick="volver()">←</button>

<div class="bloque-centro">
<div id="fecha"></div>
<div>PEDIDOS</div>
</div>

<div id="usuario"></div>

</header>

<div class="panel">

<!-- PROVEEDOR -->
<select id="proveedor" onchange="cargarArticulos()">
<option value="">Seleccionar proveedor</option>
<option value="MAHOU">MAHOU</option>
<option value="COCACOLA">COCACOLA</option>
</select>

<br><br>

<!-- LINEA -->
<div class="linea">
<select id="articulo"></select>
<input type="number" id="cantidad" placeholder="Unidades">
<button onclick="agregar()">Añadir</button>
</div>

<!-- LISTA -->
<div id="lista"></div>

<!-- TOTALES -->
<div class="totales">
<div>SUBTOTAL: <span id="subtotal">0</span> €</div>
<div>IVA: <span id="iva">0</span> €</div>
<div>TOTAL: <span id="total">0</span> €</div>
</div>

</div>

<script>

let pedido = [];

/* BASE DE ARTICULOS */
const articulos = {
MAHOU:[
{nombre:"CERVEZA", precio:1.20, iva:21},
{nombre:"TERCIO", precio:1.30, iva:21}
],
COCACOLA:[
{nombre:"COCA-COLA", precio:1.00, iva:21},
{nombre:"FANTA", precio:0.95, iva:21}
]
};

function cargarArticulos(){
let prov = document.getElementById("proveedor").value;
let select = document.getElementById("articulo");

select.innerHTML="";

if(!articulos[prov]) return;

articulos[prov].forEach(a=>{
let opt = document.createElement("option");
opt.value = JSON.stringify(a);
opt.text = a.nombre;
select.appendChild(opt);
});
}

function agregar(){

let datos = JSON.parse(document.getElementById("articulo").value);
let cantidad = parseInt(document.getElementById("cantidad").value);

if(!cantidad) return;

pedido.push({
...datos,
cantidad
});

render();
}

function render(){

let lista = document.getElementById("lista");
lista.innerHTML = "";

let subtotal = 0;
let totalIVA = 0;

pedido.forEach(item=>{

let linea = document.createElement("div");
linea.className="linea";

let importe = item.precio * item.cantidad;
let ivaCalc = importe * (item.iva/100);

subtotal += importe;
totalIVA += ivaCalc;

linea.innerHTML = `
<div>${item.nombre}</div>
<div>x${item.cantidad}</div>
<div>${importe.toFixed(2)} €</div>
`;

lista.appendChild(linea);

});

document.getElementById("subtotal").innerText = subtotal.toFixed(2);
document.getElementById("iva").innerText = totalIVA.toFixed(2);
document.getElementById("total").innerText = (subtotal + totalIVA).toFixed(2);
}

function volver(){
window.location.href="index.html";
}

/* USUARIO */
document.getElementById("usuario").innerText =
localStorage.getItem("usuario") || "OPERADOR";

/* FECHA AUTOMATICA */
function actualizarFecha(){
let d = new Date();
document.getElementById("fecha").innerText =
d.toLocaleDateString("es-ES") + " · " +
d.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"});
}

setInterval(actualizarFecha,1000);
actualizarFecha();

</script>

</body>
</html>
