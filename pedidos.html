<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEDIDOS · MONOLITO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f5;
  color:#17303d;
}

header{
  background:#17303d;
  color:white;
  padding:16px;
  font-weight:900;
  font-size:20px;
}

.contenedor{padding:16px;}

select{
  width:100%;
  padding:12px;
  border-radius:14px;
  margin-bottom:15px;
  font-size:16px;
}

.card{
  background:white;
  border-radius:16px;
  padding:12px;
  margin-bottom:10px;
}

.card.costeCero{
  border:3px solid #ff9800;
  background:#fff8ea;
}

.nombre{font-weight:900;font-size:17px;}
.detalle{color:#4f5f69;font-size:14px;margin-top:4px;}

.fila{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:8px;
  gap:10px;
}

input{
  width:80px;
  padding:10px;
  border-radius:12px;
  border:1px solid #ccc;
  text-align:center;
  font-size:16px;
}

.totalLinea{
  font-weight:900;
  font-size:16px;
}

.avisoCero{
  margin-top:8px;
  color:#c06b00;
  font-weight:900;
  font-size:13px;
}

.botonCero{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:0;
  border-radius:12px;
  font-weight:900;
  font-size:14px;
  background:#17303d;
  color:white;
}

.botonCero.activo{
  background:#ff9800;
  color:white;
}

.totalFinal{
  font-size:22px;
  font-weight:900;
  margin-top:20px;
}

button{
  width:100%;
  padding:14px;
  margin-top:15px;
  border:0;
  border-radius:14px;
  font-weight:900;
  font-size:16px;
}

.guardar{
  background:#48a530;
  color:white;
}

.volver{
  background:white;
  color:#17303d;
  width:auto;
  margin:0 10px 0 0;
  padding:7px 11px;
}
</style>
</head>

<body>

<header>
  <button class="volver" onclick="volver()">←</button>
  📝 PEDIDOS
</header>

<div class="contenedor">

<select id="proveedor" onchange="cargarArticulos()"></select>

<div id="articulos"></div>

<div class="totalFinal" id="totalFinal">TOTAL PAGO: 0,00 €</div>

<button class="guardar" onclick="guardarPedido()">Guardar pedido</button>

</div>

<script>

/* ===== USUARIO ===== */

function usuarioActual(){
  return localStorage.getItem("usuario") || "OPERADOR";
}

function esHostelero(){
  const u = usuarioActual().toUpperCase();
  return u === "JAVI" || u === "JAVIER" || u === "SILVIA";
}

function volver(){
  window.location.href = "index.html";
}

/* ===== DATOS ===== */

function leerArticulos(){
  return JSON.parse(localStorage.getItem("articulos") || "[]")
    .filter(a => a.activo !== false);
}

function leerProveedores(){
  let p = JSON.parse(localStorage.getItem("proveedores") || "[]")
    .filter(x => x.activo !== false);

  if(p.length===0){
    p = [
      {nombre:"CANDELAS"},
      {nombre:"TURRADO"},
      {nombre:"SANPEDRO"},
      {nombre:"DEO"}
    ];
  }

  return p;
}

/* ===== INIT ===== */

function cargarProveedores(){
  const proveedores = leerProveedores();

  document.getElementById("proveedor").innerHTML =
    `<option value="">Selecciona proveedor</option>` +
    proveedores.map(p =>
      `<option value="${p.nombre}">${p.nombre}</option>`
    ).join("");
}

let pedido = [];

/* ===== ARTICULOS ===== */

function cargarArticulos(){

  const proveedor = document.getElementById("proveedor").value;

  const articulos = leerArticulos().filter(a =>
    a.proveedor === proveedor
  );

  pedido = articulos.map(a => ({
    ...a,
    cantidad:0,
    costeCero:false,
    excluirRappel:false
  }));

  pintar();
}

function pintar(){

  let html = "";

  pedido.forEach((a,i)=>{

    const precioCaja = Number(a.precioUnidad || 0) * Number(a.formato || 1);
    const lineaPago = a.costeCero ? 0 : Number(a.cantidad || 0) * precioCaja;

    html += `
    <div class="card ${a.costeCero ? "costeCero" : ""}">

      <div class="nombre">${a.articulo}</div>

      <div class="detalle">
        ${a.unidadFormato} · ${Number(a.precioUnidad || 0).toFixed(2)} € · IVA ${a.iva}%
      </div>

      <div class="fila">
        <input type="number" value="${a.cantidad}"
          onfocus="this.select()" onclick="this.select()"
          onchange="cambiar(${i}, this.value)">

        <div class="totalLinea" id="t${i}">
          ${lineaPago.toFixed(2)} €
        </div>
      </div>

      ${
        esHostelero() ? `
          <button class="botonCero ${a.costeCero ? "activo" : ""}" onclick="toggleCosteCero(${i})">
            ${a.costeCero ? "✅ COSTE 0 € ACTIVADO" : "Marcar COSTE 0 €"}
          </button>
        ` : ""
      }

      ${
        a.costeCero ? `
          <div class="avisoCero">
            COSTE 0 € · Cuenta en consumo/histórico · No suma pagos · No suma RAPPEL
          </div>
        ` : ""
      }

    </div>
    `;
  });

  document.getElementById("articulos").innerHTML = html;

  calcular();
}

/* ===== CAMBIOS ===== */

function cambiar(i, valor){
  pedido[i].cantidad = Number(valor || 0);
  calcular();
}

function toggleCosteCero(i){
  if(!esHostelero()){
    alert("Solo hostelería puede marcar coste 0 €");
    return;
  }

  pedido[i].costeCero = !pedido[i].costeCero;
  pedido[i].excluirRappel = pedido[i].costeCero;

  pintar();
}

/* ===== CALCULO ===== */

function calcular(){

  let totalPago = 0;

  pedido.forEach((a,i)=>{

    let precioCaja = Number(a.precioUnidad || 0) * Number(a.formato || 1);
    let linea = Number(a.cantidad || 0) * precioCaja;

    let lineaPago = a.costeCero ? 0 : linea;

    totalPago += lineaPago;

    const celda = document.getElementById("t"+i);

    if(celda){
      celda.textContent = lineaPago.toFixed(2) + " €";
    }
  });

  document.getElementById("totalFinal").textContent =
    "TOTAL PAGO: " + totalPago.toFixed(2) + " €";
}

/* ===== GUARDAR ===== */

function guardarPedido(){

  const proveedor = document.getElementById("proveedor").value;

  if(!proveedor){
    alert("Selecciona proveedor");
    return;
  }

  const lineas = pedido.filter(a => Number(a.cantidad || 0) > 0);

  if(lineas.length === 0){
    alert("Sin cantidades");
    return;
  }

  const ahora = new Date();

  const lineasFinal = lineas.map(a => {

    const precioOriginalSinIva = Number(a.precioUnidad || 0) * Number(a.formato || 1);
    const costeCero = a.costeCero === true;

    return {
      articulo: a.articulo,
      proveedor: proveedor,
      cantidad: Number(a.cantidad || 0),
      unidadFormato: a.unidadFormato || "",
      formato: Number(a.formato || 1),
      iva: Number(a.iva || 21),

      precioOriginalSinIva: precioOriginalSinIva,

      precioSinIva: costeCero ? 0 : precioOriginalSinIva,

      costeCero: costeCero,
      excluirRappel: costeCero,
      cuentaConsumo: true
    };
  });

  const totalPago = lineasFinal.reduce((t,l)=>
    t + (l.cantidad * l.precioSinIva)
  ,0);

  const pedidoGuardado = {
    proveedor,
    fecha: ahora.toLocaleString("es-ES"),
    usuario: usuarioActual(),
    totalPago,
    lineas: lineasFinal
  };

  let historico = JSON.parse(localStorage.getItem("pedidos_historico") || "[]");
  historico.unshift(pedidoGuardado);
  localStorage.setItem("pedidos_historico", JSON.stringify(historico));

  if(totalPago > 0){
    let pagos = JSON.parse(localStorage.getItem("pagos_pendientes") || "[]");
    pagos.unshift({
      proveedor,
      fecha: ahora.toLocaleString("es-ES"),
      total: totalPago,
      lineas: lineasFinal.filter(l => !l.costeCero)
    });

    localStorage.setItem("pagos_pendientes", JSON.stringify(pagos));
  }

  if(totalPago === 0){
    alert("Pedido COSTE 0 € guardado en histórico. No genera pago pendiente.");
  }else{
    alert("Pedido guardado correctamente");
  }

  location.reload();
}

/* ===== START ===== */

cargarProveedores();

</script>

</body>
</html>
