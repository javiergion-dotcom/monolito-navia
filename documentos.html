<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOCUMENTOS · MONOLITO</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#eef2f5;color:#17303d}
header{background:#17303d;color:white;padding:16px;display:flex;align-items:center;gap:10px;font-weight:900;font-size:20px}
.volver{background:white;color:#17303d;border:0;border-radius:12px;padding:8px 12px;font-weight:900}
.contenido{padding:16px}
.card{background:white;border-radius:22px;padding:16px;margin-bottom:14px;box-shadow:0 8px 18px rgba(0,0,0,.12)}
label{display:block;font-weight:900;margin-top:12px;margin-bottom:6px}
input,select,textarea{width:100%;padding:12px;border-radius:14px;border:1px solid #b8c2ca;font-size:16px}
textarea{min-height:80px}
button{border:0;border-radius:14px;padding:12px;font-weight:900;font-size:15px;cursor:pointer}
.guardar{width:100%;background:#48a530;color:white;margin-top:14px}
.borrar{width:100%;background:#c00000;color:white;margin-top:10px}
.abrir{width:100%;background:#17303d;color:white;margin-top:10px}
.titulo{font-size:20px;font-weight:900}
.detalle{color:#4f5f69;margin-top:6px;font-size:14px}
.etiqueta{display:inline-block;background:#eef2f5;border-radius:999px;padding:5px 10px;font-weight:900;font-size:12px;margin-top:8px}
.acuerdo{background:#fff1c7;color:#9a6a00}
.vacio{background:white;border-radius:22px;padding:18px;text-align:center;font-weight:900}
.filtros{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.aviso{font-size:13px;color:#7a4d00;background:#fff6d8;border-radius:12px;padding:10px;margin-top:10px;font-weight:800}
</style>
</head>

<body>

<header>
  <button id="btnVolver" class="volver">←</button>
  📂 DOCUMENTOS
</header>

<div class="contenido">

  <div class="card">
    <div class="titulo">Guardar documento</div>

    <label>Nombre del documento</label>
    <input id="nombre" placeholder="Ej: Acuerdo Mahou 2026">

    <label>Categoría</label>
    <select id="categoria">
      <option value="ACUERDOS">ACUERDOS</option>
      <option value="FACTURAS">FACTURAS</option>
      <option value="CONTRATOS">CONTRATOS</option>
      <option value="LICENCIAS">LICENCIAS</option>
      <option value="INCIDENCIAS">INCIDENCIAS</option>
      <option value="OTROS">OTROS</option>
    </select>

    <label>Año</label>
    <input id="anio" type="number">

    <label>Archivo / foto / PDF</label>
    <input id="archivo" type="file" accept="image/*,.pdf">

    <label>Nota</label>
    <textarea id="nota" placeholder="Observación, condiciones, explicación..."></textarea>

    <div class="aviso">
      Las fotos se reducen automáticamente para ocupar menos espacio. Los PDF deben ser pequeños.
    </div>

    <button id="btnGuardar" class="guardar">💾 Guardar documento</button>
  </div>

  <div class="card">
    <div class="titulo">Buscar / filtrar</div>

    <div class="filtros">
      <select id="filtroCategoria">
        <option value="">Todas</option>
        <option value="ACUERDOS">ACUERDOS</option>
        <option value="FACTURAS">FACTURAS</option>
        <option value="CONTRATOS">CONTRATOS</option>
        <option value="LICENCIAS">LICENCIAS</option>
        <option value="INCIDENCIAS">INCIDENCIAS</option>
        <option value="OTROS">OTROS</option>
      </select>

      <input id="filtroAnio" type="number" placeholder="Año">
    </div>
  </div>

  <div id="lista"></div>

</div>

<script type="module">
import {
  leerColeccion,
  guardarColeccion,
  escucharColeccion,
  borrarDocumento
} from "./monolito-cloud.js";

let documentos = [];

const COLECCION = "documentos";

function usuarioActual(){
  return localStorage.getItem("usuario") || "JAVI";
}

function esHostelero(){
  const u = usuarioActual().toUpperCase();
  return u === "JAVI" || u === "JAVIER" || u === "SILVIA";
}

function protegerAcceso(){
  if(!esHostelero()){
    alert("⚠ ACCESO SOLO HOSTELERÍA");
    window.location.href="index.html";
  }
}

function hoyAnio(){
  return new Date().getFullYear();
}

function crearId(texto){
  return String(texto || "documento")
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9]+/g,"_")
    .replace(/^_+|_+$/g,"")
    + "_" + Date.now();
}

function esc(txt){
  return String(txt || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function comprimirImagen(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();

    reader.onload = function(e){
      const img = new Image();

      img.onload = function(){
        const maxAncho = 1200;
        const maxAlto = 1200;

        let ancho = img.width;
        let alto = img.height;

        if(ancho > maxAncho || alto > maxAlto){
          const ratio = Math.min(maxAncho / ancho, maxAlto / alto);
          ancho = Math.round(ancho * ratio);
          alto = Math.round(alto * ratio);
        }

        const canvas = document.createElement("canvas");
        canvas.width = ancho;
        canvas.height = alto;

        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, ancho, alto);

        const dataUrl = canvas.toDataURL("image/jpeg", 0.65);

        resolve({
          archivo:dataUrl,
          tipo:"image/jpeg",
          nombre:file.name.replace(/\.[^/.]+$/, "") + "_optimizado.jpg"
        });
      };

      img.onerror = reject;
      img.src = e.target.result;
    };

    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function leerArchivoNormal(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();

    reader.onload = function(e){
      resolve({
        archivo:e.target.result,
        tipo:file.type || "application/pdf",
        nombre:file.name
      });
    };

    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function guardarLista(){
  await guardarColeccion(COLECCION, documentos);
}

async function guardarDocumentoNuevo(){
  const nombre = document.getElementById("nombre").value.trim();
  const categoria = document.getElementById("categoria").value;
  const anio = Number(document.getElementById("anio").value || hoyAnio());
  const nota = document.getElementById("nota").value.trim();
  const file = document.getElementById("archivo").files[0];

  if(!nombre){
    alert("Pon un nombre al documento.");
    return;
  }

  if(!file){
    alert("Selecciona una foto, imagen o PDF.");
    return;
  }

  let archivoFinal;

  try{
    if(file.type.startsWith("image/")){
      archivoFinal = await comprimirImagen(file);
    }else{
      if(file.size > 700 * 1024){
        alert("PDF demasiado grande para guardar en esta versión. Usa uno menor de 700 KB.");
        return;
      }

      archivoFinal = await leerArchivoNormal(file);
    }
  }catch(e){
    alert("No se pudo procesar el archivo.");
    return;
  }

  const nuevo = {
    id: crearId(nombre),
    nombre,
    categoria,
    anio,
    nota,
    archivoNombre:archivoFinal.nombre,
    archivoTipo:archivoFinal.tipo,
    archivo:archivoFinal.archivo,
    usuario:usuarioActual(),
    fecha:new Date().toLocaleString("es-ES"),
    actualizadoEn:new Date().toISOString()
  };

  documentos.unshift(nuevo);

  await guardarLista();

  document.getElementById("nombre").value="";
  document.getElementById("nota").value="";
  document.getElementById("archivo").value="";

  pintar();

  alert("Documento guardado.");
}

function abrirDocumentoGuardado(id){
  const doc = documentos.find(d => String(d.id) === String(id));
  if(!doc) return;

  const w = window.open();

  w.document.write(`
    <html>
      <head><title>${esc(doc.nombre)}</title></head>
      <body style="margin:0;background:#222">
        ${
          String(doc.archivoTipo || "").includes("pdf")
          ? `<iframe src="${doc.archivo}" style="width:100%;height:100vh;border:0"></iframe>`
          : `<img src="${doc.archivo}" style="max-width:100%;display:block;margin:auto">`
        }
      </body>
    </html>
  `);
}

async function borrarDocumentoGuardado(id){
  if(!confirm("¿Borrar este documento?")) return;

  documentos = documentos.filter(d => String(d.id) !== String(id));

  await borrarDocumento(COLECCION, id);

  pintar();
}

function pintar(){
  let data = [...documentos];

  const filtroCategoria = document.getElementById("filtroCategoria").value;
  const filtroAnio = document.getElementById("filtroAnio").value;

  if(filtroCategoria){
    data = data.filter(d => d.categoria === filtroCategoria);
  }

  if(filtroAnio){
    data = data.filter(d => Number(d.anio) === Number(filtroAnio));
  }

  data.sort((a,b)=> String(b.actualizadoEn || b.fecha || "").localeCompare(String(a.actualizadoEn || a.fecha || "")));

  let html = "";

  if(data.length === 0){
    html = `<div class="vacio">No hay documentos guardados.</div>`;
  }

  data.forEach(d=>{
    html += `
      <div class="card">
        <div class="titulo">${esc(d.nombre)}</div>
        <div class="etiqueta ${d.categoria === "ACUERDOS" ? "acuerdo" : ""}">
          ${esc(d.categoria)} · ${esc(d.anio)}
        </div>

        <div class="detalle">Archivo: ${esc(d.archivoNombre || "-")}</div>
        ${d.nota ? `<div class="detalle">Nota: ${esc(d.nota)}</div>` : ""}
        <div class="detalle">Guardado por: ${esc(d.usuario || "OPERADOR")} · ${esc(d.fecha || "")}</div>

        <button class="abrir" data-accion="abrir" data-id="${esc(d.id)}">👁 Ver documento</button>
        <button class="borrar" data-accion="borrar" data-id="${esc(d.id)}">🗑 Borrar</button>
      </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;
}

function volver(){
  window.location.href="index.html";
}

function activarBotones(){
  document.getElementById("btnVolver").addEventListener("click", volver);
  document.getElementById("btnGuardar").addEventListener("click", guardarDocumentoNuevo);

  document.getElementById("filtroCategoria").addEventListener("change", pintar);
  document.getElementById("filtroAnio").addEventListener("input", pintar);

  document.getElementById("lista").addEventListener("click", function(e){
    const btn = e.target.closest("button");
    if(!btn) return;

    const accion = btn.dataset.accion;
    const id = btn.dataset.id;

    if(accion === "abrir") abrirDocumentoGuardado(id);
    if(accion === "borrar") borrarDocumentoGuardado(id);
  });
}

async function iniciar(){
  protegerAcceso();

  document.getElementById("anio").value = hoyAnio();
  document.getElementById("filtroAnio").value = hoyAnio();

  activarBotones();

  escucharColeccion(COLECCION, async (lista)=>{
    documentos = lista;
    pintar();
  });

  const nube = await leerColeccion(COLECCION);

  if(nube.length === 0){
    const localViejo = localStorage.getItem("documentos_monolito");

    if(localViejo){
      try{
        const recuperados = JSON.parse(localViejo).map(d => ({
          ...d,
          id: d.id ? String(d.id) : crearId(d.nombre),
          actualizadoEn: d.actualizadoEn || new Date().toISOString()
        }));

        if(recuperados.length > 0){
          documentos = recuperados;
          await guardarLista();
          pintar();
        }
      }catch(e){}
    }
  }
}

iniciar();
</script>

</body>
</html>
