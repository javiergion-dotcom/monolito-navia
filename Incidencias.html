<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INCIDENCIAS · MONOLITO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f5;
  color:#17303d;
}

header{
  background:#17303d;
  color:white;
  padding:16px;
  font-weight:900;
  font-size:20px;
}

.proveedor{
  margin-top:25px;
  padding:10px;
  border-top:2px solid #17303d;
  font-weight:900;
}

.card{
  background:white;
  margin:10px;
  padding:12px;
  border-radius:14px;
}

.rojo{
  color:#c00000;
  font-weight:900;
}

.verde{
  color:#4caf50;
  font-weight:900;
}

button{
  border:0;
  border-radius:10px;
  padding:8px 12px;
  font-weight:800;
  margin-top:8px;
}

.resolver{
  background:#4caf50;
  color:white;
}
</style>
</head>

<body>

<header>📁 INCIDENCIAS</header>

<div id="lista"></div>

<script>

function leerIncidencias(){
  return JSON.parse(localStorage.getItem("incidencias") || "[]");
}

function guardarIncidencias(data){
  localStorage.setItem("incidencias", JSON.stringify(data));
}

function pintar(){

  let data = leerIncidencias();

  // Agrupar por proveedor
  let grupos = {};

  data.forEach(i=>{
    if(!grupos[i.proveedor]) grupos[i.proveedor] = [];
    grupos[i.proveedor].push(i);
  });

  let html = "";

  for(let prov in grupos){

    html += `<div class="proveedor">${prov}</div>`;

    grupos[prov].forEach((i,idx)=>{

      html += `
      <div class="card">

        <div class="${i.resuelta ? 'verde' : 'rojo'}">
          ${i.resuelta ? '✔ RESUELTA' : '⚠ ABIERTA'}
        </div>

        <div><b>Motivo:</b> ${i.motivo}</div>
        <div><b>Solución:</b> ${i.solucion}</div>

        <div style="margin-top:6px;font-size:12px;">
          Creada por: ${i.creadaPor} · ${i.fecha}
        </div>

        ${i.resuelta ? `
          <div style="margin-top:6px;font-size:12px;">
            Resuelta por: ${i.resueltaPor} · ${i.fechaResolucion}
          </div>
        ` : `
          <button class="resolver" onclick="resolver(${i.id})">
            ✔ Marcar resuelta
          </button>
        `}

      </div>
      `;
    });
  }

  document.getElementById("lista").innerHTML = html;
}

function resolver(id){

  let data = leerIncidencias();
  let operador = localStorage.getItem("usuario") || "CAMARERO";

  data = data.map(i=>{
    if(i.id === id){
      i.resuelta = true;
      i.resueltaPor = operador;
      i.fechaResolucion = new Date().toLocaleString();
    }
    return i;
  });

  guardarIncidencias(data);
  pintar();
}

pintar();

</script>

</body>
</html>
