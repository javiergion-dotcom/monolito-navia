<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAPEL · MONOLITO</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#eef2f5;
  color:#17303d;
}

header{
  background:#17303d;
  color:white;
  padding:16px;
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:900;
  font-size:20px;
}

.volver{
  background:white;
  color:#17303d;
  border:0;
  border-radius:12px;
  padding:8px 12px;
  font-weight:900;
}

.contenedor{
  padding:16px;
}

.nuevo{
  width:100%;
  background:#ff9800;
  color:white;
  border:0;
  border-radius:16px;
  padding:16px;
  font-size:18px;
  font-weight:900;
  margin-bottom:16px;
}

.card{
  background:white;
  border-radius:20px;
  padding:16px;
  margin-bottom:14px;
  box-shadow:0 8px 18px rgba(0,0,0,.10);
}

label{
  display:block;
  margin-top:10px;
  font-weight:900;
  font-size:14px;
}

input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #c5ced6;
  margin-top:6px;
  font-size:16px;
}

.totalLinea{
  margin-top:14px;
  font-size:22px;
  font-weight:900;
}

.botones{
  display:flex;
  gap:8px;
  margin-top:14px;
}

.borrar{
  flex:1;
  background:#c00000;
  color:white;
  border:0;
  border-radius:12px;
  padding:12px;
  font-weight:900;
}

.totalGeneral{
  background:#17303d;
  color:white;
  border-radius:20px;
  padding:20px;
  text-align:center;
  font-size:26px;
  font-weight:900;
  margin-top:20px;
}
</style>
</head>

<body>

<header>
  <button class="volver" onclick="volver()">⬅</button>
  💶 RAPEL
</header>

<div class="contenedor">

  <button class="nuevo" onclick="nuevoArticulo()">
    ➕ Añadir artículo
  </button>

  <div id="lista"></div>

  <div class="totalGeneral" id="totalGeneral">
    TOTAL GENERAL: 0,00 €
  </div>

</div>

<script>

function usuarioActual(){
  return localStorage.getItem("usuario") || "OPERADOR";
}

function esHostelero(){
  const u = usuarioActual().toUpperCase();
  return u === "JAVI" || u === "JAVIER" || u === "SILVIA";
}

function protegerAcceso(){
  if(!esHostelero()){
    alert("⚠ ACCESO SOLO HOSTELERÍA");
    window.location.href = "index.html";
  }
}

protegerAcceso();

function volver(){
  window.location.href = "index.html";
}

function euros(n){
  return Number(n || 0)
    .toFixed(2)
    .replace(".",",") + " €";
}

function leerRapel(){
  return JSON.parse(localStorage.getItem("rapel") || "[]");
}

function guardarRapel(data){
  localStorage.setItem("rapel", JSON.stringify(data));
}

function nuevoArticulo(){

  let data = leerRapel();

  data.push({
    articulo:"",
    unidades:0,
    precio:0,
    porcentaje:0
  });

  guardarRapel(data);

  pintar();
}

function calcularLinea(r){

  return (
    Number(r.unidades || 0) *
    Number(r.precio || 0) *
    (Number(r.porcentaje || 0) / 100)
  );
}

function actualizar(i,campo,valor){

  let data = leerRapel();

  if(campo === "articulo"){

    data[i][campo] = valor.toUpperCase();

    guardarRapel(data);

  }else{

    data[i][campo] = Number(valor || 0);

    guardarRapel(data);

    pintar();
  }
}

function borrarLinea(i){

  if(!confirm("¿Borrar esta línea de rápel?")) return;

  let data = leerRapel();

  data.splice(i,1);

  guardarRapel(data);

  pintar();
}

function pintar(){

  let data = leerRapel();

  let html = "";

  let totalGeneral = 0;

  data.forEach((r,i)=>{

    let totalLinea = calcularLinea(r);

    totalGeneral += totalLinea;

    html += `
      <div class="card">

        <label>Artículo</label>

        <input
          value="${r.articulo || ""}"
          placeholder="Ej: MAHOU 5 ESTRELLAS"
          oninput="actualizar(${i},'articulo',this.value)"
        >

        <label>Unidades / litros que vienen de pedidos</label>

        <input
          type="number"
          value="${r.unidades || ""}"
          onfocus="this.select()"
          onclick="this.select()"
          oninput="actualizar(${i},'unidades',this.value)"
        >

        <label>Precio</label>

        <input
          type="number"
          step="0.0001"
          value="${r.precio || ""}"
          onfocus="this.select()"
          onclick="this.select()"
          oninput="actualizar(${i},'precio',this.value)"
        >

        <label>Porcentaje rápel</label>

        <input
          type="number"
          step="0.01"
          value="${r.porcentaje || ""}"
          onfocus="this.select()"
          onclick="this.select()"
          oninput="actualizar(${i},'porcentaje',this.value)"
        >

        <div class="totalLinea">
          TOTAL: ${euros(totalLinea)}
        </div>

        <div class="botones">
          <button class="borrar" onclick="borrarLinea(${i})">
            🗑 Borrar
          </button>
        </div>

      </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;

  document.getElementById("totalGeneral").textContent =
    "TOTAL GENERAL: " + euros(totalGeneral);
}

pintar();

</script>

</body>
</html>
