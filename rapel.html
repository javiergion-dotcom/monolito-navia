<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAPPEL · MONOLITO</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#eef2f5;color:#17303d}
header{background:#17303d;color:white;padding:16px;display:flex;align-items:center;gap:10px;font-weight:900;font-size:20px}
.volver{background:white;color:#17303d;border:0;border-radius:12px;padding:8px 12px;font-weight:900}
.contenedor{padding:16px}
.bloque,.card{background:white;border-radius:18px;padding:14px;margin-bottom:14px;box-shadow:0 6px 14px rgba(0,0,0,.08)}
label{display:block;font-weight:900;margin-top:10px;font-size:14px}
input{width:100%;padding:12px;border-radius:12px;border:1px solid #c5ced6;margin-top:6px;font-size:16px}
.datoAuto{background:#f1f4f7;border-radius:12px;padding:13px;margin-top:6px;font-weight:900;color:#4f5f69}
button{border:0;border-radius:14px;padding:13px;font-weight:900;font-size:16px;cursor:pointer}
.guardar{width:100%;background:#48a530;color:white;margin-top:14px}
.nuevo{width:100%;background:#ff9800;color:white;margin-bottom:14px}
.borrar{background:#c00000;color:white;width:100%;margin-top:10px}
.titulo{font-size:20px;font-weight:900}
.detalle{margin-top:6px;color:#4f5f69}
.totalLinea{margin-top:10px;font-size:20px;font-weight:900}
.totalGeneral{background:#17303d;color:white;border-radius:18px;padding:18px;text-align:center;font-size:24px;font-weight:900;margin-top:18px}
.vacio{background:white;border-radius:18px;padding:18px;text-align:center;font-weight:900}
</style>
</head>

<body>

<header>
  <button id="btnVolver" class="volver">←</button>
  💶 RAPPEL
</header>

<div class="contenedor">

<div class="bloque">
  <label>Año</label>
  <input id="anio" type="number">

  <label>Proveedor</label>
  <input id="proveedor" placeholder="Ej: TURRADO / MAHOU">

  <label>Artículo</label>
  <input id="articulo" placeholder="Ej: MAHOU 5 ESTRELLAS">

  <label>Litros por unidad de compra</label>
  <input id="litrosUnidad" type="number" step="0.001" placeholder="Ej: caja tercios 7.92 / barril 30">

  <label>Litros acumulados desde pedidos</label>
  <div class="datoAuto" id="litrosAuto">0,00 litros</div>

  <label>Precio litro</label>
  <input id="precioLitro" type="number" step="0.0001">

  <label>Porcentaje rappel</label>
  <input id="porcentaje" type="number" step="0.01">

  <button id="btnGuardar" class="guardar">💾 Guardar condición anual</button>
</div>

<button id="btnNuevo" class="nuevo">➕ Nueva condición</button>

<div id="lista"></div>

<div class="totalGeneral" id="totalGeneral">TOTAL GENERAL: 0,00 €</div>

</div>

<script type="module">
import {
  leerColeccion,
  guardarColeccion,
  escucharColeccion,
  borrarDocumento
} from "./monolito-cloud.js";

const COLECCION_RAPEL = "rapel_anual";

let condiciones = [];
let pedidos = [];
let editandoId = "";

function usuarioActual(){
  return localStorage.getItem("usuario") || "OPERADOR";
}

function esHostelero(){
  const u = usuarioActual().toUpperCase();
  return u === "JAVI" || u === "JAVIER" || u === "SILVIA";
}

function protegerAcceso(){
  if(!esHostelero()){
    alert("⚠ ACCESO SOLO HOSTELERÍA");
    window.location.href = "index.html";
  }
}

protegerAcceso();

function volver(){
  window.location.href = "index.html";
}

function euros(n){
  return Number(n || 0).toFixed(2).replace(".",",") + " €";
}

function litrosTxt(n){
  return Number(n || 0).toFixed(2).replace(".",",") + " litros";
}

function normalizar(t){
  return String(t || "")
    .trim()
    .toUpperCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

function crearId(anio, proveedor, articulo){
  return "rapel_" +
    String(anio) + "_" +
    normalizar(proveedor).toLowerCase().replace(/[^a-z0-9]+/g,"_") + "_" +
    normalizar(articulo).toLowerCase().replace(/[^a-z0-9]+/g,"_");
}

function calcularLitrosAutomaticos(r){
  let litros = 0;

  pedidos.forEach(p=>{
    const fecha = p.fechaISO || p.fecha || p.fechaRegistro || "";
    const textoFecha = String(fecha);

    if(!textoFecha.includes(String(r.anio))){
      if(p.fechaMs){
        const anioPedido = new Date(Number(p.fechaMs)).getFullYear();
        if(Number(anioPedido) !== Number(r.anio)) return;
      }else{
        return;
      }
    }

    const lineas = p.lineas || [];

    lineas.forEach(l=>{
      if(l.costeCero || l.excluirRappel) return;

      const proveedorLinea = normalizar(l.proveedor || p.proveedor || "");
      const articuloLinea = normalizar(l.articulo || l.nombre || l.producto || "");

      if(proveedorLinea !== normalizar(r.proveedor)) return;

      if(
        !articuloLinea.includes(normalizar(r.articulo)) &&
        !normalizar(r.articulo).includes(articuloLinea)
      ){
        return;
      }

      const unidades =
        Number(l.cantidadTotalRappel || 0) ||
        Number(l.cantidad || l.unidades || l.uds || l.pedir || 0);

      litros += unidades * Number(r.litrosUnidad || 0);
    });
  });

  return litros;
}

function calcularTotal(r){
  const litros = calcularLitrosAutomaticos(r);
  return litros * Number(r.precioLitro || 0) * (Number(r.porcentaje || 0) / 100);
}

function limpiarFormulario(){
  editandoId = "";
  document.getElementById("anio").value = new Date().getFullYear();
  document.getElementById("proveedor").value = "";
  document.getElementById("articulo").value = "";
  document.getElementById("litrosUnidad").value = "";
  document.getElementById("litrosAuto").textContent = litrosTxt(0);
  document.getElementById("precioLitro").value = "";
  document.getElementById("porcentaje").value = "";
}

async function guardarCondicion(){
  const anio = Number(document.getElementById("anio").value || new Date().getFullYear());
  const proveedor = normalizar(document.getElementById("proveedor").value);
  const articulo = normalizar(document.getElementById("articulo").value);
  const litrosUnidad = Number(document.getElementById("litrosUnidad").value || 0);
  const precioLitro = Number(document.getElementById("precioLitro").value || 0);
  const porcentaje = Number(document.getElementById("porcentaje").value || 0);

  if(!proveedor){
    alert("Falta el proveedor.");
    return;
  }

  if(!articulo){
    alert("Falta el artículo.");
    return;
  }

  const id = editandoId || crearId(anio, proveedor, articulo);

  const registro = {
    id,
    anio,
    proveedor,
    articulo,
    litrosUnidad,
    precioLitro,
    porcentaje,
    actualizadoPor: usuarioActual(),
    actualizado: new Date().toLocaleString("es-ES"),
    actualizadoEn: new Date().toISOString()
  };

  const existe = condiciones.find(r => String(r.id) === String(id));

  if(existe){
    condiciones = condiciones.map(r => String(r.id) === String(id) ? registro : r);
  }else{
    condiciones.unshift(registro);
  }

  await guardarColeccion(COLECCION_RAPEL, condiciones);

  limpiarFormulario();
  pintar();
}

async function borrarCondicion(id){
  if(!confirm("¿Borrar esta condición de rappel?")) return;

  condiciones = condiciones.filter(r => String(r.id) !== String(id));
  await borrarDocumento(COLECCION_RAPEL, id);

  pintar();
}

function cargarEnFormulario(id){
  const r = condiciones.find(x => String(x.id) === String(id));
  if(!r) return;

  editandoId = r.id;

  document.getElementById("anio").value = r.anio || new Date().getFullYear();
  document.getElementById("proveedor").value = r.proveedor || "";
  document.getElementById("articulo").value = r.articulo || "";
  document.getElementById("litrosUnidad").value = r.litrosUnidad || "";
  document.getElementById("litrosAuto").textContent = litrosTxt(calcularLitrosAutomaticos(r));
  document.getElementById("precioLitro").value = r.precioLitro || "";
  document.getElementById("porcentaje").value = r.porcentaje || "";

  window.scrollTo({top:0,behavior:"smooth"});
}

function pintar(){
  let html = "";
  let totalGeneral = 0;

  if(condiciones.length === 0){
    html = `<div class="vacio">No hay condiciones de rappel todavía.</div>`;
  }

  condiciones.forEach((r)=>{
    const litros = calcularLitrosAutomaticos(r);
    const total = calcularTotal(r);
    totalGeneral += total;

    html += `
      <div class="card">
        <div class="titulo">${r.articulo}</div>
        <div class="detalle">Proveedor: <strong>${r.proveedor}</strong></div>
        <div class="detalle">Año: ${r.anio}</div>
        <div class="detalle">Litros por unidad de compra: <strong>${litrosTxt(r.litrosUnidad)}</strong></div>
        <div class="detalle">Litros acumulados desde pedidos: <strong>${litrosTxt(litros)}</strong></div>
        <div class="detalle">Precio litro: ${euros(r.precioLitro)}</div>
        <div class="detalle">Porcentaje: ${Number(r.porcentaje || 0).toFixed(2).replace(".",",")}%</div>
        <div class="totalLinea">TOTAL GENERADO: ${euros(total)}</div>
        <div class="detalle">Última actualización: ${r.actualizado || ""} · ${r.actualizadoPor || ""}</div>

        <button class="guardar" data-accion="editar" data-id="${r.id}">Editar condición</button>
        <button class="borrar" data-accion="borrar" data-id="${r.id}">🗑 Borrar</button>
      </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;
  document.getElementById("totalGeneral").textContent = "TOTAL GENERAL: " + euros(totalGeneral);
}

function activarBotones(){
  document.getElementById("btnVolver").addEventListener("click", volver);
  document.getElementById("btnGuardar").addEventListener("click", guardarCondicion);
  document.getElementById("btnNuevo").addEventListener("click", limpiarFormulario);

  ["anio","litrosUnidad","precioLitro","porcentaje"].forEach(id=>{
    const el = document.getElementById(id);
    el.addEventListener("focus", function(){this.select()});
    el.addEventListener("click", function(){this.select()});
  });

  document.getElementById("lista").addEventListener("click", function(e){
    const btn = e.target.closest("button");
    if(!btn) return;

    const accion = btn.dataset.accion;
    const id = btn.dataset.id;

    if(accion === "editar") cargarEnFormulario(id);
    if(accion === "borrar") borrarCondicion(id);
  });
}

async function iniciar(){
  activarBotones();
  limpiarFormulario();

  condiciones = await leerColeccion(COLECCION_RAPEL);
  pedidos = await leerColeccion("pedidos_historico");

  pintar();

  escucharColeccion(COLECCION_RAPEL, (lista)=>{
    condiciones = lista;
    pintar();
  });

  escucharColeccion("pedidos_historico", (lista)=>{
    pedidos = lista;
    pintar();
  });
}

iniciar();
</script>

</body>
</html>
