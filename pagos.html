<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAGOS · MONOLITO</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#dfe6ec;
  color:#17303d;
}

header{
  background:#17303d;
  color:white;
  padding:18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

button{
  border:0;
  border-radius:18px;
  padding:13px 16px;
  font-weight:800;
  font-size:16px;
  cursor:pointer;
}

.volver{
  background:#eef2f5;
  color:#17303d;
}

.contenido{
  padding:18px;
}

.resumen{
  background:white;
  border-radius:24px;
  padding:16px;
  margin-bottom:18px;
  box-shadow:0 8px 18px rgba(0,0,0,.12);
}

.bloque{
  background:white;
  border-radius:26px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:0 10px 22px rgba(0,0,0,.15);
}

.fila{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
}

.nombre{
  font-size:25px;
  font-weight:900;
}

.importe{
  font-size:25px;
  font-weight:900;
  white-space:nowrap;
}

.detalle{
  margin-top:9px;
  font-size:17px;
  color:#4f5f69;
}

.estado{
  margin-top:9px;
  font-size:17px;
}

.botones{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:16px;
}

.btn-pagado{
  background:#3fa72b;
  color:white;
}

.btn-incidencia{
  background:#ff0000;
  color:white;
}

.btn-cuenta{
  background:#f6ae1b;
  color:white;
  grid-column:1 / 3;
}

.sello{
  display:inline-block;
  margin-top:10px;
  margin-right:6px;
  padding:7px 12px;
  border-radius:999px;
  font-size:14px;
  font-weight:900;
}

.sello-pagado{
  background:#3fa72b;
  color:white;
}

.sello-incidencia{
  background:#ff0000;
  color:white;
}

.vacio{
  background:white;
  padding:24px;
  border-radius:24px;
  text-align:center;
  font-size:18px;
  font-weight:800;
}

.lineas{
  margin-top:12px;
  padding-top:12px;
  border-top:1px solid #d8e0e5;
  font-size:15px;
  color:#4f5f69;
}

.linea-articulo{
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin-bottom:5px;
}

.entregas{
  margin-top:12px;
  background:#f6f8f9;
  border-radius:18px;
  padding:12px;
  font-size:15px;
}

.entrega{
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin-bottom:5px;
}

@media(max-width:700px){
  .nombre,.importe{font-size:23px}
  .botones{grid-template-columns:1fr 1fr}
}
</style>
</head>

<body>

<header>
  <button class="volver" onclick="volver()">← Volver</button>
  <h2>💳 PAGOS</h2>
</header>

<div class="contenido">
  <div id="resumen" class="resumen"></div>
  <div id="lista"></div>
</div>

<script>
function leerPagos(){
  return JSON.parse(localStorage.getItem("pagos_pendientes") || "[]");
}

function guardarPagos(pagos){
  localStorage.setItem("pagos_pendientes", JSON.stringify(pagos));
}

function leerHistorico(){
  return JSON.parse(localStorage.getItem("historico_pedidos") || "[]");
}

function guardarHistorico(historico){
  localStorage.setItem("historico_pedidos", JSON.stringify(historico));
}

function leerIncidencias(){
  return JSON.parse(localStorage.getItem("incidencias_pendientes") || "[]");
}

function guardarIncidencias(incidencias){
  localStorage.setItem("incidencias_pendientes", JSON.stringify(incidencias));
}

function normalizarFormaPago(p){
  return String(p.formaPago || p.forma_pago || p.pago || "").toUpperCase();
}

function textoFormaPago(forma){
  if(forma === "CONTADO") return "Contado · Último pedido";
  if(forma === "REPOSICION" || forma === "REPOSICIÓN") return "Reposición · Pedido semana anterior";
  if(forma === "BANCO") return "Banco · Suma mensual para cotejar";
  if(forma === "A CUENTA" || forma === "ACUENTA") return "A cuenta · Entregas parciales";
  return forma || "Sin forma de pago";
}

function importe(n){
  return Number(n || 0).toFixed(2) + " €";
}

function pintarResumen(){
  const pagos = leerPagos();

  const totalPendiente = pagos.reduce((s,p)=>{
    const total = Number(p.total || 0);
    const pagado = Number(p.pagadoCuenta || 0);
    return s + Math.max(total - pagado, 0);
  },0);

  const bancoMes = pagos
    .filter(p => normalizarFormaPago(p) === "BANCO")
    .reduce((s,p)=>s + Number(p.total || 0),0);

  const incidencias = leerIncidencias().filter(i => !i.resuelta).length;

  document.getElementById("resumen").innerHTML = `
    <strong>Resumen de pagos</strong><br>
    Pendiente total: <strong>${importe(totalPendiente)}</strong><br>
    Banco acumulado actual: <strong>${importe(bancoMes)}</strong><br>
    Incidencias abiertas: <strong>${incidencias}</strong>
  `;
}

function pintar(){
  const pagos = leerPagos();
  let html = "";

  pintarResumen();

  if(pagos.length === 0){
    document.getElementById("lista").innerHTML =
      `<div class="vacio">No hay pedidos pendientes de pago.</div>`;
    return;
  }

  pagos.forEach((p,i)=>{
    const proveedor = p.proveedor || "SIN PROVEEDOR";
    const total = Number(p.total || 0);
    const forma = normalizarFormaPago(p);
    const estado = p.estado || "PENDIENTE";

    const pagadoCuenta = Number(p.pagadoCuenta || 0);
    const queda = Math.max(total - pagadoCuenta, 0);

    let extraCuenta = "";
    if(forma === "A CUENTA" || forma === "ACUENTA"){
      extraCuenta = `
        <div class="detalle">Entregado: <strong>${importe(pagadoCuenta)}</strong></div>
        <div class="detalle">Queda: <strong>${importe(queda)}</strong></div>
      `;
    }

    let lineasHtml = "";
    if(p.lineas && p.lineas.length){
      lineasHtml = `<div class="lineas">`;
      p.lineas.forEach(l=>{
        lineasHtml += `
          <div class="linea-articulo">
            <span>${l.articulo || l.nombre || "Artículo"} x ${l.cantidad || 0}</span>
            <strong>${importe(l.total || ((l.precio || 0) * (l.cantidad || 0)))}</strong>
          </div>`;
      });
      lineasHtml += `</div>`;
    }

    let entregasHtml = "";
    if(p.entregas && p.entregas.length){
      entregasHtml = `<div class="entregas"><strong>Entregas a cuenta</strong>`;
      p.entregas.forEach(e=>{
        entregasHtml += `
          <div class="entrega">
            <span>${e.fecha}</span>
            <strong>${importe(e.importe)}</strong>
          </div>`;
      });
      entregasHtml += `</div>`;
    }

    html += `
      <div class="bloque">
        <div class="fila">
          <div class="nombre">${proveedor}</div>
          <div class="importe">${importe(total)}</div>
        </div>

        <div class="detalle">${textoFormaPago(forma)}</div>
        <div class="estado">Estado: <strong>${String(estado).toUpperCase()}</strong></div>

        ${extraCuenta}

        ${estado === "PAGADO" || estado === "pagado" ? `<span class="sello sello-pagado">PAGADO</span>` : ""}
        ${estado === "PAGADO_CON_INCIDENCIA" || estado === "pagado_incidencia" ? `
          <span class="sello sello-pagado">PAGADO</span>
          <span class="sello sello-incidencia">INCIDENCIA ABIERTA</span>
        ` : ""}

        ${lineasHtml}
        ${entregasHtml}

        <div class="botones">
          <button class="btn-pagado" onclick="marcarPagado(${i})">✔ PAGADO</button>
          <button class="btn-incidencia" onclick="marcarIncidencia(${i})">⚠ INCIDENCIA</button>
          ${(forma === "A CUENTA" || forma === "ACUENTA") ? `<button class="btn-cuenta" onclick="anotarEntrega(${i})">💶 ENTREGA A CUENTA</button>` : ""}
        </div>
      </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;
}

function pasarAHistorico(pedido){
  const historico = leerHistorico();

  historico.unshift({
    ...pedido,
    fechaHistorico: new Date().toLocaleString("es-ES"),
    operadorCierre: localStorage.getItem("usuario") || "OPERADOR"
  });

  guardarHistorico(historico);
}

function marcarPagado(i){
  let pagos = leerPagos();
  let pedido = pagos[i];

  pedido.estado = "PAGADO";
  pedido.sello = "PAGADO";
  pedido.fechaPago = new Date().toLocaleString("es-ES");
  pedido.operadorPago = localStorage.getItem("usuario") || "OPERADOR";

  pasarAHistorico(pedido);

  pagos.splice(i,1);
  guardarPagos(pagos);

  alert("Pedido marcado como PAGADO y enviado a histórico.");
  pintar();
}

function marcarIncidencia(i){
  let pagos = leerPagos();
  let incidencias = leerIncidencias();
  let pedido = pagos[i];

  const motivo = prompt("Motivo de la incidencia:");
  if(!motivo) return;

  const solucion = prompt("Solución tomada por el proveedor / pendiente:") || "Pendiente de solución";

  pedido.estado = "PAGADO_CON_INCIDENCIA";
  pedido.sello = "PAGADO";
  pedido.incidenciaAbierta = true;
  pedido.fechaPago = new Date().toLocaleString("es-ES");
  pedido.operadorPago = localStorage.getItem("usuario") || "OPERADOR";

  incidencias.unshift({
    id: Date.now(),
    fecha: new Date().toLocaleString("es-ES"),
    proveedor: pedido.proveedor || "SIN PROVEEDOR",
    total: Number(pedido.total || 0),
    motivo: motivo,
    solucion: solucion,
    resuelta: false,
    pedido: pedido,
    operador: localStorage.getItem("usuario") || "OPERADOR"
  });

  guardarIncidencias(incidencias);
  pasarAHistorico(pedido);

  pagos.splice(i,1);
  guardarPagos(pagos);

  alert("Pedido pagado con incidencia abierta.");
  pintar();
}

function anotarEntrega(i){
  let pagos = leerPagos();
  let pedido = pagos[i];

  const total = Number(pedido.total || 0);
  const pagadoAnterior = Number(pedido.pagadoCuenta || 0);
  const quedaAnterior = Math.max(total - pagadoAnterior, 0);

  const cantidad = parseFloat(prompt("Queda " + importe(quedaAnterior) + ". ¿Cuánto entregas ahora?") || "0");

  if(!cantidad || cantidad <= 0){
    return;
  }

  if(cantidad > quedaAnterior){
    if(!confirm("La entrega supera lo pendiente. ¿Continuar igualmente?")){
      return;
    }
  }

  if(!pedido.entregas) pedido.entregas = [];

  pedido.entregas.push({
    fecha: new Date().toLocaleString("es-ES"),
    importe: cantidad,
    operador: localStorage.getItem("usuario") || "OPERADOR"
  });

  pedido.pagadoCuenta = pagadoAnterior + cantidad;

  const quedaNueva = total - pedido.pagadoCuenta;

  if(quedaNueva <= 0){
    pedido.estado = "PAGADO";
    pedido.sello = "PAGADO";
    pedido.fechaPago = new Date().toLocaleString("es-ES");
    pedido.operadorPago = localStorage.getItem("usuario") || "OPERADOR";

    pasarAHistorico(pedido);

    pagos.splice(i,1);
    guardarPagos(pagos);

    alert("Pedido A CUENTA cerrado. Queda 0,00 €. Enviado a histórico.");
  }else{
    pedido.estado = "A_CUENTA";
    pagos[i] = pedido;
    guardarPagos(pagos);

    alert("Entrega guardada. Quedan " + importe(quedaNueva) + ".");
  }

  pintar();
}

function volver(){
  window.location.href = "index.html";
}

pintar();
</script>

</body>
</html>
