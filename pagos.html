<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAGOS</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f5;color:#17303d}
header{background:#17303d;color:white;padding:16px;display:flex;justify-content:space-between}
button{border:0;border-radius:12px;padding:10px 14px;font-weight:800}

.card{background:white;margin:12px;padding:14px;border-radius:16px}
.nombre{font-size:22px;font-weight:900}
.total{font-size:24px;font-weight:900}
.detalle{color:#4f5f69;margin-top:6px}

.botones{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
.ver{background:#17303d;color:white}
.comp{background:#9c27b0;color:white}
.ok{background:#4caf50;color:white}
.error{background:#f44336;color:white}

.lineas{display:none;margin-top:10px}
.linea{padding:6px 0;border-bottom:1px solid #ddd}
</style>
</head>

<body>

<header>
<h2>💳 PAGOS</h2>
</header>

<div id="lista"></div>

<script>

function leerPagos(){
  return JSON.parse(localStorage.getItem("pagos_pendientes") || "[]");
}

function guardarHistorico(p){
  let hist = JSON.parse(localStorage.getItem("historico_pedidos") || "[]");
  hist.push(p);
  localStorage.setItem("historico_pedidos", JSON.stringify(hist));
}

function guardarPagos(data){
  localStorage.setItem("pagos_pendientes", JSON.stringify(data));
}

function euros(n){
  return Number(n||0).toFixed(2).replace(".",",")+" €";
}

function pintar(){
  let data = leerPagos();
  let html = "";

  data.forEach((p,i)=>{

    let lineasHTML="";

    if(p.lineas){
      p.lineas.forEach(l=>{
        let base = l.base || (l.cantidad*l.precioSinIva);

        lineasHTML += `
        <div class="linea">
          ${l.articulo} → ${l.cantidad} × ${euros(l.precioSinIva)} = ${euros(base)}
        </div>`;
      });
    }

    html += `
    <div class="card">
      <div class="nombre">${p.proveedor}</div>
      <div class="detalle">${p.fecha || "-"}</div>
      <div class="detalle">${p.formaPago || "-"}</div>
      <div class="total">${euros(p.total)}</div>

      <div class="botones">
        <button class="ver" onclick="ver(${i})">Ver</button>
        <button class="comp" onclick="comparar(${i})">Comparar</button>
        <button class="ok" onclick="pagar(${i},false)">PAGAR OK</button>
        <button class="error" onclick="pagar(${i},true)">INCIDENCIA</button>
      </div>

      <div class="lineas" id="l-${i}">
        ${lineasHTML}
      </div>
    </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;
}

function ver(i){
  let d=document.getElementById("l-"+i);
  d.style.display = d.style.display==="block"?"none":"block";
}

function comparar(i){
  let data = leerPagos();
  let p = data[i];

  let resultado="";
  let errorTotal=false;

  p.lineas.forEach(l=>{

    let cant = prompt(`Cantidad real ${l.articulo}`, l.cantidad);
    let precio = prompt(`Precio real ${l.articulo}`, l.precioSinIva);

    let error="";

    if(Number(cant)!=Number(l.cantidad)) error+="UNIDADES ";
    if(Number(precio)!=Number(l.precioSinIva)) error+="PRECIO ";

    if(error===""){
      resultado+=`✔ ${l.articulo}\n`;
    }else{
      resultado+=`🔴 ${l.articulo}: ${error}\n`;
      errorTotal=true;
    }

  });

  p.resultadoComparacion = resultado;
  p.tieneIncidencia = errorTotal;

  guardarPagos(data);

  alert(resultado);
}

function pagar(i,conError){
  let data = leerPagos();
  let p = data[i];

  p.estado = conError ? "INCIDENCIA" : "OK";

  guardarHistorico(p);

  data.splice(i,1);
  guardarPagos(data);

  pintar();
}

pintar();

</script>

</body>
</html>
