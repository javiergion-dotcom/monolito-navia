<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAGOS · MONOLITO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f5;
  color:#17303d;
}

/* HEADER */
header{
  background:#17303d;
  color:white;
  padding:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* ICONO VERDE (coherente con pedidos/histórico) */
.icono{
  font-size:22px;
  color:#4caf50;
  font-weight:900;
}

/* TARJETAS */
.card{
  background:white;
  margin:12px;
  padding:14px;
  border-radius:16px;
}

.nombre{
  font-size:22px;
  font-weight:900;
}

.total{
  font-size:26px;
  font-weight:900;
  margin-top:6px;
}

.detalle{
  color:#4f5f69;
  margin-top:4px;
}

/* BOTONES */
button{
  border:0;
  border-radius:10px;
  padding:8px 12px;
  font-weight:800;
}

.botones{
  margin-top:10px;
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.ver{background:#17303d;color:white}
.comp{background:#9c27b0;color:white}
.ok{background:#4caf50;color:white}
.errorBtn{background:#f44336;color:white}

/* LÍNEAS */
.lineas{
  display:none;
  margin-top:10px;
}

.linea{
  padding:8px 0;
  border-bottom:1px dashed #ccc;
}

.lineaError{
  background:#ffe5e5;
  color:#c00000;
  font-weight:900;
  padding:8px;
  border-radius:8px;
  margin-top:4px;
}

.aviso{
  margin-top:8px;
  color:#c00000;
  font-weight:900;
}
</style>
</head>

<body>

<header>
  <div class="icono">💳 PAGOS</div>
</header>

<div id="lista"></div>

<script>

function leerPagos(){
  return JSON.parse(localStorage.getItem("pagos_pendientes") || "[]");
}

function guardarPagos(data){
  localStorage.setItem("pagos_pendientes", JSON.stringify(data));
}

function leerHistorico(){
  return JSON.parse(localStorage.getItem("historico_pedidos") || "[]");
}

function guardarHistorico(data){
  localStorage.setItem("historico_pedidos", JSON.stringify(data));
}

function euros(n){
  return Number(n||0).toFixed(2).replace(".",",")+" €";
}

function pintar(){

  let data = leerPagos();
  let html = "";

  data.forEach((p,i)=>{

    let lineasHTML = "";

    if(p.lineas){
      p.lineas.forEach((l,idx)=>{

        let base = l.base || (l.cantidad*l.precioSinIva);

        let esError = p.erroresLineas && p.erroresLineas.includes(idx);

        lineasHTML += `
        <div class="linea ${esError ? "lineaError" : ""}">
          ${l.articulo}<br>
          ${l.cantidad} × ${euros(l.precioSinIva)} = ${euros(base)}

          ${esError ? `<div>⚠ Error en esta línea</div>` : ""}
        </div>`;
      });
    }

    html += `
    <div class="card">

      <div class="nombre">${p.proveedor}</div>
      <div class="detalle">${p.fecha || ""}</div>
      <div class="detalle">${p.formaPago || ""}</div>
      <div class="total">${euros(p.total)}</div>

      ${
        p.erroresLineas && p.erroresLineas.length
        ? `<div class="aviso">⚠ ESTE PEDIDO TIENE ERRORES</div>`
        : ""
      }

      <div class="botones">
        <button class="ver" onclick="ver(${i})">Ver</button>
        <button class="comp" onclick="comparar(${i})">Comparar</button>
        <button class="ok" onclick="pagarOK(${i})">PAGAR OK</button>
        <button class="errorBtn" onclick="incidencia(${i})">INCIDENCIA</button>
      </div>

      <div class="lineas" id="l-${i}">
        ${lineasHTML}
      </div>

    </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;
}

function ver(i){
  let d = document.getElementById("l-"+i);
  d.style.display = d.style.display==="block"?"none":"block";
}

/* COMPARADOR */
function comparar(i){

  let data = leerPagos();
  let p = data[i];

  let errores = [];
  let resultado="";

  p.lineas.forEach((l,idx)=>{

    let cant = prompt(`Cantidad real ${l.articulo}`,l.cantidad);
    let precio = prompt(`Precio real ${l.articulo}`,l.precioSinIva);

    let error="";

    if(Number(cant)!=Number(l.cantidad)) error+="UNIDADES ";
    if(Number(precio)!=Number(l.precioSinIva)) error+="PRECIO ";

    if(error===""){
      resultado+=`✔ ${l.articulo}\n`;
    }else{
      resultado+=`🔴 ${l.articulo}: ${error}\n`;
      errores.push(idx);
    }

  });

  p.erroresLineas = errores;

  guardarPagos(data);
  pintar();

  alert(resultado);
}

/* PAGAR OK */
function pagarOK(i){

  let pagos = leerPagos();
  let historico = leerHistorico();

  let p = pagos[i];

  if(p.erroresLineas && p.erroresLineas.length){
    alert("No puedes pagar OK. Hay errores.");
    return;
  }

  p.estado="OK";

  historico.unshift(p);
  pagos.splice(i,1);

  guardarHistorico(historico);
  guardarPagos(pagos);

  pintar();
}

/* INCIDENCIA */
function incidencia(i){

  let pagos = leerPagos();
  let historico = leerHistorico();

  let p = pagos[i];

  p.estado="INCIDENCIA";

  historico.unshift(p);
  pagos.splice(i,1);

  guardarHistorico(historico);
  guardarPagos(pagos);

  pintar();
}

pintar();

</script>

</body>
</html>
