<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAGOS · MONOLITO</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f5;color:#17303d}
header{background:#17303d;color:white;padding:16px;display:flex;justify-content:space-between;align-items:center}
button{border:0;border-radius:14px;padding:11px 14px;font-weight:800}
.volver{background:white;color:#17303d}
.contenido{padding:16px}
.card{background:white;border-radius:22px;padding:16px;margin-bottom:12px;box-shadow:0 8px 18px rgba(0,0,0,.12)}
.nombre{font-size:22px;font-weight:900}
.detalle{margin-top:6px;color:#4f5f69}
.importe{font-size:24px;font-weight:900;margin-top:8px}
.botones{display:flex;gap:10px;margin-top:12px}
.pagado{background:#48a530;color:white}
.incidencia{background:#ff0000;color:white}
</style>
</head>

<body>

<header>
<button class="volver" onclick="location.href='index.html'">← Volver</button>
<h2>💳 PAGOS</h2>
</header>

<div class="contenido" id="lista"></div>

<script>

function leerPagos(){
  return JSON.parse(localStorage.getItem("pagos_pendientes") || "[]");
}

function guardarPagos(p){
  localStorage.setItem("pagos_pendientes", JSON.stringify(p));
}

function leerHistorico(){
  return JSON.parse(localStorage.getItem("historico_pedidos") || "[]");
}

function guardarHistorico(h){
  localStorage.setItem("historico_pedidos", JSON.stringify(h));
}

function euros(n){
  return Number(n||0).toFixed(2).replace(".",",")+" €";
}

function pintar(){
  const pagos = leerPagos();
  let html="";

  pagos.forEach((p,i)=>{

    html += `
    <div class="card">
      <div class="nombre">${p.proveedor}</div>
      <div class="detalle">${p.fecha}</div>
      <div class="importe">${euros(p.total)}</div>

      <div class="botones">
        <button class="pagado" onclick="pagado(${i})">✔ PAGADO</button>
        <button class="incidencia" onclick="incidencia(${i})">⚠ INCIDENCIA</button>
      </div>
    </div>`;
  });

  document.getElementById("lista").innerHTML = html;
}

function pagado(i){
  let pagos = leerPagos();
  let hist = leerHistorico();

  let p = pagos[i];

  // 🔥 AQUÍ ESTÁ LA CLAVE → se guarda TODO el pedido
  let pedidoCompleto = {
    proveedor: p.proveedor,
    fecha: p.fecha,
    total: p.total,
    lineas: p.lineas || [],   // 👈 IMPORTANTE
    estado: "PAGADO",
    fechaPago: new Date().toLocaleString()
  };

  hist.unshift(pedidoCompleto);
  pagos.splice(i,1);

  guardarHistorico(hist);
  guardarPagos(pagos);

  alert("Pagado ✔");
  location.reload();
}

function incidencia(i){
  let pagos = leerPagos();
  let hist = leerHistorico();

  let p = pagos[i];

  let motivo = prompt("Motivo incidencia:");
  let solucion = prompt("Solución prevista:");

  let pedidoCompleto = {
    proveedor: p.proveedor,
    fecha: p.fecha,
    total: p.total,
    lineas: p.lineas || [],
    estado: "INCIDENCIA",
    motivo: motivo,
    solucion: solucion,
    fechaPago: new Date().toLocaleString()
  };

  hist.unshift(pedidoCompleto);
  pagos.splice(i,1);

  guardarHistorico(hist);
  guardarPagos(pagos);

  alert("Incidencia registrada ⚠");
  location.reload();
}

pintar();

</script>

</body>
</html>
