<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAGOS · MONOLITO</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#eef2f5;color:#17303d}
header{background:#17303d;color:white;padding:16px;display:flex;align-items:center;gap:12px}
header h2{margin:0;font-size:20px}
button{border:0;border-radius:14px;padding:12px;font-size:15px;font-weight:900;cursor:pointer}
.volver{background:white;color:#17303d}
.contenedor{padding:16px}
.card{background:white;border-radius:22px;padding:16px;margin-bottom:14px;box-shadow:0 8px 18px rgba(0,0,0,.12)}
.cardIncidencia{border:3px solid #c00000;background:#fff0f0}
.proveedor{font-size:22px;font-weight:900}
.detalle{margin-top:6px;color:#5a6872;font-weight:700}
.total{font-size:26px;font-weight:900;margin-top:10px}
.pendiente{margin-top:8px;background:#fff4d8;color:#8a5a00;padding:10px;border-radius:14px;font-weight:900}
.estadoIncidencia{margin-top:10px;background:#ffd6d6;color:#9b0000;padding:10px;border-radius:14px;font-weight:900}
.historialPago{margin-top:10px;background:#edf7ed;border-radius:14px;padding:10px;font-size:14px}
select,input{width:100%;padding:12px;border-radius:14px;border:1px solid #b8c2ca;font-size:16px;margin-top:10px}
.pagado{width:100%;background:#1f8f34;color:white;margin-top:10px}
.verPedido{width:100%;background:#17303d;color:white;margin-top:10px}
.incidencia{width:100%;background:#c00000;color:white;margin-top:10px}
.vacio{background:white;border-radius:22px;padding:18px;text-align:center;font-weight:900}
</style>
</head>

<body>

<header>
  <button id="btnVolver" class="volver">←</button>
  <h2>💰 PAGOS</h2>
</header>

<div class="contenedor">
  <div id="lista"></div>
</div>

<script type="module">
import {
  leerColeccion,
  guardarColeccion,
  escucharColeccion
} from "./monolito-cloud.js";

let pagosPendientes = [];
let pagosHistorico = [];
let incidencias = [];

function crearId(prefijo){
  return String(prefijo || "id")
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9]+/g,"_")
    .replace(/^_+|_+$/g,"")
    + "_" + Date.now() + "_" + Math.random().toString(36).slice(2,7);
}

function esc(txt){
  return String(txt || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

async function guardarPendientes(){
  await guardarColeccion("pagos_pendientes", pagosPendientes);
}

async function guardarHistorico(){
  await guardarColeccion("pagos_historico", pagosHistorico);
}

async function guardarIncidencias(){
  await guardarColeccion("incidencias", incidencias);
}

function pintar(){
  let html = "";

  if(pagosPendientes.length === 0){
    html = `<div class="vacio">No hay pagos pendientes</div>`;
  }else{
    pagosPendientes.forEach((p,i)=>{
      const total = Number(p.total || 0);
      const pendiente = Number(p.pendiente || total);
      const tieneIncidencia = p.estado === "INCIDENCIA";

      html += `
        <div class="card ${tieneIncidencia ? "cardIncidencia" : ""}">

          <div class="proveedor">${esc(p.proveedor || "SIN PROVEEDOR")}</div>

          <div class="detalle">Fecha pedido: ${esc(p.fecha || "")}</div>
          <div class="detalle">Líneas: ${p.lineas ? p.lineas.length : 0}</div>

          <div class="total">${total.toFixed(2)} €</div>

          <div class="pendiente">
            Pendiente: ${pendiente.toFixed(2)} €
          </div>

          ${
            tieneIncidencia
            ? `
              <div class="estadoIncidencia">
                🚨 INCIDENCIA PENDIENTE<br><br>
                Motivo: ${esc(p.motivoIncidencia || "")}<br><br>
                Solución prevista: ${esc(p.solucionIncidencia || "")}
              </div>
            `
            : ""
          }

          ${
            p.historialPagos && p.historialPagos.length
            ? `
              <div class="historialPago">
                <b>Historial pagos:</b><br>
                ${
                  p.historialPagos.map(h=>`
                    • ${esc(h.fecha)} → ${Number(h.importe || 0).toFixed(2)} €
                  `).join("<br>")
                }
              </div>
            `
            : ""
          }

          <button class="verPedido" data-accion="ver" data-id="${esc(p.id)}">
            📄 Ver pedido completo
          </button>

          <select id="tipo${esc(p.id)}">
            <option value="CONTADO">CONTADO</option>
            <option value="REPOSICION">REPOSICIÓN</option>
            <option value="BANCO">BANCO</option>
            <option value="A CUENTA">A CUENTA</option>
          </select>

          <input
            type="number"
            id="importe${esc(p.id)}"
            placeholder="Importe pagado"
            value="${pendiente.toFixed(2)}"
          >

          <button class="pagado" data-accion="pagar" data-id="${esc(p.id)}">
            ✅ Registrar pago
          </button>

          <button class="incidencia" data-accion="incidencia" data-id="${esc(p.id)}">
            🚨 Marcar incidencia
          </button>

        </div>
      `;
    });
  }

  document.getElementById("lista").innerHTML = html;
}

function verPedido(id){
  const p = pagosPendientes.find(x => String(x.id) === String(id));

  if(!p){
    alert("No se encontró el pedido.");
    return;
  }

  let texto = "";

  texto += "PEDIDO COMPLETO\n";
  texto += "=============================\n\n";
  texto += "Proveedor: " + (p.proveedor || "SIN PROVEEDOR") + "\n";
  texto += "Fecha: " + (p.fecha || "") + "\n";
  texto += "Estado: " + (p.estado || "PENDIENTE") + "\n\n";
  texto += "DESGLOSE\n";
  texto += "-----------------------------\n\n";

  if(p.lineas && p.lineas.length){
    p.lineas.forEach((l,idx)=>{
      const articulo = l.articulo || l.nombre || l.producto || "Artículo";
      const unidades = Number(l.unidades || l.cantidad || l.uds || 0);
      const precio = Number(l.precio || l.precioUnidad || l.precio_unitario || l.importeUnidad || 0);
      const iva = Number(l.iva || l.tipoIva || 0);
      const subtotal = Number(l.subtotal || l.importe || (unidades * precio));

      texto += (idx + 1) + ". " + articulo + "\n";
      texto += "   Unidades: " + unidades + "\n";
      texto += "   Precio unidad: " + precio.toFixed(2) + " €\n";
      texto += "   Subtotal: " + subtotal.toFixed(2) + " €\n";

      if(iva){
        texto += "   IVA: " + iva + "%\n";
      }

      texto += "\n";
    });
  }else{
    texto += "Este pedido no tiene líneas guardadas.\n\n";
  }

  texto += "-----------------------------\n";
  texto += "Total pedido: " + Number(p.total || 0).toFixed(2) + " €\n";
  texto += "Pendiente: " + Number(p.pendiente || p.total || 0).toFixed(2) + " €\n";

  if(p.motivoIncidencia){
    texto += "\nINCIDENCIA\n";
    texto += "Motivo: " + p.motivoIncidencia + "\n";
    texto += "Solución prevista: " + (p.solucionIncidencia || "") + "\n";
  }

  alert(texto);
}

async function marcarPagado(id){
  let pago = pagosPendientes.find(x => String(x.id) === String(id));
  if(!pago) return;

  const tipoPago = document.getElementById("tipo"+id).value;
  const importe = parseFloat(document.getElementById("importe"+id).value || 0);

  if(importe <= 0){
    alert("Introduce importe válido");
    return;
  }

  if(!pago.pendiente){
    pago.pendiente = Number(pago.total || 0);
  }

  if(!pago.historialPagos){
    pago.historialPagos = [];
  }

  pago.historialPagos.unshift({
    fecha:new Date().toLocaleString("es-ES"),
    importe:importe,
    tipo:tipoPago
  });

  pago.tipoPago = tipoPago;
  pago.pendiente = Number(pago.pendiente) - importe;

  if(pago.pendiente < 0){
    pago.pendiente = 0;
  }

  pago.actualizadoEn = new Date().toISOString();

  if(pago.pendiente === 0){
    pago.estado = "PAGADO";
    pago.fechaPago = new Date().toLocaleString("es-ES");

    pagosHistorico.unshift(pago);
    pagosPendientes = pagosPendientes.filter(x => String(x.id) !== String(id));

    await guardarHistorico();
    await guardarPendientes();

    alert("Pago completado.");
  }else{
    pago.estado = "A CUENTA";

    pagosPendientes = pagosPendientes.map(x =>
      String(x.id) === String(id) ? pago : x
    );

    await guardarPendientes();

    alert(
      "Pago parcial registrado.\n\n" +
      "Pendiente: " + pago.pendiente.toFixed(2) + " €"
    );
  }

  pintar();
}

async function marcarIncidencia(id){
  const pago = pagosPendientes.find(x => String(x.id) === String(id));
  if(!pago) return;

  const motivo = prompt("Motivo de la incidencia");
  if(!motivo) return;

  const solucion = prompt("¿Cómo se resolverá?");
  if(!solucion) return;

  const incidenciaId = crearId("incidencia_" + (pago.proveedor || ""));

  const incidencia = {
    id:incidenciaId,
    proveedor:pago.proveedor || "",
    titulo:"Incidencia con " + (pago.proveedor || "proveedor"),
    texto:
      "Proveedor: " + (pago.proveedor || "") +
      " · Importe: " + Number(pago.total || 0).toFixed(2) + " €" +
      " · Motivo: " + motivo +
      " · Solución prevista: " + solucion,
    motivo:motivo,
    solucionPrevista:solucion,
    fecha:new Date().toLocaleString("es-ES"),
    fechaMs:Date.now(),
    pedidoFecha:pago.fecha || "",
    importe:Number(pago.total || 0),
    pagoId:pago.id || "",
    resuelta:false,
    actualizadoEn:new Date().toISOString()
  };

  incidencias.unshift(incidencia);

  pagosPendientes = pagosPendientes.map(p=>{
    if(String(p.id) !== String(id)) return p;

    return {
      ...p,
      estado:"INCIDENCIA",
      motivoIncidencia:motivo,
      solucionIncidencia:solucion,
      fechaIncidencia:incidencia.fecha,
      incidenciaId:incidenciaId,
      actualizadoEn:new Date().toISOString()
    };
  });

  await guardarIncidencias();
  await guardarPendientes();

  alert(
    "Incidencia registrada.\n\n" +
    "Proveedor marcado hasta resolver."
  );

  pintar();
}

function volver(){
  window.location.href = "index.html";
}

function activarBotones(){
  document.getElementById("btnVolver").addEventListener("click", volver);

  document.getElementById("lista").addEventListener("click", function(e){
    const btn = e.target.closest("button");
    if(!btn) return;

    const accion = btn.dataset.accion;
    const id = btn.dataset.id;

    if(accion === "ver") verPedido(id);
    if(accion === "pagar") marcarPagado(id);
    if(accion === "incidencia") marcarIncidencia(id);
  });
}

async function iniciar(){
  activarBotones();

  pagosPendientes = await leerColeccion("pagos_pendientes");
  pagosHistorico = await leerColeccion("pagos_historico");
  incidencias = await leerColeccion("incidencias");

  pagosPendientes = pagosPendientes.map(p => ({
    ...p,
    id: p.id || crearId("pago_" + (p.proveedor || ""))
  }));

  pintar();

  escucharColeccion("pagos_pendientes", (lista)=>{
    pagosPendientes = lista.sort((a,b)=>
      Number(b.fechaMs || 0) - Number(a.fechaMs || 0)
    );
    pintar();
  });

  escucharColeccion("pagos_historico", (lista)=>{
    pagosHistorico = lista.sort((a,b)=>
      Number(b.fechaMs || 0) - Number(a.fechaMs || 0)
    );
  });

  escucharColeccion("incidencias", (lista)=>{
    incidencias = lista.sort((a,b)=>
      Number(b.fechaMs || 0) - Number(a.fechaMs || 0)
    );
  });
}

iniciar();
</script>

</body>
</html>
