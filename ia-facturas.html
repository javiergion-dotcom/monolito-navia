<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA FACTURAS · MONOLITO</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#eef2f5;color:#17303d}

header{
  background:#17303d;color:white;padding:16px;
  display:flex;align-items:center;gap:12px;
  font-size:22px;font-weight:900;
}

.volver{
  background:white;color:#17303d;border:0;border-radius:14px;
  padding:10px 14px;font-weight:900;font-size:16px;
}

.contenedor{padding:16px;max-width:950px;margin:auto}

.card{
  background:white;border-radius:22px;padding:16px;margin-bottom:14px;
  box-shadow:0 8px 18px rgba(0,0,0,.12);
}

h2,h3{margin:0 0 12px}

label{
  display:block;font-weight:900;margin-top:12px;margin-bottom:6px;
}

input,select,textarea{
  width:100%;padding:12px;border-radius:14px;
  border:1px solid #b8c2ca;font-size:16px;
}

textarea{min-height:90px}

button{
  width:100%;border:0;border-radius:14px;padding:13px;
  margin-top:10px;font-size:15px;font-weight:900;
  background:#17303d;color:white;
}

.guardar{background:#48a530}
.limpiar{background:#ff9800}
.rojo{background:#c00000}
.azul{background:#17627f}

.preview{
  width:100%;max-height:260px;object-fit:contain;
  border-radius:16px;border:1px solid #dfe6ec;margin-top:12px;background:#f8fafc;
}

.item{
  border-top:1px solid #dfe6ec;
  padding-top:12px;margin-top:12px;
}

.detalle{
  color:#4f5f69;font-size:14px;margin-top:6px;line-height:1.4;
}

.etiqueta{
  display:inline-block;padding:5px 9px;border-radius:999px;
  font-size:12px;font-weight:900;margin-top:8px;margin-right:5px;
}

.PENDIENTE{background:#fff3c4;color:#9a7300}
.REVISADA{background:#e4f5ff;color:#17627f}
.INCIDENCIA{background:#ffe0e0;color:#c00000}
.OK{background:#e5ffe5;color:#1a7f1a}

.vacio{
  background:white;border-radius:18px;padding:18px;
  text-align:center;font-weight:900;
}

.acciones{
  display:flex;gap:8px;margin-top:10px;
}
.acciones button{flex:1}
</style>
</head>

<body>

<header>
<button class="volver" onclick="history.back()">←</button>
📸 IA FACTURAS
</header>

<div class="contenedor">

<div class="card">
<h2>📸 Foto / revisión de factura</h2>
<div class="detalle">
Primera versión: guarda foto comprimida y datos básicos para revisión.  
La IA se preparará después sobre esta estructura.
</div>

<label>Proveedor</label>
<input id="proveedor" placeholder="Ej: Coca-Cola, Turrado, Sampedro...">

<label>Nº factura / albarán</label>
<input id="numero" placeholder="Número de factura o albarán">

<label>Fecha</label>
<input type="date" id="fecha">

<label>Total factura</label>
<input id="total" type="number" step="0.01" placeholder="Ej: 124.50">

<label>Tipo de revisión</label>
<select id="tipo">
  <option value="FACTURA">FACTURA</option>
  <option value="ALBARAN">ALBARÁN</option>
  <option value="DOCUMENTO">DOCUMENTO</option>
</select>

<label>Foto de factura</label>
<input type="file" id="foto" accept="image/*" capture="environment" onchange="prepararImagen(event)">

<img id="preview" class="preview" style="display:none">

<label>Observaciones / sospecha</label>
<textarea id="observaciones" placeholder="Ej: revisar precio, promoción, unidades, IVA, producto nuevo..."></textarea>

<button class="guardar" onclick="guardarFacturaIA()">💾 Guardar revisión</button>
<button class="limpiar" onclick="limpiarFormulario()">➕ Limpiar</button>
</div>

<div class="card">
<h3>📋 Revisiones guardadas</h3>
<div id="listado"></div>
</div>

</div>

<script>
const CLAVE_FACTURAS_IA = "ia_facturas_monolito";
let imagenComprimida = "";

function usuarioActual(){
  return localStorage.getItem("usuario") || "OPERADOR";
}

function hoyISO(){
  const d = new Date();
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0,10);
}

function leerFacturasIA(){
  return JSON.parse(localStorage.getItem(CLAVE_FACTURAS_IA) || "[]");
}

function guardarFacturasIA(data){
  localStorage.setItem(CLAVE_FACTURAS_IA, JSON.stringify(data));
}

function prepararImagen(event){
  const file = event.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(e){
    const img = new Image();

    img.onload = function(){
      const canvas = document.createElement("canvas");

      const maxAncho = 1200;
      const escala = Math.min(1, maxAncho / img.width);

      canvas.width = Math.round(img.width * escala);
      canvas.height = Math.round(img.height * escala);

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      imagenComprimida = canvas.toDataURL("image/jpeg", 0.72);

      const preview = document.getElementById("preview");
      preview.src = imagenComprimida;
      preview.style.display = "block";
    };

    img.src = e.target.result;
  };

  reader.readAsDataURL(file);
}

function guardarFacturaIA(){
  const proveedor = document.getElementById("proveedor").value.trim();
  const numero = document.getElementById("numero").value.trim();
  const fecha = document.getElementById("fecha").value;
  const total = document.getElementById("total").value;
  const tipo = document.getElementById("tipo").value;
  const observaciones = document.getElementById("observaciones").value.trim();

  if(!proveedor){
    alert("Indica proveedor.");
    return;
  }

  if(!fecha){
    alert("Indica fecha.");
    return;
  }

  if(!imagenComprimida){
    alert("Añade una foto de la factura.");
    return;
  }

  const entrada = {
    id:"IAF-" + Date.now(),
    proveedor,
    numero,
    fecha,
    total,
    tipo,
    observaciones,
    imagen: imagenComprimida,
    estado:"PENDIENTE",
    creadaPor: usuarioActual(),
    fechaRegistro: new Date().toLocaleString("es-ES")
  };

  let data = leerFacturasIA();
  data.unshift(entrada);
  guardarFacturasIA(data);

  limpiarFormulario();
  pintarListado();

  alert("Factura guardada para revisión.");
}

function limpiarFormulario(){
  document.getElementById("proveedor").value = "";
  document.getElementById("numero").value = "";
  document.getElementById("fecha").value = hoyISO();
  document.getElementById("total").value = "";
  document.getElementById("tipo").value = "FACTURA";
  document.getElementById("observaciones").value = "";
  document.getElementById("foto").value = "";
  document.getElementById("preview").style.display = "none";
  document.getElementById("preview").src = "";
  imagenComprimida = "";
}

function cambiarEstado(id, estado){
  let data = leerFacturasIA();

  data = data.map(f=>{
    if(f.id === id){
      f.estado = estado;
      f.revisadaPor = usuarioActual();
      f.fechaRevision = new Date().toLocaleString("es-ES");
    }
    return f;
  });

  guardarFacturasIA(data);
  pintarListado();
}

function borrarRevision(id){
  if(!confirm("¿Borrar esta revisión?")) return;

  let data = leerFacturasIA().filter(f=>f.id !== id);
  guardarFacturasIA(data);
  pintarListado();
}

function pintarListado(){
  const cont = document.getElementById("listado");
  const data = leerFacturasIA();

  if(data.length === 0){
    cont.innerHTML = `<div class="vacio">No hay facturas guardadas.</div>`;
    return;
  }

  let html = "";

  data.forEach(f=>{
    html += `
      <div class="item">
        <strong>${f.proveedor}</strong>
        <div class="detalle">
          ${f.tipo || "FACTURA"} · ${f.fecha || ""} · Nº ${f.numero || "-"}<br>
          Total: ${f.total ? Number(f.total).toFixed(2) + " €" : "-"}
        </div>

        <span class="etiqueta ${f.estado}">${f.estado}</span>

        ${f.observaciones ? `<div style="margin-top:10px">${f.observaciones.replace(/\n/g,"<br>")}</div>` : ""}

        ${f.imagen ? `<img class="preview" src="${f.imagen}">` : ""}

        <div class="detalle">
          Guardado por: ${f.creadaPor || "OPERADOR"} · ${f.fechaRegistro || "-"}
          ${f.fechaRevision ? `<br>Revisado por: ${f.revisadaPor || "-"} · ${f.fechaRevision}` : ""}
        </div>

        <div class="acciones">
          <button class="azul" onclick="cambiarEstado('${f.id}','REVISADA')">Revisada</button>
          <button class="guardar" onclick="cambiarEstado('${f.id}','OK')">OK</button>
          <button class="rojo" onclick="cambiarEstado('${f.id}','INCIDENCIA')">Incidencia</button>
        </div>

        <button class="rojo" onclick="borrarRevision('${f.id}')">Borrar</button>
      </div>
    `;
  });

  cont.innerHTML = html;
}

document.getElementById("fecha").value = hoyISO();
pintarListado();
</script>

</body>
</html>
